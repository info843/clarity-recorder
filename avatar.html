<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clarity Avatar Front Premium</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  #root {
    position: fixed;
    inset: 0;
    background: transparent;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: transparent;
  }
</style>
</head>
<body>
<div id="root">
  <canvas id="avatarCanvas"></canvas>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("avatarCanvas");
  const ctx = canvas.getContext("2d", { alpha: true });

  let width = 0;
  let height = 0;
  let dpr = 1;

  const nobreath = new URLSearchParams(location.search).get("nobreath") === "1";

  const STYLES = {
    idle: {
      baseGlow: 0.62,
      pulseSpeed: 1.0,
      haloStrength: 0.55,
      eyeGlow: 0.85,
      orbitSpeed: 0.22,
      floatAmount: 1.0
    },
    listening: {
      baseGlow: 0.78,
      pulseSpeed: 1.35,
      haloStrength: 0.82,
      eyeGlow: 1.0,
      orbitSpeed: 0.34,
      floatAmount: 1.1
    },
    thinking: {
      baseGlow: 0.70,
      pulseSpeed: 0.72,
      haloStrength: 0.64,
      eyeGlow: 0.78,
      orbitSpeed: 0.16,
      floatAmount: 0.85
    },
    speaking: {
      baseGlow: 0.98,
      pulseSpeed: 1.85,
      haloStrength: 1.0,
      eyeGlow: 1.08,
      orbitSpeed: 0.42,
      floatAmount: 1.25
    }
  };

  let currentState = "idle";
  let targetLevel = 0;
  let currentLevel = 0;
  let lastMsg = performance.now();
  let activeStyle = { ...STYLES.idle };

  const particles = Array.from({ length: 24 }, (_, i) => ({
    angle: (Math.PI * 2 * i) / 24 + Math.random() * 0.4,
    radius: 1.18 + Math.random() * 0.28,
    speed: 0.15 + Math.random() * 0.18,
    size: 0.006 + Math.random() * 0.012,
    phase: Math.random() * Math.PI * 2,
    tint: Math.random() > 0.5 ? "cyan" : "magenta"
  }));

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function setState(state = "idle") {
    currentState = STYLES[state] ? state : "idle";
    activeStyle = { ...STYLES[currentState] };
  }

  function setLevel(value = 0) {
    targetLevel = clamp(Number(value) || 0, 0, 1);
    lastMsg = performance.now();
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function drawEllipse(x, y, rx, ry, rotation, fillStyle, alpha = 1, shadowColor = null, shadowBlur = 0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation || 0);
    ctx.globalAlpha = alpha;
    if (shadowColor) {
      ctx.shadowColor = shadowColor;
      ctx.shadowBlur = shadowBlur;
    }
    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = fillStyle;
    ctx.fill();
    ctx.restore();
  }

  function strokePath(drawFn, options) {
    ctx.save();
    ctx.globalAlpha = options.alpha == null ? 1 : options.alpha;
    ctx.lineCap = options.lineCap || "round";
    ctx.lineJoin = options.lineJoin || "round";
    ctx.lineWidth = options.lineWidth || 10;
    ctx.strokeStyle = options.strokeStyle || "#fff";

    if (options.shadowColor) ctx.shadowColor = options.shadowColor;
    if (options.shadowBlur) ctx.shadowBlur = options.shadowBlur;

    ctx.beginPath();
    drawFn();
    ctx.stroke();
    ctx.restore();
  }

  function fillPath(drawFn, options) {
    ctx.save();
    ctx.globalAlpha = options.alpha == null ? 1 : options.alpha;
    if (options.shadowColor) ctx.shadowColor = options.shadowColor;
    if (options.shadowBlur) ctx.shadowBlur = options.shadowBlur;
    ctx.beginPath();
    drawFn();
    ctx.fillStyle = options.fillStyle;
    ctx.fill();
    ctx.restore();
  }

  function createLinearGradient(x1, y1, x2, y2, stops) {
    const g = ctx.createLinearGradient(x1, y1, x2, y2);
    stops.forEach(stop => g.addColorStop(stop[0], stop[1]));
    return g;
  }

  function createRadialGradient(x1, y1, r1, x2, y2, r2, stops) {
    const g = ctx.createRadialGradient(x1, y1, r1, x2, y2, r2);
    stops.forEach(stop => g.addColorStop(stop[0], stop[1]));
    return g;
  }

  function drawAura(s, t, level, pulse) {
    const auraScale = 1 + pulse * 0.03 + level * 0.08;
    const haloStrength = activeStyle.haloStrength;

    // Soft outer aura
    const auraGrad = createRadialGradient(
      0, 0, s * 0.35,
      0, 0, s * 1.55 * auraScale,
      [
        [0.00, "rgba(70,220,255,0.18)"],
        [0.38, "rgba(60,140,255,0.12)"],
        [0.65, "rgba(255,40,170,0.10)"],
        [1.00, "rgba(255,255,255,0.00)"]
      ]
    );
    drawEllipse(0, 0, s * 1.55 * auraScale, s * 1.55 * auraScale, 0, auraGrad, 0.85 * haloStrength);

    // Cyan main ring
    strokePath(() => {
      ctx.arc(0, 0, s * (1.18 + level * 0.03 + pulse * 0.015), -Math.PI * 0.96, Math.PI * 0.78);
    }, {
      lineWidth: s * 0.018,
      strokeStyle: "rgba(120,255,255,0.48)",
      alpha: 0.55 * haloStrength,
      shadowColor: "rgba(70,240,255,0.75)",
      shadowBlur: s * 0.08
    });

    // Magenta secondary ring
    strokePath(() => {
      ctx.arc(0, 0, s * (1.31 + level * 0.04 + pulse * 0.02), -Math.PI * 0.08, Math.PI * 1.62);
    }, {
      lineWidth: s * 0.014,
      strokeStyle: "rgba(255,100,220,0.36)",
      alpha: 0.48 * haloStrength,
      shadowColor: "rgba(255,70,200,0.7)",
      shadowBlur: s * 0.07
    });

    // Dotted tech ring
    ctx.save();
    ctx.setLineDash([s * 0.022, s * 0.026]);
    strokePath(() => {
      ctx.arc(0, 0, s * (1.24 + pulse * 0.01), -Math.PI * 0.65 + t * 0.15, Math.PI * 1.1 + t * 0.15);
    }, {
      lineWidth: s * 0.008,
      strokeStyle: "rgba(210,245,255,0.28)",
      alpha: 0.55 * haloStrength,
      shadowColor: "rgba(140,235,255,0.35)",
      shadowBlur: s * 0.04
    });
    ctx.restore();
  }

  function drawParticles(s, t, level) {
    const orbitBase = activeStyle.orbitSpeed;
    particles.forEach((p, i) => {
      const a = p.angle + t * (orbitBase + p.speed + level * 0.35);
      const r = s * (p.radius + Math.sin(t * 1.1 + p.phase) * 0.02 + level * 0.05);
      const x = Math.cos(a) * r;
      const y = Math.sin(a) * r * 0.96;
      const size = s * (p.size + level * 0.006);

      let color = p.tint === "cyan"
        ? "rgba(135,255,255,0.85)"
        : "rgba(255,125,230,0.78)";

      drawEllipse(
        x, y, size, size, 0,
        color,
        0.75,
        color,
        s * 0.045
      );
    });
  }

  function drawCore(s, t, level) {
    // dark face orb
    const faceGrad = createRadialGradient(
      -s * 0.22, -s * 0.28, s * 0.04,
      0, 0, s * 0.9,
      [
        [0.00, "#173e8c"],
        [0.18, "#0b2e79"],
        [0.48, "#07255f"],
        [0.78, "#03173e"],
        [1.00, "#010e2a"]
      ]
    );

    drawEllipse(0, 0.01 * s, s * 0.78, s * 0.74, -0.06, faceGrad, 0.98, "rgba(30,180,255,0.16)", s * 0.06);

    // Inner subtle rim
    strokePath(() => {
      ctx.ellipse(0, 0.01 * s, s * 0.78, s * 0.74, -0.06, 0, Math.PI * 2);
    }, {
      lineWidth: s * 0.018,
      strokeStyle: "rgba(90,170,255,0.12)",
      alpha: 1
    });

    // left highlight
    const gloss = createRadialGradient(
      -s * 0.32, -s * 0.28, 0,
      -s * 0.32, -s * 0.28, s * 0.34,
      [
        [0.00, "rgba(255,255,255,0.95)"],
        [0.12, "rgba(220,235,255,0.72)"],
        [0.38, "rgba(120,180,255,0.20)"],
        [1.00, "rgba(255,255,255,0.00)"]
      ]
    );
    drawEllipse(-s * 0.18, -s * 0.20, s * 0.24, s * 0.18, -0.55, gloss, 0.9);

    // inner color ambience
    const innerAmbience = createRadialGradient(
      s * 0.18, s * 0.22, 0,
      s * 0.18, s * 0.22, s * 0.55,
      [
        [0.00, "rgba(255,0,150,0.16)"],
        [0.40, "rgba(110,40,255,0.08)"],
        [1.00, "rgba(0,0,0,0.00)"]
      ]
    );
    drawEllipse(0, 0.02 * s, s * 0.62, s * 0.58, 0, innerAmbience, 1);

    // cyan edge glow left
    const edgeGlow = createRadialGradient(
      -s * 0.52, 0, 0,
      -s * 0.52, 0, s * 0.42,
      [
        [0.00, "rgba(30,255,255,0.16)"],
        [0.55, "rgba(30,140,255,0.08)"],
        [1.00, "rgba(0,0,0,0.00)"]
      ]
    );
    drawEllipse(-s * 0.18, 0, s * 0.74, s * 0.68, 0, edgeGlow, 1);
  }

  function drawTopCyanRibbon(s, level, pulse) {
    const grad = createLinearGradient(-s * 0.9, -s * 0.9, s * 0.8, -s * 0.1, [
      [0.00, "#3bf9f1"],
      [0.35, "#34dce7"],
      [0.70, "#1795e8"],
      [1.00, "#0d4ab6"]
    ]);

    const hi = createLinearGradient(-s * 0.5, -s * 0.6, s * 0.6, -s * 0.25, [
      [0.00, "rgba(255,255,255,0.00)"],
      [0.25, "rgba(210,255,255,0.95)"],
      [0.65, "rgba(170,245,255,0.65)"],
      [1.00, "rgba(255,255,255,0.00)"]
    ]);

    strokePath(() => {
      ctx.moveTo(-s * 0.54, s * 0.03);
      ctx.bezierCurveTo(
        -s * 0.88, -s * 0.48,
        -s * 0.48, -s * 1.02,
        s * 0.16, -s * 0.96
      );
      ctx.bezierCurveTo(
        s * 0.68, -s * 0.90,
        s * 0.88, -s * 0.56,
        s * 0.68, -s * 0.26
      );
    }, {
      lineWidth: s * (0.39 + level * 0.03 + pulse * 0.01),
      strokeStyle: grad,
      alpha: 0.98,
      shadowColor: "rgba(35,240,255,0.70)",
      shadowBlur: s * 0.09
    });

    strokePath(() => {
      ctx.moveTo(-s * 0.34, -s * 0.02);
      ctx.bezierCurveTo(
        -s * 0.58, -s * 0.36,
        -s * 0.32, -s * 0.76,
        s * 0.18, -s * 0.78
      );
      ctx.bezierCurveTo(
        s * 0.48, -s * 0.78,
        s * 0.62, -s * 0.60,
        s * 0.52, -s * 0.44
      );
    }, {
      lineWidth: s * 0.06,
      strokeStyle: hi,
      alpha: 0.72
    });
  }

  function drawLowerBlueRibbon(s, level, pulse) {
    const grad = createLinearGradient(-s * 0.95, s * 0.75, s * 0.95, s * 0.15, [
      [0.00, "#0f63d6"],
      [0.28, "#004db6"],
      [0.60, "#00328f"],
      [1.00, "#031d67"]
    ]);

    strokePath(() => {
      ctx.moveTo(-s * 0.62, s * 0.35);
      ctx.bezierCurveTo(
        -s * 0.80, s * 0.62,
        -s * 0.44, s * 0.98,
        s * 0.08, s * 0.92
      );
      ctx.bezierCurveTo(
        s * 0.56, s * 0.86,
        s * 0.84, s * 0.54,
        s * 0.92, s * 0.18
      );
    }, {
      lineWidth: s * (0.33 + level * 0.02 + pulse * 0.01),
      strokeStyle: grad,
      alpha: 0.98,
      shadowColor: "rgba(0,110,255,0.52)",
      shadowBlur: s * 0.075
    });

    const hi = createLinearGradient(-s * 0.45, s * 0.52, s * 0.60, s * 0.16, [
      [0.00, "rgba(255,255,255,0.00)"],
      [0.25, "rgba(135,215,255,0.45)"],
      [0.55, "rgba(180,240,255,0.62)"],
      [1.00, "rgba(255,255,255,0.00)"]
    ]);

    strokePath(() => {
      ctx.moveTo(-s * 0.30, s * 0.44);
      ctx.bezierCurveTo(
        -s * 0.42, s * 0.64,
        -s * 0.10, s * 0.77,
        s * 0.28, s * 0.72
      );
      ctx.bezierCurveTo(
        s * 0.54, s * 0.68,
        s * 0.66, s * 0.48,
        s * 0.70, s * 0.30
      );
    }, {
      lineWidth: s * 0.048,
      strokeStyle: hi,
      alpha: 0.58
    });
  }

  function drawMagentaRibbon(s, level, pulse) {
    const grad = createLinearGradient(s * 0.42, -s * 0.52, s * 0.42, s * 0.98, [
      [0.00, "#ff2db0"],
      [0.32, "#f80099"],
      [0.62, "#b300ff"],
      [1.00, "#ff139d"]
    ]);

    strokePath(() => {
      ctx.moveTo(s * 0.72, -s * 0.20);
      ctx.bezierCurveTo(
        s * 0.92, s * 0.02,
        s * 0.98, s * 0.42,
        s * 0.72, s * 0.74
      );
      ctx.bezierCurveTo(
        s * 0.42, s * 1.02,
        -s * 0.04, s * 0.98,
        -s * 0.22, s * 0.84
      );
    }, {
      lineWidth: s * (0.34 + level * 0.03 + pulse * 0.015),
      strokeStyle: grad,
      alpha: 0.98,
      shadowColor: "rgba(255,40,180,0.78)",
      shadowBlur: s * 0.10
    });

    const hi = createLinearGradient(s * 0.60, -s * 0.25, s * 0.18, s * 0.88, [
      [0.00, "rgba(255,255,255,0.00)"],
      [0.15, "rgba(255,220,245,0.72)"],
      [0.55, "rgba(255,170,235,0.60)"],
      [1.00, "rgba(255,255,255,0.00)"]
    ]);

    strokePath(() => {
      ctx.moveTo(s * 0.68, -s * 0.02);
      ctx.bezierCurveTo(
        s * 0.76, s * 0.14,
        s * 0.76, s * 0.42,
        s * 0.56, s * 0.66
      );
      ctx.bezierCurveTo(
        s * 0.34, s * 0.84,
        s * 0.10, s * 0.88,
        -s * 0.02, s * 0.82
      );
    }, {
      lineWidth: s * 0.05,
      strokeStyle: hi,
      alpha: 0.72
    });
  }

  function drawPurpleTransition(s) {
    const grad = createLinearGradient(-s * 0.20, s * 0.78, s * 0.82, s * 0.30, [
      [0.00, "rgba(70,120,255,0.00)"],
      [0.24, "rgba(100,80,255,0.50)"],
      [0.70, "rgba(220,70,255,0.58)"],
      [1.00, "rgba(255,120,240,0.10)"]
    ]);

    strokePath(() => {
      ctx.moveTo(-s * 0.24, s * 0.72);
      ctx.bezierCurveTo(
        s * 0.04, s * 0.82,
        s * 0.34, s * 0.76,
        s * 0.62, s * 0.56
      );
    }, {
      lineWidth: s * 0.10,
      strokeStyle: grad,
      alpha: 0.48,
      shadowColor: "rgba(120,60,255,0.28)",
      shadowBlur: s * 0.05
    });
  }

  function drawRibbonShadows(s) {
    // faint overall shape depth
    drawEllipse(-s * 0.08, s * 0.14, s * 0.92, s * 0.76, 0.08, "rgba(0,0,0,0.10)", 1, "rgba(0,0,0,0.18)", s * 0.09);
  }

  function drawEyes(s, t, level) {
    const blinkCycle = 4.8;
    const blinkPhase = (t % blinkCycle) / blinkCycle;
    let eyeOpen = 1;

    if (blinkPhase > 0.93) {
      eyeOpen = 1 - ((blinkPhase - 0.93) / 0.07);
    }
    if (blinkPhase > 0.965) {
      eyeOpen = (blinkPhase - 0.965) / 0.035;
    }

    eyeOpen = clamp(eyeOpen, 0.35, 1);

    const glow = activeStyle.eyeGlow + level * 0.42;

    function drawOneEye(x) {
      const y = s * 0.12;
      const w = s * 0.26;
      const h = s * 0.095 * eyeOpen;

      // glow
      strokePath(() => {
        ctx.moveTo(x - w * 0.52, y);
        ctx.quadraticCurveTo(x, y - h * 1.05, x + w * 0.52, y);
      }, {
        lineWidth: s * 0.075,
        strokeStyle: "rgba(0,220,255,0.16)",
        alpha: 0.95,
        shadowColor: "rgba(40,240,255,0.95)",
        shadowBlur: s * 0.11
      });

      // main eye line
      const g = createLinearGradient(x - w * 0.5, y - h, x + w * 0.5, y, [
        [0.00, "#8bffff"],
        [0.50, "#d3ffff"],
        [1.00, "#8bffff"]
      ]);

      strokePath(() => {
        ctx.moveTo(x - w * 0.48, y);
        ctx.quadraticCurveTo(x, y - h, x + w * 0.48, y);
      }, {
        lineWidth: s * 0.038,
        strokeStyle: g,
        alpha: clamp(0.78 + glow * 0.14, 0, 1)
      });
    }

    drawOneEye(-s * 0.20);
    drawOneEye(s * 0.20);
  }

  function drawSpeculars(s) {
    // strong white reflection
    const g1 = createRadialGradient(
      -s * 0.32, -s * 0.24, 0,
      -s * 0.32, -s * 0.24, s * 0.26,
      [
        [0.00, "rgba(255,255,255,0.98)"],
        [0.18, "rgba(220,235,255,0.75)"],
        [0.45, "rgba(170,200,255,0.18)"],
        [1.00, "rgba(255,255,255,0.00)"]
      ]
    );
    drawEllipse(-s * 0.18, -s * 0.19, s * 0.20, s * 0.13, -0.58, g1, 0.88);

    const g2 = createLinearGradient(-s * 0.50, -s * 0.36, s * 0.42, -s * 0.02, [
      [0.00, "rgba(255,255,255,0.00)"],
      [0.18, "rgba(220,255,255,0.65)"],
      [0.50, "rgba(160,245,255,0.52)"],
      [1.00, "rgba(255,255,255,0.00)"]
    ]);

    strokePath(() => {
      ctx.moveTo(-s * 0.42, -s * 0.20);
      ctx.bezierCurveTo(
        -s * 0.28, -s * 0.42,
        -s * 0.02, -s * 0.58,
        s * 0.30, -s * 0.52
      );
    }, {
      lineWidth: s * 0.05,
      strokeStyle: g2,
      alpha: 0.45
    });
  }

  function drawAvatar(t) {
    const silentFor = performance.now() - lastMsg;
    const fallback = (!nobreath && silentFor > 3000)
      ? (Math.sin(t * 1.6) * 0.5 + 0.5) * 0.34
      : targetLevel;

    currentLevel = lerp(currentLevel, fallback, 0.12);

    const s = Math.min(width, height) * 0.235;
    const pulse = Math.sin(t * activeStyle.pulseSpeed * 2.2) * 0.5 + 0.5;
    const breath = nobreath ? 0 : (Math.sin(t * 1.55) * 0.5 + 0.5);

    const floatY = Math.sin(t * 1.25) * s * 0.018 * activeStyle.floatAmount;
    const subtleTilt = Math.sin(t * 0.7) * 0.02;

    ctx.clearRect(0, 0, width, height);

    ctx.save();
    ctx.translate(width / 2, height / 2 + floatY);
    ctx.rotate(subtleTilt);
    ctx.scale(
      1 + breath * 0.010 + currentLevel * 0.032,
      1 + breath * 0.016 + currentLevel * 0.045
    );

    drawAura(s, t, currentLevel, pulse);
    drawParticles(s, t, currentLevel);
    drawRibbonShadows(s);

    // back ambient glow
    const backGlow = createRadialGradient(
      0, 0, s * 0.18,
      0, 0, s * 1.05,
      [
        [0.00, "rgba(0,150,255,0.12)"],
        [0.40, "rgba(130,60,255,0.08)"],
        [0.75, "rgba(255,0,160,0.06)"],
        [1.00, "rgba(0,0,0,0.00)"]
      ]
    );
    drawEllipse(0, 0.04 * s, s * 1.00, s * 0.95, 0, backGlow, 1);

    drawCore(s, t, currentLevel);
    drawLowerBlueRibbon(s, currentLevel, pulse);
    drawTopCyanRibbon(s, currentLevel, pulse);
    drawPurpleTransition(s);
    drawMagentaRibbon(s, currentLevel, pulse);
    drawSpeculars(s);
    drawEyes(s, t, currentLevel);

    ctx.restore();
  }

  let prev = performance.now() / 1000;

  function frame() {
    requestAnimationFrame(frame);
    const now = performance.now() / 1000;
    prev = now;
    drawAvatar(now);
  }

  window.addEventListener("resize", resize);

  window.addEventListener("message", (ev) => {
    const d = ev && ev.data ? ev.data : {};

    if (d.type === "avatar:set") {
      setState(d.state || "idle");
    }

    if (d.type === "avatar:level") {
      setLevel(d.value);
    }

    if (d.type === "ping") {
      try {
        ev.source && ev.source.postMessage && ev.source.postMessage({ type: "avatar:ready" }, "*");
      } catch (e) {}
    }
  });

  resize();
  setState("idle");
  setLevel(0);
  frame();

  setTimeout(() => {
    try {
      window.parent && window.parent.postMessage && window.parent.postMessage({ type: "avatar:ready" }, "*");
    } catch (e) {}
  }, 50);
})();
</script>
</body>
</html>
