<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>CLARITY Reactive Avatar v2.0.1 Safe Render</title>
<style>
  :root{
    --cyan:#3DE6F5;
    --blue:#064E9B;
    --navy:#041D48;
    --violet:#6A35FF;
    --magenta:#EF00B8;
    --white:#F7FBFF;
    --amber:#FFB84D;
    --success:#48F0C2;
    --state-color:var(--cyan);
    --state-color-2:var(--violet);
    --state-scale:1;
    --state-speed:4.8s;
    --state-glow:.55;
    --level:.12;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  body.bg{background:radial-gradient(circle at 50% 45%,rgba(6,78,155,.28),rgba(4,29,72,.92) 72%,#020816 100%)}
  #root{position:fixed;inset:0;background:transparent;overflow:hidden}
  canvas{display:block;position:absolute;inset:0;width:100%;height:100%}

  /* Always-visible CSS fallback. It prevents a blank iframe if WebGL or the CDN fails. */
  #fallbackOrb{position:fixed;inset:0;display:grid;place-items:center;pointer-events:none;opacity:1;transition:opacity .45s ease;filter:drop-shadow(0 22px 60px rgba(0,22,56,.22))}
  #fallbackOrb.three-on{opacity:0}
  .orbWrap{position:relative;width:min(62vw,62vh,360px);height:min(62vw,62vh,360px);transform:scale(calc(var(--state-scale) + var(--level) * .045));transition:transform .16s ease-out}
  .orbCore{position:absolute;inset:9%;border-radius:50%;background:
      radial-gradient(circle at 33% 25%,rgba(255,255,255,.88) 0 5%,rgba(255,255,255,.22) 6% 14%,transparent 15%),
      radial-gradient(circle at 68% 70%,rgba(239,0,184,.78),transparent 38%),
      radial-gradient(circle at 30% 25%,rgba(61,230,245,.9),transparent 42%),
      linear-gradient(135deg,#041D48 6%,#064E9B 40%,#6A35FF 67%,#EF00B8 96%);
    box-shadow:inset 0 0 32px rgba(255,255,255,.30),inset -24px -36px 70px rgba(4,29,72,.36),0 0 calc(36px + var(--level)*60px) color-mix(in srgb, var(--state-color) 70%, transparent),0 22px 80px rgba(0,25,67,.22);
    animation:orbBreath var(--state-speed) ease-in-out infinite,orbHue 9s ease-in-out infinite;
  }
  .orbCore::before{content:"";position:absolute;inset:5%;border-radius:50%;background:linear-gradient(148deg,rgba(255,255,255,.34),transparent 28%,rgba(255,255,255,.10) 58%,transparent 72%);transform:rotate(-18deg)}
  .orbCore::after{content:"";position:absolute;inset:-1%;border-radius:50%;border:1px solid rgba(255,255,255,.34);box-shadow:inset 0 0 22px rgba(255,255,255,.18),0 0 38px rgba(61,230,245,.22)}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid color-mix(in srgb, var(--state-color) 76%, transparent);filter:drop-shadow(0 0 18px var(--state-color));opacity:calc(.25 + var(--level)*.55);animation:ringPulse 2.4s ease-in-out infinite}
  .ring.r2{inset:-7%;border-color:color-mix(in srgb, var(--state-color-2) 66%, transparent);animation-duration:3.15s;animation-direction:reverse;opacity:calc(.16 + var(--level)*.42)}
  .spark{position:absolute;width:5px;height:5px;border-radius:50%;background:var(--state-color);box-shadow:0 0 16px var(--state-color);opacity:calc(.22 + var(--level)*.55);animation:sparkOrbit 6s linear infinite}
  .spark.s2{animation-duration:7.7s;animation-direction:reverse;background:var(--state-color-2);box-shadow:0 0 18px var(--state-color-2)}
  .spark.s3{animation-duration:10s;transform-origin:110px 40px;background:#fff;box-shadow:0 0 14px #fff}

  #statusWrap{position:fixed;left:50%;bottom:clamp(10px,4.5vh,26px);transform:translateX(-50%);pointer-events:none;display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;color:rgba(247,251,255,.94);font-size:12px;font-weight:650;letter-spacing:.18px;background:linear-gradient(135deg,rgba(4,29,72,.52),rgba(4,78,155,.22));border:1px solid rgba(247,251,255,.16);box-shadow:0 14px 40px rgba(0,17,42,.22),inset 0 1px 0 rgba(255,255,255,.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);white-space:nowrap}
  #statusWrap.on{display:flex}
  #dot{width:7px;height:7px;border-radius:999px;background:var(--state-color);box-shadow:0 0 14px var(--state-color),0 0 24px color-mix(in srgb, var(--state-color) 55%, transparent)}
  #debug{position:fixed;left:8px;top:8px;z-index:5;display:none;color:rgba(247,251,255,.86);background:rgba(4,29,72,.58);border:1px solid rgba(247,251,255,.12);border-radius:10px;padding:7px 9px;font:11px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;pointer-events:none;max-width:calc(100vw - 24px);white-space:pre-wrap}
  #debug.on{display:block}
  @keyframes orbBreath{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(calc(1.015 + var(--level)*.05)) rotate(1.2deg)}}
  @keyframes orbHue{0%,100%{filter:saturate(1.04)}50%{filter:saturate(1.22)}}
  @keyframes ringPulse{0%,100%{transform:scale(.94);opacity:.24}50%{transform:scale(calc(1.02 + var(--level)*.14));opacity:.68}}
  @keyframes sparkOrbit{from{transform:rotate(0deg) translateX(48%) rotate(0deg)}to{transform:rotate(360deg) translateX(48%) rotate(-360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<div id="fallbackOrb" aria-hidden="true">
  <div class="orbWrap">
    <div class="ring"></div><div class="ring r2"></div>
    <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span>
    <div class="orbCore"></div>
  </div>
</div>
<div id="statusWrap" aria-hidden="true"><span id="dot"></span><span id="statusText">Ready</span></div>
<div id="debug"></div>
<script>
(()=>{
  'use strict';
  const VERSION = 'clarity_avatar_v2_0_1_SAFE_RENDER_READY';
  const params = new URLSearchParams(location.search || '');
  const DEBUG = params.get('debug') === '1';
  const SHOW_LABEL_DEFAULT = params.get('label') === '1' || params.get('showLabel') === '1';
  const LOW_MOTION = params.get('motion') === 'low' || params.get('reducedMotion') === '1';
  const NO_BREATH = params.get('nobreath') === '1';
  const FORCE_CSS = params.get('css') === '1' || params.get('no3d') === '1';
  if (params.get('bg') === '1' || DEBUG) document.body.classList.add('bg');

  const root = document.getElementById('root');
  const fallbackOrb = document.getElementById('fallbackOrb');
  const statusWrap = document.getElementById('statusWrap');
  const statusText = document.getElementById('statusText');
  const debugEl = document.getElementById('debug');
  if (DEBUG) debugEl.classList.add('on');

  const clamp01 = (v)=> Math.max(0, Math.min(1, Number(v) || 0));
  const lerp = (a,b,t)=> a + (b-a)*t;
  const safe = (fn, fallback)=>{ try { return fn(); } catch(e){ return fallback; } };
  const nowMs = ()=> performance.now();
  function log(msg, extra){
    if (!DEBUG) return;
    const text = `[${VERSION}] ${msg}${extra ? '\n' + JSON.stringify(extra).slice(0,520) : ''}`;
    console.log(text);
    debugEl.textContent = text;
  }
  function postParent(msg){ safe(()=> parent && parent.postMessage && parent.postMessage({ ...msg, from:'clarity-avatar', version:VERSION }, '*')); }
  function parseMessage(data){
    if (!data) return {};
    if (typeof data === 'string') { try { return JSON.parse(data); } catch(_){ return { type:data }; } }
    return data;
  }

  const STATE = {
    idle:{label:'Ready', c1:'#3DE6F5', c2:'#6A35FF', scale:1, speed:'5.2s'},
    ready:{label:'Ready', c1:'#3DE6F5', c2:'#064E9B', scale:1.01, speed:'4.8s'},
    listening:{label:'Listening', c1:'#3DE6F5', c2:'#064E9B', scale:1.025, speed:'3.8s'},
    user_speaking:{label:'User speaking', c1:'#3DE6F5', c2:'#064E9B', scale:1.045, speed:'2.8s'},
    ai_speaking:{label:'AI speaking', c1:'#EF00B8', c2:'#6A35FF', scale:1.065, speed:'2.45s'},
    thinking:{label:'Thinking', c1:'#6A35FF', c2:'#3DE6F5', scale:1.025, speed:'4.2s'},
    processing:{label:'Processing', c1:'#3DE6F5', c2:'#F7FBFF', scale:1.035, speed:'2.2s'},
    complete:{label:'Complete', c1:'#48F0C2', c2:'#F7FBFF', scale:1.055, speed:'2.6s'},
    error:{label:'Please wait', c1:'#FFB84D', c2:'#EF00B8', scale:1.025, speed:'3.3s'},
    stopped:{label:'Stopped', c1:'#F7FBFF', c2:'#064E9B', scale:.985, speed:'6s'}
  };
  function normalizeState(s){
    const x = String(s || '').trim().toLowerCase().replace(/[\s-]+/g,'_');
    const a = {
      wait:'idle', waiting:'idle', standby:'idle', awake:'ready', start:'ready', active:'ready',
      listen:'listening', hearing:'listening', recording:'listening',
      user:'user_speaking', user_speech:'user_speaking', user_talking:'user_speaking', candidate_speaking:'user_speaking', speech_started:'user_speaking',
      speaking:'ai_speaking', ai:'ai_speaking', assistant:'ai_speaking', assistant_speaking:'ai_speaking', ai_talking:'ai_speaking', talking:'ai_speaking', speak:'ai_speaking',
      think:'thinking', analyzing:'thinking', analysing:'thinking', preparing:'thinking',
      process:'processing', uploading:'processing', exporting:'processing', report:'processing', building_report:'processing',
      done:'complete', success:'complete', finished:'complete', ready_done:'complete', report_ready:'complete',
      warn:'error', warning:'error', failed:'error', failure:'error', stopped:'stopped', stop:'stopped'
    };
    return STATE[x] ? x : (a[x] || 'idle');
  }

  let stateName = 'idle';
  let currentLevel = .10, targetLevel = .10, userLevel = 0, aiLevel = 0;
  let lastLevelAt = nowMs();
  let threeAPI = null;
  let threeReady = false;

  function setLabelVisibility(on){ statusWrap.classList.toggle('on', !!on); }
  setLabelVisibility(SHOW_LABEL_DEFAULT);

  function applyCssState(name){
    const s = STATE[name] || STATE.idle;
    document.documentElement.style.setProperty('--state-color', s.c1);
    document.documentElement.style.setProperty('--state-color-2', s.c2);
    document.documentElement.style.setProperty('--state-scale', s.scale);
    document.documentElement.style.setProperty('--state-speed', s.speed);
    statusText.textContent = s.label;
  }
  function setState(name){
    stateName = normalizeState(name);
    applyCssState(stateName);
    if (threeAPI) threeAPI.setState(stateName);
    postParent({ type:'avatar:state', state:stateName, label:(STATE[stateName] || STATE.idle).label });
    log('state', { state:stateName, threeReady });
  }
  function setLevel(value, source){
    const v = clamp01(value);
    const src = String(source || '').toLowerCase();
    lastLevelAt = nowMs();
    if (src === 'user' || src === 'mic' || src === 'candidate') {
      userLevel = v; targetLevel = Math.max(targetLevel, v);
      if (v > .08 && ['idle','ready','listening'].includes(stateName)) setState('user_speaking');
    } else if (src === 'ai' || src === 'assistant' || src === 'tts' || src === 'output') {
      aiLevel = v; targetLevel = Math.max(targetLevel, v);
      if (v > .08 && ['idle','ready','thinking'].includes(stateName)) setState('ai_speaking');
    } else {
      targetLevel = v;
      if (stateName === 'ai_speaking') aiLevel = Math.max(aiLevel, v);
      if (stateName === 'user_speaking' || stateName === 'listening') userLevel = Math.max(userLevel, v);
    }
    if (threeAPI) threeAPI.setLevel(v, src);
  }
  function stopAvatar(){ userLevel=0; aiLevel=0; targetLevel=0; setState('stopped'); }
  function resetAvatar(){ userLevel=0; aiLevel=0; targetLevel=.18; setState('ready'); }

  function loadScript(src){
    return new Promise((resolve,reject)=>{
      const s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.crossOrigin = 'anonymous';
      s.onload = resolve;
      s.onerror = ()=> reject(new Error('script_load_failed: '+src));
      document.head.appendChild(s);
    });
  }
  async function ensureThree(){
    if (window.THREE) return window.THREE;
    const cdns = [
      'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
      'https://unpkg.com/three@0.160.0/build/three.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js'
    ];
    let lastErr = null;
    for (const src of cdns) {
      try { log('loading three', {src}); await loadScript(src); if (window.THREE) return window.THREE; }
      catch(e){ lastErr = e; log('three load failed', {src, error:String(e && e.message || e)}); }
    }
    throw lastErr || new Error('THREE not available');
  }

  function createThreeAvatar(THREE){
    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, LOW_MOTION ? 1.25 : 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    root.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, .1, 60);
    camera.position.set(0,0,3.45);
    const group = new THREE.Group(); scene.add(group);
    scene.add(new THREE.AmbientLight(0xffffff, .92));
    const key = new THREE.DirectionalLight(0xffffff, .42); key.position.set(3,2.5,3); scene.add(key);
    const cyanLight = new THREE.PointLight(0x3DE6F5, 1.25, 7); cyanLight.position.set(-2,1.3,2.4); scene.add(cyanLight);
    const magLight = new THREE.PointLight(0xEF00B8, .85, 7); magLight.position.set(2,-1.5,2.2); scene.add(magLight);

    const coreMat = new THREE.MeshStandardMaterial({
      color:0x064E9B, emissive:0x3DE6F5, emissiveIntensity:.42, roughness:.28, metalness:.03, transparent:true, opacity:.96
    });
    const core = new THREE.Mesh(new THREE.SphereGeometry(.86, LOW_MOTION ? 96 : 160, LOW_MOTION ? 64 : 112), coreMat);
    group.add(core);

    const shellMat = new THREE.MeshPhysicalMaterial({
      color:0xF7FBFF, transparent:true, opacity:.22, roughness:.08, metalness:0, transmission:.38, thickness:.45, clearcoat:1, clearcoatRoughness:.08, side:THREE.FrontSide
    });
    const shell = new THREE.Mesh(new THREE.SphereGeometry(1.0, LOW_MOTION ? 80 : 128, LOW_MOTION ? 56 : 88), shellMat);
    group.add(shell);

    function ring(color, radius, tube){
      const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.32, blending:THREE.AdditiveBlending, depthWrite:false });
      const mesh = new THREE.Mesh(new THREE.TorusGeometry(radius, tube, 16, 180), mat);
      group.add(mesh);
      return mesh;
    }
    const rUser = ring(0x3DE6F5, 1.08, .008);
    const rAi = ring(0xEF00B8, 1.18, .009);
    const rProcess = ring(0xF7FBFF, 1.30, .007);
    rUser.rotation.x = Math.PI/2.2; rAi.rotation.y = Math.PI/2.5; rProcess.rotation.x = Math.PI/2;

    const pCount = LOW_MOTION ? 70 : 120;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount*3);
    for(let i=0;i<pCount;i++){
      const a = Math.random()*Math.PI*2, r=1.13+Math.random()*.58, z=(Math.random()*2-1)*.52;
      pPos[i*3]=Math.cos(a)*r; pPos[i*3+1]=Math.sin(a)*r; pPos[i*3+2]=z;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
    const pMat = new THREE.PointsMaterial({ color:0x3DE6F5, size:.018, transparent:true, opacity:.30, blending:THREE.AdditiveBlending, depthWrite:false });
    const particles = new THREE.Points(pGeo,pMat); group.add(particles);

    let visualState = stateName;
    let localLevel = currentLevel;
    let tPrev = performance.now()/1000;
    function applyVisualState(){
      const s = visualState;
      const ai = s === 'ai_speaking';
      const user = s === 'user_speaking' || s === 'listening';
      const processing = s === 'processing';
      const complete = s === 'complete';
      const err = s === 'error';
      coreMat.color.setHex(ai ? 0x6A35FF : user ? 0x064E9B : processing ? 0x041D48 : complete ? 0x067C68 : err ? 0x8F5512 : 0x064E9B);
      coreMat.emissive.setHex(ai ? 0xEF00B8 : user ? 0x3DE6F5 : processing ? 0x3DE6F5 : complete ? 0x48F0C2 : err ? 0xFFB84D : 0x3DE6F5);
      rUser.material.opacity = (user ? .42 : .16) + Math.max(userLevel,localLevel*.25)*.42;
      rAi.material.opacity = (ai ? .48 : .10) + Math.max(aiLevel,localLevel*.22)*.42;
      rProcess.material.opacity = processing ? .62 : complete ? .38 : .08;
      pMat.color.setHex(ai ? 0xEF00B8 : user ? 0x3DE6F5 : complete ? 0x48F0C2 : err ? 0xFFB84D : 0x3DE6F5);
    }
    function frame(){
      requestAnimationFrame(frame);
      const tNow = performance.now()/1000;
      const dt = Math.min(tNow - tPrev, .05); tPrev = tNow;
      if (nowMs() - lastLevelAt > 240) { userLevel*=.88; aiLevel*=.88; targetLevel*=.90; }
      const breath = (!NO_BREATH && nowMs()-lastLevelAt>3000) ? (Math.sin(tNow*1.45)*.5+.5)*.18 : 0;
      localLevel = lerp(localLevel, Math.max(targetLevel,userLevel,aiLevel,breath), .14);
      applyVisualState();
      const scaleBase = (STATE[visualState] || STATE.idle).scale || 1;
      group.scale.setScalar(scaleBase * (1 + localLevel*.055 + aiLevel*.025));
      core.rotation.y += dt*(.15 + localLevel*.25);
      core.rotation.x += dt*(.05 + aiLevel*.08);
      shell.rotation.y -= dt*.035;
      rUser.rotation.z += dt*(.40 + userLevel*1.8);
      rAi.rotation.z -= dt*(.55 + aiLevel*1.8);
      rProcess.rotation.z += dt*(visualState === 'processing' ? 1.6 : .35);
      particles.rotation.z += dt*(.045 + localLevel*.10);
      coreMat.emissiveIntensity = .35 + localLevel*.75 + aiLevel*.35;
      pMat.opacity = .18 + localLevel*.45;
      cyanLight.intensity = 1.0 + userLevel*1.4 + localLevel*.35;
      magLight.intensity = .55 + aiLevel*1.7;
      renderer.render(scene,camera);
    }
    window.addEventListener('resize',()=>{
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, LOW_MOTION ? 1.25 : 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
    });
    frame();
    return {
      setState(s){ visualState = normalizeState(s); applyVisualState(); },
      setLevel(v){ targetLevel = Math.max(targetLevel, clamp01(v)); }
    };
  }

  function cssFrame(){
    if (nowMs() - lastLevelAt > 240) { userLevel*=.88; aiLevel*=.88; targetLevel*=.90; }
    const breath = (!NO_BREATH && nowMs()-lastLevelAt>3000) ? (Math.sin(performance.now()/1000*1.45)*.5+.5)*.18 : 0;
    currentLevel = lerp(currentLevel, Math.max(targetLevel,userLevel,aiLevel,breath), .16);
    document.documentElement.style.setProperty('--level', String(currentLevel.toFixed(3)));
    requestAnimationFrame(cssFrame);
  }
  cssFrame();

  window.addEventListener('message',(ev)=>{
    const d = parseMessage(ev && ev.data);
    if (!d || !d.type) return;
    const type = String(d.type).trim().toLowerCase();
    if (type === 'ping' || type === 'avatar:ping') { ev.source && ev.source.postMessage && ev.source.postMessage({ type:'avatar:ready', version:VERSION }, '*'); postParent({ type:'avatar:ready' }); return; }
    if (type === 'avatar:set' || type === 'avatar:state') { setState(d.state || d.value || 'idle'); return; }
    if (type === 'avatar:level') { setLevel(d.value ?? d.level ?? 0, d.source || d.channel || d.role || ''); return; }
    if (type === 'avatar:userlevel' || type === 'avatar:user-level') { setLevel(d.value ?? d.level ?? 0, 'user'); return; }
    if (type === 'avatar:ailevel' || type === 'avatar:ai-level') { setLevel(d.value ?? d.level ?? 0, 'ai'); return; }
    if (type === 'avatar:config') { if ('showLabel' in d) setLabelVisibility(!!d.showLabel); if ('label' in d) setLabelVisibility(!!d.label); if (d.state) setState(d.state); return; }
    if (type === 'avatar:stop') { stopAvatar(); return; }
    if (type === 'avatar:reset') { resetAvatar(); return; }
    if (type === 'avatar:complete') { setState('complete'); targetLevel=.8; return; }
    if (type === 'avatar:error') { setState('error'); targetLevel=.55; return; }
    if (type === 'clarity.live.ready' || type === 'recorder:ready') setState('ready');
    else if (type === 'input_audio_buffer.speech_started' || type === 'speech_started') setState('user_speaking');
    else if (type === 'input_audio_buffer.speech_stopped' || type === 'speech_stopped') setState('listening');
    else if (type === 'response.audio.delta' || type === 'response.audio_transcript.delta' || type === 'assistant_audio_delta') setLevel(d.value ?? .55, 'ai');
    else if (type === 'response.done' || type === 'assistant_done') { aiLevel = 0; setState('listening'); }
    else if (type === 'recorder:finished' || type === 'processing:start') setState('processing');
    else if (type === 'processing:done' || type === 'report:ready') setState('complete');
  });

  setState(params.get('state') || 'idle');
  setTimeout(()=> postParent({ type:'avatar:ready' }), 80);

  (async()=>{
    if (FORCE_CSS) { log('CSS fallback forced'); postParent({ type:'avatar:ready', renderer:'css' }); return; }
    try {
      if (!safe(()=> !!document.createElement('canvas').getContext('webgl2')) && !safe(()=> !!document.createElement('canvas').getContext('webgl'))) throw new Error('webgl_unavailable');
      const THREE = await ensureThree();
      threeAPI = createThreeAvatar(THREE);
      threeReady = true;
      fallbackOrb.classList.add('three-on');
      postParent({ type:'avatar:ready', renderer:'three' });
      log('three ready');
    } catch(e) {
      threeReady = false;
      fallbackOrb.classList.remove('three-on');
      postParent({ type:'avatar:error', code:'THREE_OR_WEBGL_FALLBACK', message:String(e && e.message || e), renderer:'css' });
      log('fallback css active', { error:String(e && e.message || e) });
    }
  })();
})();
</script>
</body>
</html>
