<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>CLARITY Voice Orb Avatar v3.0</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  #stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    background: transparent;
  }

  #label {
    position: fixed;
    left: 50%;
    bottom: 7%;
    transform: translateX(-50%);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: clamp(13px, 3.4vw, 22px);
    font-weight: 700;
    letter-spacing: .01em;
    color: rgba(58, 34, 120, .92);
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity .25s ease;
  }

  body.show-label #label { opacity: 1; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="label"></div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d', { alpha: true, desynchronized: true });
  const label = document.getElementById('label');
  const params = new URLSearchParams(location.search);

  const SHOW_LABEL = params.get('label') === '1';
  const DEBUG = params.get('debug') === '1';
  const DEMO = params.get('demo') === '1';
  const NO_BREATH = params.get('nobreath') === '1';
  const TEST_BG = params.get('bg') === '1';

  if (SHOW_LABEL || DEBUG) document.body.classList.add('show-label');

  const clamp = (v, min = 0, max = 1) => Math.max(min, Math.min(max, Number(v) || 0));
  const lerp = (a, b, t) => a + (b - a) * t;
  const TAU = Math.PI * 2;

  function hexToRgb(hex) {
    const h = String(hex || '').replace('#', '').trim();
    const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h;
    const n = parseInt(full || 'ffffff', 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  function rgbToCss(rgb, a = 1) {
    return `rgba(${Math.round(rgb[0])},${Math.round(rgb[1])},${Math.round(rgb[2])},${a})`;
  }

  function mixRgb(a, b, t) {
    return [lerp(a[0], b[0], t), lerp(a[1], b[1], t), lerp(a[2], b[2], t)];
  }

  function palette(def) {
    return {
      deep: hexToRgb(def.deep),
      mid: hexToRgb(def.mid),
      bright: hexToRgb(def.bright),
      accent: hexToRgb(def.accent),
      halo: hexToRgb(def.halo),
      white: hexToRgb(def.white || '#f7fbff'),
      energy: def.energy,
      spin: def.spin,
      scale: def.scale,
      label: def.label
    };
  }

  const PALETTES = {
    idle: palette({
      deep:'#09133f', mid:'#152a89', bright:'#2ecde2', accent:'#7a4dff', halo:'#62e9ff', energy:.22, spin:.36, scale:1.00, label:'Bereit'
    }),
    ready: palette({
      deep:'#09133f', mid:'#173091', bright:'#30d7e8', accent:'#7c58ff', halo:'#70edff', energy:.28, spin:.40, scale:1.00, label:'Bereit'
    }),
    listening: palette({
      deep:'#071f4d', mid:'#0e55b5', bright:'#3ee6f5', accent:'#508bff', halo:'#6ff7ff', energy:.40, spin:.52, scale:1.015, label:'Zuhören'
    }),
    user_speaking: palette({
      deep:'#06214c', mid:'#0072c8', bright:'#55f2ff', accent:'#2ed6ce', halo:'#79fbff', energy:.78, spin:.80, scale:1.035, label:'User spricht'
    }),
    ai_speaking: palette({
      deep:'#140c4c', mid:'#3921a8', bright:'#37dff2', accent:'#f023b8', halo:'#f668d6', energy:.86, spin:.92, scale:1.045, label:'KI spricht'
    }),
    speaking: palette({
      deep:'#140c4c', mid:'#3921a8', bright:'#37dff2', accent:'#f023b8', halo:'#f668d6', energy:.86, spin:.92, scale:1.045, label:'KI spricht'
    }),
    thinking: palette({
      deep:'#0b1648', mid:'#211f88', bright:'#36c9e6', accent:'#965cff', halo:'#a48bff', energy:.46, spin:.42, scale:1.012, label:'Denkt'
    }),
    processing: palette({
      deep:'#07194a', mid:'#1746aa', bright:'#38d5ff', accent:'#bb39e6', halo:'#55dcff', energy:.62, spin:1.15, scale:1.025, label:'Verarbeitung'
    }),
    complete: palette({
      deep:'#073245', mid:'#0e75a2', bright:'#86ffff', accent:'#8cffda', halo:'#a5fff1', energy:.50, spin:.55, scale:1.025, label:'Fertig'
    }),
    error: palette({
      deep:'#211038', mid:'#47235f', bright:'#ff96d9', accent:'#ff8a45', halo:'#ffb26c', energy:.42, spin:.30, scale:1.00, label:'Hinweis'
    })
  };

  let w = 1, h = 1, dpr = 1;
  let state = 'idle';
  let targetPalette = PALETTES.idle;
  let current = JSON.parse(JSON.stringify(PALETTES.idle));
  let targetLevel = 0;
  let level = 0;
  let lastSignalAt = performance.now();
  let t0 = performance.now();
  let flash = 0;

  function copyPaletteIntoCurrent(p, amount) {
    current.deep = mixRgb(current.deep, p.deep, amount);
    current.mid = mixRgb(current.mid, p.mid, amount);
    current.bright = mixRgb(current.bright, p.bright, amount);
    current.accent = mixRgb(current.accent, p.accent, amount);
    current.halo = mixRgb(current.halo, p.halo, amount);
    current.white = mixRgb(current.white, p.white, amount);
    current.energy = lerp(current.energy, p.energy, amount);
    current.spin = lerp(current.spin, p.spin, amount);
    current.scale = lerp(current.scale, p.scale, amount);
  }

  function normalizeState(s) {
    const raw = String(s || 'idle').trim();
    const map = {
      idle:'idle', ready:'ready', listening:'listening',
      userSpeaking:'user_speaking', user_speaking:'user_speaking', candidate_speaking:'user_speaking', candidateSpeaking:'user_speaking',
      aiSpeaking:'ai_speaking', ai_speaking:'ai_speaking', assistant_speaking:'ai_speaking', assistantSpeaking:'ai_speaking', speaking:'ai_speaking',
      thinking:'thinking', processing:'processing', complete:'complete', completed:'complete', done:'complete', error:'error'
    };
    return map[raw] || PALETTES[raw] ? raw : 'idle';
  }

  function setState(next) {
    state = normalizeState(next);
    targetPalette = PALETTES[state] || PALETTES.idle;
    label.textContent = targetPalette.label || state;
    lastSignalAt = performance.now();
    if (state === 'complete') flash = 1;
  }

  function setLevel(v) {
    targetLevel = clamp(v);
    lastSignalAt = performance.now();
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2.25);
    w = Math.max(1, Math.floor(innerWidth));
    h = Math.max(1, Math.floor(innerHeight));
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function clear() {
    ctx.clearRect(0, 0, w, h);
    if (TEST_BG) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
    }
  }

  function ellipsePath(cx, cy, rx, ry, rotation) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, rotation, 0, TAU);
  }

  function drawGlow(cx, cy, r, intensity, time) {
    const spread = r * (1.75 + intensity * .42);
    const g = ctx.createRadialGradient(cx, cy, r * .12, cx, cy, spread);
    g.addColorStop(0, rgbToCss(current.halo, .18 + .18 * intensity));
    g.addColorStop(.28, rgbToCss(current.accent, .10 + .12 * intensity));
    g.addColorStop(.60, rgbToCss(current.bright, .055 + .08 * intensity));
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, spread, 0, TAU);
    ctx.fill();

    const rings = state === 'processing' ? 3 : 2;
    for (let i = 0; i < rings; i++) {
      const phase = (time * (.35 + i * .11) + i * .32) % 1;
      const rr = r * (1.05 + intensity * .18 + phase * .34);
      const alpha = (1 - phase) * (.10 + .18 * intensity);
      ctx.lineWidth = Math.max(1.2, r * (.009 + .006 * intensity));
      ctx.strokeStyle = rgbToCss(i % 2 ? current.accent : current.halo, alpha);
      ctx.beginPath();
      ctx.arc(cx, cy, rr, 0, TAU);
      ctx.stroke();
    }
  }

  function drawOrbits(cx, cy, r, intensity, time) {
    const orbitAlpha = .22 + .28 * intensity;
    const speed = .55 + current.spin * .55 + intensity * .55;
    const orbitSet = [
      {rx:1.24, ry:.22, rot:-.10, col:current.halo, off:0},
      {rx:1.10, ry:.36, rot:.86, col:current.accent, off:.33},
      {rx:1.20, ry:.28, rot:-.78, col:current.bright, off:.66}
    ];

    ctx.save();
    ctx.lineCap = 'round';
    orbitSet.forEach((o, i) => {
      const rx = r * (o.rx + intensity * .045);
      const ry = r * (o.ry + intensity * .030);
      ctx.lineWidth = Math.max(1, r * (.006 + intensity * .004));
      ctx.strokeStyle = rgbToCss(o.col, orbitAlpha * (i === 1 ? .72 : 1));
      ellipsePath(cx, cy, rx, ry, o.rot + Math.sin(time * .17 + i) * .08);
      ctx.stroke();

      const p = (time * speed + o.off) % 1;
      const ang = p * TAU;
      const cos = Math.cos(o.rot), sin = Math.sin(o.rot);
      const ex = Math.cos(ang) * rx;
      const ey = Math.sin(ang) * ry;
      const px = cx + ex * cos - ey * sin;
      const py = cy + ex * sin + ey * cos;
      const pr = r * (.020 + .018 * intensity + (i === 1 ? .006 : 0));
      const pg = ctx.createRadialGradient(px, py, 0, px, py, pr * 4.2);
      pg.addColorStop(0, rgbToCss(o.col, .95));
      pg.addColorStop(.25, rgbToCss(current.white, .55));
      pg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = pg;
      ctx.beginPath();
      ctx.arc(px, py, pr * 4.2, 0, TAU);
      ctx.fill();
    });
    ctx.restore();
  }

  function drawOrb(cx, cy, r, intensity, time) {
    const isSpeech = state === 'user_speaking' || state === 'ai_speaking' || state === 'ai_speaking' || state === 'speaking';
    const corePulse = .55 + .45 * Math.sin(time * (isSpeech ? 5.2 : 2.1) + intensity * 2.5);

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, TAU);
    ctx.clip();

    const base = ctx.createRadialGradient(cx - r * .36, cy - r * .46, r * .08, cx + r * .28, cy + r * .30, r * 1.18);
    base.addColorStop(0, rgbToCss(mixRgb(current.white, current.bright, .28), .96));
    base.addColorStop(.20, rgbToCss(current.bright, .92));
    base.addColorStop(.48, rgbToCss(current.mid, .96));
    base.addColorStop(.78, rgbToCss(current.deep, .99));
    base.addColorStop(1, rgbToCss(mixRgb(current.deep, [0,0,0], .35), 1));
    ctx.fillStyle = base;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

    ctx.globalCompositeOperation = 'screen';
    const blobCount = 5;
    for (let i = 0; i < blobCount; i++) {
      const a = time * (.32 + i * .07 + current.spin * .045) + i * 1.61;
      const bx = cx + Math.cos(a * (1.0 + i * .13)) * r * (.26 + .045 * i) + Math.sin(time * .41 + i) * r * .06;
      const by = cy + Math.sin(a * (.82 + i * .09)) * r * (.21 + .035 * i);
      const br = r * (.28 + .08 * Math.sin(time * .8 + i) + intensity * .10);
      const col = i % 3 === 0 ? current.accent : (i % 3 === 1 ? current.bright : current.halo);
      const bg = ctx.createRadialGradient(bx, by, 0, bx, by, br);
      bg.addColorStop(0, rgbToCss(mixRgb(current.white, col, .35), .42 + .22 * intensity));
      bg.addColorStop(.38, rgbToCss(col, .20 + .16 * intensity));
      bg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, TAU);
      ctx.fill();
    }

    const coreR = r * (.185 + .075 * intensity + .020 * corePulse);
    const coreX = cx + Math.sin(time * .62) * r * .025;
    const coreY = cy + Math.cos(time * .48) * r * .018;
    const cg = ctx.createRadialGradient(coreX - coreR * .25, coreY - coreR * .35, 0, coreX, coreY, coreR * 2.55);
    cg.addColorStop(0, rgbToCss(current.white, .90));
    cg.addColorStop(.18, rgbToCss(current.bright, .72));
    cg.addColorStop(.45, rgbToCss(current.accent, .42 + .18 * intensity));
    cg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.arc(coreX, coreY, coreR * 2.55, 0, TAU);
    ctx.fill();

    ctx.globalCompositeOperation = 'source-over';

    const shade = ctx.createRadialGradient(cx - r * .12, cy - r * .22, r * .35, cx, cy, r * 1.02);
    shade.addColorStop(0, 'rgba(255,255,255,0)');
    shade.addColorStop(.58, 'rgba(0,0,0,0)');
    shade.addColorStop(1, 'rgba(2,7,38,.34)');
    ctx.fillStyle = shade;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

    const sheen = ctx.createLinearGradient(cx - r * .65, cy - r * .75, cx + r * .25, cy - r * .10);
    sheen.addColorStop(0, 'rgba(255,255,255,.38)');
    sheen.addColorStop(.36, 'rgba(255,255,255,.11)');
    sheen.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sheen;
    ctx.beginPath();
    ctx.ellipse(cx - r * .19, cy - r * .38, r * .68, r * .24, -0.34, 0, TAU);
    ctx.fill();

    ctx.restore();

    const rim = ctx.createRadialGradient(cx, cy, r * .78, cx, cy, r * 1.065);
    rim.addColorStop(0, 'rgba(255,255,255,0)');
    rim.addColorStop(.72, rgbToCss(current.halo, .16 + .22 * intensity));
    rim.addColorStop(1, rgbToCss(current.white, .34 + .18 * intensity));
    ctx.strokeStyle = rim;
    ctx.lineWidth = Math.max(1.4, r * (.030 + intensity * .012));
    ctx.beginPath();
    ctx.arc(cx, cy, r * .992, 0, TAU);
    ctx.stroke();

    const hot = Math.max(0, flash);
    if (hot > .01) {
      ctx.strokeStyle = rgbToCss(current.white, hot * .45);
      ctx.lineWidth = r * .035;
      ctx.beginPath();
      ctx.arc(cx, cy, r * (1.03 + (1 - hot) * .18), 0, TAU);
      ctx.stroke();
    }
  }

  function render() {
    const nowMs = performance.now();
    const time = (nowMs - t0) / 1000;
    const dtSince = nowMs - lastSignalAt;

    copyPaletteIntoCurrent(targetPalette, .065);

    let fallback = targetLevel;
    const speakingLike = state === 'user_speaking' || state === 'ai_speaking' || state === 'speaking';
    if (!NO_BREATH && dtSince > 2200) {
      const idlePulse = (.5 + .5 * Math.sin(time * (speakingLike ? 2.45 : 1.18))) * (speakingLike ? .34 : .16);
      fallback = Math.max(targetLevel * .35, idlePulse);
    }

    const attack = fallback > level ? .22 : .085;
    level = lerp(level, fallback, attack);
    flash = Math.max(0, flash - .018);

    clear();

    const baseR = Math.min(w, h) * .285;
    const cx = w * .5;
    const cy = h * .47;
    const speechScale = current.scale + level * (speakingLike ? .070 : .035) + Math.sin(time * (speakingLike ? 4.7 : 1.8)) * (speakingLike ? .006 : .003);
    const r = baseR * speechScale;
    const intensity = clamp(level * .82 + current.energy * .38 + flash * .35);

    drawGlow(cx, cy, r, intensity, time);
    drawOrbits(cx, cy, r, intensity, time);
    drawOrb(cx, cy, r, intensity, time);

    if (DEBUG) {
      label.textContent = `${targetPalette.label || state} · ${(level * 100).toFixed(0)}%`;
    }

    requestAnimationFrame(render);
  }

  function parseIncoming(raw) {
    if (typeof raw === 'string') {
      try { return JSON.parse(raw); } catch (_) { return null; }
    }
    return raw && typeof raw === 'object' ? raw : null;
  }

  function handleMessage(raw, source) {
    const d = parseIncoming(raw);
    if (!d) return;

    if (d.type === 'avatar:set') setState(d.state || 'idle');
    else if (d.type === 'avatar:level') setLevel(d.value);
    else if (d.type === 'avatar:bridge') {
      if (d.state) setState(d.state);
      if (typeof d.value !== 'undefined') setLevel(d.value);
      if (d.level && typeof d.level.value !== 'undefined') setLevel(d.level.value);
    }
    else if (d.type === 'clarity.avatar') setState(d.state || d?.data?.state || 'idle');
    else if (d.type === 'clarity.avatar.level') setLevel(d.value ?? d?.data?.value ?? 0);
    else if (d.type === 'avatar:complete') { setState('complete'); setLevel(.24); }
    else if (d.type === 'avatar:error') { setState('error'); setLevel(.18); }
    else if (d.type === 'avatar:stop' || d.type === 'avatar:reset') { setLevel(0); setState('idle'); }
    else if (d.type === 'ping') source?.postMessage?.({ type:'avatar:ready', version:'v3.0' }, '*');
  }

  addEventListener('message', ev => handleMessage(ev.data, ev.source));
  addEventListener('resize', resize);

  if (DEMO) {
    const seq = ['listening','user_speaking','thinking','ai_speaking','processing','complete','idle'];
    let i = 0;
    setInterval(() => {
      setState(seq[i++ % seq.length]);
    }, 2600);
    setInterval(() => {
      const active = state === 'user_speaking' || state === 'ai_speaking' || state === 'processing';
      setLevel(active ? (.25 + Math.random() * .70) : (.06 + Math.random() * .18));
    }, 160);
  }

  resize();
  setState('idle');
  setLevel(0);
  render();

  setTimeout(() => {
    try { parent?.postMessage?.({ type:'avatar:ready', version:'v3.0' }, '*'); } catch (_) {}
  }, 40);
})();
</script>
</body>
</html>
