<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>CLARITY Reactive Interview Avatar v2.0</title>
<style>
  :root{
    --clarity-cyan:#3DE6F5;
    --clarity-blue:#064E9B;
    --clarity-navy:#041D48;
    --clarity-violet:#6A35FF;
    --clarity-magenta:#EF00B8;
    --clarity-white:#F7FBFF;
  }
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  #root{position:fixed;inset:0;background:transparent;overflow:hidden}
  #statusWrap{
    position:fixed;
    left:50%;
    bottom:clamp(10px,4.5vh,26px);
    transform:translateX(-50%);
    pointer-events:none;
    display:none;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:8px 14px;
    border-radius:999px;
    color:rgba(247,251,255,.92);
    font-size:12px;
    font-weight:650;
    letter-spacing:.18px;
    background:linear-gradient(135deg,rgba(4,29,72,.40),rgba(4,78,155,.18));
    border:1px solid rgba(247,251,255,.16);
    box-shadow:0 12px 34px rgba(0,17,42,.18), inset 0 1px 0 rgba(255,255,255,.18);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    white-space:nowrap;
  }
  #statusWrap.on{display:flex}
  #dot{
    width:7px;
    height:7px;
    border-radius:999px;
    background:var(--clarity-cyan);
    box-shadow:0 0 14px var(--clarity-cyan),0 0 24px rgba(61,230,245,.45);
  }
  #debug{
    position:fixed;
    left:8px;
    top:8px;
    display:none;
    color:rgba(247,251,255,.72);
    background:rgba(4,29,72,.34);
    border:1px solid rgba(247,251,255,.12);
    border-radius:10px;
    padding:6px 8px;
    font:11px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    pointer-events:none;
    max-width:calc(100vw - 24px);
  }
  #debug.on{display:block}
  canvas{display:block}
</style>
</head>
<body>
<div id="root"></div>
<div id="statusWrap" aria-hidden="true"><span id="dot"></span><span id="statusText">Ready</span></div>
<div id="debug"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(()=>{
  'use strict';

  const VERSION = 'clarity_avatar_v2_0_REACTIVE_INTERVIEW_READY';
  const params = new URLSearchParams(location.search || '');
  const DEBUG = params.get('debug') === '1';
  const SHOW_LABEL_DEFAULT = params.get('label') === '1' || params.get('showLabel') === '1';
  const NO_BREATH = params.get('nobreath') === '1';
  const LOW_MOTION = params.get('motion') === 'low' || params.get('reducedMotion') === '1';
  const ALLOW_TTS_DEFAULT = params.get('tts') === '1' || params.get('allowTts') === '1';

  const root = document.getElementById('root');
  const statusWrap = document.getElementById('statusWrap');
  const statusText = document.getElementById('statusText');
  const dot = document.getElementById('dot');
  const debugEl = document.getElementById('debug');
  if (DEBUG) debugEl.classList.add('on');

  const clamp01 = (v)=> Math.max(0, Math.min(1, Number(v) || 0));
  const lerp = (a,b,t)=> a + (b-a)*t;
  const safe = (fn)=>{ try{return fn();}catch(_){ return undefined; } };
  const nowMs = ()=> performance.now();

  function parseMessage(data){
    if (!data) return {};
    if (typeof data === 'string') {
      try { return JSON.parse(data); } catch(_){ return { type:data }; }
    }
    return data;
  }
  function postParent(msg){
    safe(()=> parent && parent.postMessage && parent.postMessage({ ...msg, from:'clarity-avatar', version:VERSION }, '*'));
  }
  function log(msg, extra){
    if (!DEBUG) return;
    const line = `[${VERSION}] ${msg}${extra ? ' ' + JSON.stringify(extra).slice(0,260) : ''}`;
    safe(()=> console.log(line));
    debugEl.textContent = line;
  }

  // ----------------------------- Renderer / Scene -----------------------------
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, LOW_MOTION ? 1.4 : 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  root.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.1, 60);
  camera.position.set(0, 0, 3.45);

  const ambient = new THREE.AmbientLight(0xffffff, 0.92);
  scene.add(ambient);
  const key = new THREE.DirectionalLight(0xffffff, 0.42);
  key.position.set(3.0, 2.4, 3.2);
  scene.add(key);
  const rim = new THREE.PointLight(0x3de6f5, 1.25, 6.5);
  rim.position.set(-2.2, 1.5, 2.5);
  scene.add(rim);
  const magentaLight = new THREE.PointLight(0xef00b8, 0.72, 6.2);
  magentaLight.position.set(2.2, -1.35, 2.1);
  scene.add(magentaLight);

  const group = new THREE.Group();
  scene.add(group);

  // ----------------------------- Color Helpers -----------------------------
  const HSL = {
    cyan:    new THREE.Vector3(188/360, .94, .58),
    blue:    new THREE.Vector3(211/360, .94, .38),
    navy:    new THREE.Vector3(222/360, .88, .22),
    violet:  new THREE.Vector3(257/360, .92, .62),
    magenta: new THREE.Vector3(315/360, .95, .56),
    success: new THREE.Vector3(166/360, .88, .58),
    amber:   new THREE.Vector3( 34/360, .96, .58),
    white:   new THREE.Vector3(205/360, .18, .94)
  };

  // ----------------------------- Inner Organic Sphere -----------------------------
  const R_INNER = 0.84;
  const geoInner = new THREE.SphereGeometry(R_INNER, LOW_MOTION ? 128 : 192, LOW_MOTION ? 96 : 128);

  const uniforms = {
    uTime:      { value:0 },
    uBaseAmp:   { value:0.055 },
    uAudioAmp:  { value:0.22 },
    uLevel:     { value:0.0 },
    uUserLevel: { value:0.0 },
    uAiLevel:   { value:0.0 },
    uEnergy:    { value:0.0 },
    uGlow:      { value:0.84 },
    uMode:      { value:0.0 },
    uColorA:    { value:HSL.cyan.clone() },
    uColorB:    { value:HSL.violet.clone() },
    uColorC:    { value:HSL.magenta.clone() },
    uAccent:    { value:HSL.cyan.clone() },
    uAspect:    { value:window.innerWidth/window.innerHeight }
  };

  const simplex = `
  vec3 mod289(vec3 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 mod289(vec4 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
  float snoise(vec3 v){
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0,0.5,1.0,2.0);
    vec3 i=floor(v+dot(v,C.yyy));
    vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g;
    vec3 i1=min(g.xyz,l.zxy), i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx, x2=x0-i2+C.yyy, x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
    float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.0*floor(p*ns.z*ns.z); vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
    vec4 x=x_*ns.x+ns.yyyy, y=y_*ns.x+ns.yyyy, h=1.0-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy), b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.0+1.0, s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy, a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x), p1=vec3(a1.xy,h.y), p2=vec3(a0.zw,h.z), p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
    vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m*=m;
    return 42.0*dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }`;

  const vInner = `
    uniform float uTime,uBaseAmp,uAudioAmp,uLevel,uUserLevel,uAiLevel,uEnergy,uMode;
    varying vec3 vPos;
    varying float vDef;
    varying float vWave;
    ${simplex}
    void main(){
      vec3 p=position;
      vec3 n=normalize(position);
      float t=uTime;
      float organic=snoise(n*1.45+vec3(t*.28,t*.21,t*.33));
      float fine=snoise(position*2.65+vec3(-t*.92,t*.52,-t*.41));
      float speakingWave=sin((n.y*6.5+n.x*2.0)+t*(3.2+4.0*uAiLevel))*0.5+0.5;
      float listeningWave=sin((n.x*5.7-n.z*2.3)+t*(2.2+2.6*uUserLevel))*0.5+0.5;
      float active = max(uUserLevel, uAiLevel);
      float modePush = mix(listeningWave, speakingWave, smoothstep(0.35,1.0,uMode));
      float d = uBaseAmp*organic + uAudioAmp*(0.55*uLevel+0.45*uEnergy)*(0.55*fine+0.45*modePush);
      d += 0.018*uAiLevel*sin(t*6.0+n.y*10.0);
      d += 0.010*uUserLevel*sin(t*8.0+n.x*12.0);
      d = clamp(d, -0.16, 0.22);
      vDef=d;
      vWave=modePush;
      vec3 q=normalize(p)*(1.0+d);
      vPos=q;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(q,1.0);
    }`;

  const fInner = `
    precision highp float;
    varying vec3 vPos;
    varying float vDef;
    varying float vWave;
    uniform float uTime,uLevel,uUserLevel,uAiLevel,uEnergy,uGlow,uMode;
    uniform vec3 uColorA,uColorB,uColorC,uAccent;
    vec3 hsl2rgb(vec3 hsl){
      float h=hsl.x,s=hsl.y,l=hsl.z;
      float c=(1.0-abs(2.0*l-1.0))*s;
      float x=c*(1.0-abs(mod(h*6.0,2.0)-1.0));
      float m=l-0.5*c; vec3 rgb;
      if(h<1.0/6.0) rgb=vec3(c,x,0.0);
      else if(h<2.0/6.0) rgb=vec3(x,c,0.0);
      else if(h<3.0/6.0) rgb=vec3(0.0,c,x);
      else if(h<4.0/6.0) rgb=vec3(0.0,x,c);
      else if(h<5.0/6.0) rgb=vec3(x,0.0,c);
      else rgb=vec3(c,0.0,x);
      return rgb+m;
    }
    void main(){
      vec3 n=normalize(vPos);
      float a=atan(n.y,n.x);
      vec3 colA=hsl2rgb(uColorA);
      vec3 colB=hsl2rgb(uColorB);
      vec3 colC=hsl2rgb(uColorC);
      vec3 accent=hsl2rgb(uAccent);
      float swirl=sin(a*2.2+uTime*.72+n.z*2.0)*0.5+0.5;
      vec3 base=mix(colA,colB,swirl);
      float aiPull=clamp(0.18+0.82*uAiLevel,0.0,1.0);
      float userPull=clamp(uUserLevel,0.0,1.0);
      vec3 color=mix(base,colC,aiPull*.54);
      color=mix(color,accent,userPull*.42);
      float sheen=smoothstep(-0.02,0.18,vDef+0.08);
      color=mix(color,vec3(1.0),sheen*(0.14+0.16*uEnergy));
      float fres=pow(1.0-abs(n.z),2.25);
      float core=pow(max(0.0,n.z*0.5+0.5),2.0);
      vec3 glow=color*uGlow*(0.48+0.52*fres);
      vec3 finalColor=color+glow*(0.28+0.36*uEnergy)+vec3(1.0)*core*.04;
      float alpha=0.92+0.06*smoothstep(0.0,1.0,uEnergy);
      gl_FragColor=vec4(finalColor,alpha);
    }`;

  const innerMat = new THREE.ShaderMaterial({
    uniforms,
    vertexShader:vInner,
    fragmentShader:fInner,
    transparent:true,
    depthWrite:true
  });
  const innerSphere = new THREE.Mesh(geoInner, innerMat);
  group.add(innerSphere);

  // ----------------------------- Glass Shell -----------------------------
  const geoGlass = new THREE.SphereGeometry(1.0, LOW_MOTION ? 96 : 144, LOW_MOTION ? 72 : 104);
  const glassMat = new THREE.ShaderMaterial({
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
    uniforms:{
      uTime:{ value:0 },
      uLevel:{ value:0 },
      uUserLevel:{ value:0 },
      uAiLevel:{ value:0 },
      uTint:{ value:new THREE.Color(0xEAF7FF) },
      uCyan:{ value:new THREE.Color(0x3DE6F5) },
      uMagenta:{ value:new THREE.Color(0xEF00B8) },
      uStrength:{ value:0.26 }
    },
    vertexShader:`
      varying vec3 vN;
      varying vec3 vV;
      varying vec3 vP;
      void main(){
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        vV=-mv.xyz;
        vN=normalize(normalMatrix*normal);
        vP=position;
        gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`
      precision highp float;
      varying vec3 vN;
      varying vec3 vV;
      varying vec3 vP;
      uniform float uTime,uLevel,uUserLevel,uAiLevel,uStrength;
      uniform vec3 uTint,uCyan,uMagenta;
      void main(){
        float fres=pow(1.0-max(0.0,dot(normalize(vN),normalize(vV))),2.05);
        float sweep=sin(atan(vP.y,vP.x)*2.0+uTime*1.25)*0.5+0.5;
        vec3 accent=mix(uCyan,uMagenta,clamp(uAiLevel*0.92 + sweep*0.18,0.0,1.0));
        vec3 col=mix(uTint,accent,0.24+0.36*max(uUserLevel,uAiLevel));
        float a=0.055+fres*(uStrength+0.18*uLevel);
        gl_FragColor=vec4(col*(0.55+0.75*fres),a);
      }`
  });
  const glass = new THREE.Mesh(geoGlass, glassMat);
  group.add(glass);

  // ----------------------------- Rings / Orbits -----------------------------
  function makeRingMat(kind){
    const base = kind === 'user' ? new THREE.Color(0x3DE6F5) : kind === 'ai' ? new THREE.Color(0xEF00B8) : new THREE.Color(0xF7FBFF);
    const alt  = kind === 'user' ? new THREE.Color(0x064E9B) : kind === 'ai' ? new THREE.Color(0x6A35FF) : new THREE.Color(0x3DE6F5);
    return new THREE.ShaderMaterial({
      transparent:true,
      depthWrite:false,
      blending:THREE.AdditiveBlending,
      uniforms:{
        uTime:{ value:0 },
        uLevel:{ value:0 },
        uAlpha:{ value:0.0 },
        uKind:{ value:kind === 'user' ? 0.0 : kind === 'ai' ? 1.0 : 2.0 },
        uColorA:{ value:base },
        uColorB:{ value:alt }
      },
      vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
      fragmentShader:`
        precision highp float;
        varying vec2 vUv;
        uniform float uTime,uLevel,uAlpha,uKind;
        uniform vec3 uColorA,uColorB;
        void main(){
          vec2 p=vUv*2.0-1.0;
          float d=length(p);
          float ang=atan(p.y,p.x);
          float baseR = uKind < 0.5 ? 0.725 : (uKind < 1.5 ? 0.79 : 0.86);
          float R=baseR+0.012*sin(uTime*(2.1+uKind)+uKind*1.7)+0.034*uLevel;
          float width=0.030+0.026*uLevel;
          float ring=1.0-smoothstep(width,width+0.035,abs(d-R));
          float arc=0.55+0.45*sin(ang*3.0 + uTime*(uKind < 0.5 ? -2.3 : 2.8));
          float dash=smoothstep(0.18,0.82,arc);
          float fade=smoothstep(1.12,0.72,d);
          vec3 col=mix(uColorA,uColorB,arc);
          float a=ring*fade*(0.22+0.78*dash)*uAlpha*(0.35+0.75*uLevel);
          gl_FragColor=vec4(col,a);
        }`
    });
  }

  const ringGeo = new THREE.PlaneGeometry(6,6,1,1);
  const userRingMat = makeRingMat('user');
  const aiRingMat = makeRingMat('ai');
  const processRingMat = makeRingMat('process');

  const userRing = new THREE.Mesh(ringGeo, userRingMat);
  userRing.position.z = -0.62;
  userRing.scale.setScalar(1.12);
  group.add(userRing);

  const aiRing = new THREE.Mesh(ringGeo, aiRingMat);
  aiRing.position.z = -0.64;
  aiRing.scale.setScalar(1.18);
  group.add(aiRing);

  const processRing = new THREE.Mesh(ringGeo, processRingMat);
  processRing.position.z = -0.66;
  processRing.scale.setScalar(1.26);
  group.add(processRing);

  // ----------------------------- Soft Aura Particles -----------------------------
  const particleCount = LOW_MOTION ? 72 : 128;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(particleCount * 3);
  const pSeed = new Float32Array(particleCount);
  for (let i=0;i<particleCount;i++){
    const a = Math.random()*Math.PI*2;
    const r = 1.12 + Math.random()*0.55;
    const z = (Math.random()*2-1)*0.52;
    pPos[i*3+0] = Math.cos(a)*r;
    pPos[i*3+1] = Math.sin(a)*r;
    pPos[i*3+2] = z;
    pSeed[i] = Math.random();
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  pGeo.setAttribute('aSeed', new THREE.BufferAttribute(pSeed, 1));
  const pMat = new THREE.ShaderMaterial({
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
    uniforms:{
      uTime:{ value:0 },
      uAlpha:{ value:0.22 },
      uLevel:{ value:0 },
      uAiLevel:{ value:0 },
      uUserLevel:{ value:0 }
    },
    vertexShader:`
      attribute float aSeed;
      uniform float uTime,uLevel,uAiLevel,uUserLevel;
      varying float vSeed;
      void main(){
        vSeed=aSeed;
        vec3 p=position;
        float t=uTime*(0.18+0.12*aSeed);
        float rot=t*(aSeed<0.5?-1.0:1.0);
        mat2 m=mat2(cos(rot),-sin(rot),sin(rot),cos(rot));
        p.xy=m*p.xy*(1.0+0.025*uLevel*sin(uTime*2.0+aSeed*9.0));
        vec4 mv=modelViewMatrix*vec4(p,1.0);
        gl_PointSize=(2.0+4.5*(uAiLevel+uUserLevel))*((1.0+aSeed)*0.55);
        gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`
      precision highp float;
      varying float vSeed;
      uniform float uAlpha,uLevel,uAiLevel,uUserLevel;
      void main(){
        vec2 uv=gl_PointCoord*2.0-1.0;
        float d=dot(uv,uv);
        float a=smoothstep(1.0,0.0,d);
        vec3 cyan=vec3(0.24,0.90,0.96);
        vec3 mag=vec3(0.94,0.00,0.72);
        vec3 col=mix(cyan,mag,clamp(uAiLevel+vSeed*.18,0.0,1.0));
        gl_FragColor=vec4(col,a*uAlpha*(0.45+0.95*uLevel));
      }`
  });
  const particles = new THREE.Points(pGeo, pMat);
  group.add(particles);

  // ----------------------------- State Machine -----------------------------
  const STATES = {
    idle: {
      label:'Ready', dot:'#3DE6F5', mode:.20,
      glow:.82, base:.052, audio:.18, scale:1.00, rotX:.035, rotY:.080,
      colorA:HSL.cyan, colorB:HSL.blue, colorC:HSL.violet, accent:HSL.cyan,
      userRing:.12, aiRing:.07, process:.00, aura:.16
    },
    ready: {
      label:'Ready', dot:'#3DE6F5', mode:.18,
      glow:.86, base:.058, audio:.20, scale:1.01, rotX:.04, rotY:.095,
      colorA:HSL.cyan, colorB:HSL.blue, colorC:HSL.violet, accent:HSL.cyan,
      userRing:.18, aiRing:.09, process:.00, aura:.18
    },
    listening: {
      label:'Listening', dot:'#3DE6F5', mode:.12,
      glow:.94, base:.072, audio:.28, scale:1.025, rotX:.045, rotY:.135,
      colorA:HSL.cyan, colorB:HSL.blue, colorC:HSL.violet, accent:HSL.cyan,
      userRing:.55, aiRing:.08, process:.00, aura:.24
    },
    user_speaking: {
      label:'User speaking', dot:'#3DE6F5', mode:.05,
      glow:1.02, base:.082, audio:.34, scale:1.045, rotX:.052, rotY:.165,
      colorA:HSL.cyan, colorB:HSL.blue, colorC:HSL.violet, accent:HSL.cyan,
      userRing:.92, aiRing:.06, process:.00, aura:.32
    },
    speaking: {
      label:'AI speaking', dot:'#EF00B8', mode:.95,
      glow:1.04, base:.086, audio:.36, scale:1.055, rotX:.058, rotY:.195,
      colorA:HSL.cyan, colorB:HSL.violet, colorC:HSL.magenta, accent:HSL.magenta,
      userRing:.08, aiRing:.92, process:.00, aura:.34
    },
    ai_speaking: {
      label:'AI speaking', dot:'#EF00B8', mode:1.00,
      glow:1.06, base:.090, audio:.39, scale:1.065, rotX:.060, rotY:.205,
      colorA:HSL.cyan, colorB:HSL.violet, colorC:HSL.magenta, accent:HSL.magenta,
      userRing:.08, aiRing:1.00, process:.00, aura:.38
    },
    thinking: {
      label:'Thinking', dot:'#6A35FF', mode:.62,
      glow:.97, base:.068, audio:.20, scale:1.025, rotX:.032, rotY:.120,
      colorA:HSL.blue, colorB:HSL.violet, colorC:HSL.magenta, accent:HSL.violet,
      userRing:.10, aiRing:.24, process:.22, aura:.25
    },
    processing: {
      label:'Processing', dot:'#F7FBFF', mode:.70,
      glow:1.00, base:.060, audio:.18, scale:1.015, rotX:.026, rotY:.105,
      colorA:HSL.cyan, colorB:HSL.violet, colorC:HSL.white, accent:HSL.white,
      userRing:.10, aiRing:.14, process:.95, aura:.34
    },
    complete: {
      label:'Complete', dot:'#36F0B5', mode:.30,
      glow:1.06, base:.066, audio:.22, scale:1.04, rotX:.035, rotY:.125,
      colorA:HSL.success, colorB:HSL.cyan, colorC:HSL.white, accent:HSL.success,
      userRing:.48, aiRing:.16, process:.32, aura:.36
    },
    error: {
      label:'Check required', dot:'#FFB545', mode:.44,
      glow:.94, base:.060, audio:.18, scale:1.01, rotX:.025, rotY:.075,
      colorA:HSL.amber, colorB:HSL.violet, colorC:HSL.magenta, accent:HSL.amber,
      userRing:.08, aiRing:.08, process:.55, aura:.25
    },
    stopped: {
      label:'Stopped', dot:'#AAB7C8', mode:.18,
      glow:.72, base:.034, audio:.08, scale:.985, rotX:.018, rotY:.045,
      colorA:HSL.navy, colorB:HSL.blue, colorC:HSL.violet, accent:HSL.white,
      userRing:.02, aiRing:.02, process:.00, aura:.08
    }
  };

  let stateName = 'idle';
  let state = { ...STATES.idle };
  let target = { ...STATES.idle };
  let showLabel = SHOW_LABEL_DEFAULT;
  let allowTts = ALLOW_TTS_DEFAULT;
  let productMode = params.get('mode') || 'interview';
  let currentUserLevel = 0;
  let targetUserLevel = 0;
  let currentAiLevel = 0;
  let targetAiLevel = 0;
  let targetGenericLevel = 0;
  let currentGenericLevel = 0;
  let lastLevelAt = nowMs();
  let lastExplicitStateAt = nowMs();
  let pulseBoost = 0;
  let hidden = false;

  function setLabelVisibility(on){
    showLabel = !!on;
    statusWrap.classList.toggle('on', showLabel);
  }
  setLabelVisibility(showLabel);

  function applyTargetStyle(name){
    const normalized = normalizeState(name);
    stateName = normalized;
    const next = STATES[normalized] || STATES.idle;
    target = { ...next };
    statusText.textContent = next.label;
    dot.style.background = next.dot;
    dot.style.boxShadow = `0 0 14px ${next.dot},0 0 24px ${next.dot}55`;
    lastExplicitStateAt = nowMs();
    postParent({ type:'avatar:state', state:normalized, label:next.label });
    log('state', { state:normalized });
  }

  function normalizeState(s){
    const x = String(s || '').trim().toLowerCase().replace(/[\s-]+/g,'_');
    const aliases = {
      wait:'idle', waiting:'idle', standby:'idle', awake:'ready', start:'ready', active:'ready',
      listen:'listening', hearing:'listening', recording:'listening', user:'user_speaking', user_speech:'user_speaking', user_talking:'user_speaking', candidate_speaking:'user_speaking',
      ai:'ai_speaking', assistant:'ai_speaking', assistant_speaking:'ai_speaking', ai_talking:'ai_speaking', talking:'ai_speaking', speak:'ai_speaking',
      think:'thinking', analyzing:'thinking', analysing:'thinking', preparing:'thinking',
      process:'processing', uploading:'processing', exporting:'processing', report:'processing', building_report:'processing',
      done:'complete', success:'complete', finished:'complete', ready_done:'complete',
      warn:'error', warning:'error', failed:'error', failure:'error', stopped:'stopped', stop:'stopped'
    };
    return STATES[x] ? x : (aliases[x] || 'idle');
  }

  function setLevel(value, source){
    const v = clamp01(value);
    const src = String(source || '').toLowerCase();
    lastLevelAt = nowMs();
    if (src === 'user' || src === 'mic' || src === 'candidate') {
      targetUserLevel = v;
      targetGenericLevel = Math.max(targetGenericLevel, v*.75);
      if (v > .08 && (stateName === 'idle' || stateName === 'ready' || stateName === 'listening')) applyTargetStyle('user_speaking');
    } else if (src === 'ai' || src === 'assistant' || src === 'tts' || src === 'output') {
      targetAiLevel = v;
      targetGenericLevel = Math.max(targetGenericLevel, v*.75);
      if (v > .08 && (stateName === 'idle' || stateName === 'ready' || stateName === 'thinking' || stateName === 'speaking')) applyTargetStyle('ai_speaking');
    } else {
      targetGenericLevel = v;
      if (stateName === 'ai_speaking' || stateName === 'speaking') targetAiLevel = Math.max(targetAiLevel, v);
      else if (stateName === 'user_speaking' || stateName === 'listening') targetUserLevel = Math.max(targetUserLevel, v);
    }
  }

  function setConfig(cfg={}){
    if (Object.prototype.hasOwnProperty.call(cfg,'showLabel')) setLabelVisibility(!!cfg.showLabel);
    if (Object.prototype.hasOwnProperty.call(cfg,'label')) setLabelVisibility(!!cfg.label);
    if (Object.prototype.hasOwnProperty.call(cfg,'tts')) allowTts = !!cfg.tts;
    if (Object.prototype.hasOwnProperty.call(cfg,'allowTts')) allowTts = !!cfg.allowTts;
    if (cfg.mode) productMode = String(cfg.mode || productMode);
    if (cfg.state) applyTargetStyle(cfg.state);
    log('config', { showLabel, allowTts, productMode });
  }

  function stopAvatar(){
    targetUserLevel = 0;
    targetAiLevel = 0;
    targetGenericLevel = 0;
    currentUserLevel = 0;
    currentAiLevel = 0;
    currentGenericLevel = 0;
    safe(()=> speechSynthesis && speechSynthesis.cancel && speechSynthesis.cancel());
    applyTargetStyle('stopped');
  }

  function resetAvatar(){
    targetUserLevel = 0;
    targetAiLevel = 0;
    targetGenericLevel = 0;
    pulseBoost = .20;
    applyTargetStyle('ready');
  }

  // ----------------------------- Optional TTS Compatibility -----------------------------
  function speakText(text, lang){
    const clean = String(text || '').trim();
    if (!clean) return;
    if (!allowTts || !('speechSynthesis' in window) || !('SpeechSynthesisUtterance' in window)) {
      applyTargetStyle('ai_speaking');
      targetAiLevel = .62;
      setTimeout(()=>{ targetAiLevel = 0; if (stateName === 'ai_speaking') applyTargetStyle('ready'); }, Math.min(6000, 1100 + clean.length * 28));
      return;
    }
    safe(()=> speechSynthesis.cancel());
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = lang || params.get('lang') || document.documentElement.lang || 'de-DE';
    u.rate = 1.0;
    u.pitch = 1.0;
    u.volume = 1.0;
    u.onstart = ()=>{ applyTargetStyle('ai_speaking'); targetAiLevel = .72; };
    u.onend = ()=>{ targetAiLevel = 0; if (stateName === 'ai_speaking') applyTargetStyle('ready'); };
    u.onerror = ()=>{ targetAiLevel = 0; applyTargetStyle('ready'); };
    safe(()=> speechSynthesis.speak(u));
  }

  // ----------------------------- Animation Loop -----------------------------
  let tPrev = performance.now()/1000;
  function frame(){
    requestAnimationFrame(frame);
    if (hidden && LOW_MOTION) return;

    const tNow = performance.now()/1000;
    const dt = Math.min(tNow - tPrev, .05);
    tPrev = tNow;
    const ms = nowMs();
    const slow = LOW_MOTION ? .45 : 1.0;

    // If live input stops, levels decay naturally while state remains explicit.
    if (ms - lastLevelAt > 240) {
      targetUserLevel *= 0.88;
      targetAiLevel *= 0.88;
      targetGenericLevel *= 0.90;
    }
    if (ms - lastLevelAt > 2100 && (stateName === 'user_speaking' || stateName === 'ai_speaking' || stateName === 'speaking')) {
      applyTargetStyle(stateName === 'user_speaking' ? 'listening' : 'ready');
    }

    const breath = (!NO_BREATH && ms-lastLevelAt>3000) ? (Math.sin(tNow*1.45)*.5+.5)*.20 : 0;
    const stateEnergy = (stateName === 'thinking') ? (Math.sin(tNow*2.0)*.5+.5)*.16 :
                        (stateName === 'processing') ? (Math.sin(tNow*2.9)*.5+.5)*.28 :
                        (stateName === 'complete') ? (Math.sin(tNow*3.3)*.5+.5)*.22 : 0;

    currentUserLevel = lerp(currentUserLevel, targetUserLevel, .18*slow);
    currentAiLevel = lerp(currentAiLevel, targetAiLevel, .18*slow);
    currentGenericLevel = lerp(currentGenericLevel, targetGenericLevel, .14*slow);
    pulseBoost = Math.max(0, pulseBoost - dt*.58);

    const activeLevel = Math.max(currentGenericLevel, currentUserLevel, currentAiLevel, breath, stateEnergy, pulseBoost);
    const energy = Math.min(1, activeLevel + (stateName === 'processing' ? .16 : 0) + (stateName === 'thinking' ? .08 : 0));

    state.glow = lerp(state.glow, target.glow, .08*slow);
    state.base = lerp(state.base, target.base, .08*slow);
    state.audio = lerp(state.audio, target.audio, .08*slow);
    state.scale = lerp(state.scale, target.scale, .08*slow);
    state.rotX = lerp(state.rotX, target.rotX, .06*slow);
    state.rotY = lerp(state.rotY, target.rotY, .06*slow);
    state.mode = lerp(state.mode, target.mode, .09*slow);
    state.userRing = lerp(state.userRing || 0, target.userRing || 0, .12*slow);
    state.aiRing = lerp(state.aiRing || 0, target.aiRing || 0, .12*slow);
    state.process = lerp(state.process || 0, target.process || 0, .12*slow);
    state.aura = lerp(state.aura || 0, target.aura || 0, .10*slow);

    // Color interpolation in HSL-vector space.
    uniforms.uColorA.value.lerp(target.colorA || HSL.cyan, .05*slow);
    uniforms.uColorB.value.lerp(target.colorB || HSL.violet, .05*slow);
    uniforms.uColorC.value.lerp(target.colorC || HSL.magenta, .05*slow);
    uniforms.uAccent.value.lerp(target.accent || HSL.cyan, .05*slow);

    uniforms.uTime.value += dt;
    uniforms.uBaseAmp.value = state.base;
    uniforms.uAudioAmp.value = state.audio;
    uniforms.uGlow.value = state.glow;
    uniforms.uLevel.value = activeLevel;
    uniforms.uUserLevel.value = currentUserLevel;
    uniforms.uAiLevel.value = currentAiLevel;
    uniforms.uEnergy.value = energy;
    uniforms.uMode.value = state.mode;

    glassMat.uniforms.uTime.value += dt;
    glassMat.uniforms.uLevel.value = activeLevel;
    glassMat.uniforms.uUserLevel.value = currentUserLevel;
    glassMat.uniforms.uAiLevel.value = currentAiLevel;

    const pulseScale = 1 + 0.045*activeLevel + 0.030*currentAiLevel + 0.018*currentUserLevel;
    const completePop = stateName === 'complete' ? 1 + Math.max(0, Math.sin((ms-lastExplicitStateAt)/190))*0.012 : 1;
    group.scale.setScalar(state.scale * pulseScale * completePop);

    innerSphere.rotation.y += state.rotY * dt * (LOW_MOTION ? .65 : 1.0);
    innerSphere.rotation.x += state.rotX * dt * (LOW_MOTION ? .65 : 1.0);
    glass.rotation.y -= state.rotY * dt * .20;
    particles.rotation.z += dt * (0.045 + activeLevel*.07) * (stateName === 'processing' ? 1.65 : 1);

    userRing.lookAt(camera.position);
    aiRing.lookAt(camera.position);
    processRing.lookAt(camera.position);
    userRing.rotation.z += tNow*.0;
    aiRing.rotation.z -= tNow*.0;
    processRing.rotation.z += dt*(stateName === 'processing' ? 1.0 : .32);

    userRingMat.uniforms.uTime.value += dt;
    userRingMat.uniforms.uLevel.value = Math.max(currentUserLevel, activeLevel*.25);
    userRingMat.uniforms.uAlpha.value = (state.userRing || 0) * (0.55 + 0.70*currentUserLevel);

    aiRingMat.uniforms.uTime.value += dt;
    aiRingMat.uniforms.uLevel.value = Math.max(currentAiLevel, activeLevel*.22);
    aiRingMat.uniforms.uAlpha.value = (state.aiRing || 0) * (0.55 + 0.70*currentAiLevel);

    processRingMat.uniforms.uTime.value += dt*(stateName === 'processing' ? 1.9 : .7);
    processRingMat.uniforms.uLevel.value = Math.max(activeLevel*.55, stateName === 'processing' ? .48 : .08);
    processRingMat.uniforms.uAlpha.value = (state.process || 0) * (stateName === 'processing' ? .96 : .55);

    pMat.uniforms.uTime.value += dt;
    pMat.uniforms.uAlpha.value = state.aura;
    pMat.uniforms.uLevel.value = activeLevel;
    pMat.uniforms.uAiLevel.value = currentAiLevel;
    pMat.uniforms.uUserLevel.value = currentUserLevel;

    rim.intensity = 1.10 + currentUserLevel*1.25 + energy*.30;
    magentaLight.intensity = 0.58 + currentAiLevel*1.55 + (stateName==='thinking' ? .40 : 0);

    renderer.render(scene, camera);
  }
  frame();

  // ----------------------------- Events -----------------------------
  window.addEventListener('resize', ()=>{
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, LOW_MOTION ? 1.4 : 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    uniforms.uAspect.value = camera.aspect;
  });

  document.addEventListener('visibilitychange', ()=>{
    hidden = document.hidden;
  });

  window.addEventListener('message', (ev)=>{
    const d = parseMessage(ev && ev.data);
    if (!d || !d.type) return;
    const type = String(d.type || '').trim();
    const lower = type.toLowerCase();

    if (lower === 'ping' || lower === 'avatar:ping') {
      ev.source && ev.source.postMessage && ev.source.postMessage({ type:'avatar:ready', version:VERSION }, '*');
      postParent({ type:'avatar:ready' });
      return;
    }

    if (lower === 'avatar:set' || lower === 'avatar:state') {
      applyTargetStyle(d.state || d.value || 'idle');
      return;
    }

    if (lower === 'avatar:level') {
      setLevel(d.value ?? d.level ?? 0, d.source || d.channel || d.role || '');
      return;
    }

    if (lower === 'avatar:userlevel' || lower === 'avatar:user-level') {
      setLevel(d.value ?? d.level ?? 0, 'user');
      return;
    }

    if (lower === 'avatar:ailevel' || lower === 'avatar:ai-level') {
      setLevel(d.value ?? d.level ?? 0, 'ai');
      return;
    }

    if (lower === 'avatar:config') {
      setConfig(d);
      return;
    }

    if (lower === 'avatar:stop') {
      stopAvatar();
      return;
    }

    if (lower === 'avatar:reset') {
      resetAvatar();
      return;
    }

    if (lower === 'avatar:complete') {
      pulseBoost = .42;
      applyTargetStyle('complete');
      return;
    }

    if (lower === 'avatar:error') {
      pulseBoost = .20;
      applyTargetStyle('error');
      return;
    }

    if (lower === 'avatar:say') {
      speakText(d.text || d.message || '', d.lang || d.language || params.get('lang') || 'de-DE');
      return;
    }

    // Compatibility with live.html / recorder event names, if forwarded directly.
    if (lower === 'clarity.live.ready' || lower === 'recorder:ready') applyTargetStyle('ready');
    else if (lower === 'input_audio_buffer.speech_started' || lower === 'speech_started') applyTargetStyle('user_speaking');
    else if (lower === 'input_audio_buffer.speech_stopped' || lower === 'speech_stopped') applyTargetStyle('listening');
    else if (lower === 'response.audio.delta' || lower === 'response.audio_transcript.delta' || lower === 'assistant_audio_delta') setLevel(d.value ?? .55, 'ai');
    else if (lower === 'response.done' || lower === 'assistant_done') { targetAiLevel = 0; applyTargetStyle('listening'); }
    else if (lower === 'recorder:finished' || lower === 'processing:start') applyTargetStyle('processing');
    else if (lower === 'processing:done' || lower === 'report:ready') applyTargetStyle('complete');
  });

  // ----------------------------- Init -----------------------------
  applyTargetStyle(params.get('state') || 'idle');
  if (params.get('label') === '0') setLabelVisibility(false);
  setTimeout(()=> postParent({ type:'avatar:ready' }), 60);
})();
</script>
</body>
</html>
