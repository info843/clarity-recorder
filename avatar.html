<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clarity AI Orb Avatar v2</title>
<style>
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
  }
  #root{
    position:fixed;
    inset:0;
    background:transparent;
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    background:transparent;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(()=>{
  "use strict";

  // ------------------------------------------------------------
  // BASIC SETUP
  // ------------------------------------------------------------
  const root = document.getElementById("root");

  const renderer = new THREE.WebGLRenderer({
    antialias:true,
    alpha:true,
    powerPreference:"high-performance"
  });

  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.18;
  root.appendChild(renderer.domElement);

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    42,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.set(0, 0, 4.8);

  const group = new THREE.Group();
  scene.add(group);

  const haloGroup = new THREE.Group();
  scene.add(haloGroup);

  const particleGroup = new THREE.Group();
  scene.add(particleGroup);

  // ------------------------------------------------------------
  // LIGHTING
  // ------------------------------------------------------------
  scene.add(new THREE.AmbientLight(0xffffff, 0.82));

  const keyLight = new THREE.DirectionalLight(0xffffff, 1.25);
  keyLight.position.set(3.5, 4, 5);
  scene.add(keyLight);

  const cyanLight = new THREE.PointLight(0x23f3ff, 2.5, 6);
  cyanLight.position.set(-2.2, 1.2, 2.5);
  scene.add(cyanLight);

  const magentaLight = new THREE.PointLight(0xff149d, 2.3, 6);
  magentaLight.position.set(2.1, -0.7, 2.2);
  scene.add(magentaLight);

  const blueLight = new THREE.PointLight(0x005dff, 1.7, 5);
  blueLight.position.set(0, -2, 2.4);
  scene.add(blueLight);

  // ------------------------------------------------------------
  // MATERIAL HELPERS
  // ------------------------------------------------------------
  function physicalMaterial(options){
    return new THREE.MeshPhysicalMaterial(Object.assign({
      roughness:0.22,
      metalness:0.05,
      clearcoat:1,
      clearcoatRoughness:0.12,
      transparent:true
    }, options || {}));
  }

  const matFace = physicalMaterial({
    color:0x071a3f,
    emissive:0x00194d,
    emissiveIntensity:0.55,
    transmission:0,
    opacity:0.98,
    ior:1.4,
    thickness:0.5,
    roughness:0.3,
    metalness:0.08,
    clearcoat:1
  });

  const matFaceInnerGlow = new THREE.ShaderMaterial({
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
    uniforms:{
      uTime:{value:0},
      uLevel:{value:0}
    },
    vertexShader:`
      varying vec3 vNormal;
      varying vec3 vPos;
      void main(){
        vNormal = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vPos = mv.xyz;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader:`
      precision highp float;
      varying vec3 vNormal;
      varying vec3 vPos;
      uniform float uTime;
      uniform float uLevel;
      void main(){
        vec3 viewDir = normalize(-vPos);
        float fres = pow(1.0 - max(dot(normalize(vNormal), viewDir), 0.0), 2.2);
        float pulse = 0.52 + 0.48 * sin(uTime * 2.4);
        vec3 cyan = vec3(0.05, 0.85, 1.0);
        vec3 blue = vec3(0.03, 0.18, 0.9);
        vec3 mag = vec3(1.0, 0.05, 0.65);
        float vertical = smoothstep(-0.8, 0.8, vNormal.y);
        vec3 col = mix(blue, cyan, vertical);
        col = mix(col, mag, 0.18 + 0.18 * sin(uTime * 0.8));
        float a = fres * (0.22 + 0.26 * pulse + 0.45 * uLevel);
        gl_FragColor = vec4(col, a);
      }
    `
  });

  const matCyan = physicalMaterial({
    color:0x18dfe3,
    emissive:0x00ddea,
    emissiveIntensity:0.28,
    opacity:0.98,
    roughness:0.18
  });

  const matCyanLight = physicalMaterial({
    color:0x75fff8,
    emissive:0x2fffff,
    emissiveIntensity:0.45,
    opacity:0.95,
    roughness:0.16
  });

  const matBlue = physicalMaterial({
    color:0x003b9e,
    emissive:0x003cff,
    emissiveIntensity:0.26,
    opacity:0.98,
    roughness:0.2
  });

  const matDeepBlue = physicalMaterial({
    color:0x001f63,
    emissive:0x0036c9,
    emissiveIntensity:0.35,
    opacity:0.98,
    roughness:0.22
  });

  const matMagenta = physicalMaterial({
    color:0xe6008b,
    emissive:0xff0099,
    emissiveIntensity:0.42,
    opacity:0.98,
    roughness:0.17
  });

  const matPurple = physicalMaterial({
    color:0x5827d9,
    emissive:0x742cff,
    emissiveIntensity:0.25,
    opacity:0.96,
    roughness:0.18
  });

  const matEye = new THREE.MeshBasicMaterial({
    color:0x88ffff,
    transparent:true,
    opacity:0.98
  });

  const matEyeGlow = new THREE.MeshBasicMaterial({
    color:0x00dfff,
    transparent:true,
    opacity:0.35,
    blending:THREE.AdditiveBlending,
    depthWrite:false
  });

  const matWhiteSpark = new THREE.MeshBasicMaterial({
    color:0xffffff,
    transparent:true,
    opacity:0.78,
    blending:THREE.AdditiveBlending,
    depthWrite:false
  });

  // ------------------------------------------------------------
  // CORE FACE ORB
  // ------------------------------------------------------------
  const faceGeo = new THREE.SphereGeometry(1.02, 128, 96);
  const face = new THREE.Mesh(faceGeo, matFace);
  face.scale.set(1.04, 0.96, 0.82);
  face.position.set(0, 0.02, 0);
  group.add(face);

  const faceGlow = new THREE.Mesh(
    new THREE.SphereGeometry(1.035, 128, 96),
    matFaceInnerGlow
  );
  faceGlow.scale.copy(face.scale);
  faceGlow.position.copy(face.position);
  group.add(faceGlow);

  // ------------------------------------------------------------
  // CURVE / TUBE HELPERS
  // ------------------------------------------------------------
  function makeTube(points, radius, material, tubularSegments, radialSegments){
    const curve = new THREE.CatmullRomCurve3(points);
    curve.curveType = "catmullrom";
    curve.tension = 0.42;
    const geo = new THREE.TubeGeometry(
      curve,
      tubularSegments || 96,
      radius,
      radialSegments || 20,
      false
    );
    const mesh = new THREE.Mesh(geo, material);
    return mesh;
  }

  function makeArcPoints(startDeg, endDeg, radiusX, radiusY, z, count, yOffset, xOffset){
    const pts = [];
    const start = THREE.MathUtils.degToRad(startDeg);
    const end = THREE.MathUtils.degToRad(endDeg);
    for(let i=0;i<count;i++){
      const t = i/(count-1);
      const a = start + (end-start)*t;
      pts.push(new THREE.Vector3(
        Math.cos(a)*radiusX + (xOffset || 0),
        Math.sin(a)*radiusY + (yOffset || 0),
        z
      ));
    }
    return pts;
  }

  // ------------------------------------------------------------
  // CLARITY SWIRL SHELL
  // Cyan upper-left / top shell
  // ------------------------------------------------------------
  const topCyanPts = [
    new THREE.Vector3(-1.23,-0.24,0.22),
    new THREE.Vector3(-1.28,0.25,0.34),
    new THREE.Vector3(-0.96,0.78,0.42),
    new THREE.Vector3(-0.36,1.10,0.44),
    new THREE.Vector3(0.34,1.14,0.40),
    new THREE.Vector3(0.96,0.90,0.32),
    new THREE.Vector3(1.18,0.50,0.18)
  ];
  const topCyan = makeTube(topCyanPts, 0.18, matCyan, 130, 28);
  topCyan.scale.set(1.03, 0.86, 1);
  group.add(topCyan);

  const topHighlightPts = [
    new THREE.Vector3(-0.93,0.27,0.48),
    new THREE.Vector3(-0.62,0.62,0.55),
    new THREE.Vector3(-0.12,0.86,0.58),
    new THREE.Vector3(0.46,0.93,0.54),
    new THREE.Vector3(0.89,0.78,0.43)
  ];
  const topHighlight = makeTube(topHighlightPts, 0.035, matCyanLight, 90, 12);
  group.add(topHighlight);

  // Deep blue lower-left shell
  const lowerBluePts = [
    new THREE.Vector3(-1.12,-0.62,0.14),
    new THREE.Vector3(-0.74,-0.98,0.18),
    new THREE.Vector3(-0.12,-1.14,0.20),
    new THREE.Vector3(0.58,-1.02,0.22),
    new THREE.Vector3(1.02,-0.66,0.24),
    new THREE.Vector3(1.20,-0.20,0.20)
  ];
  const lowerBlue = makeTube(lowerBluePts, 0.19, matBlue, 120, 28);
  lowerBlue.scale.set(1.02, 0.9, 1);
  group.add(lowerBlue);

  const innerDeepBluePts = [
    new THREE.Vector3(-1.02,-0.43,0.31),
    new THREE.Vector3(-0.68,-0.70,0.40),
    new THREE.Vector3(-0.10,-0.79,0.46),
    new THREE.Vector3(0.55,-0.64,0.43),
    new THREE.Vector3(0.93,-0.34,0.35)
  ];
  const innerDeepBlue = makeTube(innerDeepBluePts, 0.055, matDeepBlue, 90, 14);
  group.add(innerDeepBlue);

  // Magenta right crescent shell
  const magentaPts = [
    new THREE.Vector3(1.03,0.58,0.24),
    new THREE.Vector3(1.28,0.22,0.35),
    new THREE.Vector3(1.31,-0.23,0.42),
    new THREE.Vector3(1.05,-0.78,0.38),
    new THREE.Vector3(0.55,-1.08,0.30),
    new THREE.Vector3(-0.02,-1.12,0.18)
  ];
  const magentaShell = makeTube(magentaPts, 0.2, matMagenta, 120, 30);
  magentaShell.scale.set(0.97, 0.98, 1);
  group.add(magentaShell);

  const magentaEdgePts = [
    new THREE.Vector3(1.13,0.50,0.52),
    new THREE.Vector3(1.18,0.05,0.58),
    new THREE.Vector3(1.08,-0.44,0.56),
    new THREE.Vector3(0.76,-0.84,0.48),
    new THREE.Vector3(0.31,-1.02,0.34)
  ];
  const magentaEdge = makeTube(magentaEdgePts, 0.04, new THREE.MeshBasicMaterial({
    color:0xffb9ff,
    transparent:true,
    opacity:0.9,
    blending:THREE.AdditiveBlending
  }), 90, 12);
  group.add(magentaEdge);

  // Purple transition ribbon across front
  const purplePts = [
    new THREE.Vector3(-0.72,-0.78,0.38),
    new THREE.Vector3(-0.18,-0.88,0.46),
    new THREE.Vector3(0.48,-0.76,0.52),
    new THREE.Vector3(1.03,-0.38,0.50)
  ];
  const purpleRibbon = makeTube(purplePts, 0.075, matPurple, 80, 16);
  group.add(purpleRibbon);

  // ------------------------------------------------------------
  // FRIENDLY AVATAR EYES
  // ------------------------------------------------------------
  function createEye(x){
    const pts = [
      new THREE.Vector3(x - 0.21, 0.06, 0.89),
      new THREE.Vector3(x - 0.11, 0.18, 0.93),
      new THREE.Vector3(x + 0.02, 0.21, 0.95),
      new THREE.Vector3(x + 0.17, 0.12, 0.93),
      new THREE.Vector3(x + 0.23, 0.02, 0.89)
    ];
    const eye = makeTube(pts, 0.026, matEye, 42, 10);
    const glow = makeTube(pts, 0.058, matEyeGlow, 42, 12);
    return { eye, glow };
  }

  const leftEye = createEye(-0.39);
  const rightEye = createEye(0.39);
  group.add(leftEye.glow, rightEye.glow, leftEye.eye, rightEye.eye);

  // Face glass highlight
  const shinePts = [
    new THREE.Vector3(-0.55,0.52,0.86),
    new THREE.Vector3(-0.45,0.68,0.93),
    new THREE.Vector3(-0.25,0.77,0.96),
    new THREE.Vector3(-0.07,0.73,0.94)
  ];
  const faceShine = makeTube(shinePts, 0.045, matWhiteSpark, 45, 12);
  group.add(faceShine);

  // ------------------------------------------------------------
  // HALO RINGS / PULSE AURA
  // ------------------------------------------------------------
  function createRing(radius, tube, color, opacity){
    const geo = new THREE.TorusGeometry(radius, tube, 12, 180);
    const mat = new THREE.MeshBasicMaterial({
      color,
      transparent:true,
      opacity,
      blending:THREE.AdditiveBlending,
      depthWrite:false
    });
    const mesh = new THREE.Mesh(geo, mat);
    return mesh;
  }

  const ringBackCyan = createRing(1.58, 0.008, 0x39faff, 0.42);
  ringBackCyan.position.z = -0.35;
  haloGroup.add(ringBackCyan);

  const ringBackMagenta = createRing(1.72, 0.008, 0xff4fd8, 0.33);
  ringBackMagenta.position.z = -0.43;
  haloGroup.add(ringBackMagenta);

  const ringFront = createRing(1.38, 0.006, 0xffffff, 0.18);
  ringFront.position.z = 0.1;
  haloGroup.add(ringFront);

  const auraMat = new THREE.ShaderMaterial({
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
    uniforms:{
      uTime:{value:0},
      uLevel:{value:0}
    },
    vertexShader:`
      varying vec2 vUv;
      void main(){
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader:`
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uLevel;

      void main(){
        vec2 p = vUv * 2.0 - 1.0;
        float d = length(p);
        float angle = atan(p.y, p.x);

        float baseRing = 0.78 + 0.02 * sin(uTime * 1.8);
        float ring = smoothstep(0.028, 0.0, abs(d - baseRing));

        float second = smoothstep(0.018, 0.0, abs(d - (0.98 + 0.025 * sin(uTime * 1.25))));
        float dash = 0.55 + 0.45 * sin(angle * 22.0 + uTime * 2.0);

        vec3 cyan = vec3(0.05, 0.95, 1.0);
        vec3 mag = vec3(1.0, 0.05, 0.75);
        vec3 col = mix(cyan, mag, smoothstep(-0.2, 0.9, p.x));

        float radialFade = smoothstep(1.18, 0.3, d);
        float alpha = (ring * 0.42 + second * dash * 0.28) * radialFade;
        alpha *= 0.55 + 0.9 * uLevel;

        gl_FragColor = vec4(col, alpha);
      }
    `
  });

  const aura = new THREE.Mesh(new THREE.PlaneGeometry(4.3, 4.3), auraMat);
  aura.position.z = -0.62;
  haloGroup.add(aura);

  // ------------------------------------------------------------
  // SMALL ENERGY PARTICLES
  // ------------------------------------------------------------
  const particleGeo = new THREE.BufferGeometry();
  const particleCount = 90;
  const particlePositions = new Float32Array(particleCount * 3);
  const particleSeeds = [];

  for(let i=0;i<particleCount;i++){
    const a = Math.random() * Math.PI * 2;
    const r = 1.45 + Math.random() * 0.45;
    particlePositions[i*3+0] = Math.cos(a) * r;
    particlePositions[i*3+1] = Math.sin(a) * r;
    particlePositions[i*3+2] = -0.12 + (Math.random() - 0.5) * 0.38;
    particleSeeds.push({
      a,
      r,
      speed:0.08 + Math.random() * 0.18,
      size:0.02 + Math.random() * 0.035,
      phase:Math.random() * Math.PI * 2
    });
  }

  particleGeo.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));

  const particleMat = new THREE.PointsMaterial({
    size:0.035,
    color:0x9cffff,
    transparent:true,
    opacity:0.62,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    sizeAttenuation:true
  });

  const particles = new THREE.Points(particleGeo, particleMat);
  particleGroup.add(particles);

  // ------------------------------------------------------------
  // STATE API
  // ------------------------------------------------------------
  const STYLES = {
    idle:{
      glow:0.62,
      rotX:0.035,
      rotY:0.09,
      pulseSpeed:1.0,
      eyeOpacity:0.95,
      aura:0.55
    },
    listening:{
      glow:0.82,
      rotX:0.045,
      rotY:0.13,
      pulseSpeed:1.35,
      eyeOpacity:1.0,
      aura:0.78
    },
    thinking:{
      glow:0.74,
      rotX:0.025,
      rotY:0.075,
      pulseSpeed:0.72,
      eyeOpacity:0.82,
      aura:0.65
    },
    speaking:{
      glow:1.0,
      rotX:0.055,
      rotY:0.17,
      pulseSpeed:1.75,
      eyeOpacity:1.0,
      aura:1.0
    }
  };

  let currentState = "idle";
  let targetLevel = 0;
  let currentLevel = 0;
  let rotX = STYLES.idle.rotX;
  let rotY = STYLES.idle.rotY;
  let pulseSpeed = STYLES.idle.pulseSpeed;
  let targetGlow = STYLES.idle.glow;
  let auraPower = STYLES.idle.aura;
  let lastMsg = performance.now();

  function clamp01(v){
    return Math.max(0, Math.min(1, Number(v) || 0));
  }

  function setState(state){
    currentState = STYLES[state] ? state : "idle";
    const s = STYLES[currentState];

    rotX = s.rotX;
    rotY = s.rotY;
    pulseSpeed = s.pulseSpeed;
    targetGlow = s.glow;
    auraPower = s.aura;

    matEye.opacity = s.eyeOpacity;
    matEyeGlow.opacity = 0.28 + s.eyeOpacity * 0.18;
  }

  function setLevel(v){
    targetLevel = clamp01(v);
    lastMsg = performance.now();
  }

  // ------------------------------------------------------------
  // ANIMATION LOOP
  // ------------------------------------------------------------
  const nobreath = new URLSearchParams(window.location.search).get("nobreath") === "1";
  let previous = performance.now() / 1000;

  function animate(){
    requestAnimationFrame(animate);

    const nowMs = performance.now();
    const now = nowMs / 1000;
    const dt = Math.min(now - previous, 0.05);
    previous = now;

    const silentTime = nowMs - lastMsg;
    const breathing = (!nobreath && silentTime > 3000)
      ? (Math.sin(now * 1.45) * 0.5 + 0.5) * 0.28
      : targetLevel;

    currentLevel = currentLevel * 0.86 + breathing * 0.14;

    const statePulse = Math.sin(now * (1.7 * pulseSpeed)) * 0.5 + 0.5;
    const levelPulse = 0.65 + currentLevel * 0.35;
    const breatheScale = 1 + 0.018 * statePulse + 0.055 * currentLevel;

    group.scale.setScalar(breatheScale);
    group.rotation.y += rotY * dt;
    group.rotation.x = Math.sin(now * 0.55) * 0.035 + rotX * 0.55;
    group.rotation.z = Math.sin(now * 0.42) * 0.018;

    haloGroup.rotation.z -= dt * (0.08 + 0.18 * currentLevel);
    haloGroup.scale.setScalar(1 + 0.025 * statePulse + 0.09 * currentLevel);

    ringBackCyan.material.opacity = (0.25 + 0.22 * statePulse + 0.35 * currentLevel) * auraPower;
    ringBackMagenta.material.opacity = (0.20 + 0.20 * (1 - statePulse) + 0.32 * currentLevel) * auraPower;
    ringFront.material.opacity = (0.10 + 0.10 * statePulse + 0.18 * currentLevel) * auraPower;

    ringBackCyan.rotation.z += dt * (0.12 + currentLevel * 0.25);
    ringBackMagenta.rotation.z -= dt * (0.09 + currentLevel * 0.2);
    ringFront.rotation.z += dt * (0.16 + currentLevel * 0.28);

    matFace.emissiveIntensity = 0.42 + targetGlow * 0.18 + currentLevel * 0.45;
    matCyan.emissiveIntensity = 0.24 + currentLevel * 0.45 + statePulse * 0.08;
    matCyanLight.emissiveIntensity = 0.36 + currentLevel * 0.72;
    matBlue.emissiveIntensity = 0.22 + currentLevel * 0.38;
    matDeepBlue.emissiveIntensity = 0.25 + currentLevel * 0.38;
    matMagenta.emissiveIntensity = 0.34 + currentLevel * 0.68 + (1 - statePulse) * 0.08;
    matPurple.emissiveIntensity = 0.20 + currentLevel * 0.42;

    matEye.opacity = Math.min(1, STYLES[currentState].eyeOpacity + currentLevel * 0.15);
    matEyeGlow.opacity = 0.28 + currentLevel * 0.38 + statePulse * 0.06;

    matFaceInnerGlow.uniforms.uTime.value = now;
    matFaceInnerGlow.uniforms.uLevel.value = currentLevel;

    auraMat.uniforms.uTime.value = now;
    auraMat.uniforms.uLevel.value = currentLevel * auraPower;

    cyanLight.intensity = 2.1 + statePulse * 0.6 + currentLevel * 1.5;
    magentaLight.intensity = 1.9 + (1 - statePulse) * 0.7 + currentLevel * 1.4;
    blueLight.intensity = 1.3 + currentLevel * 0.9;

    const pos = particleGeo.attributes.position.array;
    for(let i=0;i<particleCount;i++){
      const seed = particleSeeds[i];
      seed.a += seed.speed * dt * (0.8 + currentLevel * 1.8);
      const wobble = Math.sin(now * 1.1 + seed.phase) * 0.035;
      const r = seed.r + wobble + currentLevel * 0.06;
      pos[i*3+0] = Math.cos(seed.a) * r;
      pos[i*3+1] = Math.sin(seed.a) * r;
      pos[i*3+2] = -0.12 + Math.sin(now * 0.8 + seed.phase) * 0.16;
    }
    particleGeo.attributes.position.needsUpdate = true;
    particleMat.opacity = 0.35 + currentLevel * 0.35 + statePulse * 0.08;
    particleMat.size = 0.025 + currentLevel * 0.035;

    aura.lookAt(camera.position);

    renderer.render(scene, camera);
  }

  animate();

  // ------------------------------------------------------------
  // RESIZE
  // ------------------------------------------------------------
  window.addEventListener("resize", ()=>{
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  // ------------------------------------------------------------
  // MESSAGING API - BACKWARD COMPATIBLE
  // ------------------------------------------------------------
  window.addEventListener("message", (ev)=>{
    const d = ev && ev.data ? ev.data : {};

    if(d.type === "avatar:set"){
      setState(d.state || "idle");
    }

    if(d.type === "avatar:level"){
      setLevel(d.value);
    }

    if(d.type === "ping"){
      if(ev.source && typeof ev.source.postMessage === "function"){
        ev.source.postMessage({type:"avatar:ready"}, "*");
      }
    }
  });

  // ------------------------------------------------------------
  // INIT
  // ------------------------------------------------------------
  setState("idle");
  setLevel(0);

  setTimeout(()=>{
    try{
      if(window.parent && typeof window.parent.postMessage === "function"){
        window.parent.postMessage({type:"avatar:ready"}, "*");
      }
    }catch(e){}
  }, 50);

})();
</script>
</body>
</html>
