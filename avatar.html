<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>CLARITY Reactive Interview Avatar v2.0.3 Live Energy</title>
<style>
  :root{
    --clarity-cyan:#3DE6F5;
    --clarity-blue:#064E9B;
    --clarity-navy:#041D48;
    --clarity-violet:#6A35FF;
    --clarity-magenta:#EF00B8;
    --clarity-white:#F7FBFF;
    --clarity-success:#49F0C2;
    --clarity-amber:#FFB84D;

    --state-c1:#3DE6F5;
    --state-c2:#064E9B;
    --state-c3:#6A35FF;
    --state-glow:0.75;
    --state-speed:5.2s;
    --state-scale:1;
    --state-energy:.22;
    --level:0.12;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  body.bg{
    background:
      radial-gradient(circle at 50% 45%, rgba(61,230,245,.18), transparent 34%),
      radial-gradient(circle at 65% 62%, rgba(239,0,184,.18), transparent 38%),
      linear-gradient(135deg, rgba(4,29,72,.92), rgba(2,8,26,.98));
  }
  #root{position:fixed;inset:0;overflow:hidden;background:transparent}
  canvas{display:block;position:absolute;inset:0;width:100%;height:100%;z-index:2}

  /* Always-on premium fallback/backdrop. It stays visible even if WebGL fails. */
  #cssAvatar{
    position:fixed;
    inset:0;
    display:grid;
    place-items:center;
    pointer-events:none;
    z-index:1;
    opacity:1;
    transition:opacity .35s ease, filter .35s ease;
    filter:drop-shadow(0 26px 70px rgba(0,27,70,.30));
  }
  #cssAvatar.three-ready{
    opacity:.33;
    filter:blur(.2px) drop-shadow(0 22px 64px rgba(0,27,70,.22));
  }
  .avatarWrap{
    position:relative;
    width:min(68vw,68vh,410px);
    height:min(68vw,68vh,410px);
    transform:scale(calc(var(--state-scale) + var(--level) * .055));
    transition:transform .14s ease-out;
    animation:wholeBreath var(--state-speed) ease-in-out infinite;
  }
  .aura{
    position:absolute;
    inset:-10%;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 28%, rgba(61,230,245,.42), transparent 28%),
      radial-gradient(circle at 70% 64%, rgba(239,0,184,.34), transparent 34%),
      radial-gradient(circle at 50% 50%, rgba(106,53,255,.28), transparent 56%);
    opacity:calc(.46 + var(--level) * .36);
    filter:blur(18px) saturate(1.24);
    animation:auraPulse calc(var(--state-speed) * .86) ease-in-out infinite;
  }
  .orb{
    position:absolute;
    inset:9%;
    border-radius:50%;
    overflow:hidden;
    background:
      radial-gradient(circle at 32% 25%, rgba(255,255,255,.96) 0 3.7%, rgba(255,255,255,.36) 4.1%, transparent 13%),
      radial-gradient(circle at 39% 36%, rgba(61,230,245,.95), transparent 24%),
      radial-gradient(circle at 67% 64%, rgba(239,0,184,.95), transparent 31%),
      radial-gradient(circle at 54% 52%, rgba(106,53,255,.92), transparent 46%),
      linear-gradient(135deg, var(--state-c1), var(--state-c2) 46%, var(--state-c3));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.58),
      inset -24px -28px 64px rgba(4,29,72,.50),
      inset 24px 22px 64px rgba(61,230,245,.22),
      0 0 calc(34px + var(--level) * 36px) rgba(61,230,245,.30),
      0 0 calc(54px + var(--level) * 70px) rgba(239,0,184,.18);
    opacity:.98;
    animation:orbLiquid calc(var(--state-speed) * .92) ease-in-out infinite;
  }
  .orb:before{
    content:"";
    position:absolute;
    inset:5% 4% auto 7%;
    height:42%;
    border-radius:50%;
    background:linear-gradient(180deg, rgba(255,255,255,.50), rgba(255,255,255,.08) 58%, transparent);
    transform:rotate(-13deg);
    mix-blend-mode:screen;
    opacity:.92;
  }
  .orb:after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
      linear-gradient(102deg, transparent 0 22%, rgba(255,255,255,.24) 23%, transparent 32% 100%),
      radial-gradient(circle at 72% 26%, rgba(255,255,255,.75) 0 1.4%, transparent 2.4%),
      radial-gradient(circle at 28% 37%, rgba(255,255,255,.55) 0 1.1%, transparent 2.2%);
    opacity:calc(.38 + var(--level) * .22);
    animation:sheenMove 8.6s ease-in-out infinite;
  }

  .energyLayer{
    position:absolute;
    inset:12%;
    border-radius:50%;
    pointer-events:none;
    mix-blend-mode:screen;
    opacity:calc(.18 + var(--state-energy) * .36 + var(--level) * .24);
    filter:blur(1px) saturate(1.35);
    background:
      conic-gradient(from 90deg,
        transparent 0 9%,
        rgba(61,230,245,.55) 14%,
        transparent 24%,
        rgba(106,53,255,.46) 36%,
        transparent 49%,
        rgba(239,0,184,.52) 64%,
        transparent 79%,
        rgba(255,255,255,.36) 92%,
        transparent 100%);
    animation:energySpin calc(var(--state-speed) * .72) linear infinite;
  }
  .energyLayer.e2{
    inset:20%;
    opacity:calc(.14 + var(--state-energy) * .32 + var(--level) * .18);
    filter:blur(7px) saturate(1.5);
    background:
      radial-gradient(circle at 32% 34%, rgba(61,230,245,.72), transparent 27%),
      radial-gradient(circle at 69% 65%, rgba(239,0,184,.70), transparent 33%),
      radial-gradient(circle at 50% 52%, rgba(106,53,255,.52), transparent 52%);
    animation:energyBreathe calc(var(--state-speed) * .58) ease-in-out infinite;
  }
  .energyLayer.e3{
    inset:27%;
    opacity:calc(.10 + var(--state-energy) * .28 + var(--level) * .18);
    border:1px solid rgba(255,255,255,.22);
    background:transparent;
    box-shadow:
      inset 0 0 calc(10px + var(--level) * 26px) var(--state-c1),
      0 0 calc(12px + var(--level) * 34px) var(--state-c3);
    transform:rotateX(64deg) rotateZ(24deg) scale(calc(.86 + var(--level) * .24));
    animation:energyTilt calc(var(--state-speed) * .9) linear infinite reverse;
  }
  .voiceBand{
    position:absolute;
    left:15%;right:15%;
    height:2px;
    border-radius:999px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.40), var(--state-c1), rgba(255,255,255,.58), transparent);
    box-shadow:0 0 calc(7px + var(--level) * 22px) var(--state-c1);
    opacity:calc(.12 + var(--state-energy) * .26 + var(--level) * .48);
    transform-origin:center;
    animation:voiceBandPulse 1.1s ease-in-out infinite;
  }
  .voiceBand.v1{top:37%;animation-delay:-.05s;transform:scaleX(calc(.46 + var(--level) * .70)) translateY(calc(var(--level) * -10px))}
  .voiceBand.v2{top:44%;animation-delay:-.22s;transform:scaleX(calc(.62 + var(--level) * .54)) translateY(calc(var(--level) * -5px))}
  .voiceBand.v3{top:51%;animation-delay:-.39s;transform:scaleX(calc(.74 + var(--level) * .42))}
  .voiceBand.v4{top:58%;animation-delay:-.55s;transform:scaleX(calc(.56 + var(--level) * .62)) translateY(calc(var(--level) * 5px))}
  .voiceBand.v5{top:65%;animation-delay:-.71s;transform:scaleX(calc(.42 + var(--level) * .78)) translateY(calc(var(--level) * 10px))}
  .pulseShell{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1px solid color-mix(in srgb, var(--state-c1) 56%, white 22%);
    opacity:0;
    transform:scale(.90);
    filter:drop-shadow(0 0 18px var(--state-c1));
    animation:speechPulse 2.6s ease-out infinite;
  }
  .pulseShell.p2{animation-delay:.65s;border-color:color-mix(in srgb, var(--state-c3) 62%, white 14%)}
  .pulseShell.p3{animation-delay:1.30s;border-color:rgba(255,255,255,.36)}
  body[data-state="idle"] .voiceBand,
  body[data-state="ready"] .voiceBand{opacity:calc(.06 + var(--level) * .20)}
  body[data-state="user_speaking"] .voiceBand{animation-duration:.62s;opacity:calc(.34 + var(--level) * .58)}
  body[data-state="ai_speaking"] .voiceBand{animation-duration:.46s;opacity:calc(.40 + var(--level) * .56);background:linear-gradient(90deg, transparent, rgba(255,255,255,.58), var(--state-c3), var(--state-c1), transparent)}
  body[data-state="thinking"] .energyLayer{animation-duration:3.7s;opacity:calc(.24 + var(--level) * .28)}
  body[data-state="processing"] .pulseShell{animation-duration:1.55s}
  body[data-state="complete"] .pulseShell{animation-duration:1.25s}

  .wave{
    position:absolute;
    left:7%;right:7%;top:48%;height:2px;
    border-radius:999px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.82), var(--state-c1), rgba(255,255,255,.74), transparent);
    box-shadow:0 0 calc(12px + var(--level) * 22px) var(--state-c1);
    transform:scaleX(calc(.74 + var(--level) * .32));
    opacity:calc(.48 + var(--level) * .45);
    animation:waveFloat calc(var(--state-speed) * .55) ease-in-out infinite;
  }
  .ring{
    position:absolute;
    inset:4%;
    border-radius:50%;
    border:2px solid transparent;
    border-top-color:var(--state-c1);
    border-left-color:rgba(61,230,245,.18);
    border-bottom-color:rgba(255,255,255,.16);
    opacity:calc(.50 + var(--level) * .28);
    filter:drop-shadow(0 0 calc(12px + var(--level) * 18px) var(--state-c1));
    transform:rotateX(63deg) rotateZ(-10deg) scale(calc(.96 + var(--level) * .10));
    animation:ringOrbit calc(var(--state-speed) * .82) linear infinite;
  }
  .ring.r2{
    inset:1%;
    border-top-color:var(--state-c3);
    border-right-color:rgba(239,0,184,.24);
    border-left-color:transparent;
    transform:rotateX(78deg) rotateY(18deg) rotateZ(82deg) scale(calc(.92 + var(--level) * .13));
    animation-duration:calc(var(--state-speed) * 1.16);
    animation-direction:reverse;
    opacity:calc(.34 + var(--level) * .30);
  }
  .ring.r3{
    inset:11%;
    border-top-color:rgba(255,255,255,.62);
    border-right-color:rgba(255,255,255,.10);
    transform:rotateX(28deg) rotateY(66deg) rotateZ(14deg) scale(calc(.90 + var(--level) * .08));
    animation-duration:calc(var(--state-speed) * 1.34);
    opacity:calc(.30 + var(--level) * .22);
  }
  .spark{
    position:absolute;
    left:50%;top:50%;
    width:7px;height:7px;
    margin:-3.5px 0 0 -3.5px;
    border-radius:999px;
    background:#fff;
    box-shadow:0 0 14px #fff,0 0 26px var(--state-c1);
    opacity:calc(.52 + var(--level) * .38);
    animation:sparkOrbit 8.8s linear infinite;
  }
  .spark.s2{background:var(--state-c1);box-shadow:0 0 18px var(--state-c1);animation-duration:6.4s;animation-direction:reverse;transform-origin:118px 40px}
  .spark.s3{background:var(--state-c3);box-shadow:0 0 18px var(--state-c3);animation-duration:10.6s;transform-origin:96px -56px}

  #statusWrap{
    position:fixed;
    left:50%;
    bottom:clamp(10px,4.5vh,28px);
    transform:translateX(-50%);
    display:none;
    align-items:center;
    gap:8px;
    padding:8px 15px;
    border-radius:999px;
    z-index:4;
    pointer-events:none;
    color:rgba(247,251,255,.95);
    font-size:12px;
    font-weight:720;
    letter-spacing:.15px;
    background:linear-gradient(135deg, rgba(4,29,72,.58), rgba(4,78,155,.20));
    border:1px solid rgba(247,251,255,.18);
    box-shadow:0 14px 42px rgba(0,17,42,.22), inset 0 1px 0 rgba(255,255,255,.20);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    white-space:nowrap;
  }
  #statusWrap.on{display:flex}
  #dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--state-c1);
    box-shadow:0 0 14px var(--state-c1),0 0 28px var(--state-c1);
  }
  #debug{
    position:fixed;
    left:8px;top:8px;z-index:6;
    display:none;
    color:rgba(247,251,255,.90);
    background:rgba(4,29,72,.72);
    border:1px solid rgba(247,251,255,.14);
    border-radius:10px;
    padding:7px 9px;
    font:11px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    pointer-events:none;
    max-width:calc(100vw - 24px);
    white-space:pre-wrap;
  }
  #debug.on{display:block}

  @keyframes wholeBreath{0%,100%{transform:scale(calc(var(--state-scale) + var(--level) * .048)) rotate(-.4deg)}50%{transform:scale(calc(var(--state-scale) + .018 + var(--level) * .075)) rotate(.6deg)}}
  @keyframes auraPulse{0%,100%{opacity:calc(.38 + var(--level) * .24);transform:scale(.95)}50%{opacity:calc(.58 + var(--level) * .38);transform:scale(1.04)}}
  @keyframes orbLiquid{0%,100%{filter:saturate(1.10) brightness(1.02)}50%{filter:saturate(1.38) brightness(1.08)}}
  @keyframes sheenMove{0%,100%{transform:translateX(-2%) rotate(0deg);opacity:.36}50%{transform:translateX(4%) rotate(1deg);opacity:.62}}
  @keyframes waveFloat{0%,100%{top:48%;opacity:calc(.42 + var(--level) * .24)}50%{top:51.5%;opacity:calc(.62 + var(--level) * .36)}}
  @keyframes ringOrbit{from{rotate:0deg}to{rotate:360deg}}
  @keyframes sparkOrbit{from{transform:rotate(0deg) translateX(45%) rotate(0deg)}to{transform:rotate(360deg) translateX(45%) rotate(-360deg)}}
  @keyframes energySpin{from{transform:rotate(0deg) scale(calc(.94 + var(--level) * .10))}to{transform:rotate(360deg) scale(calc(.94 + var(--level) * .10))}}
  @keyframes energyBreathe{0%,100%{transform:scale(calc(.84 + var(--level) * .10)) rotate(-8deg)}50%{transform:scale(calc(1.08 + var(--level) * .18)) rotate(10deg)}}
  @keyframes energyTilt{from{rotate:0deg}to{rotate:360deg}}
  @keyframes voiceBandPulse{0%,100%{filter:blur(.1px);opacity:calc(.12 + var(--state-energy) * .18 + var(--level) * .32)}50%{filter:blur(1.3px);opacity:calc(.30 + var(--state-energy) * .25 + var(--level) * .55)}}
  @keyframes speechPulse{0%{opacity:0;transform:scale(.86)}18%{opacity:calc(.10 + var(--state-energy) * .22 + var(--level) * .34)}100%{opacity:0;transform:scale(calc(1.30 + var(--level) * .30))}}
</style>
</head>
<body>
<div id="root"></div>
<div id="cssAvatar" aria-hidden="true">
  <div class="avatarWrap">
    <div class="aura"></div>
    <div class="ring"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <span class="spark s1"></span><span class="spark s2"></span><span class="spark s3"></span>
    <div class="orb"><div class="energyLayer e1"></div><div class="energyLayer e2"></div><div class="energyLayer e3"></div><span class="voiceBand v1"></span><span class="voiceBand v2"></span><span class="voiceBand v3"></span><span class="voiceBand v4"></span><span class="voiceBand v5"></span><div class="wave"></div></div><div class="pulseShell p1"></div><div class="pulseShell p2"></div><div class="pulseShell p3"></div>
  </div>
</div>
<div id="statusWrap" aria-hidden="true"><span id="dot"></span><span id="statusText">Bereit</span></div>
<div id="debug"></div>

<script>
(()=>{
  'use strict';

  const VERSION = 'clarity_avatar_v2_0_3_LIVE_ENERGY_INTERACTIONS';
  const params = new URLSearchParams(location.search || '');
  const DEBUG = params.get('debug') === '1';
  const SHOW_LABEL_DEFAULT = params.get('label') === '1' || params.get('showLabel') === '1';
  const FORCE_CSS = params.get('css') === '1' || params.get('no3d') === '1';
  const NO_BREATH = params.get('nobreath') === '1';
  const LOW_MOTION = params.get('motion') === 'low' || params.get('reducedMotion') === '1';
  const LANG = normalizeLang(params.get('lang') || params.get('language') || 'de');

  if (DEBUG || params.get('bg') === '1') document.body.classList.add('bg');

  const root = document.getElementById('root');
  const cssAvatar = document.getElementById('cssAvatar');
  const statusWrap = document.getElementById('statusWrap');
  const statusText = document.getElementById('statusText');
  const debugEl = document.getElementById('debug');
  if (DEBUG) debugEl.classList.add('on');

  const clamp01 = (v)=> Math.max(0, Math.min(1, Number(v) || 0));
  const lerp = (a,b,t)=> a + (b-a)*t;
  const safe = (fn, fallback)=>{ try { return fn(); } catch(e){ return fallback; } };
  const nowMs = ()=> performance.now();

  function normalizeLang(v){
    const s = String(v || '').toLowerCase();
    if (s.startsWith('de')) return 'de';
    if (s.startsWith('es')) return 'es';
    if (s.startsWith('fr')) return 'fr';
    if (s.startsWith('it')) return 'it';
    return 'en';
  }
  const LABELS = {
    de:{idle:'Bereit',ready:'Bereit',listening:'Zuhören',user_speaking:'Kandidat spricht',ai_speaking:'KI spricht',thinking:'KI denkt',processing:'Verarbeitung läuft',complete:'Abgeschlossen',error:'Bitte warten',stopped:'Gestoppt'},
    en:{idle:'Ready',ready:'Ready',listening:'Listening',user_speaking:'User speaking',ai_speaking:'AI speaking',thinking:'Thinking',processing:'Processing',complete:'Complete',error:'Please wait',stopped:'Stopped'},
    es:{idle:'Listo',ready:'Listo',listening:'Escuchando',user_speaking:'Usuario hablando',ai_speaking:'IA hablando',thinking:'Pensando',processing:'Procesando',complete:'Completado',error:'Espere, por favor',stopped:'Detenido'},
    fr:{idle:'Prêt',ready:'Prêt',listening:'Écoute',user_speaking:'Utilisateur parle',ai_speaking:'IA parle',thinking:'Réflexion',processing:'Traitement',complete:'Terminé',error:'Veuillez patienter',stopped:'Arrêté'},
    it:{idle:'Pronto',ready:'Pronto',listening:'In ascolto',user_speaking:'Utente parla',ai_speaking:'IA parla',thinking:'Elaborazione',processing:'Elaborazione',complete:'Completato',error:'Attendere',stopped:'Fermato'}
  };
  const T = LABELS[LANG] || LABELS.en;

  function log(msg, extra){
    if (!DEBUG) return;
    const text = `[${VERSION}] ${msg}${extra ? '\n' + JSON.stringify(extra).slice(0,700) : ''}`;
    console.log(text);
    debugEl.textContent = text;
  }
  function postParent(msg){
    safe(()=> parent && parent.postMessage && parent.postMessage(Object.assign({ from:'clarity-avatar', version:VERSION }, msg), '*'));
  }
  function parseMessage(data){
    if (!data) return {};
    if (typeof data === 'string') { try { return JSON.parse(data); } catch(_){ return { type:data }; } }
    return data;
  }

  const STATE = {
    idle:{c1:'#3DE6F5', c2:'#064E9B', c3:'#6A35FF', scale:1.00, speed:'5.6s', glow:.62, rot:.10, energy:.18, label:T.idle},
    ready:{c1:'#3DE6F5', c2:'#064E9B', c3:'#6A35FF', scale:1.01, speed:'5.0s', glow:.72, rot:.13, energy:.26, label:T.ready},
    listening:{c1:'#3DE6F5', c2:'#064E9B', c3:'#49F0C2', scale:1.03, speed:'3.8s', glow:.82, rot:.18, energy:.42, label:T.listening},
    user_speaking:{c1:'#3DE6F5', c2:'#064E9B', c3:'#49F0C2', scale:1.075, speed:'1.95s', glow:1.08, rot:.34, energy:.86, label:T.user_speaking},
    ai_speaking:{c1:'#EF00B8', c2:'#6A35FF', c3:'#3DE6F5', scale:1.095, speed:'1.70s', glow:1.16, rot:.42, energy:.94, label:T.ai_speaking},
    thinking:{c1:'#6A35FF', c2:'#041D48', c3:'#3DE6F5', scale:1.035, speed:'3.2s', glow:.88, rot:.20, energy:.56, label:T.thinking},
    processing:{c1:'#3DE6F5', c2:'#F7FBFF', c3:'#6A35FF', scale:1.055, speed:'1.35s', glow:1.10, rot:.48, energy:.88, label:T.processing},
    complete:{c1:'#49F0C2', c2:'#F7FBFF', c3:'#3DE6F5', scale:1.075, speed:'2.2s', glow:1.13, rot:.26, energy:.72, label:T.complete},
    error:{c1:'#FFB84D', c2:'#EF00B8', c3:'#064E9B', scale:1.03, speed:'2.6s', glow:.92, rot:.12, energy:.52, label:T.error},
    stopped:{c1:'#F7FBFF', c2:'#064E9B', c3:'#041D48', scale:.985, speed:'6.2s', glow:.38, rot:.04, energy:.08, label:T.stopped}
  };

  function normalizeState(s){
    const x = String(s || '').trim().toLowerCase().replace(/[\s-]+/g,'_');
    const aliases = {
      wait:'idle', waiting:'idle', standby:'idle', awake:'ready', start:'ready', active:'ready', initialized:'ready',
      listen:'listening', hearing:'listening', recording:'listening', mic_on:'listening',
      user:'user_speaking', user_speech:'user_speaking', user_talking:'user_speaking', candidate_speaking:'user_speaking', speech_started:'user_speaking', candidate:'user_speaking',
      speaking:'ai_speaking', speak:'ai_speaking', ai:'ai_speaking', assistant:'ai_speaking', assistant_speaking:'ai_speaking', ai_talking:'ai_speaking', talking:'ai_speaking', response_audio:'ai_speaking',
      think:'thinking', analyzing:'thinking', analysing:'thinking', preparing:'thinking', deliberating:'thinking',
      process:'processing', upload:'processing', uploading:'processing', exporting:'processing', report:'processing', building_report:'processing', pdf:'processing',
      done:'complete', success:'complete', finished:'complete', report_ready:'complete', completed:'complete',
      warn:'error', warning:'error', failed:'error', failure:'error', problem:'error',
      stop:'stopped', stopped:'stopped', hangup:'stopped'
    };
    return STATE[x] ? x : (aliases[x] || 'idle');
  }

  let stateName = 'idle';
  let targetLevel = .12, currentLevel = .12, userLevel = 0, aiLevel = 0;
  let lastLevelAt = nowMs();
  let threeAPI = null;

  function setLabelVisibility(on){ statusWrap.classList.toggle('on', !!on); }
  setLabelVisibility(SHOW_LABEL_DEFAULT);

  function applyCssState(name){
    const s = STATE[name] || STATE.idle;
    document.documentElement.style.setProperty('--state-c1', s.c1);
    document.documentElement.style.setProperty('--state-c2', s.c2);
    document.documentElement.style.setProperty('--state-c3', s.c3);
    document.documentElement.style.setProperty('--state-glow', String(s.glow));
    document.documentElement.style.setProperty('--state-speed', s.speed);
    document.documentElement.style.setProperty('--state-scale', String(s.scale));
    document.documentElement.style.setProperty('--state-energy', String(s.energy || .22));
    document.body.dataset.state = name;
    statusText.textContent = s.label;
  }
  function setState(state){
    stateName = normalizeState(state);
    applyCssState(stateName);
    if (threeAPI) threeAPI.setState(stateName);
    postParent({ type:'avatar:state', state:stateName, label:(STATE[stateName] || STATE.idle).label });
    log('state', {state:stateName, level:currentLevel, three:!!threeAPI});
  }
  function setLevel(value, source){
    const v = clamp01(value);
    const src = String(source || '').toLowerCase();
    lastLevelAt = nowMs();
    if (src === 'user' || src === 'mic' || src === 'candidate' || src === 'input') {
      userLevel = v;
      targetLevel = Math.max(targetLevel, v);
      if (v > .07 && ['idle','ready','listening'].includes(stateName)) setState('user_speaking');
    } else if (src === 'ai' || src === 'assistant' || src === 'tts' || src === 'output') {
      aiLevel = v;
      targetLevel = Math.max(targetLevel, v);
      if (v > .07 && ['idle','ready','thinking'].includes(stateName)) setState('ai_speaking');
    } else {
      targetLevel = v;
      if (stateName === 'ai_speaking') aiLevel = Math.max(aiLevel, v);
      if (stateName === 'user_speaking' || stateName === 'listening') userLevel = Math.max(userLevel, v);
    }
    if (threeAPI) threeAPI.setLevel(v, src);
  }
  function stopAvatar(){ userLevel=0; aiLevel=0; targetLevel=0; setState('stopped'); }
  function resetAvatar(){ userLevel=0; aiLevel=0; targetLevel=.16; setState('ready'); }

  function syntheticEnergyForState(name){
    const t = performance.now()/1000;
    if (NO_BREATH) return 0;
    if (name === 'ai_speaking') return .38 + .24*Math.pow(Math.sin(t*8.7)*.5+.5,1.65) + .12*Math.pow(Math.sin(t*15.1+1.2)*.5+.5,2.0);
    if (name === 'user_speaking') return .32 + .22*Math.pow(Math.sin(t*6.2+0.5)*.5+.5,1.5) + .10*Math.pow(Math.sin(t*11.4)*.5+.5,2.0);
    if (name === 'processing') return .34 + .20*Math.pow(Math.sin(t*4.4)*.5+.5,1.15);
    if (name === 'thinking') return .18 + .12*Math.pow(Math.sin(t*2.3+0.4)*.5+.5,1.4);
    if (name === 'listening') return .18 + .12*Math.pow(Math.sin(t*3.0)*.5+.5,1.3);
    if (name === 'complete') return .24 + .18*Math.exp(-((t*1.2)%2.4));
    if (name === 'error') return .18 + .14*Math.pow(Math.sin(t*3.7)*.5+.5,2.0);
    return .07 + .08*(Math.sin(t*1.55)*.5+.5);
  }

  function loadScript(src){
    return new Promise((resolve,reject)=>{
      const s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.crossOrigin = 'anonymous';
      s.onload = resolve;
      s.onerror = ()=> reject(new Error('script_load_failed: '+src));
      document.head.appendChild(s);
    });
  }
  async function ensureThree(){
    if (window.THREE) return window.THREE;
    const cdns = [
      'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
      'https://unpkg.com/three@0.160.0/build/three.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js'
    ];
    let lastErr = null;
    for (const src of cdns) {
      try { log('loading three', {src}); await loadScript(src); if (window.THREE) return window.THREE; }
      catch(e){ lastErr = e; log('three load failed', {src, error:String(e && e.message || e)}); }
    }
    throw lastErr || new Error('THREE unavailable');
  }

  function makeCanvasTexture(){
    const c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    const g = c.getContext('2d');
    const grad = g.createRadialGradient(170,130,20,260,270,300);
    grad.addColorStop(0, 'rgba(255,255,255,.90)');
    grad.addColorStop(.18, 'rgba(61,230,245,.90)');
    grad.addColorStop(.48, 'rgba(6,78,155,.96)');
    grad.addColorStop(.72, 'rgba(106,53,255,.92)');
    grad.addColorStop(1, 'rgba(239,0,184,.92)');
    g.fillStyle = grad; g.fillRect(0,0,512,512);
    g.globalCompositeOperation='screen';
    g.fillStyle='rgba(255,255,255,.20)';
    g.beginPath(); g.ellipse(210,150,185,58,-0.18,0,Math.PI*2); g.fill();
    g.globalCompositeOperation='source-over';
    return c;
  }

  function createThreeAvatar(THREE){
    let renderer;
    try {
      renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
    } catch(e) {
      throw new Error('webgl_renderer_failed: ' + String(e && e.message || e));
    }
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, LOW_MOTION ? 1.25 : 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    if ('outputColorSpace' in renderer) renderer.outputColorSpace = THREE.SRGBColorSpace;
    root.appendChild(renderer.domElement);
    cssAvatar.classList.add('three-ready');

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, .1, 60);
    camera.position.set(0,0,3.7);

    const group = new THREE.Group();
    scene.add(group);
    scene.add(new THREE.AmbientLight(0xffffff, .78));
    const key = new THREE.DirectionalLight(0xffffff, .58); key.position.set(2.8,2.4,3.4); scene.add(key);
    const cyanLight = new THREE.PointLight(0x3DE6F5, 1.35, 7.0); cyanLight.position.set(-2.2,1.3,2.4); scene.add(cyanLight);
    const magLight = new THREE.PointLight(0xEF00B8, 1.05, 7.0); magLight.position.set(2.3,-1.45,2.2); scene.add(magLight);

    const texture = new THREE.CanvasTexture(makeCanvasTexture());
    if ('colorSpace' in texture) texture.colorSpace = THREE.SRGBColorSpace;

    const coreMat = new THREE.MeshPhysicalMaterial({
      map:texture,
      color:0xffffff,
      emissive:0x063a86,
      emissiveIntensity:.24,
      roughness:.26,
      metalness:.04,
      clearcoat:1,
      clearcoatRoughness:.13,
      transparent:true,
      opacity:.96
    });
    const coreGeom = new THREE.SphereGeometry(.86, 112, 84);
    const coreBase = new Float32Array(coreGeom.attributes.position.array);
    const core = new THREE.Mesh(coreGeom, coreMat);
    group.add(core);

    const glassMat = new THREE.MeshPhysicalMaterial({
      color:0xf7fbff,
      emissive:0x3DE6F5,
      emissiveIntensity:.06,
      roughness:.08,
      metalness:0,
      transparent:true,
      opacity:.22,
      clearcoat:1,
      clearcoatRoughness:.04,
      side:THREE.DoubleSide,
      depthWrite:false
    });
    const glass = new THREE.Mesh(new THREE.SphereGeometry(1.005, 96, 72), glassMat);
    group.add(glass);

    const auraMat = new THREE.MeshBasicMaterial({ color:0x3DE6F5, transparent:true, opacity:.13, blending:THREE.AdditiveBlending, depthWrite:false });
    const aura = new THREE.Mesh(new THREE.SphereGeometry(1.12, 64, 48), auraMat);
    group.add(aura);

    const makeRing = (r, tube, color, opacity)=> new THREE.Mesh(
      new THREE.TorusGeometry(r, tube, 16, 192),
      new THREE.MeshBasicMaterial({ color, transparent:true, opacity, blending:THREE.AdditiveBlending, depthWrite:false })
    );
    const ring1 = makeRing(1.11,.009,0x3DE6F5,.62); ring1.rotation.x = Math.PI*.58; ring1.rotation.z = -.16; group.add(ring1);
    const ring2 = makeRing(1.18,.007,0xEF00B8,.38); ring2.rotation.x = Math.PI*.80; ring2.rotation.y = .36; ring2.rotation.z = 1.18; group.add(ring2);
    const ring3 = makeRing(1.03,.006,0xffffff,.28); ring3.rotation.x = Math.PI*.28; ring3.rotation.y = 1.1; group.add(ring3);

    const innerBands = [];
    for (let i=0;i<5;i++) {
      const band = new THREE.Mesh(
        new THREE.TorusGeometry(.34 + i*.105, .0045 + i*.0008, 10, 128),
        new THREE.MeshBasicMaterial({ color:i%2 ? 0xEF00B8 : 0x3DE6F5, transparent:true, opacity:.15, blending:THREE.AdditiveBlending, depthWrite:false })
      );
      band.rotation.x = Math.PI * (.50 + i*.035);
      band.rotation.y = (i-.5) * .18;
      band.rotation.z = i * .42;
      group.add(band);
      innerBands.push(band);
    }

    const sparkGeo = new THREE.SphereGeometry(.025, 20, 14);
    const sparkMats = [0xffffff,0x3DE6F5,0xEF00B8,0x6A35FF].map((c)=> new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:.92,blending:THREE.AdditiveBlending,depthWrite:false}));
    const sparks = sparkMats.map((m)=>{ const s = new THREE.Mesh(sparkGeo, m); group.add(s); return s; });

    let localState = stateName;
    let localLevel = currentLevel;
    let targetColorA = new THREE.Color(STATE[stateName].c1);
    let targetColorB = new THREE.Color(STATE[stateName].c3);
    let colorA = targetColorA.clone();
    let colorB = targetColorB.clone();
    let disposed = false;
    let last = performance.now()/1000;
    let time = 0;

    function setState3(name){
      localState = normalizeState(name);
      const s = STATE[localState] || STATE.idle;
      targetColorA.set(s.c1);
      targetColorB.set(s.c3);
    }
    function setLevel3(v){ localLevel = Math.max(localLevel, clamp01(v)); }

    function updateColors(){
      colorA.lerp(targetColorA,.055);
      colorB.lerp(targetColorB,.055);
      coreMat.emissive.copy(colorA).multiplyScalar(.38 + currentLevel*.34);
      auraMat.color.copy(colorA);
      ring1.material.color.copy(colorA);
      ring2.material.color.copy(colorB);
      glassMat.emissive.copy(colorA);
      magLight.color.copy(colorB);
      cyanLight.color.copy(colorA);
    }
    function animate(){
      if (disposed) return;
      requestAnimationFrame(animate);
      const t = performance.now()/1000;
      const dt = Math.min(.05, t-last); last = t; time += dt;

      updateColors();
      const s = STATE[localState] || STATE.idle;
      const breath = NO_BREATH ? 0 : (Math.sin(time*1.55)*.5+.5)*.16;
      const statePulse = syntheticEnergyForState(localState);
      const e = Math.max(currentLevel, localLevel*.7, statePulse*.92, breath*.6);
      localLevel *= .90;

      const scale = s.scale + e*.080 + (localState === 'ai_speaking' ? Math.sin(time*7.2)*.006*e : 0);
      group.scale.setScalar(scale);
      group.rotation.y += (s.rot + e*.22) * dt;
      group.rotation.x = Math.sin(time*.55) * .035;
      core.rotation.y += (.055 + e*.12) * dt;
      core.rotation.x += (.025 + e*.04) * dt;

      const pos = coreGeom.attributes.position;
      const arr = pos.array;
      const amp = (localState === 'ai_speaking' ? .058 : localState === 'user_speaking' ? .044 : localState === 'processing' ? .038 : .022) * e;
      const freq = localState === 'ai_speaking' ? 7.8 : localState === 'user_speaking' ? 5.7 : localState === 'processing' ? 4.8 : 2.6;
      for (let i=0; i<arr.length; i+=3) {
        const x = coreBase[i], y = coreBase[i+1], z = coreBase[i+2];
        const n = Math.sin(x*5.6 + y*3.9 + z*4.5 + time*freq) * .55 + Math.sin(x*8.1 - y*2.7 + z*5.2 - time*(freq*.73)) * .45;
        const d = amp * n;
        arr[i] = x * (1 + d);
        arr[i+1] = y * (1 + d*.92);
        arr[i+2] = z * (1 + d);
      }
      pos.needsUpdate = true;
      glass.rotation.y -= (.035 + e*.08) * dt;
      aura.scale.setScalar(1.0 + e*.11 + Math.sin(time*2.4)*.015);
      auraMat.opacity = .11 + e*.18;
      coreMat.emissiveIntensity = .18 + e*.36;
      glassMat.opacity = .18 + e*.09;
      ring1.rotation.z += (1.05 + e*1.35) * dt;
      ring2.rotation.z -= (.82 + e*1.18) * dt;
      ring3.rotation.y += (.58 + e*.76) * dt;
      ring1.scale.setScalar(1 + e*.055);
      ring2.scale.setScalar(1 + e*.070);
      ring3.scale.setScalar(1 + e*.035);
      ring1.material.opacity = .38 + e*.36;
      ring2.material.opacity = .25 + e*.38;
      ring3.material.opacity = .18 + e*.26;
      innerBands.forEach((band, i)=>{
        const k = (i+1)/innerBands.length;
        band.rotation.z += ((i%2?-.7:.85) + e*1.4) * dt;
        band.rotation.y += Math.sin(time*.7+i)*.006;
        band.scale.setScalar(1 + e*(.14 + k*.08) + Math.sin(time*(3.2+i*.42)+i)*e*.035);
        band.material.opacity = .10 + e*(localState === 'ai_speaking' ? .42 : localState === 'user_speaking' ? .34 : .24);
        band.material.color.copy(i%2 ? colorB : colorA);
      });

      sparks.forEach((sp, i)=>{
        const speed = [1.1,-.86,.62,-1.34][i];
        const radius = [.98,1.10,1.18,1.02][i] + e*.055;
        const phase = time*speed + i*1.72;
        const y = Math.sin(phase*.72 + i) * [.18,.28,.22,.32][i];
        sp.position.set(Math.cos(phase)*radius, y, Math.sin(phase)*radius*.42);
        sp.scale.setScalar(1 + e*2.2);
        sp.material.opacity = .46 + e*.48;
      });

      renderer.render(scene,camera);
    }

    window.addEventListener('resize', ()=>{
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    animate();
    return { setState:setState3, setLevel:setLevel3, dispose:()=>{ disposed=true; safe(()=>renderer.dispose()); } };
  }

  function decayLoop(){
    requestAnimationFrame(decayLoop);
    const age = nowMs() - lastLevelAt;
    const statePulse = syntheticEnergyForState(stateName);
    const fallbackBreath = (!NO_BREATH && age > 2400) ? (Math.sin(performance.now()/1000*1.55)*.5+.5)*.20 + .06 : 0;
    const fallback = Math.max(targetLevel, statePulse, fallbackBreath);
    targetLevel = lerp(targetLevel, fallback, .08);
    currentLevel = lerp(currentLevel, Math.max(targetLevel, statePulse*.92), .18);
    userLevel *= .88;
    aiLevel *= .88;
    targetLevel *= .94;
    document.documentElement.style.setProperty('--level', String(Math.max(.05, currentLevel).toFixed(3)));
    if (threeAPI) threeAPI.setLevel(currentLevel, stateName === 'ai_speaking' ? 'ai' : (stateName === 'user_speaking' ? 'user' : ''));
  }

  window.addEventListener('message', (ev)=>{
    const d = parseMessage(ev && ev.data);
    if (!d || !d.type) return;
    const type = String(d.type || '');
    if (type === 'ping') { postParent({type:'avatar:ready'}); return; }
    if (type === 'avatar:set' || type === 'avatar:state') setState(d.state || d.value || 'idle');
    else if (type === 'avatar:level') setLevel(d.value, d.source || d.kind);
    else if (type === 'avatar:config') {
      if (typeof d.showLabel === 'boolean') setLabelVisibility(d.showLabel);
      if (d.state) setState(d.state);
      postParent({ type:'avatar:config:ok' });
    }
    else if (type === 'avatar:complete') setState('complete');
    else if (type === 'avatar:error') setState('error');
    else if (type === 'avatar:stop') stopAvatar();
    else if (type === 'avatar:reset') resetAvatar();
    else if (type === 'avatar:showLabel') setLabelVisibility(true);
    else if (type === 'avatar:hideLabel') setLabelVisibility(false);
    log('message', d);
  });

  setState(params.get('state') || 'ready');
  if (params.get('state') === null && params.get('autolistening') === '1') setState('listening');
  if (params.get('demo') === '1') {
    const demoStates = ['listening','user_speaking','thinking','ai_speaking','processing','complete'];
    let di = 0;
    setInterval(()=>{ setState(demoStates[di++ % demoStates.length]); setLevel(.72, stateName === 'ai_speaking' ? 'ai' : 'user'); }, 2600);
  }
  decayLoop();

  if (!FORCE_CSS) {
    ensureThree()
      .then((THREE)=>{ threeAPI = createThreeAvatar(THREE); threeAPI.setState(stateName); threeAPI.setLevel(currentLevel); log('three ready'); postParent({type:'avatar:ready', render:'three'}); })
      .catch((e)=>{ log('three unavailable, css fallback active', {error:String(e && e.message || e)}); postParent({type:'avatar:ready', render:'css', warning:'three_unavailable'}); });
  } else {
    log('forced css mode');
    postParent({type:'avatar:ready', render:'css'});
  }
  setTimeout(()=> postParent({type:'avatar:ready'}), 80);
})();
</script>
</body>
</html>
