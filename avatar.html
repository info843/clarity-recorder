<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>CLARITY Avatar v2.1 Final Reactive Signal</title>
<style>
  :root{
    --c-cyan:#3DE6F5;
    --c-blue:#064E9B;
    --c-navy:#041D48;
    --c-violet:#6A35FF;
    --c-magenta:#EF00B8;
    --c-white:#F7FBFF;
    --c-success:#49F0C2;
    --c-amber:#FFB84D;

    --state-c1:#3DE6F5;
    --state-c2:#064E9B;
    --state-c3:#6A35FF;
    --state-c4:#EF00B8;

    --level:.12;
    --visual-level:.12;
    --core-scale:1;
    --halo-scale:1;
    --orb-scale:1;
    --shell-opacity:.42;
    --inner-opacity:.86;
    --glow:.75;
    --speed:4.8s;
    --orbit-speed:7.5s;
    --wave-opacity:.28;
    --ring-spread:1;
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }
  body.bg{
    background:
      radial-gradient(circle at 50% 42%, rgba(61,230,245,.16), transparent 32%),
      radial-gradient(circle at 70% 64%, rgba(239,0,184,.15), transparent 38%),
      linear-gradient(135deg, rgba(248,250,252,.95), rgba(232,240,255,.93));
  }

  #root{
    position:fixed;
    inset:0;
    display:grid;
    place-items:center;
    overflow:hidden;
    pointer-events:none;
    background:transparent;
  }

  .stage{
    position:relative;
    width:min(78vw,72vh,470px);
    height:min(78vw,72vh,470px);
    display:grid;
    place-items:center;
    transform:scale(var(--orb-scale));
    transition:transform .12s ease-out;
    filter:drop-shadow(0 28px 70px rgba(4,29,72,.22));
  }

  .outerGlow{
    position:absolute;
    inset:2%;
    border-radius:50%;
    background:
      radial-gradient(circle at 38% 28%, rgba(61,230,245,.48), transparent 30%),
      radial-gradient(circle at 72% 62%, rgba(239,0,184,.40), transparent 35%),
      radial-gradient(circle at 52% 52%, rgba(106,53,255,.35), transparent 58%);
    opacity:calc(.28 + var(--visual-level) * .48);
    filter:blur(calc(18px + var(--visual-level) * 16px)) saturate(1.32);
    transform:scale(calc(.95 + var(--visual-level) * .16));
    animation:outerGlowBreath var(--speed) ease-in-out infinite;
  }

  .reactiveHalo,
  .reactiveHalo2,
  .reactiveHalo3{
    position:absolute;
    inset:9%;
    border-radius:50%;
    opacity:calc(.28 + var(--visual-level) * .60);
    transform:scale(calc(var(--halo-scale) + var(--visual-level) * .22));
    border:2px solid rgba(61,230,245,.34);
    box-shadow:
      0 0 calc(16px + var(--visual-level) * 56px) rgba(61,230,245,.34),
      0 0 calc(38px + var(--visual-level) * 92px) rgba(106,53,255,.16),
      inset 0 0 calc(16px + var(--visual-level) * 32px) rgba(255,255,255,.16);
    transition:border-color .28s ease, box-shadow .28s ease;
    animation:haloPulse calc(var(--speed) * .72) ease-in-out infinite;
  }
  .reactiveHalo2{
    inset:5%;
    opacity:calc(.12 + var(--visual-level) * .32);
    border-color:rgba(239,0,184,.22);
    transform:scale(calc(var(--halo-scale) + var(--visual-level) * .30));
    animation-delay:.32s;
    animation-duration:calc(var(--speed) * .92);
  }
  .reactiveHalo3{
    inset:14%;
    opacity:calc(.14 + var(--visual-level) * .38);
    border-color:rgba(255,255,255,.30);
    transform:scale(calc(.97 + var(--visual-level) * .18));
    filter:blur(.2px);
    animation-delay:.18s;
  }

  .atomRing{
    position:absolute;
    border-radius:50%;
    border:2px solid transparent;
    opacity:calc(.48 + var(--visual-level) * .30);
    filter:drop-shadow(0 0 calc(8px + var(--visual-level) * 22px) var(--state-c1));
    transform-style:preserve-3d;
  }
  .ringA{
    inset:15%;
    border-top-color:var(--state-c1);
    border-left-color:rgba(61,230,245,.26);
    border-bottom-color:rgba(255,255,255,.20);
    transform:rotateX(68deg) rotateZ(-10deg) scale(calc(1 + var(--visual-level) * .10));
    animation:spinA var(--orbit-speed) linear infinite;
  }
  .ringB{
    inset:10%;
    border-top-color:var(--state-c3);
    border-right-color:rgba(239,0,184,.30);
    border-left-color:rgba(255,255,255,.10);
    opacity:calc(.35 + var(--visual-level) * .38);
    transform:rotateX(76deg) rotateY(19deg) rotateZ(86deg) scale(calc(.96 + var(--visual-level) * .14));
    animation:spinB calc(var(--orbit-speed) * 1.25) linear infinite reverse;
  }
  .ringC{
    inset:21%;
    border-top-color:rgba(255,255,255,.72);
    border-right-color:rgba(61,230,245,.18);
    opacity:calc(.26 + var(--visual-level) * .28);
    transform:rotateX(31deg) rotateY(68deg) rotateZ(18deg) scale(calc(.92 + var(--visual-level) * .10));
    animation:spinC calc(var(--orbit-speed) * 1.55) linear infinite;
  }

  .particle{
    position:absolute;
    left:50%;top:50%;
    width:8px;height:8px;
    margin:-4px 0 0 -4px;
    border-radius:999px;
    background:var(--c-white);
    box-shadow:0 0 14px rgba(255,255,255,.96),0 0 30px var(--state-c1);
    opacity:calc(.48 + var(--visual-level) * .48);
    animation:particleA 8.8s linear infinite;
  }
  .p2{width:7px;height:7px;background:var(--state-c1);box-shadow:0 0 17px var(--state-c1),0 0 32px var(--state-c1);animation:particleB 6.7s linear infinite reverse}
  .p3{width:6px;height:6px;background:var(--state-c3);box-shadow:0 0 17px var(--state-c3),0 0 33px var(--state-c4);animation:particleC 10.9s linear infinite}
  .p4{width:5px;height:5px;background:#fff;box-shadow:0 0 14px #fff,0 0 24px var(--state-c3);animation:particleD 12.4s linear infinite reverse;opacity:calc(.32 + var(--visual-level) * .42)}

  .sphere{
    position:absolute;
    inset:18%;
    border-radius:50%;
    overflow:hidden;
    opacity:.98;
    transform:scale(calc(1 + var(--visual-level) * .035));
    background:
      radial-gradient(circle at 31% 24%, rgba(255,255,255,.95) 0 3.7%, rgba(255,255,255,.32) 4.2%, transparent 12%),
      radial-gradient(circle at 35% 34%, rgba(61,230,245,.88), transparent 29%),
      radial-gradient(circle at 70% 64%, rgba(239,0,184,.86), transparent 36%),
      radial-gradient(circle at 50% 51%, rgba(106,53,255,.76), transparent 54%),
      linear-gradient(136deg, var(--state-c1), var(--state-c2) 48%, var(--state-c3));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.72),
      inset -18px -22px 58px rgba(4,29,72,.42),
      inset 19px 18px 58px rgba(61,230,245,.22),
      0 0 calc(22px + var(--visual-level) * 42px) rgba(61,230,245,.24),
      0 0 calc(48px + var(--visual-level) * 78px) rgba(239,0,184,.14);
    animation:sphereBreath var(--speed) ease-in-out infinite;
  }
  .sphere::before{
    content:"";
    position:absolute;
    inset:3% 4% auto 6%;
    height:44%;
    border-radius:50%;
    background:linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,.09) 58%, transparent);
    transform:rotate(-13deg);
    mix-blend-mode:screen;
    opacity:var(--shell-opacity);
    z-index:8;
  }
  .sphere::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
      linear-gradient(105deg, transparent 0 20%, rgba(255,255,255,.20) 23%, transparent 32% 100%),
      radial-gradient(circle at 72% 26%, rgba(255,255,255,.72) 0 1.4%, transparent 2.4%),
      radial-gradient(circle at 28% 37%, rgba(255,255,255,.58) 0 1.1%, transparent 2.2%);
    opacity:calc(.32 + var(--visual-level) * .20);
    animation:sheen 8.4s ease-in-out infinite;
    z-index:9;
    pointer-events:none;
  }

  #innerCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:3;
    mix-blend-mode:screen;
    opacity:var(--inner-opacity);
  }

  .audioCore{
    position:absolute;
    left:50%;top:50%;
    width:30%;height:30%;
    margin:-15% 0 0 -15%;
    border-radius:50%;
    z-index:5;
    background:
      radial-gradient(circle at 38% 30%, rgba(255,255,255,.95), rgba(255,255,255,.42) 14%, transparent 22%),
      radial-gradient(circle at 50% 50%, rgba(247,251,255,.76), rgba(61,230,245,.58) 38%, rgba(106,53,255,.38) 62%, transparent 72%);
    box-shadow:
      0 0 calc(14px + var(--visual-level) * 44px) var(--state-c1),
      0 0 calc(22px + var(--visual-level) * 70px) var(--state-c3),
      inset 0 0 calc(10px + var(--visual-level) * 22px) rgba(255,255,255,.42);
    opacity:calc(.46 + var(--visual-level) * .46);
    transform:scale(var(--core-scale));
    filter:saturate(1.32) blur(.15px);
    transition:box-shadow .16s ease-out, opacity .16s ease-out;
    animation:corePulse .9s ease-in-out infinite;
  }
  .audioCore::after{
    content:"";
    position:absolute;
    inset:-52%;
    border-radius:50%;
    background:conic-gradient(from 0deg, transparent, rgba(61,230,245,.24), transparent, rgba(239,0,184,.22), transparent);
    opacity:calc(.22 + var(--visual-level) * .40);
    animation:coreSpin calc(var(--speed) * .74) linear infinite;
  }

  .innerWave{
    position:absolute;
    left:10%;right:10%;
    height:2px;
    border-radius:999px;
    z-index:6;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.44), var(--state-c1), rgba(255,255,255,.70), transparent);
    box-shadow:0 0 calc(9px + var(--visual-level) * 28px) var(--state-c1);
    opacity:calc(var(--wave-opacity) + var(--visual-level) * .42);
    transform-origin:center;
    animation:voiceLine .58s ease-in-out infinite;
  }
  .w1{top:35%;transform:scaleX(calc(.36 + var(--visual-level) * .72)) translateY(calc(var(--visual-level) * -14px));animation-delay:-.04s}
  .w2{top:42%;transform:scaleX(calc(.52 + var(--visual-level) * .58)) translateY(calc(var(--visual-level) * -7px));animation-delay:-.16s}
  .w3{top:50%;transform:scaleX(calc(.70 + var(--visual-level) * .42));animation-delay:-.28s}
  .w4{top:58%;transform:scaleX(calc(.50 + var(--visual-level) * .66)) translateY(calc(var(--visual-level) * 7px));animation-delay:-.40s}
  .w5{top:65%;transform:scaleX(calc(.34 + var(--visual-level) * .78)) translateY(calc(var(--visual-level) * 14px));animation-delay:-.52s}

  .shell{
    position:absolute;
    inset:16%;
    border-radius:50%;
    z-index:10;
    pointer-events:none;
    background:
      radial-gradient(circle at 34% 20%, rgba(255,255,255,.20), transparent 24%),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,.07), transparent 65%);
    border:1px solid rgba(255,255,255,.28);
    box-shadow:
      inset 0 0 28px rgba(255,255,255,.13),
      inset 0 0 64px rgba(61,230,245,.10),
      0 0 calc(16px + var(--visual-level) * 36px) rgba(61,230,245,.18);
    opacity:var(--shell-opacity);
  }

  .expandingPulse,
  .expandingPulse2,
  .expandingPulse3{
    position:absolute;
    inset:15%;
    border-radius:50%;
    border:1px solid rgba(61,230,245,.38);
    z-index:12;
    opacity:0;
    filter:drop-shadow(0 0 16px var(--state-c1));
    animation:expandingPulse 2.1s ease-out infinite;
  }
  .expandingPulse2{animation-delay:.52s;border-color:rgba(239,0,184,.34)}
  .expandingPulse3{animation-delay:1.04s;border-color:rgba(255,255,255,.32)}

  .sweep{
    position:absolute;
    inset:13%;
    border-radius:50%;
    z-index:11;
    opacity:0;
    background:conic-gradient(from 0deg, transparent 0 70%, rgba(255,255,255,.0), var(--state-c1), transparent 92% 100%);
    filter:blur(.3px) drop-shadow(0 0 16px var(--state-c1));
    animation:processingSweep 1.35s linear infinite;
    pointer-events:none;
  }

  body[data-state="processing"] .sweep{opacity:calc(.48 + var(--visual-level) * .34)}
  body[data-state="processing"] .innerWave{animation-duration:.38s}
  body[data-state="ai_speaking"] .innerWave{animation-duration:.34s;opacity:calc(.48 + var(--visual-level) * .48);background:linear-gradient(90deg, transparent, rgba(255,255,255,.64), var(--state-c3), var(--state-c1), transparent)}
  body[data-state="user_speaking"] .innerWave{animation-duration:.44s;opacity:calc(.42 + var(--visual-level) * .50)}
  body[data-state="thinking"] .audioCore{animation-duration:1.7s}
  body[data-state="complete"] .reactiveHalo{animation-duration:1.2s}
  body[data-state="error"] .reactiveHalo{animation-duration:1.05s}
  body[data-state="idle"] .expandingPulse,
  body[data-state="ready"] .expandingPulse,
  body[data-state="listening"] .expandingPulse{animation-duration:3.4s}
  body[data-state="user_speaking"] .expandingPulse,
  body[data-state="ai_speaking"] .expandingPulse{animation-duration:1.25s}

  #statusWrap{
    position:fixed;
    left:50%;
    bottom:clamp(8px,4.0vh,24px);
    transform:translateX(-50%);
    display:none;
    align-items:center;
    gap:8px;
    padding:8px 14px;
    border-radius:999px;
    z-index:20;
    pointer-events:none;
    color:rgba(247,251,255,.96);
    font-size:12px;
    font-weight:750;
    letter-spacing:.15px;
    background:linear-gradient(135deg, rgba(4,29,72,.66), rgba(4,78,155,.24));
    border:1px solid rgba(247,251,255,.18);
    box-shadow:0 14px 42px rgba(0,17,42,.22), inset 0 1px 0 rgba(255,255,255,.20);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    white-space:nowrap;
    max-width:calc(100vw - 24px);
  }
  #statusWrap.on{display:flex}
  #dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--state-c1);
    box-shadow:0 0 14px var(--state-c1),0 0 28px var(--state-c1);
    flex:0 0 auto;
  }
  #statusText{overflow:hidden;text-overflow:ellipsis}

  #debug{
    position:fixed;
    left:8px;top:8px;z-index:30;
    display:none;
    color:rgba(247,251,255,.92);
    background:rgba(4,29,72,.74);
    border:1px solid rgba(247,251,255,.16);
    border-radius:10px;
    padding:7px 9px;
    font:11px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    pointer-events:none;
    max-width:calc(100vw - 24px);
    white-space:pre-wrap;
  }
  #debug.on{display:block}

  @keyframes outerGlowBreath{0%,100%{transform:scale(.95);opacity:calc(.25 + var(--visual-level) * .38)}50%{transform:scale(1.06);opacity:calc(.42 + var(--visual-level) * .54)}}
  @keyframes haloPulse{0%,100%{transform:scale(calc(var(--halo-scale) + var(--visual-level) * .14));opacity:calc(.22 + var(--visual-level) * .46)}50%{transform:scale(calc(var(--halo-scale) + .035 + var(--visual-level) * .32));opacity:calc(.38 + var(--visual-level) * .56)}}
  @keyframes spinA{from{rotate:0deg}to{rotate:360deg}}
  @keyframes spinB{from{rotate:0deg}to{rotate:360deg}}
  @keyframes spinC{from{rotate:0deg}to{rotate:360deg}}
  @keyframes particleA{from{transform:rotate(0deg) translateX(40%) rotate(0deg)}to{transform:rotate(360deg) translateX(40%) rotate(-360deg)}}
  @keyframes particleB{from{transform:rotate(0deg) translateX(48%) rotate(0deg)}to{transform:rotate(360deg) translateX(48%) rotate(-360deg)}}
  @keyframes particleC{from{transform:rotate(0deg) translateX(53%) rotate(0deg)}to{transform:rotate(360deg) translateX(53%) rotate(-360deg)}}
  @keyframes particleD{from{transform:rotate(0deg) translateX(36%) rotate(0deg)}to{transform:rotate(360deg) translateX(36%) rotate(-360deg)}}
  @keyframes sphereBreath{0%,100%{filter:saturate(1.18) brightness(1.06)}50%{filter:saturate(1.48) brightness(1.15)}}
  @keyframes sheen{0%,100%{transform:translateX(-3%) rotate(0deg);opacity:.28}50%{transform:translateX(5%) rotate(1deg);opacity:.56}}
  @keyframes corePulse{0%,100%{transform:scale(calc(var(--core-scale) * .96));opacity:calc(.38 + var(--visual-level) * .36)}50%{transform:scale(calc(var(--core-scale) * 1.09));opacity:calc(.58 + var(--visual-level) * .40)}}
  @keyframes coreSpin{from{rotate:0deg}to{rotate:360deg}}
  @keyframes voiceLine{0%,100%{filter:blur(.1px);height:2px}50%{filter:blur(1.2px);height:calc(2px + var(--visual-level) * 6px)}}
  @keyframes expandingPulse{0%{opacity:0;transform:scale(.82)}18%{opacity:calc(.08 + var(--visual-level) * .45)}100%{opacity:0;transform:scale(calc(1.18 + var(--visual-level) * .44))}}
  @keyframes processingSweep{from{rotate:0deg}to{rotate:360deg}}

  @media (prefers-reduced-motion:reduce){
    .atomRing,.particle,.audioCore::after,.sweep{animation-duration:9s!important}
    .innerWave,.expandingPulse,.reactiveHalo,.outerGlow,.sphere,.audioCore{animation-duration:4s!important}
  }
</style>
</head>
<body data-state="ready">
<div id="root" aria-label="CLARITY AI Avatar">
  <div class="stage" id="stage">
    <div class="outerGlow"></div>
    <div class="reactiveHalo"></div>
    <div class="reactiveHalo2"></div>
    <div class="reactiveHalo3"></div>

    <div class="atomRing ringA"></div>
    <div class="atomRing ringB"></div>
    <div class="atomRing ringC"></div>
    <span class="particle p1"></span>
    <span class="particle p2"></span>
    <span class="particle p3"></span>
    <span class="particle p4"></span>

    <div class="sphere" id="sphere">
      <canvas id="innerCanvas"></canvas>
      <div class="audioCore"></div>
      <span class="innerWave w1"></span>
      <span class="innerWave w2"></span>
      <span class="innerWave w3"></span>
      <span class="innerWave w4"></span>
      <span class="innerWave w5"></span>
    </div>
    <div class="shell"></div>
    <div class="sweep"></div>
    <div class="expandingPulse"></div>
    <div class="expandingPulse2"></div>
    <div class="expandingPulse3"></div>
  </div>
</div>
<div id="statusWrap" aria-hidden="true"><span id="dot"></span><span id="statusText">Bereit</span></div>
<div id="debug"></div>

<script>
(()=>{
  'use strict';

  const VERSION = 'clarity_avatar_v2_1_FINAL_REACTIVE_SIGNAL';
  const Q = new URLSearchParams(location.search || '');
  const DEBUG = Q.get('debug') === '1';
  const SHOW_LABEL = Q.get('label') === '1' || Q.get('showLabel') === '1';
  const LOW_MOTION = Q.get('motion') === 'low' || Q.get('reducedMotion') === '1';
  const LANG = normalizeLang(Q.get('lang') || Q.get('language') || 'de');

  if (DEBUG || Q.get('bg') === '1') document.body.classList.add('bg');

  const root = document.documentElement;
  const body = document.body;
  const canvas = document.getElementById('innerCanvas');
  const sphere = document.getElementById('sphere');
  const statusWrap = document.getElementById('statusWrap');
  const statusText = document.getElementById('statusText');
  const debugEl = document.getElementById('debug');
  const ctx = canvas.getContext('2d', { alpha:true });

  if (DEBUG) debugEl.classList.add('on');
  if (SHOW_LABEL) statusWrap.classList.add('on');

  const clamp01 = v => Math.max(0, Math.min(1, Number(v) || 0));
  const lerp = (a,b,t) => a + (b-a)*t;
  const now = () => performance.now();
  const safe = fn => { try { return fn(); } catch(_) {} };

  function normalizeLang(v){
    const s = String(v || '').toLowerCase();
    if (s.startsWith('de')) return 'de';
    if (s.startsWith('es')) return 'es';
    if (s.startsWith('fr')) return 'fr';
    if (s.startsWith('it')) return 'it';
    return 'en';
  }

  const LABELS = {
    de:{idle:'Bereit',ready:'Bereit',listening:'Zuhören',user_speaking:'Kandidat spricht',ai_speaking:'KI spricht',thinking:'KI denkt',processing:'Verarbeitung läuft',complete:'Abgeschlossen',error:'Bitte warten',stopped:'Gestoppt'},
    en:{idle:'Ready',ready:'Ready',listening:'Listening',user_speaking:'User speaking',ai_speaking:'AI speaking',thinking:'Thinking',processing:'Processing',complete:'Complete',error:'Please wait',stopped:'Stopped'},
    es:{idle:'Listo',ready:'Listo',listening:'Escuchando',user_speaking:'Usuario hablando',ai_speaking:'IA hablando',thinking:'Pensando',processing:'Procesando',complete:'Completado',error:'Espere, por favor',stopped:'Detenido'},
    fr:{idle:'Prêt',ready:'Prêt',listening:'Écoute',user_speaking:'Utilisateur parle',ai_speaking:'IA parle',thinking:'Réflexion',processing:'Traitement',complete:'Terminé',error:'Veuillez patienter',stopped:'Arrêté'},
    it:{idle:'Pronto',ready:'Pronto',listening:'In ascolto',user_speaking:'Utente parla',ai_speaking:'IA parla',thinking:'Elaborazione',processing:'Elaborazione',complete:'Completato',error:'Attendere',stopped:'Fermato'}
  };
  const T = LABELS[LANG] || LABELS.en;

  const STATES = {
    idle:          { c1:'#3DE6F5', c2:'#064E9B', c3:'#6A35FF', c4:'#EF00B8', base:.08, amp:.10, scale:1.000, halo:1.000, shell:.36, inner:.78, glow:.55, speed:'5.8s', orbit:'8.8s', label:T.idle },
    ready:         { c1:'#3DE6F5', c2:'#064E9B', c3:'#6A35FF', c4:'#EF00B8', base:.12, amp:.14, scale:1.010, halo:1.012, shell:.35, inner:.82, glow:.66, speed:'5.0s', orbit:'7.9s', label:T.ready },
    listening:     { c1:'#3DE6F5', c2:'#064E9B', c3:'#49F0C2', c4:'#6A35FF', base:.20, amp:.20, scale:1.035, halo:1.035, shell:.32, inner:.88, glow:.86, speed:'3.5s', orbit:'6.7s', label:T.listening },
    user_speaking: { c1:'#3DE6F5', c2:'#064E9B', c3:'#49F0C2', c4:'#6A35FF', base:.34, amp:.58, scale:1.060, halo:1.070, shell:.27, inner:.96, glow:1.08, speed:'1.65s', orbit:'5.2s', label:T.user_speaking },
    ai_speaking:   { c1:'#EF00B8', c2:'#6A35FF', c3:'#3DE6F5', c4:'#F7FBFF', base:.40, amp:.60, scale:1.078, halo:1.092, shell:.25, inner:.98, glow:1.18, speed:'1.42s', orbit:'4.9s', label:T.ai_speaking },
    thinking:      { c1:'#6A35FF', c2:'#041D48', c3:'#3DE6F5', c4:'#EF00B8', base:.22, amp:.22, scale:1.030, halo:1.035, shell:.30, inner:.90, glow:.92, speed:'2.9s', orbit:'6.0s', label:T.thinking },
    processing:    { c1:'#3DE6F5', c2:'#F7FBFF', c3:'#6A35FF', c4:'#EF00B8', base:.36, amp:.38, scale:1.045, halo:1.075, shell:.28, inner:.94, glow:1.12, speed:'1.2s', orbit:'3.9s', label:T.processing },
    complete:      { c1:'#49F0C2', c2:'#F7FBFF', c3:'#3DE6F5', c4:'#6A35FF', base:.28, amp:.34, scale:1.050, halo:1.070, shell:.27, inner:.96, glow:1.12, speed:'1.7s', orbit:'5.2s', label:T.complete },
    error:         { c1:'#FFB84D', c2:'#EF00B8', c3:'#064E9B', c4:'#F7FBFF', base:.24, amp:.28, scale:1.025, halo:1.040, shell:.32, inner:.90, glow:.88, speed:'1.8s', orbit:'6.8s', label:T.error },
    stopped:       { c1:'#F7FBFF', c2:'#064E9B', c3:'#041D48', c4:'#6A35FF', base:.03, amp:.04, scale:.985, halo:.990, shell:.42, inner:.62, glow:.36, speed:'6.4s', orbit:'10s', label:T.stopped }
  };

  function normalizeState(value){
    const x = String(value || '').trim().toLowerCase().replace(/[\s-]+/g,'_');
    const aliases = {
      wait:'idle',waiting:'idle',standby:'idle',awake:'ready',start:'ready',active:'ready',initialized:'ready',
      listen:'listening',hearing:'listening',recording:'listening',mic_on:'listening',
      user:'user_speaking',user_speech:'user_speaking',user_talking:'user_speaking',candidate_speaking:'user_speaking',candidate:'user_speaking',speech_started:'user_speaking',input_audio:'user_speaking',
      speaking:'ai_speaking',speak:'ai_speaking',ai:'ai_speaking',assistant:'ai_speaking',assistant_speaking:'ai_speaking',ai_talking:'ai_speaking',talking:'ai_speaking',response_audio:'ai_speaking',
      think:'thinking',analyzing:'thinking',analysing:'thinking',preparing:'thinking',deliberating:'thinking',
      process:'processing',upload:'processing',uploading:'processing',exporting:'processing',report:'processing',building_report:'processing',pdf:'processing',finalizing:'processing',
      done:'complete',success:'complete',finished:'complete',report_ready:'complete',completed:'complete',
      warn:'error',warning:'error',failed:'error',failure:'error',problem:'error',
      stop:'stopped',hangup:'stopped'
    };
    return STATES[x] ? x : (aliases[x] || 'ready');
  }

  let stateName = 'ready';
  let visualLevel = .12;
  let targetLevel = .12;
  let userLevel = 0;
  let aiLevel = 0;
  let lastLevelAt = now();
  let lastInputSource = '';
  let frame = 0;

  function log(label, data){
    if (!DEBUG) return;
    const text = `[${VERSION}] ${label}${data ? '\n' + JSON.stringify(data).slice(0,900) : ''}`;
    console.log(text);
    debugEl.textContent = text;
  }

  function postParent(payload){
    safe(() => parent && parent.postMessage && parent.postMessage({ from:'clarity-avatar', version:VERSION, ...payload }, '*'));
  }

  function applyState(name){
    const s = STATES[name] || STATES.ready;
    root.style.setProperty('--state-c1', s.c1);
    root.style.setProperty('--state-c2', s.c2);
    root.style.setProperty('--state-c3', s.c3);
    root.style.setProperty('--state-c4', s.c4);
    root.style.setProperty('--speed', s.speed);
    root.style.setProperty('--orbit-speed', s.orbit);
    root.style.setProperty('--shell-opacity', String(s.shell));
    root.style.setProperty('--inner-opacity', String(s.inner));
    root.style.setProperty('--glow', String(s.glow));
    body.dataset.state = name;
    statusText.textContent = s.label;
  }

  function setState(value){
    stateName = normalizeState(value);
    applyState(stateName);
    postParent({ type:'avatar:state', state:stateName, label:(STATES[stateName] || STATES.ready).label });
    log('state', { state:stateName, level:visualLevel, source:lastInputSource });
  }

  function setLevel(value, source){
    const v = clamp01(value);
    const src = String(source || '').toLowerCase();
    lastInputSource = src;
    lastLevelAt = now();

    if (src === 'user' || src === 'mic' || src === 'candidate' || src === 'input') {
      userLevel = Math.max(userLevel, v);
      targetLevel = Math.max(targetLevel, v);
      if (v > .06 && ['idle','ready','listening'].includes(stateName)) setState('user_speaking');
    } else if (src === 'ai' || src === 'assistant' || src === 'tts' || src === 'output' || src === 'system') {
      aiLevel = Math.max(aiLevel, v);
      targetLevel = Math.max(targetLevel, v);
      if (v > .06 && ['idle','ready','thinking'].includes(stateName)) setState('ai_speaking');
    } else {
      targetLevel = Math.max(targetLevel, v);
      if (stateName === 'ai_speaking') aiLevel = Math.max(aiLevel, v);
      if (stateName === 'user_speaking' || stateName === 'listening') userLevel = Math.max(userLevel, v);
    }
  }

  function setConfig(cfg){
    if (!cfg || typeof cfg !== 'object') return;
    if (cfg.lang || cfg.language) {
      // Language is read at load. Keep no-op for compatibility.
    }
    if (cfg.showLabel === true || cfg.label === true) statusWrap.classList.add('on');
    if (cfg.showLabel === false || cfg.label === false) statusWrap.classList.remove('on');
    if (cfg.state) setState(cfg.state);
    if (typeof cfg.level !== 'undefined') setLevel(cfg.level, cfg.source || 'system');
  }

  function parseMessage(data){
    if (!data) return {};
    if (typeof data === 'string') {
      try { return JSON.parse(data); } catch(_) { return { type:data }; }
    }
    return data;
  }

  function syntheticEnergy(name, t){
    if (LOW_MOTION) return .04;
    if (name === 'ai_speaking') return .38 + .30*Math.pow(Math.sin(t*8.5)*.5+.5,1.65) + .14*Math.pow(Math.sin(t*15.8+1.1)*.5+.5,2.0);
    if (name === 'user_speaking') return .34 + .28*Math.pow(Math.sin(t*6.5+.4)*.5+.5,1.55) + .11*Math.pow(Math.sin(t*12.2)*.5+.5,2.1);
    if (name === 'processing') return .35 + .20*Math.pow(Math.sin(t*4.6)*.5+.5,1.1);
    if (name === 'thinking') return .20 + .14*Math.pow(Math.sin(t*2.5+.2)*.5+.5,1.4);
    if (name === 'listening') return .18 + .12*Math.pow(Math.sin(t*3.0)*.5+.5,1.2);
    if (name === 'complete') return .20 + .28*Math.max(0, Math.sin(t*2.6));
    if (name === 'error') return .20 + .13*Math.pow(Math.sin(t*3.7)*.5+.5,2.0);
    return .07 + .06*(Math.sin(t*1.45)*.5+.5);
  }

  function hexToRgb(hex){
    const s = String(hex || '#ffffff').replace('#','');
    const n = parseInt(s.length === 3 ? s.split('').map(x=>x+x).join('') : s, 16);
    return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
  }
  function rgba(hex, a){
    const c = hexToRgb(hex);
    return `rgba(${c.r},${c.g},${c.b},${a})`;
  }

  function resizeCanvas(){
    const rect = sphere.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    const w = Math.max(10, Math.round(rect.width * dpr));
    const h = Math.max(10, Math.round(rect.height * dpr));
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
    }
  }

  function drawInnerCanvas(t, energy){
    const w = canvas.width;
    const h = canvas.height;
    if (!w || !h) return;
    const cx = w/2;
    const cy = h/2;
    const r = Math.min(w,h)/2;
    const s = STATES[stateName] || STATES.ready;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,r*.965,0,Math.PI*2);
    ctx.clip();

    // Inner luminous cloud.
    const cloud = ctx.createRadialGradient(cx-r*.08,cy-r*.05,r*.05,cx,cy,r*.78);
    cloud.addColorStop(0, rgba('#ffffff', .16 + energy*.20));
    cloud.addColorStop(.22, rgba(s.c1, .20 + energy*.26));
    cloud.addColorStop(.52, rgba(s.c3, .16 + energy*.20));
    cloud.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = cloud;
    ctx.fillRect(0,0,w,h);

    // Expanding inner acoustic rings.
    const pulseCount = 4;
    for (let i=0;i<pulseCount;i++){
      const phase = ((t*.55 + i/pulseCount) % 1);
      const rr = r * (.18 + phase * (.58 + energy*.18));
      const alpha = (1-phase) * (.08 + energy*.28);
      ctx.beginPath();
      ctx.arc(cx,cy,rr,0,Math.PI*2);
      ctx.strokeStyle = i%2 ? rgba(s.c3, alpha) : rgba(s.c1, alpha);
      ctx.lineWidth = Math.max(1, r*(.006 + energy*.006));
      ctx.stroke();
    }

    // Waveform lines in the sphere; deliberately strong enough to be visible.
    const lines = 5;
    for (let j=0;j<lines;j++){
      const y = cy + (j-(lines-1)/2) * r*.15;
      const amp = r * (.012 + energy*.105) * (1 - Math.abs(j-2)*.12);
      const len = r * (.55 + energy*.34) * (1 - Math.abs(j-2)*.07);
      const start = cx - len;
      const end = cx + len;
      ctx.beginPath();
      for (let i=0;i<=90;i++){
        const p = i/90;
        const x = start + (end-start)*p;
        const env = Math.sin(Math.PI*p);
        const wave = Math.sin(p*Math.PI*(3.2 + j*.35) + t*(stateName === 'ai_speaking' ? 10.5 : 7.2) + j*.74);
        const jitter = Math.sin(p*Math.PI*12 + t*5.2 + j) * .22;
        const yy = y + (wave + jitter) * amp * env;
        if (i===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
      }
      const grad = ctx.createLinearGradient(start,y,end,y);
      grad.addColorStop(0,'rgba(255,255,255,0)');
      grad.addColorStop(.18,rgba(s.c1,.18 + energy*.32));
      grad.addColorStop(.5,rgba('#ffffff',.28 + energy*.42));
      grad.addColorStop(.82,rgba(s.c3,.18 + energy*.32));
      grad.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = Math.max(1.1, r*(.007 + energy*.011));
      ctx.shadowColor = s.c1;
      ctx.shadowBlur = r*(.02 + energy*.08);
      ctx.stroke();
    }

    // Rotating internal energy arcs.
    ctx.shadowBlur = r*(.045 + energy*.08);
    for (let k=0;k<3;k++){
      const phase = t*(.75 + k*.18) + k*2.1;
      const rr = r * (.30 + k*.12 + energy*.08);
      ctx.beginPath();
      ctx.ellipse(cx, cy, rr*(1.15 + energy*.10), rr*(.38 + k*.06), phase*.28, phase, phase + Math.PI*(.55 + energy*.25));
      ctx.strokeStyle = k%2 ? rgba(s.c3,.18 + energy*.24) : rgba(s.c1,.20 + energy*.26);
      ctx.lineWidth = Math.max(1, r*(.006 + energy*.006));
      ctx.stroke();
    }

    // Soft central flash on strong peaks.
    const core = ctx.createRadialGradient(cx,cy,0,cx,cy,r*.34);
    core.addColorStop(0, rgba('#ffffff', .22 + energy*.35));
    core.addColorStop(.35, rgba(s.c1, .12 + energy*.25));
    core.addColorStop(.82, rgba(s.c3, .06 + energy*.13));
    core.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(cx,cy,r*(.20 + energy*.16),0,Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function animationLoop(){
    frame += 1;
    const t = now()/1000;
    const age = now() - lastLevelAt;
    const s = STATES[stateName] || STATES.ready;

    // Fade direct level when bridge pauses, but keep clear synthetic life in active states.
    const decay = age > 150 ? Math.pow(.985, Math.min(90, (age-150)/16)) : 1;
    userLevel *= .88;
    aiLevel *= .88;
    targetLevel *= .92 * decay;

    const synthetic = syntheticEnergy(stateName, t);
    const sourceLevel = Math.max(targetLevel, userLevel, aiLevel, s.base + synthetic * s.amp);
    visualLevel = lerp(visualLevel, clamp01(sourceLevel), LOW_MOTION ? .05 : .16);

    const strong = Math.pow(visualLevel, .72);
    const coreScale = 1 + strong * (stateName === 'ai_speaking' ? .52 : stateName === 'user_speaking' ? .46 : .31);
    const haloScale = s.halo + strong * (stateName === 'ai_speaking' ? .25 : stateName === 'user_speaking' ? .22 : .15);
    const orbScale = s.scale + strong * (stateName === 'ai_speaking' ? .030 : stateName === 'user_speaking' ? .026 : .018);

    root.style.setProperty('--level', visualLevel.toFixed(3));
    root.style.setProperty('--visual-level', visualLevel.toFixed(3));
    root.style.setProperty('--core-scale', coreScale.toFixed(3));
    root.style.setProperty('--halo-scale', haloScale.toFixed(3));
    root.style.setProperty('--orb-scale', orbScale.toFixed(3));
    root.style.setProperty('--wave-opacity', String(Math.min(.78, .18 + visualLevel*.56).toFixed(3)));
    root.style.setProperty('--ring-spread', String(1 + visualLevel*.22));

    if (frame % 3 === 0) resizeCanvas();
    drawInnerCanvas(t, visualLevel);

    if (DEBUG && frame % 22 === 0) {
      debugEl.textContent = `[${VERSION}]\nstate=${stateName}\nlevel=${visualLevel.toFixed(3)} target=${targetLevel.toFixed(3)}\nsource=${lastInputSource || '-'}\nageMs=${Math.round(age)}`;
    }
    requestAnimationFrame(animationLoop);
  }

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('message', ev => {
    const d = parseMessage(ev.data);
    const type = String(d.type || d.event || '').trim();

    if (type === 'ping') {
      postParent({ type:'avatar:ready', state:stateName });
      return;
    }
    if (type === 'avatar:set' || type === 'avatar:state' || type === 'clarity.avatar') {
      setState(d.state || d.value || d.status || 'ready');
      return;
    }
    if (type === 'avatar:level' || type === 'clarity.avatar.level') {
      setLevel(d.value ?? d.level ?? d.audioLevel ?? d.energy ?? 0, d.source || d.kind || d.channel || 'system');
      return;
    }
    if (type === 'avatar:bridge' || type === 'clarity.avatar.bridge') {
      if (d.state) setState(d.state);
      if (typeof d.value !== 'undefined' || typeof d.level !== 'undefined') setLevel(d.value ?? d.level, d.source || d.kind || 'system');
      if (d.data && typeof d.data === 'object') {
        if (d.data.state) setState(d.data.state);
        if (typeof d.data.value !== 'undefined' || typeof d.data.level !== 'undefined') setLevel(d.data.value ?? d.data.level, d.data.source || d.data.kind || 'system');
      }
      return;
    }
    if (type === 'avatar:config') { setConfig(d); return; }
    if (type === 'avatar:stop') { setState('stopped'); setLevel(0,'system'); return; }
    if (type === 'avatar:reset') { setState('ready'); setLevel(.14,'system'); return; }
    if (type === 'avatar:complete') { setState('complete'); setLevel(.85,'system'); return; }
    if (type === 'avatar:error') { setState('error'); setLevel(.55,'system'); return; }

    // Friendly fallback for direct payloads from Wix.
    if (d.state && !type) setState(d.state);
    if ((typeof d.value !== 'undefined' || typeof d.level !== 'undefined') && !type) setLevel(d.value ?? d.level, d.source || 'system');
  });

  // Public mini API for manual tests in browser console.
  window.ClarityAvatar = {
    version: VERSION,
    setState,
    setLevel,
    stop: () => setState('stopped'),
    reset: () => { setState('ready'); setLevel(.14, 'system'); },
    complete: () => { setState('complete'); setLevel(.85, 'system'); }
  };

  applyState('ready');
  resizeCanvas();
  setLevel(.16, 'system');
  requestAnimationFrame(animationLoop);

  postParent({ type:'avatar:ready', state:stateName });
  log('ready', { lang:LANG, label:SHOW_LABEL, bg:document.body.classList.contains('bg') });
})();
</script>
</body>
</html>
