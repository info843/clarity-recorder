<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CLARITY Avatar — Original Base Reactive Dark</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  #root{position:fixed;inset:0}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(()=>{
  const root = document.getElementById('root');
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  root.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 50);
  camera.position.set(0,0,3.2);

  scene.add(new THREE.AmbientLight(0xffffff, 0.88));
  const dir = new THREE.DirectionalLight(0xffffff, 0.32);
  dir.position.set(3,2,3);
  scene.add(dir);

  const avatarGroup = new THREE.Group();
  scene.add(avatarGroup);

  const R_INNER = 0.85;
  const geoInner = new THREE.SphereGeometry(R_INNER, 192, 128);

  const uniforms = {
    uTime:      { value: 0 },
    uBaseAmp:   { value: 0.055 },
    uAudioAmp:  { value: 0.18 },
    uLevel:     { value: 0.0 },
    uBand:      { value: 0.0 },
    uGlow:      { value: 0.82 },
    uColorA:    { value: new THREE.Vector3(214/255, 0.90, 0.52) },
    uColorB:    { value: new THREE.Vector3(227/255, 0.80, 0.34) },
    uColorC:    { value: new THREE.Vector3(196/255, 0.86, 0.42) },
    uColorBoost:{ value: 0.0 },
    uAspect:    { value: innerWidth/innerHeight }
  };

  const simplex = `
  vec3 mod289(vec3 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 mod289(vec4 x){return x - floor(x * (1.0/289.0)) * 289.0;}
  vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
  vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
  float snoise(vec3 v){
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0,0.5,1.0,2.0);
    vec3 i=floor(v+dot(v,C.yyy));
    vec3 x0=v-i+dot(i,C.xxx);
    vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g;
    vec3 i1=min(g.xyz,l.zxy), i2=max(g.xyz,l.zxy);
    vec3 x1=x0-i1+C.xxx, x2=x0-i2+C.yyy, x3=x0-D.yyy;
    i=mod289(i);
    vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
    float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
    vec4 j=p-49.0*floor(p*ns.z*ns.z); vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
    vec4 x=x_*ns.x+ns.yyyy, y=y_*ns.x+ns.yyyy, h=1.0-abs(x)-abs(y);
    vec4 b0=vec4(x.xy,y.xy), b1=vec4(x.zw,y.zw);
    vec4 s0=floor(b0)*2.0+1.0, s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
    vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy, a1=b1.xzyw+s1.xzyw*sh.zzww;
    vec3 p0=vec3(a0.xy,h.x), p1=vec3(a1.xy,h.y), p2=vec3(a0.zw,h.z), p3=vec3(a1.zw,h.w);
    vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
    p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
    vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m*=m;
    return 42.0*dot(m*m, vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
  }`;

  const vInner = `
    uniform float uTime,uBaseAmp,uAudioAmp,uLevel,uBand;
    varying vec3 vPos; varying float vDef; varying float vNoise;
    ${simplex}
    void main(){
      vec3 p=position;
      float t=uTime*0.38;
      float n1=snoise(normal*1.45+vec3(t*0.55,t*0.35,t*0.72));
      float n2=snoise(position*1.05+vec3(-t*0.28,t*0.48,-t*0.18));
      float audioMix = (0.65*uLevel + 0.35*uBand);
      float d=uBaseAmp*n1 + uAudioAmp*audioMix*n2;
      vNoise = n2;
      vDef=d;
      vec3 q=normalize(p)*(1.0+d);
      vPos=q;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(q,1.0);
    }`;

  const fInner = `
    precision highp float;
    varying vec3 vPos; varying float vDef; varying float vNoise;
    uniform float uGlow,uTime,uLevel,uBand,uColorBoost;
    uniform vec3 uColorA,uColorB,uColorC;
    vec3 hsl2rgb(vec3 hsl){
      float h=hsl.x,s=hsl.y,l=hsl.z;
      float c=(1.0-abs(2.0*l-1.0))*s;
      float x=c*(1.0-abs(mod(h*6.0,2.0)-1.0));
      float m=l-0.5*c; vec3 rgb;
      if(h<1.0/6.0) rgb=vec3(c,x,0.0);
      else if(h<2.0/6.0) rgb=vec3(x,c,0.0);
      else if(h<3.0/6.0) rgb=vec3(0.0,c,x);
      else if(h<4.0/6.0) rgb=vec3(0.0,x,c);
      else if(h<5.0/6.0) rgb=vec3(x,0.0,c);
      else rgb=vec3(c,0.0,x);
      return rgb+m;
    }
    void main(){
      vec3 n=normalize(vPos);
      float a=atan(n.y,n.x);
      float swirl = sin(a*2.2 + uTime*0.65 + vNoise*1.4)*0.5+0.5;
      vec3 colA=hsl2rgb(uColorA);
      vec3 colB=hsl2rgb(uColorB);
      vec3 colC=hsl2rgb(uColorC);
      vec3 base = mix(colA,colB,swirl);
      float speechPull = clamp(0.18 + 0.82*(0.62*uLevel + 0.38*uBand),0.0,1.0);
      vec3 color = mix(base,colC,speechPull*0.72);
      float core = smoothstep(0.95,0.08,length(vPos));
      float fres = pow(1.0-abs(n.z),2.4);
      float pulse = 0.55 + 0.45*sin(uTime*2.4 + speechPull*2.8);
      vec3 bright = mix(color, vec3(1.0), 0.12 + 0.18*speechPull + 0.12*uColorBoost);
      vec3 finalCol = mix(color, bright, core*(0.35 + 0.28*speechPull));
      vec3 glow = finalCol * (uGlow + 0.22*uColorBoost) * (0.35 + 0.65*fres) * (0.9 + 0.1*pulse);
      gl_FragColor = vec4(finalCol + glow*0.42, 0.95);
    }`;

  const innerMat = new THREE.ShaderMaterial({
    uniforms, vertexShader:vInner, fragmentShader:fInner, transparent:true
  });
  const innerSphere = new THREE.Mesh(geoInner, innerMat);
  avatarGroup.add(innerSphere);

  const R_GLASS = 1.0;
  const geoGlass = new THREE.SphereGeometry(R_GLASS, 128, 96);
  const glassUniforms = {
    uTint:     { value:new THREE.Color(0xdde8ff) },
    uStrength: { value:0.19 },
    uAlpha:    { value:0.07 }
  };
  const glassMat = new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    uniforms: glassUniforms,
    vertexShader:`
      varying vec3 vN; varying vec3 vV;
      void main(){
        vec4 mv = modelViewMatrix * vec4(position,1.0);
        vV = -mv.xyz; vN = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader:`
      precision highp float;
      varying vec3 vN; varying vec3 vV;
      uniform vec3 uTint; uniform float uStrength; uniform float uAlpha;
      void main(){
        float fres = pow(1.0 - max(0.0, dot(normalize(vN), normalize(vV))), 2.15);
        vec3 col = uTint * (0.30 + 0.70*fres);
        float a = uAlpha + fres * uStrength;
        gl_FragColor = vec4(col, a);
      }`
  });
  const glass = new THREE.Mesh(geoGlass, glassMat);
  avatarGroup.add(glass);

  const ringGeo = new THREE.PlaneGeometry(6,6,1,1);
  const ringUniforms = {
    uTime:{value:0},
    uLevel:{value:0},
    uHue:{value:214/255},
    uSat:{value:0.85},
    uLig:{value:0.68},
    uBoost:{value:0.0}
  };
  const ringMat = new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    uniforms:ringUniforms,
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`
      precision highp float; varying vec2 vUv;
      uniform float uTime; uniform float uLevel; uniform float uHue; uniform float uSat; uniform float uLig; uniform float uBoost;
      vec3 hsl2rgb(vec3 hsl){
        float h=hsl.x,s=hsl.y,l=hsl.z;
        float c=(1.0-abs(2.0*l-1.0))*s;
        float x=c*(1.0-abs(mod(h*6.0,2.0)-1.0));
        float m=l-0.5*c; vec3 rgb;
        if(h<1.0/6.0) rgb=vec3(c,x,0.0);
        else if(h<2.0/6.0) rgb=vec3(x,c,0.0);
        else if(h<3.0/6.0) rgb=vec3(0.0,c,x);
        else if(h<4.0/6.0) rgb=vec3(0.0,x,c);
        else if(h<5.0/6.0) rgb=vec3(x,0.0,c);
        else rgb=vec3(c,0.0,x);
        return rgb+m;
      }
      void main(){
        vec2 p = vUv*2.0-1.0;
        float d = length(p);
        float speech = smoothstep(0.0,1.0,uLevel);
        float R = 0.775 + 0.012*sin(uTime*2.2) + 0.048*speech;
        float width = 0.028 + 0.026*speech;
        float edge = abs(d-R);
        float ring = smoothstep(width, 0.0, edge);
        float halo = smoothstep(R + 0.22 + speech*0.08, R - 0.01, d);
        vec3 col = hsl2rgb(vec3(uHue,uSat,uLig));
        float a = ring*(0.38 + 0.52*speech + 0.10*uBoost) + halo*(0.06 + 0.18*speech);
        gl_FragColor = vec4(col, a);
      }`
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.scale.setScalar(1.18);
  ring.position.z = -0.55;
  avatarGroup.add(ring);

  const PALETTES = {
    idle:      { A:[210/360,0.88,0.42], B:[235/360,0.76,0.28], C:[286/360,0.76,0.34], ring:[214/360,0.84,0.67], glow:0.82, base:0.055, audio:0.16, shellAlpha:0.065, shellStrength:0.18, boost:0.02, rotX:0.05, rotY:0.12, scale:1.00 },
    ready:     { A:[210/360,0.88,0.43], B:[235/360,0.78,0.29], C:[286/360,0.78,0.35], ring:[214/360,0.84,0.69], glow:0.84, base:0.058, audio:0.17, shellAlpha:0.067, shellStrength:0.18, boost:0.03, rotX:0.05, rotY:0.12, scale:1.00 },
    listening: { A:[200/360,0.92,0.46], B:[225/360,0.82,0.30], C:[272/360,0.72,0.36], ring:[195/360,0.90,0.72], glow:0.90, base:0.063, audio:0.18, shellAlpha:0.060, shellStrength:0.17, boost:0.05, rotX:0.05, rotY:0.15, scale:1.01 },
    user_speaking:{ A:[190/360,0.96,0.48], B:[215/360,0.88,0.33], C:[245/360,0.72,0.37], ring:[188/360,0.92,0.73], glow:0.97, base:0.072, audio:0.25, shellAlpha:0.058, shellStrength:0.18, boost:0.10, rotX:0.06, rotY:0.17, scale:1.02 },
    ai_speaking:{ A:[210/360,0.86,0.44], B:[250/360,0.84,0.32], C:[318/360,0.88,0.43], ring:[310/360,0.92,0.70], glow:1.00, base:0.076, audio:0.28, shellAlpha:0.056, shellStrength:0.20, boost:0.14, rotX:0.06, rotY:0.20, scale:1.025 },
    speaking:  { A:[210/360,0.86,0.44], B:[250/360,0.84,0.32], C:[318/360,0.88,0.43], ring:[310/360,0.92,0.70], glow:1.00, base:0.076, audio:0.28, shellAlpha:0.056, shellStrength:0.20, boost:0.14, rotX:0.06, rotY:0.20, scale:1.025 },
    thinking:  { A:[214/360,0.86,0.42], B:[248/360,0.78,0.30], C:[292/360,0.78,0.37], ring:[270/360,0.82,0.68], glow:0.92, base:0.060, audio:0.14, shellAlpha:0.062, shellStrength:0.17, boost:0.05, rotX:0.04, rotY:0.10, scale:1.005 },
    processing:{ A:[205/360,0.90,0.45], B:[235/360,0.80,0.31], C:[305/360,0.84,0.40], ring:[220/360,0.92,0.70], glow:0.98, base:0.070, audio:0.18, shellAlpha:0.058, shellStrength:0.19, boost:0.10, rotX:0.05, rotY:0.18, scale:1.015 },
    complete:  { A:[190/360,0.88,0.50], B:[220/360,0.80,0.35], C:[290/360,0.72,0.42], ring:[185/360,0.88,0.76], glow:0.98, base:0.060, audio:0.16, shellAlpha:0.060, shellStrength:0.18, boost:0.10, rotX:0.05, rotY:0.14, scale:1.01 },
    error:     { A:[210/360,0.72,0.43], B:[260/360,0.62,0.30], C:[340/360,0.82,0.42], ring:[10/360,0.88,0.68], glow:0.92, base:0.058, audio:0.13, shellAlpha:0.064, shellStrength:0.18, boost:0.08, rotX:0.04, rotY:0.10, scale:1.00 }
  };

  let currentState = 'idle';
  let rotX = 0.05, rotY = 0.12;
  let targetLevel = 0, currentLevel = 0, lastSignal = performance.now();
  let targetScaleBase = 1.0, currentScale = 1.0;

  function applyPalette(stateName){
    const s = PALETTES[stateName] || PALETTES.idle;
    uniforms.uColorA.value.set(s.A[0], s.A[1], s.A[2]);
    uniforms.uColorB.value.set(s.B[0], s.B[1], s.B[2]);
    uniforms.uColorC.value.set(s.C[0], s.C[1], s.C[2]);
    uniforms.uGlow.value = s.glow;
    uniforms.uBaseAmp.value = s.base;
    uniforms.uAudioAmp.value = s.audio;
    uniforms.uColorBoost.value = s.boost;
    ringUniforms.uHue.value = s.ring[0];
    ringUniforms.uSat.value = s.ring[1];
    ringUniforms.uLig.value = s.ring[2];
    ringUniforms.uBoost.value = s.boost;
    glassUniforms.uAlpha.value = s.shellAlpha;
    glassUniforms.uStrength.value = s.shellStrength;
    rotX = s.rotX; rotY = s.rotY;
    targetScaleBase = s.scale;
    currentState = stateName;
  }

  function normalizeState(s){
    if(!s) return 'idle';
    const map = {
      idle:'idle',
      ready:'ready',
      listening:'listening',
      user_speaking:'user_speaking',
      userSpeaking:'user_speaking',
      ai_speaking:'ai_speaking',
      aiSpeaking:'ai_speaking',
      speaking:'speaking',
      thinking:'thinking',
      processing:'processing',
      complete:'complete',
      completed:'complete',
      error:'error'
    };
    return map[s] || 'idle';
  }

  function setState(state='idle'){
    applyPalette(normalizeState(state));
    lastSignal = performance.now();
  }

  function setLevel(v=0){
    targetLevel = Math.max(0, Math.min(1, Number(v) || 0));
    lastSignal = performance.now();
  }

  let prevTime = performance.now()/1000;
  const nobreath = new URLSearchParams(location.search).get('nobreath') === '1';

  function frame(){
    requestAnimationFrame(frame);
    const now = performance.now()/1000;
    const dt = Math.min(now - prevTime, 0.05);
    prevTime = now;

    const since = performance.now() - lastSignal;
    const isSpeakingState = currentState === 'user_speaking' || currentState === 'ai_speaking' || currentState === 'speaking';
    const fallback = (!nobreath && since > 2800)
      ? (isSpeakingState ? (Math.sin(now*2.2)*0.5+0.5)*0.32 : (Math.sin(now*1.25)*0.5+0.5)*0.18)
      : targetLevel;

    currentLevel = currentLevel * 0.84 + fallback * 0.16;
    uniforms.uLevel.value = currentLevel;
    uniforms.uTime.value += dt;
    ringUniforms.uTime.value += dt;
    ringUniforms.uLevel.value = currentLevel;

    innerSphere.rotation.y += rotY * dt;
    innerSphere.rotation.x += rotX * dt;

    const speechScale = isSpeakingState ? (0.016 + currentLevel * 0.062) : (0.008 + currentLevel * 0.032);
    const pulse = Math.sin(now * (isSpeakingState ? 5.4 : 2.2)) * (isSpeakingState ? 0.006 : 0.003);
    const wantedScale = targetScaleBase + speechScale + pulse;
    currentScale = currentScale * 0.84 + wantedScale * 0.16;
    avatarGroup.scale.setScalar(currentScale);

    ring.scale.setScalar(1.18 + currentLevel * (isSpeakingState ? 0.07 : 0.03));
    ring.lookAt(camera.position);

    renderer.render(scene, camera);
  }
  frame();

  addEventListener('resize', ()=>{
    renderer.setSize(innerWidth, innerHeight);
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    uniforms.uAspect.value = innerWidth/innerHeight;
  });

  function handleMessage(data, sourceWindow){
    const d = typeof data === 'string' ? (()=>{ try { return JSON.parse(data); } catch(e){ return null; } })() : data;
    if(!d || typeof d !== 'object') return;

    if(d.type === 'avatar:set') setState(d.state || 'idle');
    if(d.type === 'avatar:level') setLevel(d.value);
    if(d.type === 'avatar:stop') { setLevel(0); setState('idle'); }
    if(d.type === 'avatar:reset') { setLevel(0); setState('idle'); }
    if(d.type === 'avatar:complete') { setState('complete'); setLevel(0.15); }
    if(d.type === 'avatar:error') { setState('error'); }
    if(d.type === 'avatar:bridge'){
      if(d.state) setState(d.state);
      if(typeof d.value !== 'undefined') setLevel(d.value);
    }
    if(d.type === 'ping') sourceWindow?.postMessage?.({type:'avatar:ready'}, '*');
  }

  addEventListener('message', (ev)=> handleMessage(ev.data, ev.source));

  setState('idle');
  setLevel(0);
  setTimeout(()=> parent?.postMessage?.({type:'avatar:ready'}, '*'), 40);
})();
</script>
</body>
</html>
