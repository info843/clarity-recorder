      delayMs: delay,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      followUpAsked: !!structuredFollowUpAskedForQuestion[structuredCurrentQuestionIndex || 0]
    });
  }

  function effectiveCandidateResponseCount(){
    return Math.max(Number(userUtterances || 0), Number(userAudioItems || 0));
  }

  function shouldAutoFinishInterview({ forceAfterTarget = false } = {}){
    if (!STARTED || END_CALLED || FINAL_HANGUP_TIMER) return false;
    if (!isInterviewLiveContext(CTX)) return false;
    if (!interviewStartedAt) return false;

    const target = interviewLiveQuestionTarget(CTX);
    const elapsedMs = Date.now() - interviewStartedAt;
    const answerCount = effectiveCandidateResponseCount();
    const targetReached = structuredCurrentQuestionIndex >= target || nearCompleteVideoOnlyByRuntime(CTX);
    const hasEnoughResponses = answerCount >= Math.max(3, target - 1);
    const longEnough = elapsedMs >= Math.max(180000, target * 24000);

    if (forceAfterTarget && targetReached) return true;
    return (targetReached && hasEnoughResponses) || (targetReached && longEnough);
  }

  function sendFinalCloseInstruction(source, forced = false){
    if (END_CALLED || FINAL_HANGUP_TIMER) return;
    if (!forced && !shouldAutoFinishInterview()) return;

    if (forced && (isInterviewLiveContext(CTX) || isAssessmentVoiceLive(CTX))) {
      HARD_END_LOCK = true;
      TARGET_FINALIZE_REQUESTED = true;
      clearHardEndTimers();
      lockRealtimeListeningForEnd(source || 'forced_final_close');
      try { dcSend({ type: 'response.cancel' }); } catch(_) {}
    }

    if (FINAL_MESSAGE_SPOKEN) {
      beginFinalHangup(source || 'autofinish_final_spoken');
      return;
    }

    if (structuredAutoFinishRequested && !forced) return;
    structuredAutoFinishRequested = true;

    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);
    const isAssessmentEnd = isAssessmentVoiceLive(CTX);
    const isHybridEnd = isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX);
    const finalClose = isAssessmentHybridLive(CTX)
      ? (assessmentHybridClosingText(CTX, lk, profile) || finalClosingText({ ...CTX, lang: lk }))
      : (isInterviewHybrid(CTX)
        ? (interviewHybridClosingText(CTX, lk, profile) || finalClosingText({ ...CTX, lang: lk }))
        : finalClosingText({ ...CTX, lang: lk }));
    const controlledStandaloneFinal = controlledInterviewDriverEnabled(CTX) && isInterviewLiveContext(CTX) && !isInterviewHybrid(CTX) && !isAssessmentEnd && !isHybridEnd;
    const instruction = lk === 'de'
      ? (controlledStandaloneFinal
        ? `Das Interview ist jetzt abgeschlossen. Stelle keine weitere Frage. Sage jetzt exakt diesen Abschluss ohne zusätzliche Erklärungen und ohne Meta-Kommentar: „${finalClose}“ Rufe end_interview nicht in derselben Antwort auf; die App beendet das Interview automatisch, nachdem der Abschluss hörbar gesprochen wurde.`
        : (isHybridEnd
          ? `Der mündliche Teil ist jetzt abgeschlossen. Stelle keine weitere mündliche Frage. Sage jetzt exakt diesen Übergabesatz ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`
          : `${isAssessmentEnd ? 'Das Assessment' : 'Das Interview'} ist jetzt abgeschlossen. Stelle keine weitere Frage. Sage jetzt exakt diesen Abschluss ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`))
      : (controlledStandaloneFinal
        ? `The interview is now complete. Do not ask another question. Now say exactly this closing message without additional explanation or meta commentary: “${finalClose}” Do not call end_interview in the same response; the app will end the interview automatically after the closing message has been spoken.`
        : (isHybridEnd
          ? `The spoken part is now complete. Do not ask another spoken question. Now say exactly this handoff message without additional explanation: “${finalClose}” Then call end_interview.`
          : `The ${isAssessmentEnd ? 'assessment' : 'interview'} is now complete. Do not ask another question. Now say exactly this closing message without additional explanation: “${finalClose}” Then call end_interview.`));

    log('[END] autofinish requested', {
      source: source || '',
      forced,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      userUtterances,
      userAudioItems,
      effectiveCandidateResponses: effectiveCandidateResponseCount()
    });

    if (controlledStandaloneFinal) {
      startDeterministicFinalCloseAndHangup(source || 'autofinish_deterministic_final_close', finalClose);
      return;
    }

    try {
      if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) {
        dcSend({
          type: 'response.create',
          response: {
            conversation: 'default',
            modalities: ['audio'],
            instructions: instruction
          }
        });
      } else {
        dcSend({
          type: 'conversation.item.create',
          item: { type: 'message', role: 'user', content: [{ type: 'input_text', text: instruction }] }
        });
        dcSend({ type: 'response.create', response: { conversation: 'default', modalities: ['audio'] } });
      }
    } catch (e) {
      log('[END] autofinish instruction failed', errMsg(e));
    }

    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    const finalWatchdogMs = controlledStandaloneFinal
      ? CONTROLLED_FINAL_CLOSE_WATCHDOG_MS
      : (forced ? HARD_END_WATCHDOG_MS : STRUCTURED_AUTOFINISH_FORCE_MS);
    HARD_END_WATCHDOG_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      log('[END] autofinish force hangup after missing model tool/final audio', { finalWatchdogMs, controlledStandaloneFinal });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup('autofinish_force_timeout');
    }, finalWatchdogMs);
  }

  function requestAutoFinishInterview(source){
    sendFinalCloseInstruction(source || 'autofinish', false);
  }

  function slotPlanQuestionAt(no){
    const plan = currentStructuredQuestionPlan(CTX);
    return String(plan[Math.max(0, Number(no || 0) - 1)] || '').trim();
  }

  function clearSlotStallTimer(){
    try { if (SLOT_STALL_TIMER) clearTimeout(SLOT_STALL_TIMER); } catch(_) {}
    SLOT_STALL_TIMER = null;
  }

  function createAssistantAudioResponseFromInstruction(instruction, source){
    if (!instruction || !dcSend || END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return false;
    try {
      // v4.0: controlled standalone Interview audio/video must not inject driver instructions
      // as fake candidate/user messages. response.instructions keeps the conversation cleaner.
      // Hybrid/Mix keeps the older isolated path for now.
      if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) {
        try { dcSend({ type: 'response.cancel' }); } catch(_) {}
        dcSend({
          type: 'response.create',
          response: {
            conversation: 'default',
            modalities: ['audio'],
            instructions: String(instruction)
          }
        });
        log('[DRIVER:controlled] response.instructions sent', {
          source: source || '',
          mode: controlledDriverLabel(CTX),
          current: structuredCurrentQuestionIndex,
          target: interviewMainQuestionTarget(CTX),
          instructionPreview: String(instruction).slice(0, 180)
        });
        return true;
      }

      dcSend({
        type: 'conversation.item.create',
        item: {
          type: 'message',
          role: 'user',
          content: [{ type: 'input_text', text: instruction }]
        }
      });
      dcSend({ type: 'response.create', response: { conversation: 'default', modalities: ['audio'] } });
      log('[SLOT] recovery instruction sent', { source: source || '', instructionPreview: String(instruction).slice(0, 180) });
      return true;
    } catch(e) {
      log('[SLOT] recovery instruction failed', { source: source || '', message: errMsg(e) });
      return false;
    }
  }

  function clearVideoDriverTimer(){
    try { if (VIDEO_DRIVER_TIMER) clearTimeout(VIDEO_DRIVER_TIMER); } catch(_) {}
    VIDEO_DRIVER_TIMER = null;
    try { if (CONTROLLED_DRIVER_TIMER) clearTimeout(CONTROLLED_DRIVER_TIMER); } catch(_) {}
    CONTROLLED_DRIVER_TIMER = null;
  }

  function scheduleVideoOnlyDriver(source, delayMs = 1800){
    // Historical name kept for compatibility. v4.0 now drives standalone audio and video.
    if (!controlledInterviewDriverEnabled(CTX) && !isVideoOnlyInterview(CTX)) return false;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK || VIDEO_DRIVER_FINAL_LOCK) return false;

    const target = interviewMainQuestionTarget(CTX);
    const current = structuredCurrentQuestionIndex || 0;
    const key = `${source || 'controlled_driver'}|${controlledDriverLabel(CTX)}|${current}|${target}|${structuredLastAssistantTurnType}|${structuredLastCandidateTurnType}|${!!structuredFollowUpAskedForQuestion[current || 0]}`;
    const now = Date.now();
    if (CONTROLLED_DRIVER_LAST_KEY === key && now - CONTROLLED_DRIVER_LAST_AT < 1800) return false;
    CONTROLLED_DRIVER_LAST_KEY = key;
    CONTROLLED_DRIVER_LAST_AT = now;
    VIDEO_DRIVER_LAST_KEY = key;
    VIDEO_DRIVER_LAST_AT = now;

    clearVideoDriverTimer();
    CONTROLLED_DRIVER_TIMER = setTimeout(() => {
      if (!controlledInterviewDriverEnabled(CTX) && !isVideoOnlyInterview(CTX)) return;
      if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK || VIDEO_DRIVER_FINAL_LOCK) return;

      const q = structuredCurrentQuestionIndex || 0;
      const t = interviewMainQuestionTarget(CTX);

      if (q >= t) {
        VIDEO_DRIVER_FINAL_LOCK = true;
        log('[DRIVER:controlled] target complete -> hard finalization', { source: source || '', q, target: t, mode: controlledDriverLabel(CTX) });
        requestHardEnd(source || 'controlled_driver_target_complete', { speakFinal: true, cancelActive: true });
        return;
      }

      // After a main answer, ask exactly one natural follow-up only while it cannot endanger completion.
      // v4.0.3: From Q8/Q9/Q10 in Q10 interviews, skip follow-ups and move directly to the next main/final close.
      if (q > 0 && structuredLastCandidateTurnType === 'answer' && !structuredFollowUpAskedForQuestion[q] && controlledInterviewFollowUpAllowed(q, t)) {
        log('[DRIVER:controlled] requesting one controlled follow-up', { source: source || '', q, target: t, mode: controlledDriverLabel(CTX), latePhase: controlledInterviewLatePhase(q, t) });
        requestSlotFollowUp(source || 'controlled_driver_followup');
        return;
      }

      if (q > 0 && structuredLastCandidateTurnType === 'answer' && !controlledInterviewFollowUpAllowed(q, t)) {
        log('[DRIVER:controlled] late phase: follow-up skipped to protect Q10 completion', { source: source || '', q, target: t, mode: controlledDriverLabel(CTX) });
      }

      // After the follow-up answer, after a late-phase main answer, or if no active slot exists yet,
      // progress to the next fixed main question.
      log('[DRIVER:controlled] requesting next fixed main question', { source: source || '', current: q, next: Math.min(t, q + 1), target: t, mode: controlledDriverLabel(CTX) });
      requestNextPlannedMainQuestion(source || 'controlled_driver_next_main');
    }, Math.max(500, Number(delayMs) || 1800));

    log('[DRIVER:controlled] scheduled', { source: source || '', delayMs: Math.max(500, Number(delayMs) || 1800), current, target, mode: controlledDriverLabel(CTX) });
    return true;
  }

  function requestSlotFollowUp(source){
    if (!isInterviewLiveContext(CTX) || isInterviewHybrid(CTX)) return false;
    const q = structuredCurrentQuestionIndex || 0;
    const target = interviewMainQuestionTarget(CTX);
    if (q <= 0 || q >= target) return false;
    if (!controlledInterviewFollowUpAllowed(q, target)) return false;
    if (structuredFollowUpAskedForQuestion[q]) return false;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return false;

    const lk = activeInterviewLang(CTX);
    const late = controlledInterviewLatePhase(q, target);
    const instruction = lk === 'de'
      ? (late
        ? 'Bitte stelle jetzt genau eine sehr kurze, natürliche Vertiefungsfrage zur letzten Antwort. Maximal ein Satz. Stelle keine neue Hauptfrage, verwende keine spätere Kundenfrage und leite danach zügig zur nächsten Hauptfrage weiter, sobald die Ergänzungsantwort abgeschlossen ist.'
        : 'Bitte stelle jetzt genau eine kurze, natürliche Nachfrage oder Ergänzungsmöglichkeit zur letzten Antwort. Stelle keine neue Hauptfrage und verwende keine spätere Kundenfrage. Warte danach auf die Ergänzungsantwort.')
      : (late
        ? 'Please now ask exactly one very short, natural deepening question about the last answer. One sentence maximum. Do not ask a new main question, do not use a later customer question, and move on quickly to the next main question once the addition answer is complete.'
        : 'Please now ask exactly one short, natural follow-up or addition opportunity about the last answer. Do not ask a new main question and do not use a later customer question. Then wait for the addition answer.');

    return createAssistantAudioResponseFromInstruction(instruction, source || 'slot_followup_stall');
  }

  function requestNextPlannedMainQuestion(source){
    if (!isInterviewLiveContext(CTX) || isInterviewHybrid(CTX)) return false;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return false;
    const target = interviewMainQuestionTarget(CTX);
    const nextNo = Math.min(target, (structuredCurrentQuestionIndex || 0) + 1);
    if (nextNo <= 0 || nextNo > target) return false;

    const plannedQuestion = slotPlanQuestionAt(nextNo);
    const lk = activeInterviewLang(CTX);
    const lateSlot = nextNo >= Math.max(1, target - 2);
    const instruction = lk === 'de'
      ? (plannedQuestion
        ? (lateSlot
          ? `HARD FINAL SLOT LOCK: Stelle jetzt exakt Frage ${nextNo} von ${target} aus dem festen Interviewplan. Sage ausschließlich diese Frage, ohne Motivation, ohne Zusammenfassung, ohne Lob, ohne Übergangstext und ohne Meta-Erklärung. Danach wartest du auf die Antwort: ${plannedQuestion}`
          : `Bitte stelle jetzt exakt diese nächste Hauptfrage aus dem festen Interviewplan. Sage nur die Frage selbst und keine Meta-Erklärung: ${plannedQuestion}`)
        : (lateSlot
          ? `HARD FINAL SLOT LOCK: Stelle jetzt direkt Frage ${nextNo} von ${target}. Sage ausschließlich die Frage selbst, ohne Motivation, ohne Zusammenfassung, ohne Lob, ohne Übergangstext und ohne Meta-Erklärung. Danach wartest du auf die Antwort.`
          : 'Bitte stelle jetzt direkt die nächste rollenbezogene Hauptfrage. Sage nur die Frage selbst und keine Meta-Erklärung.'))
      : (plannedQuestion
        ? (lateSlot
          ? `HARD FINAL SLOT LOCK: Now ask exactly question ${nextNo} of ${target} from the fixed interview plan. Say only this question, without motivation, summary, praise, transition text or meta explanation. Then wait for the answer: ${plannedQuestion}`
          : `Please now ask exactly this next main question from the fixed interview plan. Say only the question itself and no meta explanation: ${plannedQuestion}`)
        : (lateSlot
          ? `HARD FINAL SLOT LOCK: Now ask question ${nextNo} of ${target} directly. Say only the question itself, without motivation, summary, praise, transition text or meta explanation. Then wait for the answer.`
          : 'Please now ask the next role-specific main question directly. Say only the question itself and no meta explanation.'));

    return createAssistantAudioResponseFromInstruction(instruction, source || 'slot_next_main_stall');
  }

  function scheduleSlotStallRecovery(kind, q, delayMs, source){
    if (!isInterviewLiveContext(CTX) || isInterviewHybrid(CTX)) return;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return;
    const target = interviewMainQuestionTarget(CTX);
    if (!q || q >= target) return;

    clearSlotStallTimer();
    const delay = Math.max(3000, Number(delayMs) || SLOT_NEXT_MAIN_STALL_MS);
    SLOT_STALL_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return;
      if ((structuredCurrentQuestionIndex || 0) !== q) return;
      if (kind === 'followup') {
        if (structuredLastAssistantTurnType === 'main_question' && !structuredFollowUpAskedForQuestion[q] && controlledInterviewFollowUpAllowed(q, target)) {
          requestSlotFollowUp(source || 'slot_followup_stall');
        } else if (structuredLastAssistantTurnType === 'main_question' && !controlledInterviewFollowUpAllowed(q, target)) {
          scheduleVideoOnlyDriver('slot_followup_stall_late_skip_followup', CONTROLLED_LATE_NEXT_MAIN_DELAY_MS);
        }
        return;
      }
      if (kind === 'next_main') {
        if (structuredLastCandidateTurnType === 'answer_addition' || structuredLastAssistantTurnType === 'follow_up_question') {
          requestNextPlannedMainQuestion(source || 'slot_next_main_stall');
        }
      }
    }, delay);

    log('[SLOT] stall recovery scheduled', {
      kind,
      q,
      delayMs: delay,
      source: source || '',
      target
    });
  }

  function scheduleInterviewAutoFinishCheck(source){
    try { if (structuredAutoFinishTimer) clearTimeout(structuredAutoFinishTimer); } catch(_) {}
    if (!isInterviewLiveContext(CTX)) return;

    // v3.11.7: Hybrid/Mix previously skipped the idle auto-finish path completely.
    // That meant the model could speak the correct handoff sentence, but if it missed the
    // end_interview tool call or transcript final event, the recorder stayed open until the
    // user pressed the fallback button. Hybrid may now auto-finalize ONLY after the spoken
    // media target is reached; before that it remains protected by the early-end guards.
    if (isInterviewHybrid(CTX) && structuredCurrentQuestionIndex < interviewLiveQuestionTarget(CTX)) return;

    structuredAutoFinishTimer = setTimeout(() => {
      if (isInterviewHybrid(CTX)) {
        sendFinalCloseInstruction(source || 'hybrid_idle_after_spoken_target', true);
      } else {
        requestAutoFinishInterview(source || 'idle_after_candidate_answer');
      }
    }, isInterviewHybrid(CTX) ? Math.max(3000, TARGET_FINALIZE_AFTER_ANSWER_MS) : STRUCTURED_AUTOFINISH_IDLE_MS);
  }

  function scheduleTargetReachedAutoFinish(source, delayMs){
    const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
    const assessmentReached = isAssessmentVoiceLive(CTX) && structuredCurrentQuestionIndex >= assessmentTarget;
    if (!isInterviewLiveContext(CTX) && !assessmentReached) return;
    if (END_CALLED || FINAL_HANGUP_TIMER) return;
    if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex < interviewLiveQuestionTarget(CTX) && !nearCompleteVideoOnlyByRuntime(CTX)) return;
    if (isAssessmentVoiceLive(CTX) && structuredCurrentQuestionIndex < assessmentTarget) return;

    const delay = Number.isFinite(Number(delayMs)) ? Number(delayMs) : TARGET_QUESTION_ANSWER_GRACE_MS;
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    targetAutoFinishTimer = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;

      // v3.11.7: For Mix/Video+Chat the spoken target is intentionally lower than the
      // full Q-set. The remaining slots are handled by chat. Assessment hybrid follows
      // the same principle, but remains isolated from the Interview driver.
      const requiredTarget = isAssessmentVoiceLive(CTX)
        ? assessmentTarget
        : (isInterviewHybrid(CTX) ? interviewLiveQuestionTarget(CTX) : interviewMainQuestionTarget(CTX));
      if (structuredCurrentQuestionIndex < requiredTarget && !nearCompleteVideoOnlyByRuntime(CTX)) return;

      requestHardEnd(source || (isAssessmentHybridLive(CTX) || isInterviewHybrid(CTX) ? 'hybrid_spoken_target_reached_timer' : 'target_reached_timer'), { speakFinal: true, cancelActive: true });
    }, Math.max(1500, delay));

    log('[END] target reached autofinish scheduled', {
      source: source || '',
      delayMs: Math.max(1500, delay),
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      liveTargetQuestions: isAssessmentVoiceLive(CTX) ? assessmentTarget : interviewLiveQuestionTarget(CTX),
      hybrid: isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX),
      assessment: isAssessmentVoiceLive(CTX),
      userUtterances,
      userAudioItems
    });
  }

  function markCandidateAudioItem(itemId, source){
    const key = String(itemId || `${source || 'audio'}-${Date.now()}-${Math.random()}`).trim();
    if (seenUserAudioItemIds.has(key)) return;
    seenUserAudioItemIds.add(key);
    userAudioItems += 1;
    log('[USER-AUDIO] counted candidate audio item', {
      source: source || '',
      itemId: key,
      userAudioItems,
      userUtterances,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX)
    });
    const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
    const assessmentReached = isAssessmentVoiceLive(CTX) && structuredCurrentQuestionIndex >= assessmentTarget;
    if (structuredCurrentQuestionIndex >= interviewLiveQuestionTarget(CTX) || nearCompleteVideoOnlyByRuntime(CTX) || assessmentReached) {
      const q = structuredCurrentQuestionIndex || 0;
      const delay = structuredFollowUpAskedForQuestion[q] ? TARGET_FINALIZE_AFTER_ANSWER_MS : TARGET_FOLLOWUP_WAIT_MS;
      if (assessmentReached) scheduleTargetReachedAutoFinish('assessment_candidate_audio_after_target', delay);
      else scheduleStrictTargetFinalization('candidate_audio_after_target', delay);
      if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) scheduleVideoOnlyDriver('candidate_audio_after_target', delay + 500);
    } else {
      scheduleInterviewAutoFinishCheck('candidate_audio_item');
      if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) scheduleVideoOnlyDriver('candidate_audio_item', CONTROLLED_IDLE_RECOVERY_MS);
    }
  }

  function canEndNow(){
    if (!interviewStartedAt) return false;

    const elapsed = (Date.now() - interviewStartedAt) / 1000;
    const answerCount = effectiveCandidateResponseCount();
    const target = interviewLiveQuestionTarget(CTX);
    const qComplete = !shouldBlockEarlyInterviewClosing() || nearCompleteVideoOnlyByRuntime(CTX);

    // Before the Q-set is complete, keep the old safety floor.
    if (!qComplete) {
      if (elapsed < MIN_SECONDS_BEFORE_END) return false;
      if (answerCount < MIN_USER_UTTERANCES) return false;
      return false;
    }

    // v3.11.5: Video-only and Video+Chat must not finalize on a falsely advanced
    // question index with too little captured candidate material. This keeps the finalizer
    // robust for real completed interviews while blocking short, incomplete video runs.
    const stricterMediaGuard = isInterviewLiveContext(CTX) && (!AUDIO_ONLY || isInterviewHybrid(CTX));
    if (stricterMediaGuard) {
      const minResponses = Math.max(2, Math.min(target, target - 1));
      const elapsedLongEnough = elapsed >= Math.max(90, target * 12);
      if (answerCount < minResponses && !elapsedLongEnough) {
        log('[END] end_interview blocked by video/mix response guard', {
          elapsedSec: elapsed.toFixed(1),
          answerCount,
          minResponses,
          target,
          hybrid: isInterviewHybrid(CTX),
          audioOnly: AUDIO_ONLY
        });
        return false;
      }
    }

    // After the selected Q-set/media target is complete, accept end_interview.
    // The slot plan itself is the stronger completion signal; do not block the finalizer
    // only because Realtime missed one user transcription event.
    return true;
  }

  function effectiveFinalHangupBufferMs(){
    const base = Math.max(2500, Number(FINAL_HANGUP_BUFFER_MS) || 55000);

    // v4.0.2: Controlled standalone Interview already waits for the final spoken closing
    // through CONTROLLED_FINAL_CLOSE_WATCHDOG_MS or final-audio detection. After that signal,
    // only a short safety tail is needed before stopping mic/video/recorder. The old 52s+
    // buffer made successful Q10 runs look like a missing auto-hangup.
    if (controlledInterviewDriverEnabled(CTX) && isInterviewLiveContext(CTX) && !isInterviewHybrid(CTX)) {
      return Math.max(6500, Math.min(14000, Number(Q.get('controlledFinalHangupBufferMs') || 8500) || 8500));
    }

    // Hybrid handoff and legacy interview modes keep a longer buffer because their final/handoff
    // speech can be detected earlier by Realtime transcript events.
    if (isInterviewLiveContext(CTX)) return Math.max(18000, Math.min(42000, base));
    return Math.max(2500, Math.min(36000, base));
  }

  function beginFinalHangup(source){
    if (END_CALLED) return;
    if (FINAL_HANGUP_TIMER) return;
    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    HARD_END_WATCHDOG_TIMER = null;
    const hangupBufferMs = effectiveFinalHangupBufferMs();

    log('[END] final hangup scheduled', {
      source: source || 'unknown',
      finalMessageSpoken: FINAL_MESSAGE_SPOKEN,
      itemId: FINAL_MESSAGE_ITEM_ID || '',
      bufferMs: hangupBufferMs
    });

    setStatus('warn', t('processing'));

    avatarSet('processing', 'final_hangup_scheduled');
    avatarLevel('ai', 0, 'final_hangup_scheduled');
    avatarLevel('user', 0, 'final_hangup_scheduled');

    postToParent('clarity.live.final_message_pending', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      bufferMs: hangupBufferMs,
      ts: new Date().toISOString()
    });

    if (isInterviewHybrid(CTX)) {
      postToParent('clarity.live.handoff_pending', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        targetQuestions: interviewMainQuestionTarget(CTX),
        mainQuestions: structuredCurrentQuestionIndex,
        chatQuestionCount: Number(CTX?.chatQuestionCount || 0),
        ts: new Date().toISOString()
      });
    }

    FINAL_HANGUP_TIMER = setTimeout(() => {
      if (END_CALLED) return;

      END_CALLED = true;

      log('[END] final hangup accepted after buffer', {
        source: source || 'unknown',
        bufferMs: hangupBufferMs
      });

      postToParent('clarity.live.final_message_done', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        bufferMs: hangupBufferMs,
        ts: new Date().toISOString()
      });

      if (isInterviewHybrid(CTX)) {
        postToParent('clarity.live.handoff_ready', {
          uid: UID,
          companyId: COMPANY_ID,
          source: source || '',
          targetQuestions: interviewMainQuestionTarget(CTX),
          mainQuestions: structuredCurrentQuestionIndex,
          chatQuestionCount: Number(CTX?.chatQuestionCount || 0),
          ts: new Date().toISOString()
        });
      }

      hangup(source || 'final_message_done');
    }, hangupBufferMs);
  }

  function requestEndNow(source){
    if (END_CALLED) return;

    if (!canEndNow()){
      log('[END] end_interview IGNORED (too early)', {
        source: source || 'unknown',
        elapsedSec: interviewStartedAt ? ((Date.now() - interviewStartedAt) / 1000).toFixed(1) : '0',
        userUtterances
      });
      return;
    }

    END_REQUESTED_BY_MODEL = true;
    log('[END] end_interview requested by model', source || 'unknown');

    if (FINAL_MESSAGE_SPOKEN) {
      beginFinalHangup(source || 'model_end');
      return;
    }

    // v3.11.3: Some Realtime runs emit the end_interview tool call without a transcript
    // that our finalClosingDetected() can classify as the closing message. Previously that
    // left the interview half-ended: microphone/input stopped or model done, but recorder/video
    // kept running and the parent processing flow never started.
    // Now a valid end_interview request after the slot plan is complete always leads to a full
    // finalizer. We still try to request the spoken closing once; if it is not produced quickly,
    // we finalize rather than hanging indefinitely.
    try { if (MODEL_END_NO_FINAL_TIMER) clearTimeout(MODEL_END_NO_FINAL_TIMER); } catch(_) {}
    sendFinalCloseInstruction(source || 'model_end_without_detected_closing', true);
    MODEL_END_NO_FINAL_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      log('[FINALIZER] model end without detected closing -> finalize fallback', { source: source || '' });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup(source || 'model_end_no_final_fallback');
    }, MODEL_END_NO_FINAL_GRACE_MS);
  }

  /* ===== DC Queue ===== */
  function dcSend(obj){
    try {
      if (dcIsOpen && DC?.readyState === 'open'){
        DC.send(JSON.stringify(obj));
      } else {
        dcQueue.push(obj);
        log('[DC] queued', (obj && (obj.type || Object.keys(obj)[0])) || '');
      }
    } catch(e) {
      log('[DC] send fail', errMsg(e));
    }
  }

  function flushDCQueue(){
    if (!dcIsOpen || !DC) return;

    try {
      while (dcQueue.length){
        const m = dcQueue.shift();
        DC.send(JSON.stringify(m));
      }
      log('[DC] queue flushed');
    } catch(e) {
      log('[DC] flush error', errMsg(e));
    }
  }

  /* ===== Token ===== */
  async function getRealtimeToken(payload){
    log('[Live] Fetching token…', TOKEN_URL, JSON.stringify(payload));

    const r = await fetch(TOKEN_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    const txt = await r.text().catch(() => '');
    let data = null;

    try {
      data = txt ? JSON.parse(txt) : null;
    } catch(_) {}

    if (!r.ok) {
      throw new Error('token_http_' + r.status + ': ' + (txt || r.statusText));
    }

    // v3.10.3: GA-token compatibility.
    // Some backends wrap the OpenAI client secret as { ok:true, token/client_secret },
    // while the GA /v1/realtime/client_secrets endpoint can return the raw shape
    // { value, expires_at, ... }. Accept both. Only fail if no usable ephemeral key exists.
    const sec =
      data?.client_secret?.value ||
      data?.client_secret ||
      data?.clientSecret?.value ||
      data?.clientSecret ||
      data?.token?.value ||
      data?.token ||
      data?.value ||
      data?.secret ||
      '';

    if (!sec) {
      const openAiErr = data?.error?.message || data?.error || '';
      const code = data?.error?.code || data?.code || '';
      const msg = data?.message || openAiErr || 'client_secret_missing';
      throw new Error('token_error: ' + [code, msg].filter(Boolean).join(' '));
    }

    if (data?.ok === false) {
      const openAiErr = data?.error?.message || data?.error || '';
      const code = data?.error?.code || data?.code || '';
      const msg = data?.message || openAiErr || 'token_error';
      throw new Error('token_error: ' + [code, msg].filter(Boolean).join(' '));
    }

    log('[Live] effective', {
      lang: data.lang || data.session?.lang || '',
      reportLang: data.reportLang || '',
      voice: data.voice || data.session?.audio?.output?.voice || '',
      model: data.model || data.session?.model || ''
    });

    return { secret: sec, ctx: data?.ok === false ? {} : data };
  }

  /* ===== WebRTC ===== */
  async function connectRealtime(clientSecret){
    if (pc) return;

    pc = new RTCPeerConnection({
      iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
    });

    pc.onconnectionstatechange = () => {
      const state = pc.connectionState || '';
      const ice = pc.iceConnectionState || '';
      log('[RTC]', state, { ice });
      postAudioDiag('rtc_state_change', { state, ice });

      if (state === 'failed' || state === 'disconnected'){
        setStatus('warn', t('disconnected'));
        postAudioDiag('rtc_unstable', { state, ice });
      }
    };

    pc.oniceconnectionstatechange = () => {
      const ice = pc.iceConnectionState || '';
      if (ice === 'failed' || ice === 'disconnected') {
        log('[RTC-DIAG] ice connection state', ice);
        postAudioDiag('ice_unstable', { ice });
      } else if (DEBUG_LOGS) {
        log('[RTC-DIAG] ice connection state', ice);
      }
    };

    pc.ontrack = async (ev) => {
      log('[RTC] ontrack kind=', ev.track.kind);

      if (!remoteStream) remoteStream = new MediaStream();
      remoteStream.addTrack(ev.track);
      $remoteA.srcObject = remoteStream;

      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        remoteSource = audioCtx.createMediaStreamSource(remoteStream);

        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;

        const buf = new Uint8Array(analyser.frequencyBinCount);
        remoteSource.connect(analyser);

        (function tick(){
          if (destroyed) return;

          analyser.getByteTimeDomainData(buf);

          let dev = 0;
          for (let i = 0; i < buf.length; i++) {
            dev = Math.max(dev, Math.abs(buf[i] - 128));
          }

          $sys.style.width = Math.min(100, dev * 2) + '%';
          avatarRemoteAudioDev(dev);

          requestAnimationFrame(tick);
        })();
      } catch(_) {}

      try {
        $remoteA.muted = false;
        $remoteA.volume = 1.0;
        $remoteA.autoplay = true;
        $remoteA.playsInline = true;

        await $remoteA.play();

        audioUnlocked = true;
        $audioBadge.textContent = t('audioReady');
        postToParent('clarity.live.audio_ready', {});
        postAudioDiag('remote_audio_started');
        log('[AUDIO-DIAG] remote audio playing (unlocked).');
      } catch(e) {
        audioUnlocked = false;
        $audioBadge.textContent = t('audioPreparing');
        postToParent('clarity.live.audio_wait', {});
        postAudioDiag('remote_audio_wait', { reason: 'autoplay_blocked' });
        log('[AUDIO-DIAG] autoplay blocked, waiting for user gesture.');
      }

      remoteTrackReadyResolve?.();
    };

    if (localStream){
      localStream.getAudioTracks().forEach(t => {
        t.enabled = false;
        pc.addTrack(t, localStream);
      });

      if (!AUDIO_ONLY) {
        localStream.getVideoTracks().forEach(t => pc.addTrack(t, localStream));
      }

      log('[RTC] local tracks added', {
        audioOnly: AUDIO_ONLY,
        audioTracks: localStream.getAudioTracks().length,
        videoTracks: localStream.getVideoTracks().length
      });
    }

    DC = pc.createDataChannel('oai-events');

    DC.onopen = () => {
      dcIsOpen = true;
      log('[RTC] DC open');
      flushDCQueue();
    };

    DC.onmessage = onRealtimeEvent;

    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: false
    });

    await pc.setLocalDescription(offer);

    // v3.10.3: GA Realtime WebRTC uses /v1/realtime/calls; token parser accepts GA raw client_secret shape.
    // The old SDP exchange endpoint /v1/realtime?model=... now returns beta_api_shape_disabled.
    const r = await fetch('https://api.openai.com/v1/realtime/calls', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${clientSecret}`,
        'Content-Type': 'application/sdp'
      },
      body: offer.sdp
    });

    if (!r.ok){
      const txt = await r.text().catch(() => r.statusText);
      throw new Error('realtime_handshake_failed: ' + txt);
    }

    const answer = {
      type: 'answer',
      sdp: await r.text()
    };

    await pc.setRemoteDescription(answer);
  }

  function onRealtimeEvent(ev){
    let data = ev && ev.data;

    try {
      if (typeof data === 'string') data = JSON.parse(data);
    } catch(_) {}

    if (!data) return;

    const eventType = data.type || '';

    if (
      eventType.includes('transcript') ||
      eventType.includes('transcription') ||
      eventType.includes('input_audio') ||
      eventType === 'conversation.item.created' ||
      eventType === 'conversation.item.done' ||
      eventType === 'response.output_item.done' ||
      eventType === 'response.output_item.added' ||
      eventType === 'response.function_call_arguments.done'
    ) {
      log('[RT-EVENT-TYPE]', eventType);

      log('[RT-EVENT-CHECK]', {
        type: eventType,
        hasTranscript: !!data?.transcript,
        hasText: !!data?.text,
        hasDelta: !!data?.delta,
        hasError: !!data?.error,
        itemId: data?.item_id || data?.itemId || data?.item?.id || '',
        itemRole: data?.item?.role || '',
        itemType: data?.item?.type || '',
        itemStatus: data?.item?.status || '',
        itemContentTypes: Array.isArray(data?.item?.content)
          ? data.item.content.map(p => p?.type || '').join(',')
          : '',
        error: data?.error?.message || data?.error || ''
      });
    }

    if (eventType === 'response.state' && data.state){
      avatarSet(data.state, 'response.state');
    }

    /* USER TRANSCRIPT — completed */
    if (
      eventType === 'conversation.item.input_audio_transcription.completed' ||
      eventType === 'input_audio_transcription.completed'
    ) {
      const txtRaw = String(
        data?.transcript ||
        data?.transcription?.text ||
        data?.text ||
        ''
      ).trim();

      const txt = txtRaw.toLowerCase();

      log('[USER-TRANSCRIPT-COMPLETED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasText: !!txtRaw,
        textPreview: txtRaw.slice(0, 160)
      });

      if (txtRaw) {
        avatarSet('thinking', 'user_transcript_completed');
        avatarLevel('user', 0.12, 'user_transcript_completed');

        userUtterances += 1;
        const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
        if (structuredCurrentQuestionIndex >= interviewMainQuestionTarget(CTX) || (assessmentTarget && structuredCurrentQuestionIndex >= assessmentTarget)) {
          scheduleTargetReachedAutoFinish(isAssessmentVoiceLive(CTX) ? 'assessment_user_transcript_after_target' : 'user_transcript_after_target', STRUCTURED_AUTOFINISH_IDLE_MS);
        } else {
          scheduleInterviewAutoFinishCheck('user_transcript_completed');
        }

        emitTranscript('user', txtRaw, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });
      }

      if (isReadyText(txtRaw)){
        READY_DETECTED = true;
        maybeAskFirstQuestion();
      }

      return;
    }

    /* USER TRANSCRIPT — delta / segment diagnostics */
    if (
      eventType === 'conversation.item.input_audio_transcription.delta' ||
      eventType === 'input_audio_transcription.delta' ||
      eventType === 'conversation.item.input_audio_transcription.segment' ||
      eventType === 'input_audio_transcription.segment'
    ) {
      const piece = String(
        data?.delta ||
        data?.transcript ||
        data?.text ||
        data?.segment?.text ||
        ''
      ).trim();

      log('[USER-TRANSCRIPT-PIECE]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasPiece: !!piece,
        piecePreview: piece.slice(0, 160)
      });

      if (piece) {
        avatarSet('user_speaking', 'user_transcript_piece');
        avatarLevel('user', Math.max(0.35, Math.min(0.85, piece.length / 70)), 'user_transcript_piece');
      }

      return;
    }

    /* USER TRANSCRIPT — failed */
    if (
      eventType === 'conversation.item.input_audio_transcription.failed' ||
      eventType === 'input_audio_transcription.failed'
    ) {
      log('[USER-TRANSCRIPT-FAILED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        error: data?.error?.message || data?.error || 'unknown'
      });

      postToParent('rt.transcript.partial', {
        speaker: 'system',
        text: '[user_transcription_failed]',
        sourceEvent: eventType,
        final: true,
        ts: new Date().toISOString()
      });

      return;
    }

    /* USER AUDIO ITEM / internal user input_text */
    if (
      (eventType === 'conversation.item.created' || eventType === 'conversation.item.done') &&
      data.item &&
      data.item.role === 'user'
    ) {
      const it = data.item;
      const contentTypes = Array.isArray(it.content)
        ? it.content.map(p => p?.type || '').join(',')
        : '';

      const hasInputAudio = contentTypes.includes('input_audio');
      const hasInputText = contentTypes.includes('input_text');

      if (hasInputAudio) {
        const audioItemId = it.id || data.item_id || data.itemId || '';
        log('[TRANSCRIPT] user input_audio item observed, waiting for transcription.completed', {
          itemId: audioItemId,
          contentTypes
        });
        // GA fallback: if no completed transcription event follows, this still lets
        // the technical Q-cap/hangup logic know that the candidate answered.
        markCandidateAudioItem(audioItemId, eventType);
        return;
      }

      if (hasInputText) {
        log('[TRANSCRIPT] skipped internal user input_text', {
          itemId: it.id || data.item_id || '',
          contentTypes
        });
        return;
      }

      const texts = [];

      if (Array.isArray(it.content)) {
        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.input_text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }
      }

      const userText = texts.join('\n').trim();

      if (userText) {
        userUtterances += 1;

        emitTranscript('user', userText, {
          itemId: it.id || data.item_id || '',
          responseId: data.response_id || '',
          sourceEvent: eventType,
          final: true
        });

        const low = userText.toLowerCase();
        if (isReadyText(userText)) {
          READY_DETECTED = true;
          maybeAskFirstQuestion();
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — spoken final */
    if (eventType === 'response.audio_transcript.done') {
      postAudioDiag('response_audio_done', {
        itemId: data.item_id || data.itemId || '',
        responseId: data.response_id || data.responseId || ''
      });
      const txt = String(data?.transcript || '').trim();

      if (txt) {
        emitTranscript('assistant', txt, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });

        avatarLevel('ai', 0.18, 'assistant_audio_done');
        if (!FINAL_MESSAGE_SPOKEN && !FINAL_HANGUP_TIMER && !END_CALLED) {
          avatarSet('listening', 'assistant_audio_done');
        }

        if (finalClosingDetected(txt)) {
          if (shouldBlockEarlyInterviewClosing()) {
            requestMissingInterviewQuestion('early_final_audio_transcript_done');
            return;
          }

          FINAL_MESSAGE_SPOKEN = true;
          FINAL_MESSAGE_ITEM_ID = data.item_id || data.itemId || '';
          log('[END] final/handoff message detected', {
            itemId: FINAL_MESSAGE_ITEM_ID,
            responseId: data.response_id || data.responseId || '',
            isHybrid: isAssessmentHybrid(CTX) || isInterviewHybrid(CTX),
            mainQuestions: structuredCurrentQuestionIndex,
            targetQuestions: interviewMainQuestionTarget(CTX)
          });

          // Robuster Auto-Hangup: Einige Realtime-Läufe sprechen den korrekten
          // Abschluss-/Handoff-Satz, liefern aber den end_interview-Toolcall nicht
          // zuverlässig nach. Nach dem vollständig transkribierten Satz starten wir
          // deshalb den Puffer selbst. Der Button bleibt nur Fallback.
          if (!FINAL_HANGUP_TIMER && !END_CALLED) {
            beginFinalHangup(isAssessmentHybrid(CTX) ? 'hybrid_handoff_audio_done' : (isInterviewHybrid(CTX) ? 'interview_handoff_audio_done' : 'final_audio_transcript_done'));
          }
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — delta diagnostics only */
    if (eventType === 'response.audio_transcript.delta') {
      const piece = String(data?.delta || '').trim();

      if (piece) {
        avatarSet('ai_speaking', 'assistant_audio_delta');
        avatarLevel('ai', Math.max(0.42, Math.min(0.95, piece.length / 85)), 'assistant_audio_delta');
      }

      if (piece && DEBUG_LOGS) {
        log('[ASSISTANT-TRANSCRIPT-DELTA]', {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          piecePreview: piece.slice(0, 80)
        });
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — text fallback, but ignore tool JSON/noise */
    if (eventType === 'response.text.done') {
      const txt = String(data?.text || '').trim();

      if (looksLikeToolNoise(txt)) {
        log('[TRANSCRIPT] skipped empty/json response.text.done', {
          textPreview: txt.slice(0, 120)
        });
        return;
      }

      emitTranscript('assistant', txt, {
        itemId: data.item_id || data.itemId || '',
        responseId: data.response_id || data.responseId || '',
        sourceEvent: eventType,
        final: true
      });

      return;
    }

    /* ASSISTANT output_item.done */
    if (eventType === 'response.output_item.done' && data.item) {
      const it = data.item;

      if (FINAL_MESSAGE_SPOKEN) {
        const itemId = it.id || data.item_id || data.itemId || '';
        const sameItem = !FINAL_MESSAGE_ITEM_ID || itemId === FINAL_MESSAGE_ITEM_ID;

        if (sameItem || END_REQUESTED_BY_MODEL) {
          beginFinalHangup('final_audio_done');
          return;
        }
      }

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }

      if (Array.isArray(it.content)) {
        const texts = [];

        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }

        const finalText = texts.join('\n').trim();

        if (finalText && !looksLikeToolNoise(finalText)) {
          emitTranscript('assistant', finalText, {
            itemId: it.id || data.item_id || '',
            responseId: data.response_id || '',
            sourceEvent: eventType,
            final: true
          });

          // v3.10.5 HOTFIX: In GA Realtime the final spoken text often arrives
          // reliably via response.output_item.done, while response.audio_transcript.done
          // and/or the end_interview tool call may be delayed or absent.
          // Treat the recognized closing/handoff text as a valid processing trigger.
          if (finalClosingDetected(finalText)) {
            if (shouldBlockEarlyInterviewClosing()) {
              requestMissingInterviewQuestion('early_final_output_item_done');
              return;
            }

            FINAL_MESSAGE_SPOKEN = true;
            FINAL_MESSAGE_ITEM_ID = it.id || data.item_id || data.itemId || '';
            log('[END] final/handoff text detected in output_item.done', {
              itemId: FINAL_MESSAGE_ITEM_ID,
              responseId: data.response_id || data.responseId || '',
              mainQuestions: structuredCurrentQuestionIndex,
              targetQuestions: interviewMainQuestionTarget(CTX),
              userUtterances
            });

            if (!FINAL_HANGUP_TIMER && !END_CALLED) {
              beginFinalHangup(isAssessmentHybrid(CTX)
                ? 'hybrid_handoff_output_item_done'
                : (isInterviewHybrid(CTX) ? 'interview_handoff_output_item_done' : 'final_output_item_done'));
            }
          }
        }
      }

      return;
    }

    /* RESPONSE DONE — GA safety: after the target is reached, do not wait forever for user transcription events. */
    if (eventType === 'response.done' || eventType === 'response.completed') {
      const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
      if ((isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex >= interviewLiveQuestionTarget(CTX)) || (assessmentTarget && structuredCurrentQuestionIndex >= assessmentTarget)) {
        // v3.11.7/v3.12.1: In Hybrid/Mix the spoken target is e.g. 7/10. Once that response is done,
        // schedule the handoff/finalizer instead of waiting for the full Q10/Q20 count.
        const hybridDone = isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX);
        scheduleTargetReachedAutoFinish(hybridDone ? 'hybrid_response_done_after_spoken_target' : (isAssessmentVoiceLive(CTX) ? 'assessment_response_done_after_target' : 'response_done_after_target'), hybridDone ? TARGET_FINALIZE_AFTER_ANSWER_MS : STRUCTURED_AUTOFINISH_IDLE_MS);
      }
      return;
    }

    /* end_interview tool detection */
    if (eventType === 'conversation.item.created' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow('conversation.item.created');
        return;
      }
    }

    if (eventType === 'response.output_item.added' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }
    }

    if (eventType === 'response.function_call_arguments.done'){
      const name =
        data.name ||
        data.tool_name ||
        data.function_name ||
        data?.function_call?.name;

      if (name === 'end_interview'){
        requestEndNow('function_call_arguments.done');
        return;
      }
    }
  }

  /* ===== Audio unlock ===== */
  async function ensureAudioUnlocked(){
    if (audioUnlocked) return true;

    try {
      await $remoteA.play();

      audioUnlocked = true;
      $audioBadge.textContent = t('audioReady');
      postToParent('clarity.live.audio_ready', {});

      return true;
    } catch(_) {}

    postToParent('clarity.live.audio_wait', {});
    setStatus('warn', t('audioClick'));

    return new Promise((resolve) => {
      const unlock = async () => {
        try {
          if (audioCtx && audioCtx.state !== 'running'){
            try {
              await audioCtx.resume();
            } catch(_) {}
          }

          await $remoteA.play();

          audioUnlocked = true;
          $audioBadge.textContent = t('audioReady');
          postToParent('clarity.live.audio_ready', {});

          window.removeEventListener('pointerdown', unlock);
          window.removeEventListener('keydown', unlock);

          resolve(true);
        } catch(_) {}
      };

      window.addEventListener('pointerdown', unlock, { once:true });
      window.addEventListener('keydown', unlock, { once:true });
    });

  function spokenMediaQuestionCap(ctx = CTX){
    const mode = String(ctx?.interviewMode || ctx?.assessmentMode || ctx?.mode || (AUDIO_ONLY ? 'audio' : 'video')).toLowerCase();
    const isChatLike = ['chat','hybrid','mix','mixmode','video_chat','audio_chat'].includes(mode);
    // Launch policy: spoken video/audio sessions are capped at Q30.
    // Q40/Q50 can remain available for chat/hybrid/future products outside this live voice flow.
    return isChatLike ? 50 : 30;
  }

  function interviewMaxQuestions(ctx = CTX){
    const cap = spokenMediaQuestionCap(ctx);
    const direct = Number(ctx?.interviewConfig?.maxQuestions || ctx?.questionCount || ctx?.maxQuestions || 0);
    if (Number.isFinite(direct) && direct > 0) return Math.max(1, Math.min(cap, Math.round(direct)));
    const raw = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || '').toUpperCase();
    const m = raw.match(/(10|20|30|40|50)/);
    return m ? Math.max(1, Math.min(cap, Number(m[1]))) : 10;
  }

  function parseQuestionLines(text){
    const raw = String(text || '').trim();
    if (!raw) return [];

    const out = [];
    const seen = new Set();
    raw
      .split(/\r?\n|(?=\b\d{1,2}[.)]\s+)/g)
      .map(line => line.replace(/^\s*[-•*]+\s*/, '').replace(/^\s*\d{1,2}[.)]\s*/, '').trim())
      .filter(Boolean)
      .forEach(line => {
        const clean = line.replace(/\s+/g, ' ');
        const key = clean.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          out.push(clean);
        }
      });
    return out;
  }

  function questionPolicyText(ctx = CTX){
    const maxQ = interviewMaxQuestions(ctx);
    const qset = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || `Q${maxQ}`).toUpperCase();
    const customQuestions = selectedCustomerQuestionLines(ctx).slice(0, maxQ);
    const missing = Math.max(0, maxQ - customQuestions.length);
    const capNoteDe = spokenMediaQuestionCap(ctx) === 30 ? ' Für Video- und Audio-Interviews ist Q30 das aktuelle Maximum im Live-Gespräch.' : '';

    const hybridNoteDe = isInterviewHybrid(ctx) ? ` Dies ist nur der mündliche Teil eines hybriden Interviews. Stelle hier genau ${spokenQ} mündliche Hauptfragen; der restliche schriftliche Teil folgt im Chat. Beende den mündlichen Teil mit dem vorgegebenen Übergabesatz.` : '';
    const hybridNoteEn = isInterviewHybrid(ctx) ? ` This is only the spoken part of a hybrid interview. Ask exactly ${spokenQ} spoken main questions here; the remaining written part follows in chat. End the spoken part with the provided handoff message.` : '';
    const hasCustomerPlan = customQuestions.length > 0;
    if (activeInterviewLang(ctx) === 'de') {
      return hasCustomerPlan
        ? `Interner Interviewumfang ${qset}: Es gibt einen festen Slot-Plan mit genau ${maxQ} Hauptfragen. Stelle zuerst die kundeneigenen Fragen exakt in der gespeicherten Reihenfolge. Wenn nur ${customQuestions.length} kundeneigene Fragen vorhanden sind, ergänze danach ${missing} passende rollenbezogene Hauptfragen. Pro Slot gilt strikt: Hauptfrage stellen, vollständige Antwort abwarten, genau eine kurze natürliche Nachfrage oder Ergänzungsmöglichkeit stellen, Ergänzungsantwort abwarten, erst dann nächster Slot. Eine Nachfrage darf NIEMALS eine spätere kundeneigene Hauptfrage enthalten und zählt NIEMALS als Hauptfrage. Sage im Gespräch keine Fragennummern, kein Q10/Q20/Q30 und keine Formulierungen wie „zweite Frage“, „Frage 8“ oder „letzte Frage“. Beende erst nach Slot ${maxQ} und dessen Antwort/Ergänzung.${capNoteDe}${hybridNoteDe}`
        : `Interner Interviewumfang ${qset}: Stelle genau ${maxQ} passende rollenbezogene Hauptfragen in einem festen Slot-Plan. Pro Slot gilt strikt: Hauptfrage stellen, vollständige Antwort abwarten, genau eine kurze natürliche Nachfrage oder Ergänzungsmöglichkeit stellen, Ergänzungsantwort abwarten, erst dann nächster Slot. Eine Nachfrage zählt NIEMALS als Hauptfrage. Sage im Gespräch keine Fragennummern, kein Q10/Q20/Q30 und keine Formulierungen wie „zweite Frage“, „Frage 8“ oder „letzte Frage“. Nutze natürliche professionelle Übergänge. Beende erst nach Slot ${maxQ} und dessen Antwort/Ergänzung.${capNoteDe}${hybridNoteDe}`;
    }

      ? `Internal interview scope ${qset}: There is a fixed slot plan with exactly ${maxQ} main questions. Ask the customer's own questions first, exactly in the stored order. If only ${customQuestions.length} customer questions are available, add ${missing} suitable role-specific main questions afterwards. Per slot, strictly follow: ask the main question, wait for the complete answer, ask exactly one short natural follow-up or addition opportunity, wait for the addition answer, only then move to the next slot. A follow-up must NEVER contain a later customer main question and NEVER counts as a main question. Do not announce question numbers, Q10/Q20/Q30, or phrases like “question 8”, “second question”, or “last question”. End only after slot ${maxQ} and its answer/addition.${capNoteEn}${hybridNoteEn}`
      : `Internal interview scope ${qset}: Ask exactly ${maxQ} suitable role-specific main questions in a fixed slot plan. Per slot, strictly follow: ask the main question, wait for the complete answer, ask exactly one short natural follow-up or addition opportunity, wait for the addition answer, only then move to the next slot. A follow-up NEVER counts as a main question. Do not announce question numbers, Q10/Q20/Q30, or phrases like “question 8”, “second question”, or “last question”. Use natural professional transitions. End only after slot ${maxQ} and its answer/addition.${capNoteEn}${hybridNoteEn}`;

  function chunkText(txt, max = 1800) {
    const out = [];
    let i = 0;

    while (i < txt.length) {
      out.push(txt.slice(i, i + max));
      i += max;
    }

    return out;
  }

  function pushCompanyKnowledge() {
    const kb  = (CTX.kbText || '').trim();
    const job = (CTX.jobAd  || '').trim();

    if (!kb && !job) return;

    const header = '=== KONTEXT / CONTEXT START ===';
    const footer = '=== KONTEXT / CONTEXT ENDE ===';
    const questions = isAssessmentContext(CTX) ? '' : currentStructuredQuestionPlan(CTX)
      .map((q, i) => `${i + 1}. ${q}`)
      .join('\n');

    const policy = isAssessmentContext(CTX) ? assessmentQuestionPolicyText(CTX, activeInterviewLang(CTX)) : questionPolicyText(CTX);
    const questionBlock = [
      policy,
      questions ? `CUSTOMER QUESTIONS / KUNDENEIGENE FRAGEN:\n${questions}` : ''
    ].filter(Boolean).join('\n\n');

    const body = [kb, job, questionBlock].filter(Boolean).join('\n\n');
    const pieces = chunkText(`${header}\n${body}\n${footer}`, 1800);

    for (const p of pieces) {
      dcSend({
        type: 'conversation.item.create',
        item: {
          type: 'message',
          role: 'system',
          content: [{ type: 'input_text', text: p }]
        }
      });
    }
  }

  function buildInterviewPlan(ctx){
    const lk = activeInterviewLang(ctx);
    const profile = langProfile(lk);
    const seeds = [];
    const prefix = profile.jobPrefix || LANG_PROFILES.en.jobPrefix;
    const maxQ = interviewMaxQuestions(ctx);

    const customQuestions = selectedCustomerQuestionLines(ctx).slice(0, maxQ);
    customQuestions.forEach(q => seeds.push(q));

    const base = (profile.baseQuestions || LANG_PROFILES.en.baseQuestions).slice();
    base.forEach(q => seeds.push(q));

    const text =
      (ctx.roleProfileText || '').trim() +
      '\n' +
      (ctx.docsText || '').trim();

    const lines = text
      .split(/\r?\n/)
      .map(s => s.trim())
      .filter(Boolean)
      .filter(line => !/^\d{1,2}[.)]\s*/.test(line))
      .slice(0, Math.max(0, maxQ - seeds.length));

    if (lines.length){
      lines.forEach(line => {
        seeds.push(prefix + line);
      });
    }

    const unique = [];
    const seen = new Set();
    for (const q of seeds){
      const clean = String(q || '').replace(/\s+/g, ' ').trim();
      if (!clean) continue;
      const key = clean.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      unique.push(clean);
      if (unique.length >= maxQ) break;
    }

    return unique.slice(0, Math.max(1, maxQ));
  }

  function firstQuestionInstruction(question, lk){
    const profile = langProfile(lk);

    if (profile.firstQuestionInstruction) return profile.firstQuestionInstruction(question);

    return `Please now ask exactly this first interview question out loud in ${profile.englishName} and then wait for the candidate's answer. Say only the question itself: ${question}`;
  }

  function fallbackFirstQuestion(lk){

    const plan = currentStructuredQuestionPlan(CTX);

  /* ===== Media ===== */
  async function setupLocalMedia(){
    const constraints = {
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: AUDIO_ONLY ? false : true
    };

    try {
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) {
      setStatus('warn', t('mediaBlocked'));
      log('[Media] getUserMedia error', {
        audioOnly: AUDIO_ONLY,
        message: errMsg(e)
      });
      postToParent('clarity.live.permission_error', { message:String(e?.name || e), audioOnly: AUDIO_ONLY });
      localStream = null;
    }

    if (localStream){
      if (!AUDIO_ONLY) {
        $localV.srcObject = localStream;
      } else {
        try { $localV.srcObject = null; } catch(_) {}
      }

      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const src = ctx.createMediaStreamSource(localStream);
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 512;

        const buf = new Uint8Array(analyser.frequencyBinCount);
        src.connect(analyser);

        (function tick(){
          if (destroyed) return;

          analyser.getByteTimeDomainData(buf);

          let dev = 0;
          for (let i = 0; i < buf.length; i++) {
            dev = Math.max(dev, Math.abs(buf[i] - 128));
          }

          $mic.style.width = Math.min(100, dev * 2) + '%';
          avatarLocalAudioDev(dev);

          requestAnimationFrame(tick);
        })();
      } catch(_) {}

      localStream.getAudioTracks().forEach(t => t.enabled = false);
    }
  }

  function enableMicUplink(){

      localStream?.getAudioTracks()?.forEach(t => t.enabled = true);

      localStream?.getAudioTracks()?.forEach(t => t.enabled = false);
