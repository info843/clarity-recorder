<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Live Interview</title>
  <!-- v4.0.4 DETERMINISTIC_FINAL_CLOSE: based on v4.0.3; controlled interview final close uses deterministic Wix/OpenAI TTS playback instead of free Realtime closing generation -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:#ffffff;
      --fg:#111827;
      --muted:#6b7280;
      --ok:#047857;
      --warn:#92400e;
      --err:#b91c1c;
      --card:#ffffff;
      --line:#e5e7eb;
      --soft:#f8fafc;
      --bar:#e5e7eb;
      --accent:#4f46e5;
      --shadow:0 16px 40px rgba(15,23,42,.10);
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--fg);
      font:14px/1.45 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      display:grid;
      grid-template-columns:1fr 300px;
      gap:16px;
      padding:14px;
      align-items:start;
      background:#ffffff;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(229,231,235,.65);
      border-radius:16px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .row{display:flex;gap:10px;align-items:center}

    .bar{
      height:6px;
      background:var(--bar);
      border-radius:999px;
      overflow:hidden;
    }

    .bar > i{
      display:block;
      height:100%;
      width:0;
      background:var(--accent);
      transition:width 50ms linear;
    }

    .badge{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      color:#334155;
      font-size:12px;
    }

    .muted{color:var(--muted)}

    .btn{
      appearance:none;
      border:1px solid #cbd5e1;
      background:#ffffff;
      color:#111827;
      border-radius:10px;
      padding:8px 12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(15,23,42,.08);
    }

    .btn:hover{background:#f8fafc}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    video{
      width:100%;
      max-height:320px;
      background:#ffffff;
      border-radius:12px;
      box-shadow:0 10px 28px rgba(15,23,42,.10);
      border:0;
    }

    audio{width:100%}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .log{
      font-family:ui-monospace,Menlo,Consolas,monospace;
      font-size:12px;
      color:#6b7280;
      white-space:pre-wrap;
      max-height:260px;
      overflow:auto;
      background:#f8fafc;
      border-radius:12px;
      padding:8px;
      border:1px solid #e5e7eb;
    }

    .ghost{opacity:.72}

    .debugOnly{display:none}
    body.debug-ui .debugOnly{display:block}

    body.audio-only #cameraLabel,
    body.audio-only #localVideo{
      display:none;
    }

    body.audio-only .wrap{
      grid-template-columns:1fr;
    }

    body.audio-only .grid2{
      grid-template-columns:1fr;
    }

    @media (max-width:900px){
      .wrap{grid-template-columns:1fr}
      .grid2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <div id="status" class="badge">Initialisierung…</div>
          <div id="audioBadge" class="badge" style="margin-left:6px">Audio wird vorbereitet</div>
        </div>
        <div class="row">
          <button id="btnStop" class="btn">Interview beenden</button>
        </div>
      </div>

      <div class="grid2" style="margin-top:12px">
        <div>
          <div id="cameraLabel" class="muted" style="margin-bottom:6px">Kamera-Vorschau</div>
          <video id="localVideo" autoplay playsinline muted></video>
          <div id="micLabel" class="muted" style="margin:8px 0 4px">Mikrofon</div>
          <div class="bar"><i id="micLevel"></i></div>
        </div>
        <div>
          <div id="assistantAudioLabel" class="muted" style="margin-bottom:6px">Interview-Audio</div>
          <audio id="remoteAudio" controls></audio>
          <div id="systemLabel" class="muted" style="margin:8px 0 4px">System</div>
          <div class="bar"><i id="sysLevel"></i></div>
          <div id="autoplayHint" class="muted" style="margin-top:10px">Falls kein Ton zu hören ist, klicken Sie einmal in den Player.</div>
        </div>
      </div>
    </section>

    <aside class="card debugOnly" id="debugPanel">
      <div id="recorderTitle" style="font-weight:600;margin-bottom:8px">Recorder / Upload</div>
      <div class="row">
        <div class="badge ghost" id="recState">idle</div>
        <div class="badge ghost" id="muxState" style="margin-left:6px">no upload</div>
      </div>
      <div id="progressLabel" class="muted" style="margin:8px 0 4px">Fortschritt</div>
      <div class="bar"><i id="recProgress"></i></div>
      <div id="logsLabel" class="muted" style="margin:10px 0 4px">Logs</div>
      <div id="log" class="log"></div>
    </aside>
  </div>

    const s = String(v ?? '').trim().toLowerCase();

    const uid = String(ctx.uid || ctx.linkId || UID || '').toUpperCase();

  function effectiveRealtimeVoice(ctx = {}){
    // Explicit test override only for the two production voices we validated.
    if (REQUESTED_VOICE === 'marin' || REQUESTED_VOICE === 'cedar') return REQUESTED_VOICE;
    return looksAssessmentContext(ctx) ? 'marin' : 'cedar';

  // Critical diagnostics are still posted to the Wix page so real audio/RTC failures remain visible.
  const DEBUG_LOGS = Q.get('debug') === '1' || Q.get('debugLive') === '1' || Q.get('debuglive') === '1' || DEBUG_UI;

  function firstNonEmpty(...values){
    for (const value of values) {
      const s = String(value || '').trim();
      if (s) return s;
    }
    return '';
  }

  function getInterviewLangRaw(ctx = {}){
    return firstNonEmpty(
      ctx.userCommLang,
      ctx.interviewLang,
      ctx.interviewLanguage,
      ctx.userLanguage,
      ctx.userLang,
      ctx.spokenLang,
      ctx.language,
      ctx.lang,
      LANG
    );
  }

  function getReportLangRaw(ctx = {}){
    return firstNonEmpty(
      ctx.reportLang,
      ctx.reportLanguage,
      ctx.pdfLang,
      ctx.pdfLanguage,
      ctx.outputLang,
      ctx.outputLanguage,
      LANG
    );
  }

  function normalizeLangToken(raw){
    return String(raw || '')
      .trim()
      .toLowerCase()
      .replace(/[._]/g, '-')
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, ' ');
  }

  function langKey(raw){
    const original = String(raw || LANG || 'en').trim();
    if (!original) return 'en';

    const lowerOriginal = original.toLowerCase();
    if (LANG_PROFILES[lowerOriginal]) return lowerOriginal;

    const normalized = normalizeLangToken(original);
    const firstPart = normalized.split(/[-\s/]+/).filter(Boolean)[0] || normalized;

    if (LANG_PROFILES[firstPart]) return firstPart;
    if (LANG_ALIASES[normalized]) return LANG_ALIASES[normalized];
    if (LANG_ALIASES[firstPart]) return LANG_ALIASES[firstPart];

    for (const key of Object.keys(LANG_ALIASES)) {
      if (normalized.includes(key)) return LANG_ALIASES[key];
    }

    return 'en';
  }

  function activeInterviewLang(ctx = CTX){
    return langKey(getInterviewLangRaw(ctx || {}));
  }

  function activeReportLang(ctx = CTX){
    return langKey(getReportLangRaw(ctx || {}));
  }

  function langProfile(code){
    return LANG_PROFILES[code] || LANG_PROFILES.en;
  }

  function normalizeIncomingContext(data = {}){
    const incoming = data || {};
    const merged = { ...CTX, ...incoming };

    // Wichtig: Die Interview-Sprache kommt je nach Seite/DB unter verschiedenen Feldnamen.
    // Für die Live-KI wird sie zentral als CTX.lang normalisiert.
    merged.lang = activeInterviewLang(merged);
    merged.reportLang = activeReportLang(merged);

    return merged;
  }


  // v3.10.2 VIDEO_START_RESTORE
  // Parent/Page-Kontext kann historisch Werte wie "live-video", "video_chat",
  // "mixMode" usw. liefern. Der Realtime-Token-Endpoint braucht aber einen
  // stabilen technischen Medienmodus. Ohne diese Normalisierung können Video-Links
  // vor dem RTC-Aufbau mit token_error abbrechen, obwohl Audio funktioniert.
  function canonicalRealtimeMediaMode(ctx = CTX){
    const raw = String(
      ctx?.mediaMode ||
      ctx?.recordingMode ||
      ctx?.interviewMode ||
      ctx?.assessmentMode ||
      ctx?.mode ||
      MODE_RAW ||
      ''
    ).trim().toLowerCase().replace(/_/g, '-');

    if (AUDIO_ONLY || raw === 'audio' || raw === 'audio-only' || raw === 'audioonly' || raw === 'audio-chat') {
      return 'audio';
    }

    if (
      !raw ||
      raw === 'video' ||
      raw === 'live-video' ||
      raw === 'video-only' ||
      raw === 'videoonly' ||
      raw === 'video-chat' ||
      raw === 'mix' ||
      raw === 'mixmode' ||
      raw === 'hybrid'
    ) {
      return 'video';
    }

    if (raw.includes('audio') && !raw.includes('video')) return 'audio';
    if (raw.includes('video') || raw.includes('mix') || raw.includes('hybrid')) return 'video';

    return AUDIO_ONLY ? 'audio' : 'video';
  }

  function classifyStartError(message){
    const m = String(message || '').toLowerCase();
    if (m.includes('token_http') || m.includes('token_error') || m.includes('client_secret')) return 'token_error';
    if (m.includes('remote_track_timeout')) return 'rtc_start_timeout';
    if (m.includes('realtime_handshake')) return 'realtime_handshake_error';
    if (m.includes('permission') || m.includes('notallowed') || m.includes('notreadable') || m.includes('device')) return 'media_permission_error';
    if (m.includes('rtc') || m.includes('ice')) return 'rtc_error';
    return 'start_error';
  }

  function withStartTimeout(promise, ms, label){
    let timer = null;
    return Promise.race([
      promise,
      new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(label || 'start_timeout')), Math.max(1000, Number(ms) || 20000));
      })
    ]).finally(() => {
      try { if (timer) clearTimeout(timer); } catch(_) {}
    });
  }

  function isImportantLogText(s){
    const t = String(s || '');
    // Production-critical only. Do NOT treat benign words such as "token", "muxError" keys,
    // or normal audio_diag markers as important, because they create high-frequency Wix log traffic.
    return /\b(error|failed|failure|timeout|denied|blocked|disconnect|disconnected|ice failed|rtc failed|mux error|autoplay blocked|audio-stall|audio stalled|audio_wait|client_secret_missing)\b/i.test(t)
      || /\[(ERR|ERROR|WARN|RTC-DIAG)\]/i.test(t);
  }

  function canPostParentLog(s, important){
    if (important) return true;
    if (!DEBUG_LOGS) return false;

    const now = Date.now();
    if (now - __logParentWindowStart > LOG_PARENT_WINDOW_MS) {
      __logParentWindowStart = now;
      __logParentWindowCount = 0;
    }
    if (__logParentWindowCount >= LOG_PARENT_MAX_PER_WINDOW) return false;
    if (s === __lastParentLogText && now - __lastParentLogAt < 5000) return false;
    if (now - __lastParentLogAt < LOG_PARENT_MIN_MS) return false;

    __logParentWindowCount += 1;
    __lastParentLogAt = now;
    __lastParentLogText = s;
    return true;
  }

  function isImportantAudioDiagCode(code){
    return /unstable|wait|failed|failure|stall|blocked|interrupted|ended_unexpected|playback_error/i.test(String(code || ''));
  }

  function postAudioDiag(code, data = {}){
    // In production only send audio diagnostics that actually indicate a problem.
    // Normal events like response_audio_done or remote_audio_started stay local unless ?debug=1.
    if (!DEBUG_LOGS && !isImportantAudioDiagCode(code)) return;

    try {
      parent?.postMessage?.({
        type: 'clarity.live.audio_diag',
        data: {
          code,
          ts: new Date().toISOString(),
          uid: UID || CTX?.uid || CTX?.linkId || '',
          mode: AUDIO_ONLY ? 'audio' : (CTX?.mode || 'video'),
          rtcState: pc?.connectionState || '',
          iceState: pc?.iceConnectionState || '',
          ...data
        }
      }, '*');
    } catch(_) {}
  }

  function wireRemoteAudioDiagnostics(){
    try {
      if (!$remoteA || $remoteA.__clarityDiagWired) return;
      $remoteA.__clarityDiagWired = true;

      $remoteA.addEventListener('waiting', () => postAudioDiagThrottled('audio_element_waiting', {
        readyState: $remoteA.readyState,
        networkState: $remoteA.networkState,
        currentTime: $remoteA.currentTime
      }));

      $remoteA.addEventListener('stalled', () => postAudioDiagThrottled('audio_element_stalled', {
        readyState: $remoteA.readyState,
        networkState: $remoteA.networkState,
        currentTime: $remoteA.currentTime
      }));

      $remoteA.addEventListener('error', () => postAudioDiagThrottled('audio_element_playback_error', {
        readyState: $remoteA.readyState,
        networkState: $remoteA.networkState,
        message: String($remoteA.error?.message || $remoteA.error?.code || '')
      }, 1000));
    } catch(_) {}
  }

  wireRemoteAudioDiagnostics();

  function log(...a){
    const s = a.map(x => {
      try { return typeof x === 'object' ? JSON.stringify(x) : String(x); }
      catch(_) { return String(x); }
    }).join(' ');

    const important = isImportantLogText(s);

    if (DEBUG_LOGS || important) {
      try {
        (important ? console.warn : console.log)(...a);
      } catch(_) {}
    }

    if (DEBUG_UI && $log) {
      $log.textContent += s + "\n";
      $log.scrollTop = $log.scrollHeight;
    }

    if (canPostParentLog(s, important)) {
      try {
        parent?.postMessage?.({ type:'clarity.live.log', data:s }, '*');
      } catch(_) {}
    }
  }

  /* ===== Avatar Bridge v1.0 — live.html -> Wix parent -> avatar iframe =====
     Sends real live audio energy and interaction state to the Wix parent page.
     The avatar iframe should receive these from the parent as:
       { type:'avatar:set', state:'ai_speaking' | 'user_speaking' | ... }
       { type:'avatar:level', source:'ai'|'user'|'system', value:0..1 }
     Important: The avatar itself does not access microphone/camera. */
  const AVATAR_LEVEL_MIN_INTERVAL_MS = 80;
  let __avatarState = '';
  let __lastAvatarStateAt = 0;
  let __lastAvatarLevelAt = { ai: 0, user: 0, system: 0 };
  let __lastAvatarLevelValue = { ai: -1, user: -1, system: -1 };
  let __aiSpeakingUntil = 0;
  let __userSpeakingUntil = 0;

  function clamp01(v){
    return Math.max(0, Math.min(1, Number(v) || 0));
  }

  function normalizeAvatarAudioDev(dev){
    const raw = Math.max(0, Number(dev) || 0);
    return clamp01((raw - 2) / 34);
  }

  function avatarBridgePost(type, data){
    try { postToParent(type, data || {}); } catch(_) {}
  }

  function avatarSet(state, reason){
    const now = Date.now();
    const st = String(state || 'idle').trim() || 'idle';
    if (st === __avatarState && now - __lastAvatarStateAt < 350) return;
    __avatarState = st;
    __lastAvatarStateAt = now;

    // Existing parent bridge can already listen to clarity.avatar for state.
    avatarBridgePost('clarity.avatar', { state: st, reason: reason || '', ts: now });

    // Rich event for level/state forwarding and debugging.
    avatarBridgePost('clarity.avatar.bridge', { action: 'set', state: st, reason: reason || '', ts: now });
  }

  function avatarLevel(source, value, reason){
    const src = String(source || 'system').toLowerCase();
    const v = clamp01(value);
    const now = Date.now();
    const lastAt = __lastAvatarLevelAt[src] || 0;
    const lastVal = __lastAvatarLevelValue[src];

    if (now - lastAt < AVATAR_LEVEL_MIN_INTERVAL_MS && Math.abs(v - lastVal) < 0.08) return;

    __lastAvatarLevelAt[src] = now;
    __lastAvatarLevelValue[src] = v;

    avatarBridgePost('clarity.avatar.level', {
      source: src,
      value: v,
      reason: reason || '',
      ts: now
    });

    avatarBridgePost('clarity.avatar.bridge', {
      action: 'level',
      source: src,
      value: v,
      reason: reason || '',
      ts: now
    });
  }

  function avatarRemoteAudioDev(dev){
    const v = normalizeAvatarAudioDev(dev);
    avatarLevel('ai', v, 'remote_audio_analyser');

    if (v > 0.045) {
      __aiSpeakingUntil = Date.now() + 450;
      avatarSet('ai_speaking', 'remote_audio_level');
    } else if (__avatarState === 'ai_speaking' && Date.now() > __aiSpeakingUntil) {
      avatarSet(END_CALLED || FINAL_HANGUP_TIMER ? 'processing' : 'listening', 'remote_audio_silence');
    }
  }

  function avatarLocalAudioDev(dev){
    const v = normalizeAvatarAudioDev(dev);
    avatarLevel('user', v, 'mic_audio_analyser');

    // Avoid assistant playback/echo flipping the avatar to user_speaking.
    if (v > 0.075 && Date.now() > __aiSpeakingUntil) {
      __userSpeakingUntil = Date.now() + 550;
      avatarSet('user_speaking', 'mic_audio_level');

  function buildSlotQuestionPlan(ctx = CTX){
    if (!isInterviewLiveContext(ctx)) return { questions: [], customerCount: 0, source: 'not_interview' };

    const target = interviewMainQuestionTarget(ctx);
    const customer = selectedCustomerQuestionLines(ctx).slice(0, target);
    const seeds = [];
    const seen = new Set();
    const add = (q) => {
      const clean = String(q || '').replace(/\s+/g, ' ').trim();
      if (!clean) return;
      const key = normalizeForMatch(clean);
      if (!key || seen.has(key)) return;
      seen.add(key);
      seeds.push(clean);
    };

    customer.forEach(add);

    // Only fill missing slots. Customer questions always keep priority and order.
    if (seeds.length < target) {
      const lk = activeInterviewLang(ctx);
      const profile = langProfile(lk);
      const base = (profile.baseQuestions || LANG_PROFILES.en.baseQuestions || []).slice();
      base.forEach(add);
    }

    if (seeds.length < target) {
      const prefix = (langProfile(activeInterviewLang(ctx)).jobPrefix || LANG_PROFILES.en.jobPrefix || 'Role context: ');
      const text = [ctx?.roleProfileText, ctx?.docsText, ctx?.jobAd].map(v => String(v || '').trim()).filter(Boolean).join('\n');

        .map(line => line.trim())
        .filter(Boolean)
        .filter(line => !/^\d{1,2}[.)]\s*/.test(line))
        .forEach(line => add(prefix + line));
    }

    while (seeds.length < target) {
      const no = seeds.length + 1;
      const lk = activeInterviewLang(ctx);

        ? 'Welche konkrete Erfahrung oder welches Beispiel ist für diese Rolle besonders relevant?'

    return {
      questions: seeds.slice(0, target),
      customerCount: customer.length,
      source: customer.length ? 'customer_snapshot_first' : 'ai_or_context_fill'
    };
  }

  function refreshStructuredQuestionPlan(ctx = CTX, reason = 'refresh'){
    const plan = buildSlotQuestionPlan(ctx);

    structuredQuestionPlanSignatures = structuredQuestionPlan.map((q, i) => ({
      number: i + 1,
      text: q,
      normalized: normalizeForMatch(q),
      tokens: matchTokens(q),
      isCustomer: i < structuredCustomerQuestionCount

      customerQuestions: structuredCustomerQuestionCount,
      source: structuredQuestionPlanSource,
      first: structuredQuestionPlan[0] || '',
      last: structuredQuestionPlan[structuredQuestionPlan.length - 1] || ''

  function currentStructuredQuestionPlan(ctx = CTX){

  function matchTokens(value){
    const n = normalizeForMatch(value);
    return n.split(/\s+/).map(t => t.trim()).filter(t => t.length >= 4 && !['welche','welchen','welcher','would','could','sollten','bitte','please','danke','thank','frage','question'].includes(t));

  function plannedMainQuestionMatch(text, ctx = CTX){
    if (!isInterviewLiveContext(ctx)) return null;
    const plan = currentStructuredQuestionPlan(ctx);
    if (!plan.length || !structuredQuestionPlanSignatures.length) return null;

    const raw = String(text || '').trim();
    const normalized = normalizeForMatch(raw);
    if (!normalized || !textHasQuestion(raw)) return null;

    const current = structuredCurrentQuestionIndex || 0;
    const nextExpected = Math.min(interviewMainQuestionTarget(ctx), current + 1);
    const future = structuredQuestionPlanSignatures.filter(p => p.number > current);

    let best = null;
    for (const p of future) {
      if (!p.normalized || p.normalized.length < 16) continue;
      let score = 0;
      let reason = '';
      if (normalized.includes(p.normalized)) {
        score = 1;
        reason = 'snapshot_substring';
      } else {
        const tokens = p.tokens || [];
        if (tokens.length) {
          const hits = tokens.filter(tok => normalized.includes(tok)).length;
          const ratio = hits / tokens.length;
          if (hits >= 5 && ratio >= 0.68) {
            score = ratio;
            reason = 'token_overlap';
          }
        }
      }
      if (score > 0 && (!best || score > best.score || (score === best.score && Math.abs(p.number - nextExpected) < Math.abs(best.number - nextExpected)))) {
        best = { ...p, score, reason, isNext: p.number === nextExpected, isFuture: p.number > nextExpected };
      }
    }
    if (!best) return null;
    if (!best.isCustomer && best.score < 0.92) return null;
    return best;
  }


  function shouldEnforceStrictPlannedMainOnly(ctx = CTX){
    // Strict mode is only for real customer/snapshot questions.
    // Pure AI-generated Q10 interviews stay flexible, because the model may phrase role questions

    // then flexible for AI-filled remaining slots.
    if (!isInterviewLiveContext(ctx)) return false;
    const target = interviewMainQuestionTarget(ctx);
    const customerCount = Math.max(0, Math.min(target, Number(structuredCustomerQuestionCount || 0)));
    if (!customerCount) return false;
    return (structuredCurrentQuestionIndex || 0) < customerCount;

  function textHasQuestion(text){

  function textAfterTransitionColon(text){
    const raw = String(text || '').trim();
    const parts = raw.split(/[:：]/);
    if (parts.length < 2) return '';
    return parts.slice(1).join(':').trim();
  }

  function looksLikeExplicitNextMainQuestion(text){
    const raw = String(text || '').trim();
    const n = normalizeForMatch(raw);
    if (!n) return false;

    const transitionSignals = [
      'nachste frage', 'naechste frage', 'nächste frage', 'zweite frage', 'dritte frage', 'vierte frage', 'funfte frage', 'fünfte frage', 'sechste frage', 'siebte frage', 'achte frage', 'neunte frage', 'zehnte frage', 'letzte frage',
      'gehen wir weiter', 'gehen wir zur', 'kommen wir zur', 'machen wir weiter', 'nachstes thema', 'naechstes thema', 'nächstes thema',
      'next question', 'second question', 'third question', 'fourth question', 'fifth question', 'sixth question', 'seventh question', 'eighth question', 'ninth question', 'tenth question', 'last question', 'next topic', 'move on to',
      'siguiente pregunta', 'ultima pregunta', 'última pregunta', 'proxima pregunta', 'próxima pregunta',
      'question suivante', 'derniere question', 'dernière question',
      'prossima domanda', 'ultima domanda'
    ];

    const normalizedSignals = transitionSignals.map(normalizeForMatch).filter(Boolean);
    const transitionPos = normalizedSignals
      .map(sig => ({ sig, idx: n.indexOf(sig) }))
      .filter(x => x.idx >= 0)
      .sort((a, b) => a.idx - b.idx)[0];

    if (!transitionPos) return false;

    const afterColon = textAfterTransitionColon(raw);
    const afterColonN = normalizeForMatch(afterColon);

    // Classic pattern: "... next question: What ...?". Keep this as a new main question.
    if (afterColonN) {
      const addOnlySignals = ['add anything', 'anything else', 'etwas erganzen', 'etwas ergänzen', 'hinzufugen', 'hinzufügen', 'ajouter', 'anadir', 'añadir', 'aggiungere'];
      const isAddOnly = addOnlySignals.some(m => afterColonN.includes(normalizeForMatch(m))) && afterColonN.length < 140;
      return !isAddOnly && (afterColon.length >= 18 || textHasQuestion(afterColon));
    }

    // Natural speech often has no colon, e.g. "Dann gehen wir weiter zur nächsten Frage:"
    // can be transcribed as "Dann gehen wir weiter zur nächsten Frage wie priorisieren Sie ...".
    // In that case, detect a substantive question starter after the transition phrase.
    const afterTransition = n.slice(transitionPos.idx + transitionPos.sig.length).trim();
    const substantiveStarters = [
      'was ', 'wie ', 'welche ', 'welchen ', 'welcher ', 'warum ', 'womit ', 'konnen sie ', 'koennen sie ', 'konntest du ', 'kannst du ', 'beschreiben sie ', 'beschreibe ', 'gibt es ', 'haben sie ',
      'what ', 'how ', 'which ', 'why ', 'can you ', 'could you ', 'describe ', 'tell me ', 'do you ', 'would you ',
      'que ', 'como ', 'cual ', 'cuál ', 'puede ', 'podria ', 'podría ',
      'comment ', 'quel ', 'quelle ', 'pourquoi ', 'pouvez vous ',
      'come ', 'quale ', 'perche ', 'perché ', 'puo ', 'può '
    ].map(normalizeForMatch);

    const hasSubstantiveQuestionAfterTransition = substantiveStarters.some(st => {
      if (!st) return false;
      const idx = afterTransition.indexOf(st);
      return idx >= 0 && idx <= 90;
    });

    if (hasSubstantiveQuestionAfterTransition && afterTransition.length >= 18) return true;

    // Long transition sentences containing a question mark are likely a new main question,
    // while short "shall we continue?" style prompts remain follow-ups.
    if (textHasQuestion(raw) && afterTransition.length >= 45) return true;

    return false;
  }

  function looksLikeReadyWelcome(text){
    const n = normalizeForMatch(text);
    if (!n) return false;
    const readyMarkers = [
      'willkommen', 'welcome', 'bienvenido', 'bienvenue', 'benvenuto',
      'are you ready', 'sind sie bereit', 'bist du bereit', 'êtes vous prêt', 'etes vous pret',
      'esta listo', 'está listo', 'e pronto', 'è pronto', 'ready to begin', 'ready to start'
    ];
    return readyMarkers.some(m => n.includes(normalizeForMatch(m))) && (n.includes('ready') || n.includes('bereit') || n.includes('listo') || n.includes('prêt') || n.includes('pret') || n.includes('pronto') || n.includes('start'));
  }

  function looksLikeFollowUpQuestion(text){

    if (looksLikeExplicitNextMainQuestion(text)) return false;

    const markers = [
      'would you like to add', 'would you like to add anything', 'do you want to add', 'anything to add', 'anything else', 'is that complete',
      'shall we continue', 'should we continue', 'ready for the next question', 'move on to the next question', 'continue to the next question', 'continue with the next question',
      'before we continue', 'before moving on', 'shall i move on', 'can i move on', 'may i continue', 'may we finish', 'can we finish',

      'mochten sie noch etwas erganzen', 'moechten sie noch etwas ergaenzen', 'möchten sie noch etwas ergänzen',
      'mochten sie dazu noch etwas erganzen', 'moechten sie dazu noch etwas ergaenzen', 'möchten sie dazu noch etwas ergänzen',
      'noch etwas erganzen', 'noch etwas ergänzen', 'etwas hinzufugen', 'etwas hinzufügen', 'noch etwas hinzufugen', 'noch etwas hinzufügen',
      'gibt es noch etwas', 'gibt es dazu noch etwas', 'haben sie noch etwas', 'mochten sie noch etwas hinzufugen', 'möchten sie noch etwas hinzufügen',

      'zur nachsten frage', 'zur nächsten frage', 'zur letzten frage', 'bereit fur die nachste frage', 'bereit für die nächste frage',
      'durfen wir abschliessen', 'dürfen wir abschließen', 'konnen wir abschliessen', 'können wir abschließen', 'interview hier abschliessen', 'interview hier abschließen',

      'voulez vous ajouter', 'souhaitez vous ajouter', 'autre chose a ajouter', 'passer a la question suivante', 'passer à la question suivante',

    ];

    if (markers.some(m => n.includes(normalizeForMatch(m)))) return true;

    // German/Spanish/French/etc. phrases can vary strongly after translation/transcription.
    // If the sentence combines an "add something" signal with a continuation/finish signal, it is a follow-up.
    const addSignals = [
      'add', 'anything else',
      'erganz', 'ergänz', 'hinzufug', 'hinzufüg',
      'ajouter', 'anadir', 'añadir', 'aggiungere'
    ];
    const continueSignals = [

      'question suivante', 'derniere question', 'dernière question', 'terminer',
      'prossima domanda', 'ultima domanda', 'concludere'
    ];
    if (addSignals.some(w => n.includes(normalizeForMatch(w))) && continueSignals.some(w => n.includes(normalizeForMatch(w)))) {
      return true;
    }

    // Conservative fallback: while the model is expected to ask the one follow-up after a main question,
    // a short assistant question that only offers continuation is treated as follow-up.
    if (structuredAwaitingFollowUpQuestion && textHasQuestion(text) && n.length < 220) {
      const continuationWords = ['add', 'erganzen', 'ergänzen', 'hinzufugen', 'hinzufügen', 'continue', 'fortfahren', 'next', 'nachste', 'nächste', 'letzte', 'abschliessen', 'abschließen', 'autre', 'ajouter', 'anadir', 'añadir', 'aggiungere', 'prossima'];
      return continuationWords.some(w => n.includes(normalizeForMatch(w)));

    return false;
  }

  function shouldForceInterviewFollowUpBySequence(text){
    if (!isInterviewLiveContext(CTX)) return false;
    if (!textHasQuestion(text)) return false;
    const q = structuredCurrentQuestionIndex || 0;
    if (q <= 0) return false;
    if (structuredLastAssistantTurnType !== 'main_question') return false;
    if (structuredFollowUpAskedForQuestion[q]) return false;

    const n = normalizeForMatch(text);
    if (!n) return false;
    if (finalClosingDetected(text)) return false;
    if (looksLikeReadyWelcome(text)) return false;

    const plannedMain = plannedMainQuestionMatch(text, CTX);
    if (plannedMain && plannedMain.number > structuredCurrentQuestionIndex) {
      log('[SLOT] planned main beats sequence follow-up', {
        currentQuestion: structuredCurrentQuestionIndex,
        plannedNumber: plannedMain.number,
        reason: plannedMain.reason,
        isCustomer: plannedMain.isCustomer,
        textPreview: String(text || '').slice(0, 140)
      });
      return false;
    }

    if (looksLikeExplicitNextMainQuestion(text)) return false;

    // v3.11.2: Deterministic slot plan sequence restored.
    // The product rule is: main question -> candidate answer -> exactly one follow-up/deepening question
    // -> candidate addition -> next main question. Therefore the first assistant question after a main
    // answer is the follow-up slot unless the model explicitly announces a next main question.
    // This prevents natural follow-ups like "Könnten Sie noch ein Beispiel nennen?" or
    // "Gibt es noch eine Kennzahl...?" from consuming the Q10/Q20/Q30 main-question count.
    if (structuredAwaitingFollowUpQuestion) {
      log('[QCOUNT] sequence-forced follow-up question', {
        currentQuestion: q,
        targetQuestions: interviewMainQuestionTarget(CTX),
        textPreview: String(text || '').slice(0, 140)
      });
      return true;
    }

    // Fallback for cases where the candidate-answer event was observed but the awaiting flag
    // was not set because GA Realtime omitted the completed transcription event.
    const followUpSignals = [
      'add anything', 'anything else', 'can you elaborate', 'could you elaborate', 'can you clarify', 'could you clarify',
      'give an example', 'specific example', 'tell me more', 'what exactly', 'how exactly', 'what was your role',
      'noch etwas', 'erganzen', 'ergänzen', 'hinzufugen', 'hinzufügen', 'beispiel', 'kennzahl', 'genauer erläutern', 'genauer erlautern',
      'können sie das näher', 'koennen sie das naeher', 'was genau', 'wie genau', 'welche rolle hatten sie',
      'ajouter', 'un exemple', 'preciser', 'préciser', 'plus de details', 'plus de détails',
      'anadir', 'añadir', 'un ejemplo', 'puede precisar', 'mas detalles', 'más detalles',
      'aggiungere', 'un esempio', 'può chiarire', 'puo chiarire', 'piu dettagli', 'più dettagli'
    ];
    return followUpSignals.some(w => n.includes(normalizeForMatch(w)));
  }
  function isInterviewLiveContext(ctx = CTX){
    return !looksAssessmentContext(ctx) && !(typeof isAssessmentContext === 'function' && isAssessmentContext(ctx));
  }

  function liveInterviewDriverMode(ctx = CTX){
    if (!isInterviewLiveContext(ctx)) return 'assessment';
    if (isInterviewHybrid(ctx)) return 'mix';
    if (AUDIO_ONLY || String(ctx?.mode || '').toLowerCase() === 'audio') return 'audio';
    return 'video';
  }

  function isVideoOnlyInterview(ctx = CTX){
    return liveInterviewDriverMode(ctx) === 'video';
  }

  function isAudioOnlyInterview(ctx = CTX){
    return liveInterviewDriverMode(ctx) === 'audio';
  }

  function isMixInterview(ctx = CTX){
    return liveInterviewDriverMode(ctx) === 'mix';
  }

  function controlledInterviewDriverEnabled(ctx = CTX){
    if (!isInterviewLiveContext(ctx)) return false;
    if (isInterviewHybrid(ctx)) return false;
    if (isAssessmentContext(ctx) || looksAssessmentContext(ctx)) return false;
    const raw = String(ctx?.controlledInterviewDriver ?? ctx?.appControlledInterview ?? 'true').trim().toLowerCase();
    return !['0','false','no','off','disabled'].includes(raw);
  }

  function controlledDriverLabel(ctx = CTX){
    if (!controlledInterviewDriverEnabled(ctx)) return 'legacy';
    return isAudioOnlyInterview(ctx) ? 'controlled_audio' : 'controlled_video';
  }

  function controlledInterviewFollowUpAllowed(questionIndex, target = interviewMainQuestionTarget(CTX)){
    if (!controlledInterviewDriverEnabled(CTX) && !isVideoOnlyInterview(CTX)) return true;
    const q = Math.max(0, Number(questionIndex || 0));
    const t = Math.max(1, Number(target || 1));
    if (!q || q >= t) return false;
    // v4.0.3: last three slots in Q10-style interviews must be protected for completion.
    // Q1-Q7 may still get one natural follow-up; Q8-Q10 prioritize finishing the plan.
    return q < Math.max(1, t - 2);
  }

  function controlledInterviewLatePhase(questionIndex, target = interviewMainQuestionTarget(CTX)){
    const q = Math.max(0, Number(questionIndex || 0));
    const t = Math.max(1, Number(target || 1));
    return q >= Math.max(1, t - 2);
  }

  function controlledFinalCloseWatchdogMs(){
    if (controlledInterviewDriverEnabled(CTX) && isInterviewLiveContext(CTX) && !isInterviewHybrid(CTX) && !isAssessmentVoiceLive(CTX)) {
      return CONTROLLED_FINAL_CLOSE_WATCHDOG_MS;
    }
    return HARD_END_WATCHDOG_MS;
  }

  function interviewMainQuestionTarget(ctx = CTX){
    return Math.max(1, Math.min(30, interviewMaxQuestions(ctx)));
  }

  function hybridDefaultOralTarget(total){
    const n = Math.max(1, Number(total) || 1);
    // v3.11.8: Fixed Mix split. For Q10 this must be Q1-Q7 spoken and Q8-Q10 chat.
    // For Q20/Q30 it scales to about 70% spoken, 30% written.
    return Math.max(1, Math.min(n, Math.ceil(n * 0.7)));
  }

  function interviewLiveQuestionTarget(ctx = CTX){
    const total = interviewMainQuestionTarget(ctx);
    if (!isInterviewLiveContext(ctx)) return total;
    if (!isInterviewHybrid(ctx)) return total;

    const defaultOralTarget = hybridDefaultOralTarget(total);

    const explicitSpoken = Number(
      ctx?.spokenQuestionCount ||
      ctx?.mediaQuestionCount ||
      ctx?.oralQuestionCount ||
      ctx?.voiceQuestionCount ||
      ctx?.videoQuestionCount ||
      0
    );
    if (Number.isFinite(explicitSpoken) && explicitSpoken > 0) {
      const rounded = Math.max(1, Math.min(total, Math.round(explicitSpoken)));
      // v3.11.8: A too-low page/media value caused Mix to hand off after Q4 while the
      // chat correctly started at Q8, leaving Q5-Q7 empty. Keep the spoken target locked
      // to at least the product split unless the page explicitly sends a higher target.
      if (rounded < defaultOralTarget) {
        log('[MIX] explicit spoken target below product oral target; locking to default oral split', {
          explicitSpoken: rounded,
          defaultOralTarget,
          totalQuestions: total,
          mode: ctx?.mode || '',
          mediaQuestionCount: ctx?.mediaQuestionCount || '',
          chatQuestionCount: ctx?.chatQuestionCount || ''
        });
        return defaultOralTarget;
      }
      return rounded;
    }

    const chatQ = Number(
      ctx?.chatQuestionCount ||
      ctx?.writtenQuestionCount ||
      ctx?.textQuestionCount ||
      ctx?.chatQuestionsCount ||
      0
    );
    if (Number.isFinite(chatQ) && chatQ > 0 && chatQ < total) {
      const fromChatRemainder = Math.max(1, Math.min(total, total - Math.round(chatQ)));
      if (fromChatRemainder < defaultOralTarget) {
        log('[MIX] chat remainder below product oral target; locking to default oral split', {
          fromChatRemainder,
          defaultOralTarget,
          totalQuestions: total,
          chatQuestionCount: chatQ
        });
        return defaultOralTarget;
      }
      return fromChatRemainder;
    }

    // Default Mix policy: about 70% spoken, remaining slots in chat.
    return defaultOralTarget;
  }


  function assessmentModeName(ctx = CTX){
    return String(ctx?.assessmentMode || ctx?.mode || (AUDIO_ONLY ? 'audio' : 'video')).toLowerCase().replace(/[+\s-]+/g, '_');
  }

  function isAssessmentHybridLive(ctx = CTX){
    if (!isAssessmentContext(ctx)) return false;
    const m = assessmentModeName(ctx);
    return m === 'audio_chat' || m === 'video_chat' || m === 'mix' || m === 'mixmode' || m === 'hybrid';
  }

  function isAssessmentVoiceLive(ctx = CTX){
    if (!isAssessmentContext(ctx)) return false;
    return assessmentModeName(ctx) !== 'chat';
  }

  function assessmentLiveQuestionTarget(ctx = CTX){
    const total = interviewMainQuestionTarget(ctx);
    if (!isAssessmentVoiceLive(ctx)) return total;
    if (!isAssessmentHybridLive(ctx)) return total;

    const defaultOralTarget = hybridDefaultOralTarget(total);
    const explicitSpoken = Number(
      ctx?.spokenQuestionCount ||
      ctx?.mediaQuestionCount ||
      ctx?.oralQuestionCount ||
      ctx?.voiceQuestionCount ||
      ctx?.videoQuestionCount ||
      0
    );
    if (Number.isFinite(explicitSpoken) && explicitSpoken > 0) {
      return Math.max(1, Math.min(total, Math.round(explicitSpoken)));
    }

    const chatQ = Number(
      ctx?.chatQuestionCount ||
      ctx?.writtenQuestionCount ||
      ctx?.textQuestionCount ||
      ctx?.chatQuestionsCount ||
      0
    );
    if (Number.isFinite(chatQ) && chatQ > 0 && chatQ < total) {
      return Math.max(1, Math.min(total, total - Math.round(chatQ)));
    }

    return defaultOralTarget;
  }

  function nearCompleteVideoOnlyByRuntime(ctx = CTX){
    if (!STARTED || !interviewStartedAt) return false;
    if (!isInterviewLiveContext(ctx) || isInterviewHybrid(ctx) || AUDIO_ONLY) return false;
    const target = interviewLiveQuestionTarget(ctx);
    const elapsedMs = Date.now() - interviewStartedAt;
    const answerCount = effectiveCandidateResponseCount();
    const q = structuredCurrentQuestionIndex || 0;
    const enoughSlotProgress = q >= Math.max(1, target - 3);
    const enoughAnswerProgress = answerCount >= Math.max(4, target - 4);
    const longEnough = elapsedMs >= Math.max(420000, target * 42000);
    return enoughSlotProgress && enoughAnswerProgress && longEnough;
  }

  function interviewMainQuestionsComplete(ctx = CTX){
    if (!isInterviewLiveContext(ctx)) return true;
    return structuredCurrentQuestionIndex >= interviewLiveQuestionTarget(ctx);
  }

  function shouldBlockEarlyInterviewClosing(){
    if (!isInterviewLiveContext(CTX)) return false;
    // v3.11.5: Video+Chat / Mix must also complete the spoken media target before
    // any handoff or final processing may be accepted. The parent page sends
    // maxQuestions as the media-question count for hybrid modes.
    return !interviewMainQuestionsComplete(CTX);
  }

  function requestMissingInterviewQuestion(source){
    if (!dcSend) return;
    if (structuredEarlyClosingContinueRequests > 8) {
      log('[QLOCK] early closing blocked but retry limit reached; keeping session open for manual recovery', {
        source: source || '',
        current: structuredCurrentQuestionIndex,
        target: interviewMainQuestionTarget(CTX),
        attempts: structuredEarlyClosingContinueRequests,
        mode: CTX?.mode || '',
        hybrid: isInterviewHybrid(CTX),
        audioOnly: AUDIO_ONLY
      });
      setStatus('warn', t('fallbackEnd'));
      postToParent('clarity.live.early_end_blocked', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        current: structuredCurrentQuestionIndex,
        target: interviewMainQuestionTarget(CTX),
        attempts: structuredEarlyClosingContinueRequests,
        ts: new Date().toISOString()
      });
      return;
    }
    structuredEarlyClosingContinueRequests += 1;

    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);
    const target = interviewLiveQuestionTarget(CTX);
    const nextNo = Math.min(target, structuredCurrentQuestionIndex + 1);

    const plan = currentStructuredQuestionPlan(CTX);
    const plannedQuestion = String(plan[nextNo - 1] || '').trim();
    const instruction = lk === 'de'
      ? (plannedQuestion
        ? `Bitte stelle jetzt direkt exakt diese nächste Hauptfrage aus dem Interviewplan. Sage nur die Frage selbst. Erwähne nicht, dass Fragen fehlen, entschuldige dich nicht und wiederhole nicht den Abschlusssatz. Nach der Antwort darfst du genau eine kurze, natürlich formulierte Ergänzungs- oder Vertiefungsfrage stellen: ${plannedQuestion}`
        : `Bitte stelle jetzt direkt die nächste rollenbezogene Hauptfrage. Sage nur die Frage selbst. Erwähne nicht, dass Fragen fehlen, entschuldige dich nicht und wiederhole nicht den Abschlusssatz. Nach der Antwort darfst du genau eine kurze, natürlich formulierte Ergänzungs- oder Vertiefungsfrage stellen.`)
      : (plannedQuestion
        ? `Please now ask exactly this next main question from the interview plan. Say only the question itself. Do not mention that questions are missing, do not apologize, and do not repeat the closing message. After the answer, you may ask exactly one short, naturally phrased follow-up or deepening question: ${plannedQuestion}`
        : `Please now ask the next role-specific main question directly. Say only the question itself. Do not mention that questions are missing, do not apologize, and do not repeat the closing message. After the answer, you may ask exactly one short, naturally phrased follow-up or deepening question.`);

    log('[QLOCK] blocked early closing and requested missing question', {
      source: source || '',
      current: structuredCurrentQuestionIndex,
      target,
      nextNo,
      attempts: structuredEarlyClosingContinueRequests
    });

    // v3.12.0: route through the mode-specific driver. Video-only uses
    // response.instructions; Audio-only/Mix keep the older stable message path.
    createAssistantAudioResponseFromInstruction(instruction, source || 'missing_interview_question');

    try { if (structuredEarlyClosingRecoveryTimer) clearTimeout(structuredEarlyClosingRecoveryTimer); } catch(_) {}
    const requestedQuestionIndex = structuredCurrentQuestionIndex;
    structuredEarlyClosingRecoveryTimer = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      if (!shouldBlockEarlyInterviewClosing()) return;

      // v3.11.5: never convert an early closing recovery timeout into processing.
      // This was the remaining path that could end video/video+chat after only one or a few questions.
      // Instead, request the missing planned question again. If the retry limit is reached, keep the
      // session open and surface a recoverable status rather than creating an incomplete report.
      log('[QLOCK] early closing recovery watchdog -> re-request missing question, no finalization', {
        source: source || '',
        requestedQuestionIndex,
        current: structuredCurrentQuestionIndex,
        target: interviewMainQuestionTarget(CTX),
        attempts: structuredEarlyClosingContinueRequests,
        mode: CTX?.mode || '',
        hybrid: isInterviewHybrid(CTX),
        audioOnly: AUDIO_ONLY
      });
      requestMissingInterviewQuestion('early_closing_recovery_retry');
    }, 16000);
  }

  function inferAssistantStructuredMeta(text){
    const clean = String(text || '').trim();

    if (finalClosingDetected(clean)) {
      const earlyInterviewClosing = shouldBlockEarlyInterviewClosing();
      structuredLastAssistantTurnType = earlyInterviewClosing ? 'system' : 'closing';
      return {
        role: 'assistant',
        turnType: earlyInterviewClosing ? 'system' : 'closing',
        questionIndex: structuredCurrentQuestionIndex || 0,
        subTurnIndex: structuredCurrentSubTurnIndex || 0,
        isMainQuestion: false,
        isFollowUp: false,
        isIncludedInReport: !earlyInterviewClosing && false,
        isTechnical: earlyInterviewClosing
      };
    }

    if (looksLikeReadyWelcome(clean)) {
      structuredLastAssistantTurnType = 'welcome';
      return {
        role: 'assistant',
        turnType: 'welcome',
        questionIndex: 0,
        subTurnIndex: 0,
        isMainQuestion: false,
        isFollowUp: false,
        isIncludedInReport: false
      };
    }

    const plannedMain = plannedMainQuestionMatch(clean, CTX);
    if (plannedMain && plannedMain.number > structuredCurrentQuestionIndex) {
      log('[SLOT] planned main question accepted', { plannedNumber: plannedMain.number, currentBefore: structuredCurrentQuestionIndex, reason: plannedMain.reason, isCustomer: plannedMain.isCustomer, score: plannedMain.score, textPreview: clean.slice(0, 160) });
      return registerAssistantMainQuestionMeta(plannedMain.number, plannedMain);
    }

    const forcedSequenceFollowUp = shouldForceInterviewFollowUpBySequence(clean);
    if (looksLikeFollowUpQuestion(clean) || forcedSequenceFollowUp) {
      const q = structuredCurrentQuestionIndex || 0;

      // Only one report-relevant follow-up per main question. Repeated prompts caused by silence,
      // "please continue" loops, or early-close recovery stay out of the PDF transcript.
      if (q > 0 && structuredFollowUpAskedForQuestion[q]) {
        structuredLastAssistantTurnType = 'system';
        structuredAwaitingFollowUpQuestion = false;
        return {
          role: 'assistant',
          turnType: 'system',
          questionIndex: q,
          subTurnIndex: structuredCurrentSubTurnIndex || 1,
          isMainQuestion: false,
          isFollowUp: false,
          isIncludedInReport: false,
          isTechnical: true
        };
      }

      structuredCurrentSubTurnIndex = Math.max(1, (structuredCurrentSubTurnIndex || 0) + 1);
      structuredLastAssistantTurnType = 'follow_up_question';
      structuredAwaitingFollowUpQuestion = false;
      try { if (SLOT_STALL_TIMER) clearTimeout(SLOT_STALL_TIMER); } catch(_) {}
      SLOT_STALL_TIMER = null;
      if (q > 0) structuredFollowUpAskedForQuestion[q] = true;

      // If this is the allowed follow-up after the final main question, cancel the earlier
      // "no follow-up arrived" close timer. The close timer is then rescheduled after
      // the candidate's follow-up answer, so the system does not hang up mid-answer.
      if (isInterviewLiveContext(CTX) && q >= interviewLiveQuestionTarget(CTX)) {
        try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
        targetAutoFinishTimer = null;
        log('[QCOUNT] final-main follow-up accepted; target close timer deferred until answer', {
          currentQuestion: q,
          targetQuestions: interviewMainQuestionTarget(CTX)
        });
      }

      return {
        role: 'assistant',
        turnType: 'follow_up_question',
        questionIndex: q,
        subTurnIndex: structuredCurrentSubTurnIndex,
        isMainQuestion: false,
        isFollowUp: true,
        isIncludedInReport: q > 0
      };
    }

    if (textHasQuestion(clean)) {
      const target = interviewLiveQuestionTarget(CTX);

      // v3.12.0 Video-only driver: if the assistant asks a question that is neither
      // the next planned main question nor the allowed follow-up, keep it out of
      // the report and immediately steer back to the fixed slot plan. This prevents
      // Q8/Q9 drift into normal GPT chat.
      if ((controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) && structuredCurrentQuestionIndex < target) {
        structuredLastAssistantTurnType = 'system';
        structuredAwaitingFollowUpQuestion = false;
        scheduleVideoOnlyDriver('unplanned_video_question_detected', 900);
        log('[DRIVER:controlled] unplanned assistant question suppressed', {
          currentQuestion: structuredCurrentQuestionIndex,
          targetQuestions: target,
          textPreview: clean.slice(0, 180)
        });
        return {
          role: 'assistant',
          turnType: 'system',
          questionIndex: structuredCurrentQuestionIndex || 0,
          subTurnIndex: structuredCurrentSubTurnIndex || 0,
          isMainQuestion: false,
          isFollowUp: false,
          isIncludedInReport: false,
          isTechnical: true
        };
      }

      if (nearCompleteVideoOnlyByRuntime(CTX)) {
        try {
          if (targetExtraQuestionAutoFinishTimer) clearTimeout(targetExtraQuestionAutoFinishTimer);
          targetExtraQuestionAutoFinishTimer = setTimeout(() => {
            requestHardEnd('video_near_complete_extra_question', { speakFinal: true, cancelActive: true });
          }, EXTRA_AFTER_TARGET_FINISH_MS);
        } catch(_) {}
        structuredLastAssistantTurnType = 'system';
        return {
          role: 'assistant',
          turnType: 'system',
          questionIndex: structuredCurrentQuestionIndex || target,
          subTurnIndex: structuredCurrentSubTurnIndex || 0,
          isMainQuestion: false,
          isFollowUp: false,
          isIncludedInReport: false,
          isTechnical: true
        };
      }

      // For live interview products, never let an extra main question exceed the chosen Q-set.
      // Extra questions after the cap are treated as non-report system context unless they are follow-ups.
      if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex >= target) {
        // Q-set is complete: do not allow an endless interview.
        // Extra assistant questions are kept out of the report and trigger a forced close.
        try {
          if (targetExtraQuestionAutoFinishTimer) clearTimeout(targetExtraQuestionAutoFinishTimer);
          targetExtraQuestionAutoFinishTimer = setTimeout(() => {
            requestHardEnd('extra_question_after_target', { speakFinal: true, cancelActive: true });
          }, EXTRA_AFTER_TARGET_FINISH_MS);
        } catch(_) {}
        structuredLastAssistantTurnType = 'system';
        return {
          role: 'assistant',
          turnType: 'system',
          questionIndex: structuredCurrentQuestionIndex || target,
          subTurnIndex: structuredCurrentSubTurnIndex || 0,
          isMainQuestion: false,
          isFollowUp: false,
          isIncludedInReport: false,
          isTechnical: true
        };
      }

      if (shouldEnforceStrictPlannedMainOnly(CTX)) {
        return returnStrictPlannedUnmatchedQuestionAsFollowUp(clean, 'unplanned_detected_question');
      }

      return registerAssistantMainQuestionMeta((structuredCurrentQuestionIndex || 0) + 1, 'unplanned_detected_question');
    }

    if ((controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) && isInterviewLiveContext(CTX) && !isInterviewHybrid(CTX)) {
      const target = interviewLiveQuestionTarget(CTX);
      const q = structuredCurrentQuestionIndex || 0;
      if (q > 0 && q < target && q >= Math.max(1, target - 2)) {
        log('[DRIVER:controlled] late-phase assistant system/comment recovered to next fixed slot', {
          currentQuestion: q,
          targetQuestions: target,
          textPreview: clean.slice(0, 180)
        });
        scheduleVideoOnlyDriver('late_phase_system_comment_recovery', 700);
      } else if (q >= target) {
        scheduleStrictTargetFinalization('system_after_target_complete', TARGET_FINALIZE_AFTER_ANSWER_MS + 1200);
      }
    }

    structuredLastAssistantTurnType = 'system';
    return {
      role: 'assistant',
      turnType: 'system',
      questionIndex: structuredCurrentQuestionIndex || 0,
      subTurnIndex: structuredCurrentSubTurnIndex || 0,
      isMainQuestion: false,
      isFollowUp: false,
      isIncludedInReport: false
    };
  }

  function inferCandidateStructuredMeta(){
    const q = structuredCurrentQuestionIndex || 0;
    const target = interviewLiveQuestionTarget(CTX);
    const isFollowUp = structuredLastAssistantTurnType === 'follow_up_question';
    const isMainAnswer = q > 0 && structuredLastAssistantTurnType === 'main_question';
    const isAnswerAddition = q > 0 && isFollowUp;

    if (isMainAnswer && isInterviewLiveContext(CTX)) {
      structuredAwaitingFollowUpQuestion = controlledInterviewFollowUpAllowed(q, target);
      if (q >= target) {
        // v4.0.1: Final main answer is enough. Do not wait for another Q10 follow-up.
        scheduleStrictTargetFinalization('target_main_answer_completed', TARGET_FINALIZE_AFTER_ANSWER_MS);
      } else if (!controlledInterviewFollowUpAllowed(q, target) && controlledInterviewDriverEnabled(CTX)) {
        // Late phase: protect Q9/Q10 completion by moving straight to the next fixed main question.
        scheduleVideoOnlyDriver('late_phase_main_answer_skip_followup', CONTROLLED_LATE_NEXT_MAIN_DELAY_MS);
      }
    }

    if (isAnswerAddition) {
      structuredAwaitingFollowUpQuestion = false;
      if (q >= target) {
        // Final Q follow-up has been answered: close quickly and do not allow Q10.1/Q10.6 loops.
        scheduleStrictTargetFinalization('target_followup_answer_completed', TARGET_FINALIZE_AFTER_ANSWER_MS);
      }
    }

    if (isInterviewLiveContext(CTX) && !isInterviewHybrid(CTX) && q > 0 && q < target) {
      if (isMainAnswer) {
        if (controlledInterviewFollowUpAllowed(q, target)) {
          const d = isVideoOnlyInterview(CTX) ? Math.min(SLOT_FOLLOWUP_STALL_MS, 6500) : SLOT_FOLLOWUP_STALL_MS;
          scheduleSlotStallRecovery('followup', q, d, 'candidate_main_answer_completed');
          if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) scheduleVideoOnlyDriver('candidate_main_answer_completed', Math.min(d + 600, CONTROLLED_FOLLOWUP_DELAY_MS));
        } else if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) {
          scheduleVideoOnlyDriver('candidate_main_answer_completed_late_skip_followup', CONTROLLED_LATE_NEXT_MAIN_DELAY_MS);
        }
      } else if (isAnswerAddition) {
        const d = isVideoOnlyInterview(CTX) ? Math.min(SLOT_NEXT_MAIN_STALL_MS, 3200) : SLOT_NEXT_MAIN_STALL_MS;
        scheduleSlotStallRecovery('next_main', q, d, 'candidate_followup_answer_completed');
        if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) scheduleVideoOnlyDriver('candidate_followup_answer_completed', Math.min(d + 500, CONTROLLED_NEXT_MAIN_DELAY_MS));
      }
    }

    structuredLastCandidateTurnType = isAnswerAddition ? 'answer_addition' : (isMainAnswer ? 'answer' : 'system');

    return {
      role: 'candidate',
      turnType: q > 0 ? (isAnswerAddition ? 'answer_addition' : 'answer') : 'system',
      questionIndex: q,
      subTurnIndex: isAnswerAddition ? (structuredCurrentSubTurnIndex || 1) : 0,
      isMainQuestion: false,
      isFollowUp: isAnswerAddition,
      isCandidateAnswer: q > 0,
      isIncludedInReport: q > 0
    };
  }

  function emitStructuredTurnFromTranscript(payload){
    try {
      const speaker = String(payload?.speaker || '').toLowerCase();
      const text = String(payload?.text || '').trim();
      if (!text) return;

      const meta = speaker === 'assistant'
        ? inferAssistantStructuredMeta(text)
        : inferCandidateStructuredMeta();

      structuredTurnIndex += 1;

      postToParent('clarity.live.turn', {
        uid: UID || CTX?.uid || CTX?.linkId || '',
        linkId: UID || CTX?.uid || CTX?.linkId || '',
        sessionId: CTX?.sessionId || CTX?.liveSessionId || '',
        companyId: COMPANY_ID || CTX?.companyId || '',
        productType: looksAssessmentContext(CTX) ? 'modul1' : 'interview',
        moduleArea: CTX?.moduleArea || '',
        mode: AUDIO_ONLY ? 'audio' : (CTX?.mode || 'video'),
        position: CTX?.position || '',
        candidateName: CTX?.candidateName || CTX?.name || '',
        candidateEmail: CTX?.candidateEmail || CTX?.employeeEmail || '',
        turnIndex: structuredTurnIndex,
        questionIndex: meta.questionIndex || 0,
        subTurnIndex: meta.subTurnIndex || 0,
        role: meta.role,
        speaker: meta.role,
        turnType: meta.turnType,
        source: meta.role === 'assistant' ? 'assistant_audio' : 'realtime_input',
        originalText: text,
        cleanText: text,
        originalLang: activeInterviewLang(CTX),
        reportLang: activeReportLang(CTX),
        isFinal: payload.final !== false,
        isMainQuestion: !!meta.isMainQuestion,
        isFollowUp: !!meta.isFollowUp,
        isCandidateAnswer: meta.role === 'candidate' && !!meta.isCandidateAnswer,
        isIncludedInReport: meta.isIncludedInReport !== false,
        isTechnical: meta.turnType === 'system',
        itemId: payload.itemId || '',
        responseId: payload.responseId || '',
        sourceEvent: payload.sourceEvent || '',
        createdAt: payload.ts || new Date().toISOString(),
        metaJson: {
          transcriptSeq: payload.seq || 0,
          realtimeModel: REALTIME_MODEL,
          voice: effectiveRealtimeVoice(CTX),
          assessment: looksAssessmentContext(CTX),
          questionSet: CTX?.questionSet || '',
          totalQuestionCount: CTX?.totalQuestionCount || CTX?.questionCount || '',
          mainQuestionIndexLive: structuredCurrentQuestionIndex,
          awaitingFollowUp: structuredAwaitingFollowUpQuestion
        }
      });
    } catch (e) {
      log('[TURN] emit failed', errMsg(e));
    }
  }

  applyStaticTexts();
  setStatus('info', t('init'));
  avatarSet('ready', 'live_initialized');

  function transcriptKey(speaker, text, itemId) {
    return [
      String(speaker || '').toLowerCase(),
      String(itemId || ''),
      String(text || '').trim().slice(0, 180)
    ].join('|');
  }

  function looksLikeToolNoise(text){
    const clean = String(text || '').trim();
    if (!clean) return true;
    if (clean === '{}' || clean === '[]') return true;
    if (/^\s*[{[]/.test(clean)) return true;
    if (/^\s*null\s*$/i.test(clean)) return true;
    return false;
  }

  function emitTranscript(speaker, text, extra = {}) {
    const clean = String(text || '').trim();
    if (!clean) return;
    if (speaker === 'assistant' && looksLikeToolNoise(clean)) {
      log('[TRANSCRIPT] skipped assistant tool/noise text', {
        sourceEvent: extra.sourceEvent || '',
        textPreview: clean.slice(0, 120)
      });
      return;
    }

    const key = transcriptKey(
      speaker,
      clean,
      extra.itemId || extra.item_id || extra.responseId || extra.response_id || ''
    );

    if (transcriptSeen.has(key)) return;
    transcriptSeen.add(key);

    transcriptSeq += 1;

    const payload = {
      speaker: speaker || 'unknown',
      text: clean,
      seq: transcriptSeq,
      itemId: extra.itemId || extra.item_id || '',
      responseId: extra.responseId || extra.response_id || '',
      sourceEvent: extra.sourceEvent || '',
      final: extra.final !== false,
      ts: new Date().toISOString()
    };

    log('[TRANSCRIPT]', payload);
    postToParent('rt.transcript.partial', payload);
    emitStructuredTurnFromTranscript(payload);

    if (payload.final !== false) {
      if (String(payload.speaker || '').toLowerCase() === 'user') {
        scheduleInterviewAutoFinishCheck('candidate_transcript_final');
      } else if (String(payload.speaker || '').toLowerCase() === 'assistant') {
        // New assistant activity means the model is still active; defer idle autofinish.
        if (!finalClosingDetected(payload.text)) scheduleInterviewAutoFinishCheck('assistant_transcript_final');
      }
    }
  }

  function isInterviewDe(ctx = {}) {
    return activeInterviewLang(ctx) === 'de';
  }

  function finalClosingText(ctx = {}){
    if (looksAssessmentContext(ctx) || (typeof isAssessmentContext === 'function' && isAssessmentContext(ctx))) {
      return assessmentFinalClosingText(ctx);
    }
    const profile = langProfile(activeInterviewLang(ctx));
    return profile.finalClose || UI_TEXTS.en.finalClose;
  }

  function normalizeForMatch(value){
    return String(value || '')
      .toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\u00C0-\u024F\u0370-\u03FF\u0400-\u04FF\u0590-\u05FF\u0600-\u06FF\u0900-\u097F\u0E00-\u0E7F\u1E00-\u1EFF\u3040-\u30FF\u3400-\u9FFF\uAC00-\uD7AF]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function finalClosingDetected(text){
    const given = normalizeForMatch(text);
    if (!given) return false;

    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);

    // Normaler Abschluss und Assessment-Hybrid-Handoff sind beide legitime Endsignale.
    // In Hybrid-Modi lautet der letzte Satz bewusst anders, weil danach der Chat-Teil folgt.
    const expectedCandidates = [
      finalClosingText(CTX),
      assessmentHybridClosingText(CTX, lk, profile),
      interviewHybridClosingText(CTX, lk, profile)
    ]
      .map(normalizeForMatch)
      .filter(Boolean);

    for (const expected of expectedCandidates) {
      const expectedLead = expected.slice(0, Math.min(70, expected.length));
      const expectedMid = expected.slice(0, Math.min(140, expected.length));
      const givenLead = given.slice(0, Math.min(90, given.length));

      if (expectedLead && given.includes(expectedLead)) return true;
      if (expectedMid && expected.includes(givenLead)) return true;
    }

    // Fallback-Marker für den Fall, dass das Realtime-Transkript leicht abweicht.
    const universalMarkers = [
      ['do not close', 'interview is being processed'],
      ['please do not close', 'processed'],
      ['bitte schließen', 'interview wird verarbeitet'],
      ['bitte schliessen', 'interview wird verarbeitet'],
      ['no cierre', 'entrevista se esta procesando'],
      ['no cierre', 'entrevista se está procesando'],
      ['ne pas fermer', 'entretien est en cours'],
      ['non chiuda', 'colloquio e in fase'],
      ['nao feche', 'entrevista esta sendo processada'],
      ['niet sluit', 'interview wordt verwerkt'],

      // Assessment-Hybrid-Handoff: mündlicher Teil ist fertig, Chat folgt.
      ['mündliche teil', 'schriftlicher teil', 'chat'],
      ['muendliche teil', 'schriftlicher teil', 'chat'],
      ['spoken part', 'written part', 'chat'],
      ['oral part', 'written part', 'chat'],
      ['parte orale', 'parte scritta', 'chat'],
      ['parte oral', 'parte escrita', 'chat'],
      ['partie orale', 'partie ecrite', 'chat'],
      ['partie orale', 'partie écrite', 'chat']
    ];

    return universalMarkers.some(pair => pair.every(marker => given.includes(normalizeForMatch(marker))));
  }

  function isReadyText(text){
    const normalized = normalizeForMatch(text);
    if (!normalized) return false;

    const allReadyWords = Object.values(LANG_PROFILES)
      .flatMap(profile => profile.readyWords || [])
      .concat(['ready','yes','ja','oui','si','sí','ok','okay','start']);

    return allReadyWords.some(word => {
      const w = normalizeForMatch(word);
      return w && normalized.includes(w);
    });
  }

  function clearHardEndTimers(){
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    try { if (targetExtraQuestionAutoFinishTimer) clearTimeout(targetExtraQuestionAutoFinishTimer); } catch(_) {}
    try { if (CONTROLLED_DRIVER_TIMER) clearTimeout(CONTROLLED_DRIVER_TIMER); } catch(_) {}
    try { if (structuredAutoFinishTimer) clearTimeout(structuredAutoFinishTimer); } catch(_) {}
    try { if (SLOT_STALL_TIMER) clearTimeout(SLOT_STALL_TIMER); } catch(_) {}
    targetAutoFinishTimer = null;
    targetExtraQuestionAutoFinishTimer = null;
    structuredAutoFinishTimer = null;
    SLOT_STALL_TIMER = null;
  }

  function lockRealtimeListeningForEnd(source){
    try {
      dcSend({
        type: 'session.update',
        session: { turn_detection: { type: 'none' } }
      });
    } catch(_) {}

    // v3.11.3: Do NOT disable the actual microphone track here.
    // Lock only Realtime turn detection while the final message is requested.
    // Disabling the track before full finalization can leave the UI in a half-ended state:
    // mic appears stopped, but recorder/video continues and the parent processing flow is not triggered.

    log('[HARD-END] listening locked softly', {
      source: source || '',
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      liveTargetQuestions: interviewLiveQuestionTarget(CTX),
      hybrid: isInterviewHybrid(CTX),
      userUtterances,
      userAudioItems
    });
  }

  function scheduleAbsoluteFullFinalize(source, ms = ABSOLUTE_FINALIZE_AFTER_HARD_END_MS){
    try { if (ABSOLUTE_FINALIZE_TIMER) clearTimeout(ABSOLUTE_FINALIZE_TIMER); } catch(_) {}
    const delay = Math.max(12000, Number(ms) || ABSOLUTE_FINALIZE_AFTER_HARD_END_MS);
    ABSOLUTE_FINALIZE_TIMER = setTimeout(() => {
      if (END_CALLED) return;
      if (FINAL_HANGUP_TIMER) return;
      log('[FINALIZER] absolute full finalize fallback -> hangup', {
        source: source || '',
        delayMs: delay,
        mainQuestions: structuredCurrentQuestionIndex,
        targetQuestions: interviewMainQuestionTarget(CTX),
        uploadStarted,
        uploadFinished
      });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup(source || 'absolute_finalize_fallback');
    }, delay);
    log('[FINALIZER] absolute full finalize fallback scheduled', { source: source || '', delayMs: delay });
  }


  function currentFinalCloseTextForDeterministicPlayback(){
    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);
    return finalClosingText({ ...CTX, lang: lk }) || finalClosingText(CTX) || (profile?.finalClose || t('finalClose'));
  }

  function deterministicFinalCloseEnabled(){
    return controlledInterviewDriverEnabled(CTX) && isInterviewLiveContext(CTX) && !isInterviewHybrid(CTX) && !isAssessmentVoiceLive(CTX) && !isAssessmentHybridLive(CTX);
  }

  async function fetchDeterministicFinalCloseDataUrl(text, lang){
    const body = {
      text,
      input: text,
      voice: FINAL_TTS_VOICE,
      model: FINAL_TTS_MODEL,
      lang: (typeof normalizeLangCode === 'function') ? normalizeLangCode(lang || activeInterviewLang(CTX), 'de') : String(lang || 'de').slice(0,2).toLowerCase(),
      productType: 'interview',
      purpose: 'final_close'
    };

    const res = await fetch(FINAL_TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const j = await res.json().catch(() => null);
    if (!res.ok || !j?.ok || !j?.dataUrl) {
      throw new Error(`deterministic_tts_failed status=${res.status} error=${j?.error || ''} message=${j?.message || ''}`);
    }
    return String(j.dataUrl || '');
  }

  function browserSpeechFinalClose(text, lang){
    return new Promise((resolve) => {
      try {
        if (!('speechSynthesis' in window) || !window.SpeechSynthesisUtterance) return resolve(false);
        const utterance = new SpeechSynthesisUtterance(String(text || ''));
        utterance.lang = String(lang || activeInterviewLang(CTX) || 'de').slice(0,2).toLowerCase() === 'de' ? 'de-DE' : 'en-US';
        utterance.rate = 0.96;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;
        let done = false;
        const finish = (ok) => {
          if (done) return;
          done = true;
          try { window.speechSynthesis.cancel(); } catch(_) {}
          resolve(!!ok);
        };
        utterance.onend = () => finish(true);
        utterance.onerror = () => finish(false);
        try { window.speechSynthesis.cancel(); } catch(_) {}
        window.speechSynthesis.speak(utterance);
        setTimeout(() => finish(true), Math.max(9000, Math.min(DETERMINISTIC_FINAL_CLOSE_TIMEOUT_MS, String(text || '').length * 95)));
      } catch(_) {
        resolve(false);
      }
    });
  }

  async function playDeterministicFinalClose(text, source){
    const finalText = String(text || currentFinalCloseTextForDeterministicPlayback() || '').trim();
    if (!finalText) return false;

    const lang = activeInterviewLang(CTX);
    try { clearVideoDriverTimer(); } catch(_) {}
    try { clearSlotStallTimer(); } catch(_) {}
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    try { if (structuredEarlyClosingRecoveryTimer) clearTimeout(structuredEarlyClosingRecoveryTimer); } catch(_) {}
    try { dcSend({ type: 'response.cancel' }); } catch(_) {}

    postToParent('clarity.live.deterministic_final_close_started', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      lang,
      ts: new Date().toISOString()
    });

    let played = false;
    try {
      const dataUrl = await fetchDeterministicFinalCloseDataUrl(finalText, lang);
      played = await new Promise(async (resolve) => {
        let done = false;
        let audio = null;
        let node = null;
        const timeoutMs = Math.max(14000, Math.min(DETERMINISTIC_FINAL_CLOSE_TIMEOUT_MS, finalText.length * 105));
        const finish = (ok) => {
          if (done) return;
          done = true;
          try { if (audio) { audio.pause(); audio.src = ''; } } catch(_) {}
          try { if (node) node.disconnect(); } catch(_) {}
          resolve(!!ok);
        };

        try {
          audio = new Audio();
          audio.preload = 'auto';
          audio.crossOrigin = 'anonymous';
          audio.src = dataUrl;
          audio.volume = 1.0;

          if (recordingAudioContext) {
            try { await recordingAudioContext.resume(); } catch(_) {}
          }
          if (recordingAudioContext && recordingAudioDestination) {
            try {
              node = recordingAudioContext.createMediaElementSource(audio);
              node.connect(recordingAudioDestination);
              node.connect(recordingAudioContext.destination);
            } catch (e) {
              log('[FINAL-CLOSE] deterministic audio graph connect failed', errMsg(e));
            }
          }

          audio.onended = () => finish(true);
          audio.onerror = () => finish(false);
          await audio.play();
          setTimeout(() => finish(true), timeoutMs);
        } catch (e) {
          log('[FINAL-CLOSE] deterministic audio playback failed', errMsg(e));
          finish(false);
        }
      });
    } catch (e) {
      log('[FINAL-CLOSE] deterministic TTS fetch failed', errMsg(e));
    }

    if (!played) {
      played = await browserSpeechFinalClose(finalText, lang);
      if (played) log('[FINAL-CLOSE] browser speech fallback used', { source: source || '', lang });
    }

    FINAL_MESSAGE_SPOKEN = true;
    FINAL_MESSAGE_ITEM_ID = `deterministic-final-${Date.now()}`;
    emitTranscript('assistant', finalText, {
      itemId: FINAL_MESSAGE_ITEM_ID,
      responseId: 'deterministic_final_close',
      sourceEvent: 'deterministic_final_close',
      final: true
    });

    postToParent('clarity.live.deterministic_final_close_done', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      played,
      ts: new Date().toISOString()
    });

    return true;
  }

  function startDeterministicFinalCloseAndHangup(source, finalClose){
    if (deterministicFinalCloseStarted || END_CALLED || FINAL_HANGUP_TIMER) return true;
    deterministicFinalCloseStarted = true;
    HARD_END_LOCK = true;
    TARGET_FINALIZE_REQUESTED = true;
    lockRealtimeListeningForEnd(source || 'deterministic_final_close');
    setStatus('warn', t('processing'));
    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    HARD_END_WATCHDOG_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      log('[FINAL-CLOSE] deterministic final close watchdog -> hangup', { source: source || '' });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup(source || 'deterministic_final_close_watchdog');
    }, DETERMINISTIC_FINAL_CLOSE_TIMEOUT_MS + 5000);

    playDeterministicFinalClose(finalClose, source || 'deterministic_final_close')
      .then(() => {
        if (END_CALLED || FINAL_HANGUP_TIMER) return;
        beginFinalHangup(source || 'deterministic_final_close_done');
      })
      .catch((e) => {
        log('[FINAL-CLOSE] deterministic final close exception', errMsg(e));
        if (!END_CALLED && !FINAL_HANGUP_TIMER) {
          FINAL_MESSAGE_SPOKEN = true;
          beginFinalHangup(source || 'deterministic_final_close_exception');
        }
      });
    return true;
  }

  function requestHardEnd(source, opts = {}){
    if (END_CALLED || FINAL_HANGUP_TIMER) return;

    if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex < interviewMainQuestionTarget(CTX)) {
      log('[HARD-END] blocked before media target complete', {
        source: source || '',
        current: structuredCurrentQuestionIndex,
        target: interviewMainQuestionTarget(CTX),
        hybrid: isInterviewHybrid(CTX),
        audioOnly: AUDIO_ONLY
      });
      return;
    }

    if (!isInterviewLiveContext(CTX)) {
      sendFinalCloseInstruction(source || 'hard_end_non_interview', true);
      return;
    }

    if (isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX)) {
      sendFinalCloseInstruction(source || 'hard_end_hybrid_handoff', true);
      return;
    }

    const speakFinal = opts.speakFinal !== false;
    const cancelActive = opts.cancelActive !== false;

    HARD_END_LOCK = true;
    TARGET_FINALIZE_REQUESTED = true;
    clearHardEndTimers();
    lockRealtimeListeningForEnd(source || 'hard_end');
    setStatus('warn', t('processing'));

    postToParent('clarity.live.hard_end_lock', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      ts: new Date().toISOString()
    });

    scheduleAbsoluteFullFinalize(source || 'hard_end_absolute_fallback');

    try { if (cancelActive) dcSend({ type: 'response.cancel' }); } catch(_) {}

    if (speakFinal && !FINAL_MESSAGE_SPOKEN) {
      const lk = activeInterviewLang(CTX);
      const profile = langProfile(lk);
      const finalClose = isAssessmentHybridLive(CTX)
        ? (assessmentHybridClosingText(CTX, lk, profile) || finalClosingText({ ...CTX, lang: lk }))
        : finalClosingText({ ...CTX, lang: lk });
      const isAssessmentEnd = isAssessmentVoiceLive(CTX);
      const isHybridEnd = isAssessmentHybridLive(CTX);
      const controlledStandaloneFinal = controlledInterviewDriverEnabled(CTX) && isInterviewLiveContext(CTX) && !isInterviewHybrid(CTX) && !isAssessmentEnd && !isHybridEnd;
      const instruction = lk === 'de'
        ? (controlledStandaloneFinal
          ? `Das Interview ist jetzt endgültig abgeschlossen. Stelle keine weitere Frage. Sage jetzt exakt diesen Abschluss ohne zusätzliche Erklärungen und ohne Meta-Kommentar: „${finalClose}“ Rufe end_interview nicht in derselben Antwort auf; die App beendet das Interview automatisch, nachdem der Abschluss hörbar gesprochen wurde.`
          : (isHybridEnd
            ? `Der mündliche Teil ist jetzt abgeschlossen. Stelle keine weitere mündliche Frage. Sage jetzt exakt diesen Übergabesatz ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`
            : `${isAssessmentEnd ? 'Das Assessment' : 'Das Interview'} ist jetzt endgültig abgeschlossen. Stelle keine weitere Frage. Sage jetzt exakt diesen Abschluss ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`))
        : (controlledStandaloneFinal
          ? `The interview is now definitively complete. Do not ask another question. Now say exactly this closing message without additional explanation or meta commentary: “${finalClose}” Do not call end_interview in the same response; the app will end the interview automatically after the closing message has been spoken.`
          : (isHybridEnd
            ? `The spoken part is now complete. Do not ask another spoken question. Now say exactly this handoff message without additional explanation: “${finalClose}” Then call end_interview.`
            : `The ${isAssessmentEnd ? 'assessment' : 'interview'} is now definitively complete. Do not ask another question. Now say exactly this closing message without additional explanation: “${finalClose}” Then call end_interview.`));

      if (controlledStandaloneFinal) {
        startDeterministicFinalCloseAndHangup(source || 'hard_end_deterministic_final_close', finalClose);
        return;
      }


      try {
        if (controlledInterviewDriverEnabled(CTX) || isVideoOnlyInterview(CTX)) {
          dcSend({
            type: 'response.create',
            response: {
              conversation: 'default',
              modalities: ['audio'],
              instructions: instruction
            }
          });
        } else {
          dcSend({
            type: 'conversation.item.create',
            item: { type: 'message', role: 'user', content: [{ type: 'input_text', text: instruction }] }
          });
          dcSend({ type: 'response.create', response: { conversation: 'default', modalities: ['audio'] } });
        }
      } catch (e) {
        log('[HARD-END] final instruction failed', errMsg(e));
      }
    } else {
      beginFinalHangup(source || 'hard_end_no_final_needed');
      return;
    }

    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    const finalWatchdogMs = controlledFinalCloseWatchdogMs();
    HARD_END_WATCHDOG_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      log('[HARD-END] watchdog -> force hangup/upload', {
        source: source || '',
        mainQuestions: structuredCurrentQuestionIndex,
        targetQuestions: interviewMainQuestionTarget(CTX),
        finalWatchdogMs,
        controlled: controlledInterviewDriverEnabled(CTX)
      });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup(source || 'hard_end_watchdog');
    }, finalWatchdogMs);
  }

  function scheduleStrictTargetFinalization(source, delayMs){
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return;
    const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
    const isAssessmentTargetReached = isAssessmentVoiceLive(CTX) && structuredCurrentQuestionIndex >= assessmentTarget;
    if (!isInterviewLiveContext(CTX) && !isAssessmentTargetReached) return;
    if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex < interviewLiveQuestionTarget(CTX) && !nearCompleteVideoOnlyByRuntime(CTX)) return;

    const delay = Math.max(1000, Number(delayMs) || TARGET_FINALIZE_AFTER_ANSWER_MS);
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    targetAutoFinishTimer = setTimeout(() => {
      requestHardEnd(source || 'strict_target_finalization', { speakFinal: true, cancelActive: true });
    }, delay);

    log('[HARD-END] strict target finalization scheduled', {
      source: source || '',
