<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Live Interview</title>
  <!-- v3.10.0 RECORDER_UI_PROCESS_LOCK: recorder status is recording-only until parent confirms final processing; stop button is hidden after hangup/upload -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:#ffffff;
      --fg:#111827;
      --muted:#6b7280;
      --ok:#047857;
      --warn:#92400e;
      --err:#b91c1c;
      --card:#ffffff;
      --line:#e5e7eb;
      --soft:#f8fafc;
      --bar:#e5e7eb;
      --accent:#4f46e5;
      --shadow:0 16px 40px rgba(15,23,42,.10);
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--fg);
      font:14px/1.45 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      display:grid;
      grid-template-columns:1fr 300px;
      gap:16px;
      padding:14px;
      align-items:start;
      background:#ffffff;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(229,231,235,.65);
      border-radius:16px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .row{display:flex;gap:10px;align-items:center}

    .bar{
      height:6px;
      background:var(--bar);
      border-radius:999px;
      overflow:hidden;
    }

    .bar > i{
      display:block;
      height:100%;
      width:0;
      background:var(--accent);
      transition:width 50ms linear;
    }

    .badge{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      color:#334155;
      font-size:12px;
    }

    .muted{color:var(--muted)}

    .btn{
      appearance:none;
      border:1px solid #cbd5e1;
      background:#ffffff;
      color:#111827;
      border-radius:10px;
      padding:8px 12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(15,23,42,.08);
    }

    .btn:hover{background:#f8fafc}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    video{
      width:100%;
      max-height:320px;
      background:#ffffff;
      border-radius:12px;
      box-shadow:0 10px 28px rgba(15,23,42,.10);
      border:0;
    }

    audio{width:100%}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .log{
      font-family:ui-monospace,Menlo,Consolas,monospace;
      font-size:12px;
      color:#6b7280;
      white-space:pre-wrap;
      max-height:260px;
      overflow:auto;
      background:#f8fafc;
      border-radius:12px;
      padding:8px;
      border:1px solid #e5e7eb;
    }

    .ghost{opacity:.72}

    .debugOnly{display:none}
    body.debug-ui .debugOnly{display:block}

    body.audio-only #cameraLabel,
    body.audio-only #localVideo{
      display:none;
    }

    body.audio-only .wrap{
      grid-template-columns:1fr;
    }

    body.audio-only .grid2{
      grid-template-columns:1fr;
    }

    @media (max-width:900px){
      .wrap{grid-template-columns:1fr}
      .grid2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <div id="status" class="badge">Initialisierung…</div>
          <div id="audioBadge" class="badge" style="margin-left:6px">Audio wird vorbereitet</div>
        </div>
        <div class="row">
          <button id="btnStop" class="btn">Interview beenden</button>
        </div>
      </div>

      <div class="grid2" style="margin-top:12px">
        <div>
          <div id="cameraLabel" class="muted" style="margin-bottom:6px">Kamera-Vorschau</div>
          <video id="localVideo" autoplay playsinline muted></video>
          <div id="micLabel" class="muted" style="margin:8px 0 4px">Mikrofon</div>
          <div class="bar"><i id="micLevel"></i></div>
        </div>
        <div>
          <div id="assistantAudioLabel" class="muted" style="margin-bottom:6px">Interview-Audio</div>
          <audio id="remoteAudio" controls></audio>
          <div id="systemLabel" class="muted" style="margin:8px 0 4px">System</div>
          <div class="bar"><i id="sysLevel"></i></div>
          <div id="autoplayHint" class="muted" style="margin-top:10px">Falls kein Ton zu hören ist, klicken Sie einmal in den Player.</div>
        </div>
      </div>
    </section>

    <aside class="card debugOnly" id="debugPanel">
      <div id="recorderTitle" style="font-weight:600;margin-bottom:8px">Recorder / Upload</div>
      <div class="row">
        <div class="badge ghost" id="recState">idle</div>
        <div class="badge ghost" id="muxState" style="margin-left:6px">no upload</div>
      </div>
      <div id="progressLabel" class="muted" style="margin:8px 0 4px">Fortschritt</div>
      <div class="bar"><i id="recProgress"></i></div>
      <div id="logsLabel" class="muted" style="margin:10px 0 4px">Logs</div>
      <div id="log" class="log"></div>
    </aside>
  </div>

    // Explicit test override only for the two production voices we validated.
    if (REQUESTED_VOICE === 'marin' || REQUESTED_VOICE === 'cedar') return REQUESTED_VOICE;

  function firstNonEmpty(...values){
    for (const value of values) {
      const s = String(value || '').trim();
      if (s) return s;
    }
    return '';
  }

  function normalizeLangToken(raw){
    return String(raw || '')
      .trim()
      .toLowerCase()
      .replace(/[._]/g, '-')
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, ' ');
  }

  function langKey(raw){
    const original = String(raw || LANG || 'en').trim();
    if (!original) return 'en';

    const lowerOriginal = original.toLowerCase();
    if (LANG_PROFILES[lowerOriginal]) return lowerOriginal;

    const normalized = normalizeLangToken(original);
    const firstPart = normalized.split(/[-\s/]+/).filter(Boolean)[0] || normalized;

    if (LANG_PROFILES[firstPart]) return firstPart;
    if (LANG_ALIASES[normalized]) return LANG_ALIASES[normalized];
    if (LANG_ALIASES[firstPart]) return LANG_ALIASES[firstPart];

    for (const key of Object.keys(LANG_ALIASES)) {
      if (normalized.includes(key)) return LANG_ALIASES[key];
    }

    return 'en';
  }

  function activeInterviewLang(ctx = CTX){
    return langKey(getInterviewLangRaw(ctx || {}));
  }

  function activeReportLang(ctx = CTX){
    return langKey(getReportLangRaw(ctx || {}));
  }

  function langProfile(code){
    return LANG_PROFILES[code] || LANG_PROFILES.en;

  function normalizeIncomingContext(data = {}){
    const incoming = data || {};
    const merged = { ...CTX, ...incoming };

    // Wichtig: Die Interview-Sprache kommt je nach Seite/DB unter verschiedenen Feldnamen.
    // Für die Live-KI wird sie zentral als CTX.lang normalisiert.
    merged.lang = activeInterviewLang(merged);
    merged.reportLang = activeReportLang(merged);

    return merged;
  }


  // v3.10.2 VIDEO_START_RESTORE
  // Parent/Page-Kontext kann historisch Werte wie "live-video", "video_chat",
  // "mixMode" usw. liefern. Der Realtime-Token-Endpoint braucht aber einen
  // stabilen technischen Medienmodus. Ohne diese Normalisierung können Video-Links
  // vor dem RTC-Aufbau mit token_error abbrechen, obwohl Audio funktioniert.
  function canonicalRealtimeMediaMode(ctx = CTX){
    const raw = String(
      ctx?.mediaMode ||
      ctx?.recordingMode ||
      ctx?.interviewMode ||
      ctx?.assessmentMode ||
      ctx?.mode ||
      MODE_RAW ||
      ''
    ).trim().toLowerCase().replace(/_/g, '-');

    if (AUDIO_ONLY || raw === 'audio' || raw === 'audio-only' || raw === 'audioonly' || raw === 'audio-chat') {
      return 'audio';
    }

    if (
      !raw ||
      raw === 'video' ||
      raw === 'live-video' ||
      raw === 'video-only' ||
      raw === 'videoonly' ||
      raw === 'video-chat' ||
      raw === 'mix' ||
      raw === 'mixmode' ||
      raw === 'hybrid'
    ) {
      return 'video';
    }

    if (raw.includes('audio') && !raw.includes('video')) return 'audio';
    if (raw.includes('video') || raw.includes('mix') || raw.includes('hybrid')) return 'video';

    return AUDIO_ONLY ? 'audio' : 'video';
  }

  function classifyStartError(message){
    const m = String(message || '').toLowerCase();
    if (m.includes('token_http') || m.includes('token_error') || m.includes('client_secret')) return 'token_error';
    if (m.includes('remote_track_timeout')) return 'rtc_start_timeout';
    if (m.includes('realtime_handshake')) return 'realtime_handshake_error';
    if (m.includes('permission') || m.includes('notallowed') || m.includes('notreadable') || m.includes('device')) return 'media_permission_error';
    if (m.includes('rtc') || m.includes('ice')) return 'rtc_error';
    return 'start_error';
  }

  function withStartTimeout(promise, ms, label){
    let timer = null;
    return Promise.race([
      promise,
      new Promise((_, reject) => {
        timer = setTimeout(() => reject(new Error(label || 'start_timeout')), Math.max(1000, Number(ms) || 20000));
      })
    ]).finally(() => {
      try { if (timer) clearTimeout(timer); } catch(_) {}
    });
  }

    const t = String(s || '');

    return /\b(error|failed|failure|timeout|denied|blocked|disconnect|disconnected|ice failed|rtc failed|mux error|autoplay blocked|audio-stall|audio stalled|audio_wait|client_secret_missing)\b/i.test(t)

  function canPostParentLog(s, important){
    if (important) return true;
    if (!DEBUG_LOGS) return false;

    const now = Date.now();
    if (now - __logParentWindowStart > LOG_PARENT_WINDOW_MS) {
      __logParentWindowStart = now;
      __logParentWindowCount = 0;
    }
    if (__logParentWindowCount >= LOG_PARENT_MAX_PER_WINDOW) return false;
    if (s === __lastParentLogText && now - __lastParentLogAt < 5000) return false;
    if (now - __lastParentLogAt < LOG_PARENT_MIN_MS) return false;

    __logParentWindowCount += 1;
    __lastParentLogAt = now;
    __lastParentLogText = s;
    return true;
  }

  function isImportantAudioDiagCode(code){

    if (!DEBUG_LOGS && !isImportantAudioDiagCode(code)) return;

    try {

  function log(...a){

    const important = isImportantLogText(s);

    if (DEBUG_UI && $log) {
      $log.textContent += s + "\n";
      $log.scrollTop = $log.scrollHeight;
    }

    if (canPostParentLog(s, important)) {
      try {
        parent?.postMessage?.({ type:'clarity.live.log', data:s }, '*');
      } catch(_) {}
    }

  let structuredEarlyClosingRecoveryTimer = null;

  function textHasQuestion(text){
    const t = String(text || '').trim();
    return /[?？¿]/.test(t);
  }

  function textAfterTransitionColon(text){
    const raw = String(text || '').trim();
    const parts = raw.split(/[:：]/);
    if (parts.length < 2) return '';
    return parts.slice(1).join(':').trim();
  }

  function looksLikeExplicitNextMainQuestion(text){
    const raw = String(text || '').trim();
    const n = normalizeForMatch(raw);
    if (!n) return false;

    const transitionSignals = [
      'nachste frage', 'nächste frage', 'zweite frage', 'dritte frage', 'vierte frage', 'funfte frage', 'fünfte frage', 'sechste frage', 'siebte frage', 'achte frage', 'neunte frage', 'zehnte frage', 'letzte frage',
      'gehen wir weiter', 'gehen wir zur', 'kommen wir zur', 'machen wir weiter', 'nächstes thema', 'naechstes thema',
      'next question', 'second question', 'third question', 'fourth question', 'fifth question', 'sixth question', 'seventh question', 'eighth question', 'ninth question', 'tenth question', 'last question', 'next topic', 'move on to',
      'siguiente pregunta', 'ultima pregunta', 'última pregunta', 'proxima pregunta', 'próxima pregunta',
      'question suivante', 'derniere question', 'dernière question',
      'prossima domanda', 'ultima domanda'
    ];

    if (!transitionSignals.some(m => n.includes(normalizeForMatch(m)))) return false;

    const after = textAfterTransitionColon(raw);
    const afterN = normalizeForMatch(after);
    if (!afterN) return false;

    // If a transition phrase introduces a substantive role-related question after a colon,
    // it is a new main question, not a follow-up continuation offer.
    const addOnlySignals = ['add anything', 'anything else', 'etwas erganzen', 'etwas ergänzen', 'hinzufugen', 'hinzufügen', 'ajouter', 'anadir', 'añadir', 'aggiungere'];
    const isAddOnly = addOnlySignals.some(m => afterN.includes(normalizeForMatch(m))) && afterN.length < 140;
    return !isAddOnly && (after.length >= 24 || textHasQuestion(after));
  }

  function looksLikeReadyWelcome(text){
    const n = normalizeForMatch(text);
    if (!n) return false;
    const readyMarkers = [
      'willkommen', 'welcome', 'bienvenido', 'bienvenue', 'benvenuto',
      'are you ready', 'sind sie bereit', 'bist du bereit', 'êtes vous prêt', 'etes vous pret',
      'esta listo', 'está listo', 'e pronto', 'è pronto', 'ready to begin', 'ready to start'
    ];
    return readyMarkers.some(m => n.includes(normalizeForMatch(m))) && (n.includes('ready') || n.includes('bereit') || n.includes('listo') || n.includes('prêt') || n.includes('pret') || n.includes('pronto') || n.includes('start'));
  }

  function looksLikeFollowUpQuestion(text){
    const n = normalizeForMatch(text);
    if (!n) return false;

    if (looksLikeExplicitNextMainQuestion(text)) return false;

    // Interview follow-ups are intentionally short continuation/deepening questions.
    // They must never count as Q10/Q20/Q30 main questions.
    const markers = [
      'would you like to add', 'would you like to add anything', 'do you want to add', 'anything to add', 'anything else', 'is that complete',
      'shall we continue', 'should we continue', 'ready for the next question', 'move on to the next question', 'continue to the next question', 'continue with the next question',
      'before we continue', 'before moving on', 'shall i move on', 'can i move on', 'may i continue', 'may we finish', 'can we finish',

      'mochten sie noch etwas erganzen', 'moechten sie noch etwas ergaenzen', 'möchten sie noch etwas ergänzen',
      'mochten sie dazu noch etwas erganzen', 'moechten sie dazu noch etwas ergaenzen', 'möchten sie dazu noch etwas ergänzen',
      'noch etwas erganzen', 'noch etwas ergänzen', 'etwas hinzufugen', 'etwas hinzufügen', 'noch etwas hinzufugen', 'noch etwas hinzufügen',
      'gibt es noch etwas', 'gibt es dazu noch etwas', 'haben sie noch etwas', 'mochten sie noch etwas hinzufugen', 'möchten sie noch etwas hinzufügen',
      'ist das so vollstandig', 'ist das so vollständig', 'sollen wir fortfahren', 'soll ich fortfahren',
      'zur nachsten frage', 'zur nächsten frage', 'zur letzten frage', 'bereit fur die nachste frage', 'bereit für die nächste frage',
      'durfen wir abschliessen', 'dürfen wir abschließen', 'konnen wir abschliessen', 'können wir abschließen', 'interview hier abschliessen', 'interview hier abschließen',

      'voulez vous ajouter', 'souhaitez vous ajouter', 'autre chose a ajouter', 'passer a la question suivante', 'passer à la question suivante',
      'passer a la derniere question', 'passer à la dernière question', 'pouvons nous terminer',

      'quiere anadir', 'quiere añadir', 'algo mas que anadir', 'algo más que añadir', 'pasar a la siguiente pregunta',
      'paso a la siguiente pregunta', 'paso a la ultima pregunta', 'paso a la última pregunta', 'podemos finalizar',

      'vuole aggiungere', 'desidera aggiungere', 'qualcosa da aggiungere', 'passare alla prossima domanda', 'passare all ultima domanda', 'possiamo concludere'
    ];

    if (markers.some(m => n.includes(normalizeForMatch(m)))) return true;

    // German/Spanish/French/etc. phrases can vary strongly after translation/transcription.
    // If the sentence combines an "add something" signal with a continuation/finish signal, it is a follow-up.
    const addSignals = [
      'add', 'anything else',
      'erganz', 'ergänz', 'hinzufug', 'hinzufüg',
      'ajouter', 'anadir', 'añadir', 'aggiungere'
    ];
    const continueSignals = [
      'next question', 'last question', 'continue', 'move on', 'finish',
      'nachste frage', 'nächste frage', 'letzte frage', 'fortfahren', 'weitergehen', 'abschliess', 'abschließ',
      'siguiente pregunta', 'ultima pregunta', 'última pregunta', 'finalizar',
      'question suivante', 'derniere question', 'dernière question', 'terminer',
      'prossima domanda', 'ultima domanda', 'concludere'
    ];
    if (addSignals.some(w => n.includes(normalizeForMatch(w))) && continueSignals.some(w => n.includes(normalizeForMatch(w)))) {
      return true;
    }

    // Conservative fallback: while the model is expected to ask the one follow-up after a main question,
    // a short assistant question that only offers continuation is treated as follow-up.
    if (structuredAwaitingFollowUpQuestion && textHasQuestion(text) && n.length < 220) {
      const continuationWords = ['add', 'erganzen', 'ergänzen', 'hinzufugen', 'hinzufügen', 'continue', 'fortfahren', 'next', 'nachste', 'nächste', 'letzte', 'abschliessen', 'abschließen', 'autre', 'ajouter', 'anadir', 'añadir', 'aggiungere', 'prossima'];
      return continuationWords.some(w => n.includes(normalizeForMatch(w)));
    }

    return false;
  }

  function shouldForceInterviewFollowUpBySequence(text){
    if (!isInterviewLiveContext(CTX)) return false;
    if (!textHasQuestion(text)) return false;
    const q = structuredCurrentQuestionIndex || 0;
    if (q <= 0) return false;
    if (structuredLastAssistantTurnType !== 'main_question') return false;
    if (structuredFollowUpAskedForQuestion[q]) return false;

    const n = normalizeForMatch(text);
    if (!n) return false;
    if (finalClosingDetected(text)) return false;
    if (looksLikeReadyWelcome(text)) return false;
    if (looksLikeExplicitNextMainQuestion(text)) return false;

    // After every interview main question, the next assistant question is the single follow-up slot.
    // This preserves natural, topic-specific follow-ups without forcing the exact same wording.
    return true;
  }
  function isInterviewLiveContext(ctx = CTX){
    return !looksAssessmentContext(ctx) && !(typeof isAssessmentContext === 'function' && isAssessmentContext(ctx));
  }

  function interviewMainQuestionTarget(ctx = CTX){
    return Math.max(1, Math.min(30, interviewMaxQuestions(ctx)));
  }

  function interviewMainQuestionsComplete(ctx = CTX){
    if (!isInterviewLiveContext(ctx)) return true;
    return structuredCurrentQuestionIndex >= interviewMainQuestionTarget(ctx);
  }

  function shouldBlockEarlyInterviewClosing(){
    if (!isInterviewLiveContext(CTX)) return false;
    if (isInterviewHybrid(CTX)) return false;
    return !interviewMainQuestionsComplete(CTX);
  }

  function requestMissingInterviewQuestion(source){
    if (!dcSend || structuredEarlyClosingContinueRequests > 3) return;
    structuredEarlyClosingContinueRequests += 1;

    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);
    const target = interviewMainQuestionTarget(CTX);
    const nextNo = Math.min(target, structuredCurrentQuestionIndex + 1);

    const instruction = lk === 'de'
      ? `Bitte stelle jetzt direkt die nächste rollenbezogene Hauptfrage. Sage nur die Frage selbst. Erwähne nicht, dass Fragen fehlen, entschuldige dich nicht und wiederhole nicht den Abschlusssatz. Nach der Antwort darfst du genau eine kurze, natürlich formulierte Ergänzungs- oder Vertiefungsfrage stellen.`
      : `Please now ask the next role-specific main question directly. Say only the question itself. Do not mention that questions are missing, do not apologize, and do not repeat the closing message. After the answer, you may ask exactly one short, naturally phrased follow-up or deepening question.`;

    log('[QLOCK] blocked early closing and requested missing question', {
      source: source || '',
      current: structuredCurrentQuestionIndex,
      target,
      nextNo,
      attempts: structuredEarlyClosingContinueRequests
    });

    // Use a user-style instruction here. In practice Realtime follows this more reliably
    // as an immediate next spoken action than a late system item after an early closing sentence.
    dcSend({
      type: 'conversation.item.create',
      item: {
        type: 'message',
        role: 'user',
        content: [{ type: 'input_text', text: instruction }]
      }
    });

    dcSend({
      type: 'response.create',
      response: { conversation: 'default', modalities: ['audio'] }
    });

    try { if (structuredEarlyClosingRecoveryTimer) clearTimeout(structuredEarlyClosingRecoveryTimer); } catch(_) {}
    structuredEarlyClosingRecoveryTimer = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      // Safety valve: never leave the candidate in silence after the closing sentence.
      // If the recovery question did not start quickly, process the interview with the captured turns.
      log('[QLOCK] early closing recovery watchdog -> final hangup safety');
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup('early_closing_recovery_watchdog');
    }, 16000);
  }

  function inferAssistantStructuredMeta(text){
    const clean = String(text || '').trim();

    if (finalClosingDetected(clean)) {
      const earlyInterviewClosing = shouldBlockEarlyInterviewClosing();
      structuredLastAssistantTurnType = earlyInterviewClosing ? 'system' : 'closing';
      return {
        role: 'assistant',
        turnType: earlyInterviewClosing ? 'system' : 'closing',
        questionIndex: structuredCurrentQuestionIndex || 0,
        subTurnIndex: structuredCurrentSubTurnIndex || 0,
        isMainQuestion: false,
        isFollowUp: false,
        isIncludedInReport: !earlyInterviewClosing && false,
        isTechnical: earlyInterviewClosing
      };
    }

    if (looksLikeReadyWelcome(clean)) {
      structuredLastAssistantTurnType = 'welcome';
      return {
        role: 'assistant',
        turnType: 'welcome',
        questionIndex: 0,
        subTurnIndex: 0,
        isMainQuestion: false,
        isFollowUp: false,
        isIncludedInReport: false
      };
    }

    const forcedSequenceFollowUp = shouldForceInterviewFollowUpBySequence(clean);
    if (looksLikeFollowUpQuestion(clean) || forcedSequenceFollowUp) {
      const q = structuredCurrentQuestionIndex || 0;

      // Only one report-relevant follow-up per main question. Repeated prompts caused by silence,
      // "please continue" loops, or early-close recovery stay out of the PDF transcript.
      if (q > 0 && structuredFollowUpAskedForQuestion[q]) {
        structuredLastAssistantTurnType = 'system';
        structuredAwaitingFollowUpQuestion = false;
        return {
          role: 'assistant',
          turnType: 'system',
          questionIndex: q,
          subTurnIndex: structuredCurrentSubTurnIndex || 1,
          isMainQuestion: false,
          isFollowUp: false,
          isIncludedInReport: false,
          isTechnical: true
        };
      }

      structuredCurrentSubTurnIndex = Math.max(1, (structuredCurrentSubTurnIndex || 0) + 1);
      structuredLastAssistantTurnType = 'follow_up_question';
      structuredAwaitingFollowUpQuestion = false;
      if (q > 0) structuredFollowUpAskedForQuestion[q] = true;
      return {
        role: 'assistant',
        turnType: 'follow_up_question',
        questionIndex: q,
        subTurnIndex: structuredCurrentSubTurnIndex,
        isMainQuestion: false,
        isFollowUp: true,
        isIncludedInReport: q > 0
      };
    }

    if (textHasQuestion(clean)) {
      const target = interviewMainQuestionTarget(CTX);

      // For live interview products, never let an extra main question exceed the chosen Q-set.
      // Extra questions after the cap are treated as non-report system context unless they are follow-ups.
      if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex >= target) {
        structuredLastAssistantTurnType = 'system';
        return {
          role: 'assistant',
          turnType: 'system',
          questionIndex: structuredCurrentQuestionIndex || target,
          subTurnIndex: structuredCurrentSubTurnIndex || 0,
          isMainQuestion: false,
          isFollowUp: false,
          isIncludedInReport: false,
          isTechnical: true
        };
      }

      structuredCurrentQuestionIndex += 1;
      structuredCurrentSubTurnIndex = 0;
      structuredAwaitingFollowUpQuestion = false;
      try { if (structuredEarlyClosingRecoveryTimer) clearTimeout(structuredEarlyClosingRecoveryTimer); } catch(_) {}
      structuredEarlyClosingRecoveryTimer = null;
      structuredLastAssistantTurnType = 'main_question';
      return {
        role: 'assistant',
        turnType: 'main_question',
        questionIndex: structuredCurrentQuestionIndex,
        subTurnIndex: 0,
        isMainQuestion: true,
        isFollowUp: false,
        isIncludedInReport: true
      };
    }

    structuredLastAssistantTurnType = 'system';
    return {
      role: 'assistant',
      turnType: 'system',
      questionIndex: structuredCurrentQuestionIndex || 0,
      subTurnIndex: structuredCurrentSubTurnIndex || 0,
      isMainQuestion: false,
      isFollowUp: false,
      isIncludedInReport: false
    };
  }

  function inferCandidateStructuredMeta(){
    const q = structuredCurrentQuestionIndex || 0;
    const isFollowUp = structuredLastAssistantTurnType === 'follow_up_question';
    const isMainAnswer = q > 0 && structuredLastAssistantTurnType === 'main_question';
    const isAnswerAddition = q > 0 && isFollowUp;

    if (isMainAnswer && isInterviewLiveContext(CTX)) {
      structuredAwaitingFollowUpQuestion = true;
    }

    if (isAnswerAddition) {
      structuredAwaitingFollowUpQuestion = false;
    }

    structuredLastCandidateTurnType = isAnswerAddition ? 'answer_addition' : (isMainAnswer ? 'answer' : 'system');

    return {
      role: 'candidate',
      turnType: q > 0 ? (isAnswerAddition ? 'answer_addition' : 'answer') : 'system',
      questionIndex: q,
      subTurnIndex: isAnswerAddition ? (structuredCurrentSubTurnIndex || 1) : 0,
      isMainQuestion: false,
      isFollowUp: isAnswerAddition,
      isCandidateAnswer: q > 0,
      isIncludedInReport: q > 0
    };
  }

  function emitStructuredTurnFromTranscript(payload){
    try {
      const speaker = String(payload?.speaker || '').toLowerCase();
      const text = String(payload?.text || '').trim();
      if (!text) return;

      const meta = speaker === 'assistant'
        ? inferAssistantStructuredMeta(text)
        : inferCandidateStructuredMeta();

      structuredTurnIndex += 1;

      postToParent('clarity.live.turn', {
        uid: UID || CTX?.uid || CTX?.linkId || '',
        linkId: UID || CTX?.uid || CTX?.linkId || '',
        sessionId: CTX?.sessionId || CTX?.liveSessionId || '',
        companyId: COMPANY_ID || CTX?.companyId || '',
        productType: looksAssessmentContext(CTX) ? 'modul1' : 'interview',
        moduleArea: CTX?.moduleArea || '',
        mode: AUDIO_ONLY ? 'audio' : (CTX?.mode || 'video'),
        position: CTX?.position || '',
        candidateName: CTX?.candidateName || CTX?.name || '',
        candidateEmail: CTX?.candidateEmail || CTX?.employeeEmail || '',
        turnIndex: structuredTurnIndex,
        questionIndex: meta.questionIndex || 0,
        subTurnIndex: meta.subTurnIndex || 0,
        role: meta.role,
        speaker: meta.role,
        turnType: meta.turnType,
        source: meta.role === 'assistant' ? 'assistant_audio' : 'realtime_input',
        originalText: text,
        cleanText: text,
        originalLang: activeInterviewLang(CTX),
        reportLang: activeReportLang(CTX),
        isFinal: payload.final !== false,
        isMainQuestion: !!meta.isMainQuestion,
        isFollowUp: !!meta.isFollowUp,
        isCandidateAnswer: meta.role === 'candidate' && !!meta.isCandidateAnswer,
        isIncludedInReport: meta.isIncludedInReport !== false,
        isTechnical: meta.turnType === 'system',
        itemId: payload.itemId || '',
        responseId: payload.responseId || '',
        sourceEvent: payload.sourceEvent || '',
        createdAt: payload.ts || new Date().toISOString(),
        metaJson: {
          transcriptSeq: payload.seq || 0,
          realtimeModel: REALTIME_MODEL,
          voice: effectiveRealtimeVoice(CTX),
          assessment: looksAssessmentContext(CTX),
          questionSet: CTX?.questionSet || '',
          totalQuestionCount: CTX?.totalQuestionCount || CTX?.questionCount || '',
          mainQuestionIndexLive: structuredCurrentQuestionIndex,
          awaitingFollowUp: structuredAwaitingFollowUpQuestion
        }
      });
    } catch (e) {
      log('[TURN] emit failed', errMsg(e));
    }
  }

  applyStaticTexts();
  setStatus('info', t('init'));

  function transcriptKey(speaker, text, itemId) {
    return [
      String(speaker || '').toLowerCase(),
      String(itemId || ''),
      String(text || '').trim().slice(0, 180)
    ].join('|');
  }

  function looksLikeToolNoise(text){
    const clean = String(text || '').trim();
    if (!clean) return true;
    if (clean === '{}' || clean === '[]') return true;
    if (/^\s*[{[]/.test(clean)) return true;
    if (/^\s*null\s*$/i.test(clean)) return true;
    return false;
  }

  function emitTranscript(speaker, text, extra = {}) {
    const clean = String(text || '').trim();
    if (!clean) return;
    if (speaker === 'assistant' && looksLikeToolNoise(clean)) {
      log('[TRANSCRIPT] skipped assistant tool/noise text', {
        sourceEvent: extra.sourceEvent || '',
        textPreview: clean.slice(0, 120)
      });
      return;
    }

    const key = transcriptKey(
      speaker,
      clean,
      extra.itemId || extra.item_id || extra.responseId || extra.response_id || ''
    );

    if (transcriptSeen.has(key)) return;
    transcriptSeen.add(key);

    transcriptSeq += 1;

    const payload = {
      speaker: speaker || 'unknown',
      text: clean,
      seq: transcriptSeq,
      itemId: extra.itemId || extra.item_id || '',
      responseId: extra.responseId || extra.response_id || '',
      sourceEvent: extra.sourceEvent || '',
      final: extra.final !== false,
      ts: new Date().toISOString()
    };

    log('[TRANSCRIPT]', payload);
    postToParent('rt.transcript.partial', payload);
    emitStructuredTurnFromTranscript(payload);
  }

  function isInterviewDe(ctx = {}) {
    return activeInterviewLang(ctx) === 'de';
  }

  function finalClosingText(ctx = {}){
    if (looksAssessmentContext(ctx) || (typeof isAssessmentContext === 'function' && isAssessmentContext(ctx))) {
      return assessmentFinalClosingText(ctx);
    }
    const profile = langProfile(activeInterviewLang(ctx));
    return profile.finalClose || UI_TEXTS.en.finalClose;
  }

  function normalizeForMatch(value){
    return String(value || '')
      .toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\u00C0-\u024F\u0370-\u03FF\u0400-\u04FF\u0590-\u05FF\u0600-\u06FF\u0900-\u097F\u0E00-\u0E7F\u1E00-\u1EFF\u3040-\u30FF\u3400-\u9FFF\uAC00-\uD7AF]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function finalClosingDetected(text){
    const given = normalizeForMatch(text);
    if (!given) return false;

    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);

    // Normaler Abschluss und Assessment-Hybrid-Handoff sind beide legitime Endsignale.
    // In Hybrid-Modi lautet der letzte Satz bewusst anders, weil danach der Chat-Teil folgt.
    const expectedCandidates = [
      finalClosingText(CTX),
      assessmentHybridClosingText(CTX, lk, profile),
      interviewHybridClosingText(CTX, lk, profile)
    ]
      .map(normalizeForMatch)
      .filter(Boolean);

    for (const expected of expectedCandidates) {
      const expectedLead = expected.slice(0, Math.min(70, expected.length));
      const expectedMid = expected.slice(0, Math.min(140, expected.length));
      const givenLead = given.slice(0, Math.min(90, given.length));

      if (expectedLead && given.includes(expectedLead)) return true;
      if (expectedMid && expected.includes(givenLead)) return true;
    }

    // Fallback-Marker für den Fall, dass das Realtime-Transkript leicht abweicht.
    const universalMarkers = [
      ['do not close', 'interview is being processed'],
      ['please do not close', 'processed'],
      ['bitte schließen', 'interview wird verarbeitet'],
      ['bitte schliessen', 'interview wird verarbeitet'],
      ['no cierre', 'entrevista se esta procesando'],
      ['no cierre', 'entrevista se está procesando'],
      ['ne pas fermer', 'entretien est en cours'],
      ['non chiuda', 'colloquio e in fase'],
      ['nao feche', 'entrevista esta sendo processada'],
      ['niet sluit', 'interview wordt verwerkt'],

      // Assessment-Hybrid-Handoff: mündlicher Teil ist fertig, Chat folgt.
      ['mündliche teil', 'schriftlicher teil', 'chat'],
      ['muendliche teil', 'schriftlicher teil', 'chat'],
      ['spoken part', 'written part', 'chat'],
      ['oral part', 'written part', 'chat'],
      ['parte orale', 'parte scritta', 'chat'],
      ['parte oral', 'parte escrita', 'chat'],
      ['partie orale', 'partie ecrite', 'chat'],
      ['partie orale', 'partie écrite', 'chat']
    ];

    return universalMarkers.some(pair => pair.every(marker => given.includes(normalizeForMatch(marker))));
  }

  function isReadyText(text){
    const normalized = normalizeForMatch(text);
    if (!normalized) return false;

    const allReadyWords = Object.values(LANG_PROFILES)
      .flatMap(profile => profile.readyWords || [])
      .concat(['ready','yes','ja','oui','si','sí','ok','okay','start']);

    return allReadyWords.some(word => {
      const w = normalizeForMatch(word);
      return w && normalized.includes(w);
    });
  }

  function canEndNow(){
    if (!interviewStartedAt) return false;

    const elapsed = (Date.now() - interviewStartedAt) / 1000;

    if (elapsed < MIN_SECONDS_BEFORE_END) return false;
    if (userUtterances < MIN_USER_UTTERANCES) return false;

    // Interview Q-lock: the model must not close before the selected Q-set has been completed.
    // Assessment remains governed by its own policy because it does not use mandatory follow-ups.
    if (shouldBlockEarlyInterviewClosing()) return false;

    return true;
  }

  function beginFinalHangup(source){
    if (END_CALLED) return;
    if (FINAL_HANGUP_TIMER) return;

    log('[END] final hangup scheduled', {
      source: source || 'unknown',
      finalMessageSpoken: FINAL_MESSAGE_SPOKEN,
      itemId: FINAL_MESSAGE_ITEM_ID || '',
      bufferMs: FINAL_HANGUP_BUFFER_MS
    });

    setStatus('warn', t('processing'));

    postToParent('clarity.live.final_message_pending', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      bufferMs: FINAL_HANGUP_BUFFER_MS,
      ts: new Date().toISOString()
    });

    FINAL_HANGUP_TIMER = setTimeout(() => {
      if (END_CALLED) return;

      END_CALLED = true;

      log('[END] final hangup accepted after buffer', {
        source: source || 'unknown',
        bufferMs: FINAL_HANGUP_BUFFER_MS
      });

      postToParent('clarity.live.final_message_done', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        bufferMs: FINAL_HANGUP_BUFFER_MS,
        ts: new Date().toISOString()
      });

      hangup(source || 'final_message_done');
    }, FINAL_HANGUP_BUFFER_MS);
  }

  function requestEndNow(source){
    if (END_CALLED) return;

    if (!canEndNow()){
      log('[END] end_interview IGNORED (too early)', {
        source: source || 'unknown',
        elapsedSec: interviewStartedAt ? ((Date.now() - interviewStartedAt) / 1000).toFixed(1) : '0',
        userUtterances
      });
      return;
    }

    END_REQUESTED_BY_MODEL = true;
    log('[END] end_interview requested by model', source || 'unknown');

    if (FINAL_MESSAGE_SPOKEN) {
      beginFinalHangup(source || 'model_end');
    }
  }

  /* ===== DC Queue ===== */
  function dcSend(obj){
    try {
      if (dcIsOpen && DC?.readyState === 'open'){
        DC.send(JSON.stringify(obj));
      } else {
        dcQueue.push(obj);
        log('[DC] queued', (obj && (obj.type || Object.keys(obj)[0])) || '');
      }
    } catch(e) {
      log('[DC] send fail', errMsg(e));
    }
  }

  function flushDCQueue(){
    if (!dcIsOpen || !DC) return;

    try {
      while (dcQueue.length){
        const m = dcQueue.shift();
        DC.send(JSON.stringify(m));
      }
      log('[DC] queue flushed');
    } catch(e) {
      log('[DC] flush error', errMsg(e));
    }
  }

  /* ===== Token ===== */
  async function getRealtimeToken(payload){
    log('[Live] Fetching token…', TOKEN_URL, JSON.stringify(payload));

    const r = await fetch(TOKEN_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    const txt = await r.text().catch(() => '');
    let data = null;

    try {
      data = txt ? JSON.parse(txt) : null;
    } catch(_) {}

    if (!r.ok) {
      throw new Error('token_http_' + r.status + ': ' + (txt || r.statusText));
    }

    if (!data?.ok) {
      throw new Error('token_error: ' + (data?.error || 'unknown') + ' ' + (data?.message || ''));
    }

    const sec =
      data.client_secret ||
      data?.clientSecret ||
      data?.token ||
      data?.client_secret?.value;

    if (!sec) throw new Error('client_secret_missing');

    log('[Live] effective', {
      lang: data.lang,
      reportLang: data.reportLang,
      voice: data.voice,
      model: data.model
    });

    return { secret: sec, ctx: data };
  }

  /* ===== WebRTC ===== */
  async function connectRealtime(clientSecret){
    if (pc) return;

    pc = new RTCPeerConnection({
      iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
    });

    pc.onconnectionstatechange = () => {
      const state = pc.connectionState || '';
      const ice = pc.iceConnectionState || '';
      log('[RTC]', state, { ice });
      postAudioDiag('rtc_state_change', { state, ice });

      if (state === 'failed' || state === 'disconnected'){
        setStatus('warn', t('disconnected'));
        postAudioDiag('rtc_unstable', { state, ice });
      }
    };

    pc.oniceconnectionstatechange = () => {
      const ice = pc.iceConnectionState || '';
      if (ice === 'failed' || ice === 'disconnected') {
        log('[RTC-DIAG] ice connection state', ice);
        postAudioDiag('ice_unstable', { ice });
      } else if (DEBUG_LOGS) {
        log('[RTC-DIAG] ice connection state', ice);
      }
    };

    pc.ontrack = async (ev) => {
      log('[RTC] ontrack kind=', ev.track.kind);

      if (!remoteStream) remoteStream = new MediaStream();
      remoteStream.addTrack(ev.track);
      $remoteA.srcObject = remoteStream;

      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        remoteSource = audioCtx.createMediaStreamSource(remoteStream);

        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;

        const buf = new Uint8Array(analyser.frequencyBinCount);
        remoteSource.connect(analyser);

        (function tick(){
          if (destroyed) return;

          analyser.getByteTimeDomainData(buf);

          let dev = 0;
          for (let i = 0; i < buf.length; i++) {
            dev = Math.max(dev, Math.abs(buf[i] - 128));
          }

          $sys.style.width = Math.min(100, dev * 2) + '%';

          requestAnimationFrame(tick);
        })();
      } catch(_) {}

      try {
        $remoteA.muted = false;
        $remoteA.volume = 1.0;
        $remoteA.autoplay = true;
        $remoteA.playsInline = true;

        await $remoteA.play();

        audioUnlocked = true;
        $audioBadge.textContent = t('audioReady');
        postToParent('clarity.live.audio_ready', {});
        postAudioDiag('remote_audio_started');
        log('[AUDIO-DIAG] remote audio playing (unlocked).');
      } catch(e) {
        audioUnlocked = false;
        $audioBadge.textContent = t('audioPreparing');
        postToParent('clarity.live.audio_wait', {});
        postAudioDiag('remote_audio_wait', { reason: 'autoplay_blocked' });
        log('[AUDIO-DIAG] autoplay blocked, waiting for user gesture.');
      }

      remoteTrackReadyResolve?.();
    };

    if (localStream){
      localStream.getAudioTracks().forEach(t => {
        t.enabled = false;
        pc.addTrack(t, localStream);
      });

      if (!AUDIO_ONLY) {
        localStream.getVideoTracks().forEach(t => pc.addTrack(t, localStream));
      }

      log('[RTC] local tracks added', {
        audioOnly: AUDIO_ONLY,
        audioTracks: localStream.getAudioTracks().length,
        videoTracks: localStream.getVideoTracks().length
      });
    }

    DC = pc.createDataChannel('oai-events');

    DC.onopen = () => {
      dcIsOpen = true;
      log('[RTC] DC open');
      flushDCQueue();
    };

    DC.onmessage = onRealtimeEvent;

    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: false
    });

    await pc.setLocalDescription(offer);

    // v3.10.2: GA Realtime WebRTC uses /v1/realtime/calls.
    // The old SDP exchange endpoint /v1/realtime?model=... now returns beta_api_shape_disabled.
    const r = await fetch('https://api.openai.com/v1/realtime/calls', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${clientSecret}`,
        'Content-Type': 'application/sdp'
      },
      body: offer.sdp
    });

    if (!r.ok){
      const txt = await r.text().catch(() => r.statusText);
      throw new Error('realtime_handshake_failed: ' + txt);
    }

    const answer = {
      type: 'answer',
      sdp: await r.text()
    };

    await pc.setRemoteDescription(answer);
  }

  function onRealtimeEvent(ev){
    let data = ev && ev.data;

    try {
      if (typeof data === 'string') data = JSON.parse(data);
    } catch(_) {}

    if (!data) return;

    const eventType = data.type || '';

    if (
      eventType.includes('transcript') ||
      eventType.includes('transcription') ||
      eventType.includes('input_audio') ||
      eventType === 'conversation.item.created' ||
      eventType === 'conversation.item.done' ||
      eventType === 'response.output_item.done' ||
      eventType === 'response.output_item.added' ||
      eventType === 'response.function_call_arguments.done'
    ) {
      log('[RT-EVENT-TYPE]', eventType);

      log('[RT-EVENT-CHECK]', {
        type: eventType,
        hasTranscript: !!data?.transcript,
        hasText: !!data?.text,
        hasDelta: !!data?.delta,
        hasError: !!data?.error,
        itemId: data?.item_id || data?.itemId || data?.item?.id || '',
        itemRole: data?.item?.role || '',
        itemType: data?.item?.type || '',
        itemStatus: data?.item?.status || '',
        itemContentTypes: Array.isArray(data?.item?.content)
          ? data.item.content.map(p => p?.type || '').join(',')
          : '',
        error: data?.error?.message || data?.error || ''
      });
    }

    if (eventType === 'response.state' && data.state){
      postToParent('clarity.avatar', { state:data.state });
    }

    /* USER TRANSCRIPT — completed */
    if (
      eventType === 'conversation.item.input_audio_transcription.completed' ||
      eventType === 'input_audio_transcription.completed'
    ) {
      const txtRaw = String(
        data?.transcript ||
        data?.transcription?.text ||
        data?.text ||
        ''
      ).trim();

      const txt = txtRaw.toLowerCase();

      log('[USER-TRANSCRIPT-COMPLETED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasText: !!txtRaw,
        textPreview: txtRaw.slice(0, 160)
      });

      if (txtRaw) {
        userUtterances += 1;

        emitTranscript('user', txtRaw, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });
      }

      if (isReadyText(txtRaw)){
        READY_DETECTED = true;
        maybeAskFirstQuestion();
      }

      return;
    }

    /* USER TRANSCRIPT — delta / segment diagnostics */
    if (
      eventType === 'conversation.item.input_audio_transcription.delta' ||
      eventType === 'input_audio_transcription.delta' ||
      eventType === 'conversation.item.input_audio_transcription.segment' ||
      eventType === 'input_audio_transcription.segment'
    ) {
      const piece = String(
        data?.delta ||
        data?.transcript ||
        data?.text ||
        data?.segment?.text ||
        ''
      ).trim();

      log('[USER-TRANSCRIPT-PIECE]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasPiece: !!piece,
        piecePreview: piece.slice(0, 160)
      });

      return;
    }

    /* USER TRANSCRIPT — failed */
    if (
      eventType === 'conversation.item.input_audio_transcription.failed' ||
      eventType === 'input_audio_transcription.failed'
    ) {
      log('[USER-TRANSCRIPT-FAILED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        error: data?.error?.message || data?.error || 'unknown'
      });

      postToParent('rt.transcript.partial', {
        speaker: 'system',
        text: '[user_transcription_failed]',
        sourceEvent: eventType,
        final: true,
        ts: new Date().toISOString()
      });

      return;
    }

    /* USER AUDIO ITEM / internal user input_text */
    if (
      (eventType === 'conversation.item.created' || eventType === 'conversation.item.done') &&
      data.item &&
      data.item.role === 'user'
    ) {
      const it = data.item;
      const contentTypes = Array.isArray(it.content)
        ? it.content.map(p => p?.type || '').join(',')
        : '';

      const hasInputAudio = contentTypes.includes('input_audio');
      const hasInputText = contentTypes.includes('input_text');

      if (hasInputAudio) {
        log('[TRANSCRIPT] user input_audio item observed, waiting for transcription.completed', {
          itemId: it.id || data.item_id || '',
          contentTypes
        });
        return;
      }

      if (hasInputText) {
        log('[TRANSCRIPT] skipped internal user input_text', {
          itemId: it.id || data.item_id || '',
          contentTypes
        });
        return;
      }

      const texts = [];

      if (Array.isArray(it.content)) {
        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.input_text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }
      }

      const userText = texts.join('\n').trim();

      if (userText) {
        userUtterances += 1;

        emitTranscript('user', userText, {
          itemId: it.id || data.item_id || '',
          responseId: data.response_id || '',
          sourceEvent: eventType,
          final: true
        });

        const low = userText.toLowerCase();
        if (isReadyText(userText)) {
          READY_DETECTED = true;
          maybeAskFirstQuestion();
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — spoken final */
    if (eventType === 'response.audio_transcript.done') {
      postAudioDiag('response_audio_done', {
        itemId: data.item_id || data.itemId || '',
        responseId: data.response_id || data.responseId || ''
      });
      const txt = String(data?.transcript || '').trim();

      if (txt) {
        emitTranscript('assistant', txt, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });

        if (finalClosingDetected(txt)) {
          if (shouldBlockEarlyInterviewClosing()) {
            const target = interviewMainQuestionTarget(CTX);
            const closeEnoughForSafeFinish = structuredCurrentQuestionIndex >= Math.max(1, target - 1) && userUtterances >= Math.max(MIN_USER_UTTERANCES, target);
            if (!closeEnoughForSafeFinish) {
              requestMissingInterviewQuestion('early_final_audio_transcript_done');
              return;
            }
            log('[QLOCK] accepted near-complete final closing to avoid stuck interview', {
              mainQuestions: structuredCurrentQuestionIndex,
              targetQuestions: target,
              userUtterances
            });
          }

          FINAL_MESSAGE_SPOKEN = true;
          FINAL_MESSAGE_ITEM_ID = data.item_id || data.itemId || '';
          log('[END] final/handoff message detected', {
            itemId: FINAL_MESSAGE_ITEM_ID,
            responseId: data.response_id || data.responseId || '',
            isHybrid: isAssessmentHybrid(CTX) || isInterviewHybrid(CTX),
            mainQuestions: structuredCurrentQuestionIndex,
            targetQuestions: interviewMainQuestionTarget(CTX)
          });

          // Robuster Auto-Hangup: Einige Realtime-Läufe sprechen den korrekten
          // Abschluss-/Handoff-Satz, liefern aber den end_interview-Toolcall nicht
          // zuverlässig nach. Nach dem vollständig transkribierten Satz starten wir
          // deshalb den Puffer selbst. Der Button bleibt nur Fallback.
          if (!FINAL_HANGUP_TIMER && !END_CALLED) {
            beginFinalHangup(isAssessmentHybrid(CTX) ? 'hybrid_handoff_audio_done' : (isInterviewHybrid(CTX) ? 'interview_handoff_audio_done' : 'final_audio_transcript_done'));
          }
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — delta diagnostics only */
    if (eventType === 'response.audio_transcript.delta') {
      const piece = String(data?.delta || '').trim();

      if (piece && DEBUG_LOGS) {
        log('[ASSISTANT-TRANSCRIPT-DELTA]', {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          piecePreview: piece.slice(0, 80)
        });
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — text fallback, but ignore tool JSON/noise */
    if (eventType === 'response.text.done') {
      const txt = String(data?.text || '').trim();

      if (looksLikeToolNoise(txt)) {
        log('[TRANSCRIPT] skipped empty/json response.text.done', {
          textPreview: txt.slice(0, 120)
        });
        return;
      }

      emitTranscript('assistant', txt, {
        itemId: data.item_id || data.itemId || '',
        responseId: data.response_id || data.responseId || '',
        sourceEvent: eventType,
        final: true
      });

      return;
    }

    /* ASSISTANT output_item.done */
    if (eventType === 'response.output_item.done' && data.item) {
      const it = data.item;

      if (FINAL_MESSAGE_SPOKEN) {
        const itemId = it.id || data.item_id || data.itemId || '';
        const sameItem = !FINAL_MESSAGE_ITEM_ID || itemId === FINAL_MESSAGE_ITEM_ID;

        if (sameItem || END_REQUESTED_BY_MODEL) {
          beginFinalHangup('final_audio_done');
          return;
        }
      }

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }

      if (Array.isArray(it.content)) {
        const texts = [];

        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }

        const finalText = texts.join('\n').trim();

        if (finalText && !looksLikeToolNoise(finalText)) {
          emitTranscript('assistant', finalText, {
            itemId: it.id || data.item_id || '',
            responseId: data.response_id || '',
            sourceEvent: eventType,
            final: true
          });
        }
      }

      return;
    }

    /* end_interview tool detection */
    if (eventType === 'conversation.item.created' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow('conversation.item.created');
        return;
      }
    }

    if (eventType === 'response.output_item.added' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }
    }

    if (eventType === 'response.function_call_arguments.done'){
      const name =
        data.name ||
        data.tool_name ||
        data.function_name ||
        data?.function_call?.name;

      if (name === 'end_interview'){
        requestEndNow('function_call_arguments.done');
        return;
      }
    }
  }

  /* ===== Audio unlock ===== */
  async function ensureAudioUnlocked(){
    if (audioUnlocked) return true;

    try {
      await $remoteA.play();

      audioUnlocked = true;
      $audioBadge.textContent = t('audioReady');
      postToParent('clarity.live.audio_ready', {});

      return true;
    } catch(_) {}

    postToParent('clarity.live.audio_wait', {});
    setStatus('warn', t('audioClick'));

    return new Promise((resolve) => {
      const unlock = async () => {
        try {
          if (audioCtx && audioCtx.state !== 'running'){
            try {
              await audioCtx.resume();
            } catch(_) {}
          }

          await $remoteA.play();

          audioUnlocked = true;
          $audioBadge.textContent = t('audioReady');
          postToParent('clarity.live.audio_ready', {});

          window.removeEventListener('pointerdown', unlock);
          window.removeEventListener('keydown', unlock);

          resolve(true);
        } catch(_) {}
      };

      window.addEventListener('pointerdown', unlock, { once:true });
      window.addEventListener('keydown', unlock, { once:true });
    });
  }

  /* ===== Instructions / Knowledge ===== */
  function spokenMediaQuestionCap(ctx = CTX){
    const mode = String(ctx?.interviewMode || ctx?.assessmentMode || ctx?.mode || (AUDIO_ONLY ? 'audio' : 'video')).toLowerCase();
    const isChatLike = ['chat','hybrid','mix','mixmode','video_chat','audio_chat'].includes(mode);
    // Launch policy: spoken video/audio sessions are capped at Q30.
    // Q40/Q50 can remain available for chat/hybrid/future products outside this live voice flow.
    return isChatLike ? 50 : 30;
  }

  function interviewMaxQuestions(ctx = CTX){
    const cap = spokenMediaQuestionCap(ctx);
    const direct = Number(ctx?.interviewConfig?.maxQuestions || ctx?.questionCount || ctx?.maxQuestions || 0);
    if (Number.isFinite(direct) && direct > 0) return Math.max(1, Math.min(cap, Math.round(direct)));
    const raw = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || '').toUpperCase();
    const m = raw.match(/(10|20|30|40|50)/);
    return m ? Math.max(1, Math.min(cap, Number(m[1]))) : 10;
  }

  function parseQuestionLines(text){
    const raw = String(text || '').trim();
    if (!raw) return [];

    const out = [];
    const seen = new Set();
    raw
      .split(/\r?\n|(?=\b\d{1,2}[.)]\s+)/g)
      .map(line => line.replace(/^\s*[-•*]+\s*/, '').replace(/^\s*\d{1,2}[.)]\s*/, '').trim())
      .filter(Boolean)
      .forEach(line => {
        const clean = line.replace(/\s+/g, ' ');
        const key = clean.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          out.push(clean);
        }
      });
    return out;
  }

  function questionPolicyText(ctx = CTX){
    const maxQ = interviewMaxQuestions(ctx);
    const qset = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || `Q${maxQ}`).toUpperCase();
    const customQuestions = parseQuestionLines(ctx?.customQuestionsText || ctx?.questionsText || '');
    const missing = Math.max(0, maxQ - customQuestions.length);
    const capNoteDe = spokenMediaQuestionCap(ctx) === 30 ? ' Für Video- und Audio-Interviews ist Q30 das aktuelle Maximum im Live-Gespräch.' : '';
    const capNoteEn = spokenMediaQuestionCap(ctx) === 30 ? ' For video and audio interviews, Q30 is the current maximum for the live conversation.' : '';
    const hybridNoteDe = isInterviewHybrid(ctx) ? ` Dies ist nur der mündliche Teil eines hybriden Interviews. Stelle hier genau ${maxQ} mündliche Hauptfragen; der restliche schriftliche Teil folgt im Chat. Beende den mündlichen Teil mit dem vorgegebenen Übergabesatz.` : '';
    const hybridNoteEn = isInterviewHybrid(ctx) ? ` This is only the spoken part of a hybrid interview. Ask exactly ${maxQ} spoken main questions here; the remaining written part follows in chat. End the spoken part with the provided handoff message.` : '';

    if (activeInterviewLang(ctx) === 'de') {
      return customQuestions.length
        ? `Interner Interviewumfang ${qset}: Stelle genau ${maxQ} Hauptfragen. Nutze zuerst die kundeneigenen Fragen aus dem Kontext. Wenn weniger als ${maxQ} kundeneigene Fragen vorhanden sind, ergänze ${missing} passende rollenbezogene Fragen. Zähle nur intern mit: Hauptfragen zählen, Anschluss-/Ergänzungsfragen zählen niemals als Hauptfrage. Sage im Gespräch keine Fragennummern, kein Q10/Q20/Q30 und keine Formulierungen wie „zweite Frage“, „Frage 8“ oder „letzte Frage“. Nutze stattdessen natürliche professionelle Übergänge. Beende das Interview erst nach genau ${maxQ} Hauptfragen.${capNoteDe}${hybridNoteDe}`
        : `Interner Interviewumfang ${qset}: Stelle genau ${maxQ} passende rollenbezogene Hauptfragen. Zähle nur intern mit: Hauptfragen zählen, Anschluss-/Ergänzungsfragen zählen niemals als Hauptfrage. Sage im Gespräch keine Fragennummern, kein Q10/Q20/Q30 und keine Formulierungen wie „zweite Frage“, „Frage 8“ oder „letzte Frage“. Nutze stattdessen natürliche professionelle Übergänge. Die letzte Hauptfrage sollte nach Möglichkeit den ersten 90 Tagen in der Rolle gelten. Beende das Interview erst nach genau ${maxQ} Hauptfragen.${capNoteDe}${hybridNoteDe}`;
    }

    return customQuestions.length
      ? `Internal interview scope ${qset}: Ask exactly ${maxQ} main questions. Use the customer's own questions from context first. If fewer than ${maxQ} customer questions are available, add ${missing} suitable role-specific questions. Count silently: main questions count, follow-up/addition opportunities never count as main questions. Do not announce question numbers, Q10/Q20/Q30, or phrases like “question 8”, “second question”, or “last question” to the candidate. Use natural professional transitions instead. End the interview only after exactly ${maxQ} main questions.${capNoteEn}${hybridNoteEn}`
      : `Internal interview scope ${qset}: Ask exactly ${maxQ} suitable role-specific main questions. Count silently: main questions count, follow-up/addition opportunities never count as main questions. Do not announce question numbers, Q10/Q20/Q30, or phrases like “question 8”, “second question”, or “last question” to the candidate. Use natural professional transitions instead. The final main question should preferably address the candidate's first 90 days in the role. End the interview only after exactly ${maxQ} main questions.${capNoteEn}${hybridNoteEn}`;
  }

  function isAssessmentContext(ctx){
    return String(ctx?.productType || '').toLowerCase() === 'modul1' || ctx?.assessment === true || String(ctx?.interviewMode || '').toLowerCase() === 'assessment';
  }

  function isInterviewHybrid(ctx){
    if (isAssessmentContext(ctx)) return false;
    const product = String(ctx?.productType || '').toLowerCase();
    const mode = String(ctx?.interviewMode || ctx?.mode || '').toLowerCase();
    return product === 'interview' && (ctx?.hybridInterview === true || Number(ctx?.chatQuestionCount || 0) > 0 || ['hybrid','mix','mixmode','video_chat','audio_chat'].includes(mode));
  }

  function interviewHybridClosingText(ctx, lk, profile){
    const chatQ = Number(ctx?.chatQuestionCount || 0);
    if (!(chatQ > 0) && !isInterviewHybrid(ctx)) return '';
    if (lk === 'de') {
      return 'Der mündliche Teil des Interviews ist jetzt abgeschlossen. Bitte schließen Sie dieses Fenster nicht und bleiben Sie auf der Seite. Es folgt nun ein kurzer schriftlicher Teil im Chat. Bitte warten Sie, bis der Chat angezeigt wird, und beantworten Sie dort die letzten Fragen.';
    }
    if (lk === 'it') {
      return 'La parte orale del colloquio è ora conclusa. Per favore non chiuda questa finestra e resti su questa pagina. Ora seguirà una breve parte scritta nella chat. Attenda che la chat venga visualizzata e risponda lì alle ultime domande.';
    }
    if (lk === 'es') {
      return 'La parte oral de la entrevista ha finalizado. Por favor, no cierre esta ventana y permanezca en esta página. A continuación seguirá una breve parte escrita en el chat. Espere hasta que aparezca el chat y responda allí las últimas preguntas.';
    }
    if (lk === 'fr') {

  function assessmentArea(ctx){
    const raw = String(ctx?.moduleArea || ctx?.assessmentArea || 'personality').toLowerCase();
    if (raw === 'skill') return 'skills';

    return ['aptitude','personality','skills','language'].includes(raw) ? raw : 'personality';
  }

  function assessmentAreaLabel(area, lk){
    const maps = {
      de: { aptitude:'Aptitude-Analyse', personality:'Persönlichkeitsanalyse', skills:'Skills-Analyse', language:'Sprachanalyse' },
      en: { aptitude:'aptitude analysis', personality:'personality analysis', skills:'skills analysis', language:'language analysis' },

      nl: { aptitude:'aptitude-analyse', personality:'persoonlijkheidsanalyse', skills:'vaardighedenanalyse', language:'taalanalyse' }
    };
    return (maps[lk] || maps.en)[area] || area;

  function assessmentFocusText(area, lk, hasPosition){
    const de = {
      aptitude: 'Fokus: logisches Denken, Problemlösung, Strukturierungsfähigkeit, Lernfähigkeit, Umgang mit Komplexität und Entscheidungsqualität.',
      personality: 'Fokus: Arbeitsstil, Motivation, Kommunikation, Zusammenarbeit, Konfliktverhalten, Druckverhalten und persönliche Arbeitspräferenzen.',
      skills: 'Fokus: praktische Fähigkeiten, Methodenkompetenz, Tool-Erfahrung, Projektbeispiele, Umsetzungskraft und Übertragbarkeit auf neue Aufgaben.',
      language: 'Fokus: Sprachkompetenz, Verständlichkeit, Flüssigkeit, Wortschatz, Grammatik/Struktur, Fachterminologie, Spontanität und berufliche Kommunikationsklarheit. Bewerte NICHT die fachliche Eignung, sondern die sprachliche Leistung.'
    };
    const en = {
      aptitude: 'Focus: logical reasoning, problem solving, structuring ability, learning agility, complexity handling and decision quality.',
      personality: 'Focus: work style, motivation, communication, collaboration, conflict behaviour, pressure behaviour and work preferences.',
      skills: 'Focus: practical expertise, methods, tools, project evidence, execution strength and transferability to new tasks.',
      language: 'Focus: language competence, clarity, fluency, vocabulary, grammar/structure, professional terminology, spontaneity and professional communication clarity. Do NOT evaluate subject-matter suitability; evaluate communication performance.'
    };
    const base = (lk === 'de' ? de : en)[area] || '';
    if (lk === 'de') {
      return base + ' ' + (hasPosition ? 'Die angegebene Position darf als Kontext genutzt werden, aber die Analyse bleibt strikt im genannten Fokusbereich.' : 'Es ist keine Zielposition angegeben. Stelle allgemeine Fragen für diesen Analysebereich ohne Firmen- oder Rollenannahmen.');
    }
    return base + ' ' + (hasPosition ? 'The target position may be used as context, but the assessment must stay strictly within this area.' : 'No target position is specified. Ask general questions for this assessment area without company or role assumptions.');
  }

  function assessmentQuestionPolicyText(ctx, lk){
    const maxQ = interviewMaxQuestions(ctx);
    const qset = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || `Q${maxQ}`).toUpperCase();
    const area = assessmentArea(ctx);
    const chatQ = Number(ctx?.chatQuestionCount || 0);
    const hybridNoteDe = chatQ > 0 ? ` Dies ist nur der mündliche Teil eines Hybrid-Assessments. Stelle hier höchstens ${maxQ} mündliche Hauptfragen; der restliche schriftliche Teil folgt im Chat. Erwähne am Ende, dass anschließend ein kurzer schriftlicher Teil folgt.` : '';
    const hybridNoteEn = chatQ > 0 ? ` This is only the spoken part of a hybrid assessment. Ask at most ${maxQ} spoken main questions here; the remaining written part follows in chat. At the end, mention that a short written part will follow.` : '';
    if (lk === 'de') {
      return `Analysetiefe ${qset}: Stelle maximal ${maxQ} Hauptfragen für die ${assessmentAreaLabel(area, lk)}. Stelle immer nur EINE Frage zur Zeit. Keine kundeneigenen Interviewfragen verwenden. Beende die Analyse erst nach ausreichend Antworten und nach einer klaren Abschlussmeldung.${hybridNoteDe}`;
    }
    return `Analysis depth ${qset}: Ask at most ${maxQ} main questions for the ${assessmentAreaLabel(area, lk)}. Ask exactly ONE question at a time. Do not use customer interview questions. End the assessment only after sufficient answers and a clear closing message.${hybridNoteEn}`;
  }

    }
    return 'The spoken part is now complete. Please do not close this window and stay on this page. A short written part will now follow in chat. Please wait until the chat appears and answer the final questions there.';

  function buildAssessmentSystemInstructions(ctx, lk, profile, finalClose){
    const area = assessmentArea(ctx);
    const hasPosition = !!String(ctx?.position || '').trim();
    const assessmentClose = assessmentHybridClosingText(ctx, lk, profile) || finalClose;

      return [

        assessmentQuestionPolicyText(ctx, lk),
        'Stelle niemals zwei Fragen in einer Nachricht. Jede Nachricht darf maximal eine Frage enthalten.',
        'Nach jeder Frage warten, bis die Person wirklich fertig geantwortet hat. Kurze Atemgeräusche, Füllwörter oder sehr kurze Geräusche zählen NICHT als Antwort. Warte nach einer Antwort einen natürlichen Moment, damit die Person ergänzen kann, und stelle erst dann die nächste Frage.',
        'Starte die erste Frage erst, nachdem die Person „bereit“ gesagt hat oder nach Fallback-Timeout.',
        `Wenn alle mündlichen Assessment-Fragen abgeschlossen sind, sage zum Abschluss EXAKT diesen Satz, ohne technische Details hinzuzufügen: „${assessmentClose}“ Danach rufe end_interview auf.`,

      ].join(' ');
    }
    return [

      assessmentFocusText(area, lk, hasPosition),
      assessmentQuestionPolicyText(ctx, lk),
      'Never ask two questions in one message. Each assistant message may contain at most one question.',
      'After each question, wait until the participant has truly finished answering. Breathing, filler words, or very short noises do NOT count as an answer. Leave a natural pause after each answer so the participant can add more, and only then continue.',
      `Ask the first question only after the user says one of these readiness words or after the fallback timeout: ${(profile.readyWords || ['ready']).join(', ')}.`,
      `When all assessment questions are completed, say exactly this closing message in ${profile.englishName} and do not add technical details: “${assessmentClose}” Then call end_interview.`,
      `Call end_interview ONLY when the assessment is truly complete. NEVER before. Minimum: at least ${MIN_USER_UTTERANCES} participant answers and a complete closing.`
    ].join(' ');

  function buildSystemInstructions(ctx){
    const lk = activeInterviewLang(ctx);
    const profile = langProfile(lk);
    const finalClose = isInterviewHybrid(ctx) ? interviewHybridClosingText(ctx, lk, profile) : finalClosingText({ ...ctx, lang: lk });

      return buildAssessmentSystemInstructions(ctx, lk, profile, finalClose);
    }

    if (lk === 'de') {
      return [
        'Sprich ausschließlich DEUTSCH. Wechsle nie die Sprache.',
        'Führe ein strukturiertes Job-Interview: nur EINE Hauptfrage zur Zeit, danach genau eine kurze natürliche Anschlussfrage oder Ergänzungsmöglichkeit. Bleibe strikt am Jobprofil und stelle nie zwei Hauptfragen in einer Nachricht.',
        questionPolicyText(ctx),
        'Ablauf pro Hauptfrage: 1) stelle die Hauptfrage, 2) warte die Antwort vollständig ab, 3) stelle genau eine kurze Anschlussreaktion. Diese darf natürlich variieren: kurze Ergänzungsmöglichkeit, kurze Verständnis-/Vertiefungsfrage oder Angebot zum Fortfahren. Verwende nicht immer dieselbe Formulierung. 4) warte diese Ergänzungsantwort ab, 5) erst dann nächste Hauptfrage. Diese Anschlussfrage zählt NICHT als Hauptfrage. Sprich natürlich und professionell, nicht mechanisch oder nummeriert.',
        'Nach jeder Frage warten, bis die Kandidatin/der Kandidat wirklich fertig ist. Kurze Atemgeräusche, Füllwörter oder sehr kurze Geräusche zählen NICHT als Antwort. Gib nach einer Antwort einen natürlichen Moment für Ergänzungen, bevor du fortfährst.',
        'Nutze ausschließlich die FIRMENKENNTNISSE aus „KONTEXT“ für Antworten zu Firma, Stelle, Prozessen, Benefits usw. Wenn etwas nicht im KONTEXT steht, sage freundlich, dass dies mit der Firma direkt zu klären ist.',
        'Starte die erste Frage erst, nachdem die Person „bereit“ gesagt hat (oder nach Fallback-Timeout).',
        `Erst wenn genau ${interviewMainQuestionTarget(ctx)} Hauptfragen gestellt und die letzte Antwort/Ergänzung abgeschlossen ist, sage zum Abschluss EXAKT diesen Satz, ohne technische Details hinzuzufügen: „${finalClose}“ Danach rufe end_interview auf.`,
        `Rufe end_interview NUR auf, wenn das Interview wirklich abgeschlossen ist. Vorher NIEMALS. Mindestanforderung: mindestens ${MIN_USER_UTTERANCES} Kandidaten-Antworten und ein sinnvoller Abschluss/Verabschiedung.`
      ].join(' ');
    }

    return [
