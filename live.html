<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Live Interview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg:#ffffff;
      --fg:#111827;
      --muted:#6b7280;
      --ok:#047857;
      --warn:#92400e;
      --err:#b91c1c;
      --card:#ffffff;
      --line:#e5e7eb;
      --soft:#f8fafc;
      --bar:#e5e7eb;
      --accent:#4f46e5;
      --shadow:0 16px 40px rgba(15,23,42,.10);
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--fg);
      font:14px/1.45 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }

    .wrap{
      display:grid;
      grid-template-columns:1fr 300px;
      gap:16px;
      padding:14px;
      align-items:start;
      background:#ffffff;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(229,231,235,.65);
      border-radius:16px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .row{display:flex;gap:10px;align-items:center}

    .bar{
      height:6px;
      background:var(--bar);
      border-radius:999px;
      overflow:hidden;
    }

    .bar > i{
      display:block;
      height:100%;
      width:0;
      background:var(--accent);
      transition:width 50ms linear;
    }

    .badge{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      background:#f8fafc;
      border:1px solid #e2e8f0;
      color:#334155;
      font-size:12px;
    }

    .muted{color:var(--muted)}

    .btn{
      appearance:none;
      border:1px solid #cbd5e1;
      background:#ffffff;
      color:#111827;
      border-radius:10px;
      padding:8px 12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(15,23,42,.08);
    }

    .btn:hover{background:#f8fafc}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    video{
      width:100%;
      max-height:320px;
      background:#ffffff;
      border-radius:12px;
      box-shadow:0 10px 28px rgba(15,23,42,.10);
      border:0;
    }

    audio{width:100%}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .log{
      font-family:ui-monospace,Menlo,Consolas,monospace;
      font-size:12px;
      color:#6b7280;
      white-space:pre-wrap;
      max-height:260px;
      overflow:auto;
      background:#f8fafc;
      border-radius:12px;
      padding:8px;
      border:1px solid #e5e7eb;
    }

    .ghost{opacity:.72}

    .debugOnly{display:none}
    body.debug-ui .debugOnly{display:block}

    body.audio-only #cameraLabel,
    body.audio-only #localVideo{
      display:none;
    }

    body.audio-only .wrap{
      grid-template-columns:1fr;
    }

    body.audio-only .grid2{
      grid-template-columns:1fr;
    }

    @media (max-width:900px){
      .wrap{grid-template-columns:1fr}
      .grid2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <div id="status" class="badge">Initialisierung…</div>
          <div id="audioBadge" class="badge" style="margin-left:6px">Audio wird vorbereitet</div>
        </div>
        <div class="row">
          <button id="btnStop" class="btn">Interview beenden</button>
        </div>
      </div>

      <div class="grid2" style="margin-top:12px">
        <div>
          <div id="cameraLabel" class="muted" style="margin-bottom:6px">Kamera-Vorschau</div>
          <video id="localVideo" autoplay playsinline muted></video>
          <div id="micLabel" class="muted" style="margin:8px 0 4px">Mikrofon</div>
          <div class="bar"><i id="micLevel"></i></div>
        </div>
        <div>
          <div id="assistantAudioLabel" class="muted" style="margin-bottom:6px">Interview-Audio</div>
          <audio id="remoteAudio" controls></audio>
          <div id="systemLabel" class="muted" style="margin:8px 0 4px">System</div>
          <div class="bar"><i id="sysLevel"></i></div>
          <div id="autoplayHint" class="muted" style="margin-top:10px">Falls kein Ton zu hören ist, klicken Sie einmal in den Player.</div>
        </div>
      </div>
    </section>

    <aside class="card debugOnly" id="debugPanel">
      <div id="recorderTitle" style="font-weight:600;margin-bottom:8px">Recorder / Upload</div>
      <div class="row">
        <div class="badge ghost" id="recState">idle</div>
        <div class="badge ghost" id="muxState" style="margin-left:6px">no upload</div>
      </div>
      <div id="progressLabel" class="muted" style="margin:8px 0 4px">Fortschritt</div>
      <div class="bar"><i id="recProgress"></i></div>
      <div id="logsLabel" class="muted" style="margin:10px 0 4px">Logs</div>
      <div id="log" class="log"></div>
    </aside>
  </div>

  function firstNonEmpty(...values){
    for (const value of values) {
      const s = String(value || '').trim();
      if (s) return s;
    }
    return '';
  }

  function getInterviewLangRaw(ctx = {}){
    return firstNonEmpty(
      ctx.userCommLang,
      ctx.interviewLang,
      ctx.interviewLanguage,
      ctx.userLanguage,
      ctx.userLang,
      ctx.spokenLang,
      ctx.language,
      ctx.lang,
      LANG
    );
  }

  function getReportLangRaw(ctx = {}){
    return firstNonEmpty(
      ctx.reportLang,
      ctx.reportLanguage,
      ctx.pdfLang,
      ctx.pdfLanguage,
      ctx.outputLang,
      ctx.outputLanguage,
      LANG
    );
  }

  function normalizeLangToken(raw){
    return String(raw || '')
      .trim()
      .toLowerCase()
      .replace(/[._]/g, '-')
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/\s+/g, ' ');
  }

  function langKey(raw){
    const original = String(raw || LANG || 'en').trim();
    if (!original) return 'en';

    const lowerOriginal = original.toLowerCase();
    if (LANG_PROFILES[lowerOriginal]) return lowerOriginal;

    const normalized = normalizeLangToken(original);
    const firstPart = normalized.split(/[-\s/]+/).filter(Boolean)[0] || normalized;

    if (LANG_PROFILES[firstPart]) return firstPart;
    if (LANG_ALIASES[normalized]) return LANG_ALIASES[normalized];
    if (LANG_ALIASES[firstPart]) return LANG_ALIASES[firstPart];

    for (const key of Object.keys(LANG_ALIASES)) {
      if (normalized.includes(key)) return LANG_ALIASES[key];
    }

    return 'en';
  }

  function activeInterviewLang(ctx = CTX){
    return langKey(getInterviewLangRaw(ctx || {}));
  }

  function activeReportLang(ctx = CTX){
    return langKey(getReportLangRaw(ctx || {}));
  }

  function langProfile(code){
    return LANG_PROFILES[code] || LANG_PROFILES.en;
  }

  function normalizeIncomingContext(data = {}){
    const incoming = data || {};
    const merged = { ...CTX, ...incoming };

    // Wichtig: Die Interview-Sprache kommt je nach Seite/DB unter verschiedenen Feldnamen.
    // Für die Live-KI wird sie zentral als CTX.lang normalisiert.
    merged.lang = activeInterviewLang(merged);
    merged.reportLang = activeReportLang(merged);

    return merged;
  }

  function transcriptKey(speaker, text, itemId) {
    return [
      String(speaker || '').toLowerCase(),
      String(itemId || ''),
      String(text || '').trim().slice(0, 180)
    ].join('|');
  }

  function looksLikeToolNoise(text){
    const clean = String(text || '').trim();
    if (!clean) return true;
    if (clean === '{}' || clean === '[]') return true;
    if (/^\s*[{[]/.test(clean)) return true;
    if (/^\s*null\s*$/i.test(clean)) return true;
    return false;
  }

  function emitTranscript(speaker, text, extra = {}) {
    const clean = String(text || '').trim();
    if (!clean) return;
    if (speaker === 'assistant' && looksLikeToolNoise(clean)) {
      log('[TRANSCRIPT] skipped assistant tool/noise text', {
        sourceEvent: extra.sourceEvent || '',
        textPreview: clean.slice(0, 120)
      });
      return;
    }

    const key = transcriptKey(
      speaker,
      clean,
      extra.itemId || extra.item_id || extra.responseId || extra.response_id || ''
    );

    if (transcriptSeen.has(key)) return;
    transcriptSeen.add(key);

    transcriptSeq += 1;

    const payload = {
      speaker: speaker || 'unknown',
      text: clean,
      seq: transcriptSeq,
      itemId: extra.itemId || extra.item_id || '',
      responseId: extra.responseId || extra.response_id || '',
      sourceEvent: extra.sourceEvent || '',
      final: extra.final !== false,
      ts: new Date().toISOString()
    };

    log('[TRANSCRIPT]', payload);
    postToParent('rt.transcript.partial', payload);
  }

  function isInterviewDe(ctx = {}) {

  function normalizeForMatch(value){
    return String(value || '')
      .toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\u00C0-\u024F\u0370-\u03FF\u0400-\u04FF\u0590-\u05FF\u0600-\u06FF\u0900-\u097F\u0E00-\u0E7F\u1E00-\u1EFF\u3040-\u30FF\u3400-\u9FFF\uAC00-\uD7AF]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function finalClosingDetected(text){
    const given = normalizeForMatch(text);
    const expected = normalizeForMatch(finalClosingText(CTX));

    if (given && expected) {
      const expectedLead = expected.slice(0, Math.min(70, expected.length));
      const expectedMid = expected.slice(0, Math.min(120, expected.length));

      if (expectedLead && given.includes(expectedLead)) return true;
      if (expectedMid && expected.includes(given.slice(0, Math.min(70, given.length)))) return true;
    }

    // Fallback-Marker für den Fall, dass das Realtime-Transkript leicht abweicht.
    const universalMarkers = [
      ['do not close', 'interview is being processed'],
      ['please do not close', 'processed'],
      ['bitte schließen', 'interview wird verarbeitet'],
      ['bitte schliessen', 'interview wird verarbeitet'],
      ['no cierre', 'entrevista se esta procesando'],
      ['no cierre', 'entrevista se está procesando'],
      ['ne pas fermer', 'entretien est en cours'],
      ['non chiuda', 'colloquio e in fase'],
      ['nao feche', 'entrevista esta sendo processada'],
      ['niet sluit', 'interview wordt verwerkt']
    ];

    return universalMarkers.some(pair => pair.every(marker => given.includes(normalizeForMatch(marker))));
  }

  function isReadyText(text){
    const normalized = normalizeForMatch(text);
    if (!normalized) return false;

    const allReadyWords = Object.values(LANG_PROFILES)
      .flatMap(profile => profile.readyWords || [])
      .concat(['ready','yes','ja','oui','si','sí','ok','okay','start']);

    return allReadyWords.some(word => {
      const w = normalizeForMatch(word);
      return w && normalized.includes(w);
    });
  }

  function canEndNow(){
    if (!interviewStartedAt) return false;

    const elapsed = (Date.now() - interviewStartedAt) / 1000;

    if (elapsed < MIN_SECONDS_BEFORE_END) return false;
    if (userUtterances < MIN_USER_UTTERANCES) return false;

    return true;
  }

  function beginFinalHangup(source){
    if (END_CALLED) return;
    if (FINAL_HANGUP_TIMER) return;

    log('[END] final hangup scheduled', {
      source: source || 'unknown',
      finalMessageSpoken: FINAL_MESSAGE_SPOKEN,
      itemId: FINAL_MESSAGE_ITEM_ID || '',
      bufferMs: FINAL_HANGUP_BUFFER_MS
    });

    setStatus('warn', t('processing'));

    postToParent('clarity.live.final_message_pending', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      bufferMs: FINAL_HANGUP_BUFFER_MS,
      ts: new Date().toISOString()
    });

    FINAL_HANGUP_TIMER = setTimeout(() => {
      if (END_CALLED) return;

      END_CALLED = true;

      log('[END] final hangup accepted after buffer', {
        source: source || 'unknown',
        bufferMs: FINAL_HANGUP_BUFFER_MS
      });

      postToParent('clarity.live.final_message_done', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        bufferMs: FINAL_HANGUP_BUFFER_MS,
        ts: new Date().toISOString()
      });

      hangup(source || 'final_message_done');
    }, FINAL_HANGUP_BUFFER_MS);
  }

  function requestEndNow(source){
    if (END_CALLED) return;

    if (!canEndNow()){
      log('[END] end_interview IGNORED (too early)', {
        source: source || 'unknown',
        elapsedSec: interviewStartedAt ? ((Date.now() - interviewStartedAt) / 1000).toFixed(1) : '0',
        userUtterances
      });
      return;
    }

    END_REQUESTED_BY_MODEL = true;
    log('[END] end_interview requested by model', source || 'unknown');

    if (FINAL_MESSAGE_SPOKEN) {
      beginFinalHangup(source || 'model_end');
    }
  }

  /* ===== DC Queue ===== */
  function dcSend(obj){
    try {
      if (dcIsOpen && DC?.readyState === 'open'){
        DC.send(JSON.stringify(obj));
      } else {
        dcQueue.push(obj);
        log('[DC] queued', (obj && (obj.type || Object.keys(obj)[0])) || '');
      }
    } catch(e) {
      log('[DC] send fail', errMsg(e));
    }
  }

  function flushDCQueue(){
    if (!dcIsOpen || !DC) return;

    try {
      while (dcQueue.length){
        const m = dcQueue.shift();
        DC.send(JSON.stringify(m));
      }
      log('[DC] queue flushed');
    } catch(e) {
      log('[DC] flush error', errMsg(e));
    }
  }

  /* ===== Token ===== */
  async function getRealtimeToken(payload){
    log('[Live] Fetching token…', TOKEN_URL, JSON.stringify(payload));

    const r = await fetch(TOKEN_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    const txt = await r.text().catch(() => '');
    let data = null;

    try {
      data = txt ? JSON.parse(txt) : null;
    } catch(_) {}

    if (!r.ok) {
      throw new Error('token_http_' + r.status + ': ' + (txt || r.statusText));
    }

    if (!data?.ok) {
      throw new Error('token_error: ' + (data?.error || 'unknown') + ' ' + (data?.message || ''));
    }

    const sec =
      data.client_secret ||
      data?.clientSecret ||
      data?.token ||
      data?.client_secret?.value;

    if (!sec) throw new Error('client_secret_missing');

    log('[Live] effective', {
      lang: data.lang,
      reportLang: data.reportLang,
      voice: data.voice,
      model: data.model
    });

    return { secret: sec, ctx: data };
  }

  /* ===== WebRTC ===== */
  async function connectRealtime(clientSecret){
    if (pc) return;

    pc = new RTCPeerConnection({
      iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
    });

    pc.onconnectionstatechange = () => {
      log('[RTC]', pc.connectionState);

      if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected'){
        setStatus('warn', t('disconnected'));
      }
    };

    pc.ontrack = async (ev) => {
      log('[RTC] ontrack kind=', ev.track.kind);

      if (!remoteStream) remoteStream = new MediaStream();
      remoteStream.addTrack(ev.track);
      $remoteA.srcObject = remoteStream;

      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        remoteSource = audioCtx.createMediaStreamSource(remoteStream);

        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;

        const buf = new Uint8Array(analyser.frequencyBinCount);
        remoteSource.connect(analyser);

        (function tick(){
          if (destroyed) return;

          analyser.getByteTimeDomainData(buf);

          let dev = 0;
          for (let i = 0; i < buf.length; i++) {
            dev = Math.max(dev, Math.abs(buf[i] - 128));
          }

          $sys.style.width = Math.min(100, dev * 2) + '%';

          requestAnimationFrame(tick);
        })();
      } catch(_) {}

      try {
        $remoteA.muted = false;
        $remoteA.volume = 1.0;
        $remoteA.autoplay = true;
        $remoteA.playsInline = true;

        await $remoteA.play();

        audioUnlocked = true;
        $audioBadge.textContent = t('audioReady');
        postToParent('clarity.live.audio_ready', {});
        log('[AUDIO] remote audio playing (unlocked).');
      } catch(e) {
        audioUnlocked = false;
        $audioBadge.textContent = t('audioPreparing');
        postToParent('clarity.live.audio_wait', {});
        log('[AUDIO] autoplay blocked, waiting for user gesture.');
      }

      remoteTrackReadyResolve?.();
    };

    if (localStream){
      localStream.getAudioTracks().forEach(t => {
        t.enabled = false;
        pc.addTrack(t, localStream);
      });

      if (!AUDIO_ONLY) {
        localStream.getVideoTracks().forEach(t => pc.addTrack(t, localStream));
      }

      log('[RTC] local tracks added', {
        audioOnly: AUDIO_ONLY,
        audioTracks: localStream.getAudioTracks().length,
        videoTracks: localStream.getVideoTracks().length
      });
    }

    DC = pc.createDataChannel('oai-events');

    DC.onopen = () => {
      dcIsOpen = true;
      log('[RTC] DC open');
      flushDCQueue();
    };

    DC.onmessage = onRealtimeEvent;

    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: false
    });

    await pc.setLocalDescription(offer);

    const r = await fetch('https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${clientSecret}`,
        'Content-Type': 'application/sdp'
      },
      body: offer.sdp
    });

    if (!r.ok){
      const txt = await r.text().catch(() => r.statusText);
      throw new Error('realtime_handshake_failed: ' + txt);
    }

    const answer = {
      type: 'answer',
      sdp: await r.text()
    };

    await pc.setRemoteDescription(answer);
  }

  function onRealtimeEvent(ev){
    let data = ev && ev.data;

    try {
      if (typeof data === 'string') data = JSON.parse(data);
    } catch(_) {}

    if (!data) return;

    const eventType = data.type || '';

    if (
      eventType.includes('transcript') ||
      eventType.includes('transcription') ||
      eventType.includes('input_audio') ||
      eventType === 'conversation.item.created' ||
      eventType === 'conversation.item.done' ||
      eventType === 'response.output_item.done' ||
      eventType === 'response.output_item.added' ||
      eventType === 'response.function_call_arguments.done'
    ) {
      log('[RT-EVENT-TYPE]', eventType);

      log('[RT-EVENT-CHECK]', {
        type: eventType,
        hasTranscript: !!data?.transcript,
        hasText: !!data?.text,
        hasDelta: !!data?.delta,
        hasError: !!data?.error,
        itemId: data?.item_id || data?.itemId || data?.item?.id || '',
        itemRole: data?.item?.role || '',
        itemType: data?.item?.type || '',
        itemStatus: data?.item?.status || '',
        itemContentTypes: Array.isArray(data?.item?.content)
          ? data.item.content.map(p => p?.type || '').join(',')
          : '',
        error: data?.error?.message || data?.error || ''
      });
    }

    if (eventType === 'response.state' && data.state){
      postToParent('clarity.avatar', { state:data.state });
    }

    /* USER TRANSCRIPT — completed */
    if (
      eventType === 'conversation.item.input_audio_transcription.completed' ||
      eventType === 'input_audio_transcription.completed'
    ) {
      const txtRaw = String(
        data?.transcript ||
        data?.transcription?.text ||
        data?.text ||
        ''
      ).trim();

      const txt = txtRaw.toLowerCase();

      log('[USER-TRANSCRIPT-COMPLETED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasText: !!txtRaw,
        textPreview: txtRaw.slice(0, 160)
      });

      if (txtRaw) {
        userUtterances += 1;

        emitTranscript('user', txtRaw, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });
      }

      if (isReadyText(txtRaw)){
        READY_DETECTED = true;
        maybeAskFirstQuestion();
      }

      return;
    }

    /* USER TRANSCRIPT — delta / segment diagnostics */
    if (
      eventType === 'conversation.item.input_audio_transcription.delta' ||
      eventType === 'input_audio_transcription.delta' ||
      eventType === 'conversation.item.input_audio_transcription.segment' ||
      eventType === 'input_audio_transcription.segment'
    ) {
      const piece = String(
        data?.delta ||
        data?.transcript ||
        data?.text ||
        data?.segment?.text ||
        ''
      ).trim();

      log('[USER-TRANSCRIPT-PIECE]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasPiece: !!piece,
        piecePreview: piece.slice(0, 160)
      });

      return;
    }

    /* USER TRANSCRIPT — failed */
    if (
      eventType === 'conversation.item.input_audio_transcription.failed' ||
      eventType === 'input_audio_transcription.failed'
    ) {
      log('[USER-TRANSCRIPT-FAILED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        error: data?.error?.message || data?.error || 'unknown'
      });

      postToParent('rt.transcript.partial', {
        speaker: 'system',
        text: '[user_transcription_failed]',
        sourceEvent: eventType,
        final: true,
        ts: new Date().toISOString()
      });

      return;
    }

    /* USER AUDIO ITEM / internal user input_text */
    if (
      (eventType === 'conversation.item.created' || eventType === 'conversation.item.done') &&
      data.item &&
      data.item.role === 'user'
    ) {
      const it = data.item;
      const contentTypes = Array.isArray(it.content)
        ? it.content.map(p => p?.type || '').join(',')
        : '';

      const hasInputAudio = contentTypes.includes('input_audio');
      const hasInputText = contentTypes.includes('input_text');

      if (hasInputAudio) {
        log('[TRANSCRIPT] user input_audio item observed, waiting for transcription.completed', {
          itemId: it.id || data.item_id || '',
          contentTypes
        });
        return;
      }

      if (hasInputText) {
        log('[TRANSCRIPT] skipped internal user input_text', {
          itemId: it.id || data.item_id || '',
          contentTypes
        });
        return;
      }

      const texts = [];

      if (Array.isArray(it.content)) {
        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.input_text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }
      }

      const userText = texts.join('\n').trim();

      if (userText) {
        userUtterances += 1;

        emitTranscript('user', userText, {
          itemId: it.id || data.item_id || '',
          responseId: data.response_id || '',
          sourceEvent: eventType,
          final: true
        });

        const low = userText.toLowerCase();
        if (isReadyText(userText)) {
          READY_DETECTED = true;
          maybeAskFirstQuestion();
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — spoken final */
    if (eventType === 'response.audio_transcript.done') {
      const txt = String(data?.transcript || '').trim();

      if (txt) {
        emitTranscript('assistant', txt, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });

        if (finalClosingDetected(txt)) {
          FINAL_MESSAGE_SPOKEN = true;
          FINAL_MESSAGE_ITEM_ID = data.item_id || data.itemId || '';
          log('[END] final processing message detected', {
            itemId: FINAL_MESSAGE_ITEM_ID,
            responseId: data.response_id || data.responseId || ''
          });
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — delta diagnostics only */
    if (eventType === 'response.audio_transcript.delta') {
      const piece = String(data?.delta || '').trim();

      if (piece) {
        log('[ASSISTANT-TRANSCRIPT-DELTA]', {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          piecePreview: piece.slice(0, 80)
        });
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — text fallback, but ignore tool JSON/noise */
    if (eventType === 'response.text.done') {
      const txt = String(data?.text || '').trim();

      if (looksLikeToolNoise(txt)) {
        log('[TRANSCRIPT] skipped empty/json response.text.done', {
          textPreview: txt.slice(0, 120)
        });
        return;
      }

      emitTranscript('assistant', txt, {
        itemId: data.item_id || data.itemId || '',
        responseId: data.response_id || data.responseId || '',
        sourceEvent: eventType,
        final: true
      });

      return;
    }

    /* ASSISTANT output_item.done */
    if (eventType === 'response.output_item.done' && data.item) {
      const it = data.item;

      if (FINAL_MESSAGE_SPOKEN) {
        const itemId = it.id || data.item_id || data.itemId || '';
        const sameItem = !FINAL_MESSAGE_ITEM_ID || itemId === FINAL_MESSAGE_ITEM_ID;

        if (sameItem || END_REQUESTED_BY_MODEL) {
          beginFinalHangup('final_audio_done');
          return;
        }
      }

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }

      if (Array.isArray(it.content)) {
        const texts = [];

        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }

        const finalText = texts.join('\n').trim();

        if (finalText && !looksLikeToolNoise(finalText)) {
          emitTranscript('assistant', finalText, {
            itemId: it.id || data.item_id || '',
            responseId: data.response_id || '',
            sourceEvent: eventType,
            final: true
          });
        }
      }

      return;
    }

    /* end_interview tool detection */
    if (eventType === 'conversation.item.created' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow('conversation.item.created');
        return;
      }
    }

    if (eventType === 'response.output_item.added' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }
    }

    if (eventType === 'response.function_call_arguments.done'){
      const name =
        data.name ||
        data.tool_name ||
        data.function_name ||
        data?.function_call?.name;

      if (name === 'end_interview'){
        requestEndNow('function_call_arguments.done');
        return;
      }
    }
  }

  /* ===== Audio unlock ===== */
  async function ensureAudioUnlocked(){
    if (audioUnlocked) return true;

    try {
      await $remoteA.play();

      audioUnlocked = true;
      $audioBadge.textContent = t('audioReady');
      postToParent('clarity.live.audio_ready', {});

      return true;
    } catch(_) {}

    postToParent('clarity.live.audio_wait', {});
    setStatus('warn', t('audioClick'));

    return new Promise((resolve) => {
      const unlock = async () => {
        try {
          if (audioCtx && audioCtx.state !== 'running'){
            try {
              await audioCtx.resume();
            } catch(_) {}
          }

          await $remoteA.play();

          audioUnlocked = true;
          $audioBadge.textContent = t('audioReady');
          postToParent('clarity.live.audio_ready', {});

          window.removeEventListener('pointerdown', unlock);
          window.removeEventListener('keydown', unlock);

          resolve(true);
        } catch(_) {}
      };

      window.addEventListener('pointerdown', unlock, { once:true });
      window.addEventListener('keydown', unlock, { once:true });
    });
  }

  /* ===== Instructions / Knowledge ===== */
  function interviewMaxQuestions(ctx = CTX){
    const direct = Number(ctx?.interviewConfig?.maxQuestions || ctx?.questionCount || ctx?.maxQuestions || 0);
    if (Number.isFinite(direct) && direct > 0) return Math.max(1, Math.min(50, Math.round(direct)));
    const raw = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || '').toUpperCase();
    const m = raw.match(/(10|20|30|40|50)/);
    return m ? Number(m[1]) : 10;
  }

  function parseQuestionLines(text){
    const raw = String(text || '').trim();
    if (!raw) return [];

    const out = [];
    const seen = new Set();
    raw
      .split(/\r?\n|(?=\b\d{1,2}[.)]\s+)/g)
      .map(line => line.replace(/^\s*[-•*]+\s*/, '').replace(/^\s*\d{1,2}[.)]\s*/, '').trim())
      .filter(Boolean)
      .forEach(line => {
        const clean = line.replace(/\s+/g, ' ');
        const key = clean.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          out.push(clean);
        }
      });
    return out;
  }

  function questionPolicyText(ctx = CTX){
    const maxQ = interviewMaxQuestions(ctx);
    const qset = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || `Q${maxQ}`).toUpperCase();
    const customQuestions = parseQuestionLines(ctx?.customQuestionsText || ctx?.questionsText || '');
    const missing = Math.max(0, maxQ - customQuestions.length);

    if (activeInterviewLang(ctx) === 'de') {
      return customQuestions.length
        ? `Fragenset ${qset}: Stelle maximal ${maxQ} Hauptfragen. Nutze zuerst die kundeneigenen Fragen aus dem Kontext. Wenn weniger als ${maxQ} kundeneigene Fragen vorhanden sind, ergänze ${missing} passende rollenbezogene Fragen. Beende das Interview nach maximal ${maxQ} Hauptfragen.`
        : `Fragenset ${qset}: Stelle maximal ${maxQ} passende rollenbezogene Hauptfragen. Beende das Interview nach maximal ${maxQ} Hauptfragen.`;
    }

    return customQuestions.length
      ? `Question set ${qset}: Ask at most ${maxQ} main questions. Use the customer's own questions from context first. If fewer than ${maxQ} customer questions are available, add ${missing} suitable role-specific questions. End the interview after at most ${maxQ} main questions.`
      : `Question set ${qset}: Ask at most ${maxQ} suitable role-specific main questions. End the interview after at most ${maxQ} main questions.`;
  }

  function isAssessmentContext(ctx){
    return String(ctx?.productType || '').toLowerCase() === 'modul1' || ctx?.assessment === true || String(ctx?.interviewMode || '').toLowerCase() === 'assessment';
  }

  function assessmentArea(ctx){
    const raw = String(ctx?.moduleArea || ctx?.assessmentArea || 'personality').toLowerCase();
    if (raw === 'skill') return 'skills';
    if (raw === 'lang') return 'language';
    return ['aptitude','personality','skills','language'].includes(raw) ? raw : 'personality';
  }

  function assessmentAreaLabel(area, lk){
    const de = { aptitude:'Aptitude-Analyse', personality:'Persönlichkeitsanalyse', skills:'Skills-Analyse', language:'Sprachanalyse' };
    const en = { aptitude:'aptitude analysis', personality:'personality analysis', skills:'skills analysis', language:'language analysis' };
    return (lk === 'de' ? de : en)[area] || area;
  }

  function assessmentFocusText(area, lk, hasPosition){
    const de = {
      aptitude: 'Fokus: logisches Denken, Problemlösung, Strukturierungsfähigkeit, Lernfähigkeit, Umgang mit Komplexität und Entscheidungsqualität.',
      personality: 'Fokus: Arbeitsstil, Motivation, Kommunikation, Zusammenarbeit, Konfliktverhalten, Druckverhalten und persönliche Arbeitspräferenzen.',
      skills: 'Fokus: praktische Fähigkeiten, Methodenkompetenz, Tool-Erfahrung, Projektbeispiele, Umsetzungskraft und Übertragbarkeit auf neue Aufgaben.',
      language: 'Fokus: Sprachkompetenz, Verständlichkeit, Flüssigkeit, Wortschatz, Grammatik/Struktur, Fachterminologie, Spontanität und berufliche Kommunikationsklarheit. Bewerte NICHT die fachliche Eignung, sondern die sprachliche Leistung.'
    };
    const en = {
      aptitude: 'Focus: logical reasoning, problem solving, structuring ability, learning agility, complexity handling and decision quality.',
      personality: 'Focus: work style, motivation, communication, collaboration, conflict behaviour, pressure behaviour and work preferences.',
      skills: 'Focus: practical expertise, methods, tools, project evidence, execution strength and transferability to new tasks.',
      language: 'Focus: language competence, clarity, fluency, vocabulary, grammar/structure, professional terminology, spontaneity and professional communication clarity. Do NOT evaluate subject-matter suitability; evaluate communication performance.'
    };
    const base = (lk === 'de' ? de : en)[area] || '';
    if (lk === 'de') {
      return base + ' ' + (hasPosition ? 'Die angegebene Position darf als Kontext genutzt werden, aber die Analyse bleibt strikt im genannten Fokusbereich.' : 'Es ist keine Zielposition angegeben. Stelle allgemeine Fragen für diesen Analysebereich ohne Firmen- oder Rollenannahmen.');
    }
    return base + ' ' + (hasPosition ? 'The target position may be used as context, but the assessment must stay strictly within this area.' : 'No target position is specified. Ask general questions for this assessment area without company or role assumptions.');
  }

  function assessmentQuestionPolicyText(ctx, lk){
    const maxQ = interviewMaxQuestions(ctx);
    const qset = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || `Q${maxQ}`).toUpperCase();
    const area = assessmentArea(ctx);
    const chatQ = Number(ctx?.chatQuestionCount || 0);
    const hybridNoteDe = chatQ > 0 ? ` Dies ist nur der mündliche Teil eines Hybrid-Assessments. Stelle hier höchstens ${maxQ} mündliche Hauptfragen; der restliche schriftliche Teil folgt im Chat. Erwähne am Ende, dass anschließend ein kurzer schriftlicher Teil folgt.` : '';
    const hybridNoteEn = chatQ > 0 ? ` This is only the spoken part of a hybrid assessment. Ask at most ${maxQ} spoken main questions here; the remaining written part follows in chat. At the end, mention that a short written part will follow.` : '';
    if (lk === 'de') {
      return `Analysetiefe ${qset}: Stelle maximal ${maxQ} Hauptfragen für die ${assessmentAreaLabel(area, lk)}. Stelle immer nur EINE Frage zur Zeit. Keine kundeneigenen Interviewfragen verwenden. Beende die Analyse erst nach ausreichend Antworten und nach einer klaren Abschlussmeldung.${hybridNoteDe}`;
    }
    return `Analysis depth ${qset}: Ask at most ${maxQ} main questions for the ${assessmentAreaLabel(area, lk)}. Ask exactly ONE question at a time. Do not use customer interview questions. End the assessment only after sufficient answers and a clear closing message.${hybridNoteEn}`;
  }

  function assessmentHybridClosingText(ctx, lk, profile){
    const chatQ = Number(ctx?.chatQuestionCount || 0);
    if (!(chatQ > 0)) return '';
    const area = assessmentArea(ctx);
    if (lk === 'de') {
      return 'Der mündliche Teil ist jetzt abgeschlossen. Bitte schließen Sie dieses Fenster nicht und bleiben Sie auf der Seite. Es folgt nun ein kurzer schriftlicher Teil im Chat. Bitte warten Sie, bis der Chat angezeigt wird, und beantworten Sie dort die letzten Fragen.';
    }
    if (lk === 'it') {
      return 'La parte orale è ora conclusa. Per favore non chiuda questa finestra e resti su questa pagina. Ora seguirà una breve parte scritta nella chat. Attenda che la chat venga visualizzata e risponda lì alle ultime domande.';
    }
    if (lk === 'es') {
      return 'La parte oral ha finalizado. Por favor, no cierre esta ventana y permanezca en esta página. A continuación seguirá una breve parte escrita en el chat. Espere hasta que aparezca el chat y responda allí las últimas preguntas.';
    }
    if (lk === 'fr') {
      return 'La partie orale est maintenant terminée. Veuillez ne pas fermer cette fenêtre et rester sur cette page. Une courte partie écrite va maintenant suivre dans le chat. Attendez que le chat s’affiche et répondez-y aux dernières questions.';
    }
    return 'The spoken part is now complete. Please do not close this window and stay on this page. A short written part will now follow in chat. Please wait until the chat appears and answer the final questions there.';
  }

  function buildAssessmentSystemInstructions(ctx, lk, profile, finalClose){
    const area = assessmentArea(ctx);
    const hasPosition = !!String(ctx?.position || '').trim();
    const assessmentClose = assessmentHybridClosingText(ctx, lk, profile) || finalClose;
    if (lk === 'de') {
      return [
        'Sprich ausschließlich DEUTSCH. Wechsle nie die Sprache.',
        'Dies ist ein CLARITY Assessment, KEIN klassisches Bewerbungsgespräch und KEIN Interview-Modul.',
        `Analysebereich: ${assessmentAreaLabel(area, lk)}.`,
        assessmentFocusText(area, lk, hasPosition),
        assessmentQuestionPolicyText(ctx, lk),
        'Stelle niemals zwei Fragen in einer Nachricht. Jede Nachricht darf maximal eine Frage enthalten.',
        'Nach jeder Frage warten, bis die Person fertig geantwortet hat. Gib kurze Pausen und fahre erst danach fort.',
        'Starte die erste Frage erst, nachdem die Person „bereit“ gesagt hat oder nach Fallback-Timeout.',
        `Wenn alle mündlichen Assessment-Fragen abgeschlossen sind, sage zum Abschluss EXAKT diesen Satz, ohne technische Details hinzuzufügen: „${assessmentClose}“ Danach rufe end_interview auf.`,
        `Rufe end_interview NUR auf, wenn die Analyse wirklich abgeschlossen ist. Vorher NIEMALS. Mindestanforderung: mindestens ${MIN_USER_UTTERANCES} Antworten und ein vollständiger Abschluss.`

    }

      `This is a CLARITY Assessment, NOT a classic job interview and NOT the Interview module.`,

      assessmentFocusText(area, lk, hasPosition),
      assessmentQuestionPolicyText(ctx, lk),
      'Never ask two questions in one message. Each assistant message may contain at most one question.',

      `Call end_interview ONLY when the assessment is truly complete. NEVER before. Minimum: at least ${MIN_USER_UTTERANCES} participant answers and a complete closing.`

  function buildSystemInstructions(ctx){
    const lk = activeInterviewLang(ctx);
    const profile = langProfile(lk);
    const finalClose = finalClosingText({ ...ctx, lang: lk });

    if (isAssessmentContext(ctx)) {
      return buildAssessmentSystemInstructions(ctx, lk, profile, finalClose);

    if (lk === 'de') {
      return [
        'Sprich ausschließlich DEUTSCH. Wechsle nie die Sprache.',
        'Führe ein strukturiertes Job-Interview: nur EINE Frage zur Zeit, max. 1 Nachfrage, strikt am Jobprofil bleiben. Stelle keine zwei Fragen in einer Nachricht.',
        questionPolicyText(ctx),
        'Nach jeder Frage warten, bis die Kandidatin/der Kandidat fertig ist.',
        'Nutze ausschließlich die FIRMENKENNTNISSE aus „KONTEXT“ für Antworten zu Firma, Stelle, Prozessen, Benefits usw. Wenn etwas nicht im KONTEXT steht, sage freundlich, dass dies mit der Firma direkt zu klären ist.',
        'Starte die erste Frage erst, nachdem die Person „bereit“ gesagt hat (oder nach Fallback-Timeout).',
        `Wenn alle Fragen gestellt sind, sage zum Abschluss EXAKT diesen Satz, ohne technische Details hinzuzufügen: „${finalClose}“ Danach rufe end_interview auf.`,
        `Rufe end_interview NUR auf, wenn das Interview wirklich abgeschlossen ist. Vorher NIEMALS. Mindestanforderung: mindestens ${MIN_USER_UTTERANCES} Kandidaten-Antworten und ein sinnvoller Abschluss/Verabschiedung.`
      ].join(' ');
    }

    return [
      `Speak strictly in ${profile.englishName.toUpperCase()}. Do not switch languages.`,
      `The full interview, welcome messages, questions, follow-ups, candidate-facing explanations, and closing message must be spoken in ${profile.englishName}.`,
      'Conduct a structured job interview: one question at a time, max one follow-up, stick to the job profile. Never ask two questions in one message.',
      questionPolicyText(ctx),
      'After each question, wait until the candidate is finished.',
      'Use only the COMPANY KNOWLEDGE from “CONTEXT” to answer company/job/process/benefits questions. If it is not in CONTEXT, politely say the candidate should check with the company.',
      `Ask the first question only after the user says one of these readiness words or after the fallback timeout: ${(profile.readyWords || ['ready']).join(', ')}.`,
      `When all questions are completed, say exactly this closing message in ${profile.englishName} and do not add technical details: “${finalClose}” Then call end_interview.`,
      `Call end_interview ONLY when the interview is truly complete. NEVER before. Minimum: at least ${MIN_USER_UTTERANCES} candidate answers and a proper closing/goodbye.`
    ].join(' ');
  }

  function chunkText(txt, max = 1800) {
    const out = [];
    let i = 0;

    while (i < txt.length) {
      out.push(txt.slice(i, i + max));
      i += max;
    }

    return out;
  }

  function pushCompanyKnowledge() {
    const kb  = (CTX.kbText || '').trim();
    const job = (CTX.jobAd  || '').trim();

    if (!kb && !job) return;

    const header = '=== KONTEXT / CONTEXT START ===';
    const footer = '=== KONTEXT / CONTEXT ENDE ===';
    const questions = isAssessmentContext(CTX) ? '' : parseQuestionLines(CTX.customQuestionsText || CTX.questionsText || '')
      .map((q, i) => `${i + 1}. ${q}`)
      .join('\n');

    const policy = isAssessmentContext(CTX) ? assessmentQuestionPolicyText(CTX, activeInterviewLang(CTX)) : questionPolicyText(CTX);
    const questionBlock = [
      policy,
      questions ? `CUSTOMER QUESTIONS / KUNDENEIGENE FRAGEN:\n${questions}` : ''
    ].filter(Boolean).join('\n\n');

    const body = [kb, job, questionBlock].filter(Boolean).join('\n\n');
    const pieces = chunkText(`${header}\n${body}\n${footer}`, 1800);

    for (const p of pieces) {
      dcSend({
        type: 'conversation.item.create',
        item: {
          type: 'message',
          role: 'system',

  function buildInterviewPlan(ctx){
    const lk = activeInterviewLang(ctx);
    const profile = langProfile(lk);
    const seeds = [];
    const prefix = profile.jobPrefix || LANG_PROFILES.en.jobPrefix;
    const maxQ = interviewMaxQuestions(ctx);

    const customQuestions = parseQuestionLines(ctx.customQuestionsText || ctx.questionsText || '').slice(0, maxQ);
    customQuestions.forEach(q => seeds.push(q));

    const base = (profile.baseQuestions || LANG_PROFILES.en.baseQuestions).slice();
    base.forEach(q => seeds.push(q));

    const text =
      (ctx.roleProfileText || '').trim() +
      '\n' +
      (ctx.docsText || '').trim();

    const lines = text
      .split(/\r?\n/)
      .map(s => s.trim())
      .filter(Boolean)
      .filter(line => !/^\d{1,2}[.)]\s*/.test(line))
      .slice(0, Math.max(0, maxQ - seeds.length));

    if (lines.length){
      lines.forEach(line => {
        seeds.push(prefix + line);
      });
    }

    const unique = [];
    const seen = new Set();
    for (const q of seeds){
      const clean = String(q || '').replace(/\s+/g, ' ').trim();
      if (!clean) continue;
      const key = clean.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      unique.push(clean);
      if (unique.length >= maxQ) break;
    }

    return unique.slice(0, Math.max(1, maxQ));
  }

  /* ===== Media ===== */
  async function setupLocalMedia(){
    const constraints = {
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: AUDIO_ONLY ? false : true
    };

    try {
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) {
      setStatus('warn', t('mediaBlocked'));
      log('[Media] getUserMedia error', {
        audioOnly: AUDIO_ONLY,
        message: errMsg(e)
      });
      postToParent('clarity.live.permission_error', { message:String(e?.name || e), audioOnly: AUDIO_ONLY });
      localStream = null;
    }

    if (localStream){
      if (!AUDIO_ONLY) {
        $localV.srcObject = localStream;
      } else {
        try { $localV.srcObject = null; } catch(_) {}
      }

      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const src = ctx.createMediaStreamSource(localStream);
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 512;

        const buf = new Uint8Array(analyser.frequencyBinCount);
        src.connect(analyser);

        (function tick(){
          if (destroyed) return;

          analyser.getByteTimeDomainData(buf);

          let dev = 0;
          for (let i = 0; i < buf.length; i++) {
            dev = Math.max(dev, Math.abs(buf[i] - 128));
          }

          $mic.style.width = Math.min(100, dev * 2) + '%';

          requestAnimationFrame(tick);
        })();
      } catch(_) {}

      localStream.getAudioTracks().forEach(t => t.enabled = false);
    }
  }

  /* ===== Mux Upload ===== */
  async function readJsonSafe(res){
    const ct = res.headers.get('content-type') || '';

    if (ct.includes('json')) return res.json();

    const text = await res.text().catch(() => '');
    throw new Error(`Non-JSON (${res.status}): ${text.slice(0,300)}`);
  }

  async function createMuxUpload(blob, kind){
    log('[MUX] create upload', {
      endpoint: MUX_UPLOAD_URL,
      uid: UID,
      companyId: COMPANY_ID,
      size: blob.size,
      kind
    });

    const r = await fetch(MUX_UPLOAD_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        uid: UID,
        companyId: COMPANY_ID,
        sessionId: UID,
        mode: kind === 'audio' ? 'audio' : 'video'
      })
    });

    const j = await readJsonSafe(r);

    log('[MUX] create response', {
      ok: j?.ok,
      error: j?.error || '',
      message: j?.message || '',
      uploadId: j?.uploadId || '',
      uploadUrlPresent: !!j?.uploadUrl,
      uploadUrlPrefix: j?.uploadUrl ? String(j.uploadUrl).slice(0, 50) : ''
    });

    if (!r.ok || !j?.ok) {
      throw new Error(j?.message || j?.error || `mux_create_failed_${r.status}`);
    }

    if (!j.uploadId) throw new Error('mux_uploadId_missing');
    if (!j.uploadUrl) throw new Error('mux_uploadUrl_missing');

    return j;
  }

  async function putToMux(uploadUrl, blob, kind){
    $muxState.textContent = 'uploading';
    setProg(35);

    log('[MUX] PUT start', {
      size: blob.size,
      type: blob.type,
      kind
    });

    const put = await fetch(uploadUrl, {
      method:'PUT',
      body: blob,
      headers:{
        'Content-Type': blob.type || (kind === 'audio' ? 'audio/webm' : 'video/webm')
      }
    });

    lastPutStatus = put.status;

    log('[MUX] PUT done', {
      status: put.status,
      ok: put.ok
    });

    if (!put.ok) {
      const txt = await put.text().catch(() => '');
      throw new Error(`mux_put_failed_${put.status}: ${txt.slice(0,300)}`);
    }

    setProg(65);

    return put.status;
  }

  async function fetchMuxAsset(uploadId){
    const r = await fetch(`${MUX_ASSET_URL}?uploadId=${encodeURIComponent(uploadId)}`);
    const j = await readJsonSafe(r);

    if (!r.ok || !j?.ok) {
      throw new Error(j?.message || j?.error || `mux_asset_failed_${r.status}`);
    }

    return j;
  }

  async function pollMuxAsset(uploadId, maxMs = 120000){
    const start = Date.now();
    let last = null;

    $muxState.textContent = 'processing';
    setProg(75);

    while (Date.now() - start < maxMs) {
      await new Promise(resolve => setTimeout(resolve, 3000));

      const j = await fetchMuxAsset(uploadId);
      last = j;

      log('[MUX] poll', {
        uploadId,
        assetStatus: j?.assetStatus || '',
        assetId: j?.assetId || '',
        playbackId: j?.playbackId || '',
        playbackUrlPresent: !!j?.playbackUrl,
        downloadUrlPresent: !!j?.downloadUrl,
        audioOnlyUrlPresent: !!j?.audioOnlyUrl,
        staticRenditionsStatus: j?.staticRenditionsStatus || '',
        error: j?.error || ''
      });

      if (j.assetStatus === 'ready' && j.playbackId) {
        setProg(100);
        $muxState.textContent = 'ready';
        return j;
      }

      if (j.assetStatus === 'errored') {
        setProg(0);
        $muxState.textContent = 'errored';
        return j;
      }
    }

    return last;
  }

  async function uploadBlobToMux(blob, kind){
    if (uploadStarted) {
      log('[MUX] duplicate upload ignored');
      return;
    }

    uploadStarted = true;
    uploadFinished = false;

    try {
      $muxState.textContent = 'creating';
      setProg(15);
      setStatus('warn', t('uploadPreparing'));

      const created = await createMuxUpload(blob, kind);

      await putToMux(created.uploadUrl, blob, kind);

      let first = await fetchMuxAsset(created.uploadId);

      log('[MUX] first asset', {
        uploadId: created.uploadId,
        assetStatus: first?.assetStatus || '',
        assetId: first?.assetId || '',
        playbackId: first?.playbackId || '',
        playbackUrlPresent: !!first?.playbackUrl,
        downloadUrlPresent: !!first?.downloadUrl,
        audioOnlyUrlPresent: !!first?.audioOnlyUrl
      });

      let finalAsset = first;

      if (!(first?.assetStatus === 'ready' && first?.playbackId)) {
        finalAsset = await pollMuxAsset(created.uploadId);
      }

      if (!finalAsset) throw new Error('mux_asset_poll_empty');

      const durationMs = recordingStartedAt ? (Date.now() - recordingStartedAt) : 0;

      const payload = {
        durationMs,
        size: blob.size,
        uploadUrl: finalAsset?.downloadUrl || finalAsset?.playbackUrl || '',
        mux: {
          provider: 'mux',
          uploadId: created.uploadId || '',
          putStatus: lastPutStatus,
          assetStatus: finalAsset?.assetStatus || '',
          assetId: finalAsset?.assetId || '',
          playbackId: finalAsset?.playbackId || '',
          playbackUrl: finalAsset?.playbackUrl || '',
          downloadUrl: finalAsset?.downloadUrl || '',
          audioOnlyUrl: finalAsset?.audioOnlyUrl || '',
          staticRenditionsStatus: finalAsset?.staticRenditionsStatus || '',
          error: finalAsset?.error || ''
        }
      };

      log('[MUX] recorder:finished', payload);

      uploadFinished = true;

      if (finalAsset?.assetStatus === 'ready') {
        setStatus('ok', t('uploadReady'));
      } else {
        setStatus('warn', t('uploadStillProcessing'));
      }

      postToParent('recorder:finished', payload);

      return payload;
    } catch (e) {
      const msg = errMsg(e);

      $muxState.textContent = 'upload failed';
      setProg(0);
      setStatus('warn', t('uploadStillProcessing'));

      const durationMs = recordingStartedAt ? (Date.now() - recordingStartedAt) : 0;

      const payload = {
        durationMs,
        size: blob?.size || 0,
        uploadUrl: '',
        mux: {
          provider: 'mux',
          uploadId: '',
          putStatus: lastPutStatus,
          assetStatus: '',
          assetId: '',
          playbackId: '',
          playbackUrl: '',
          downloadUrl: '',
          audioOnlyUrl: '',
          staticRenditionsStatus: '',
          error: msg
        }
      };

      log('[MUX] upload failed', payload);

      postToParent('recorder:finished', payload);
      postToParent('recorder:upload_error', { message: msg });

      return payload;
    }
  }

  function blobToDataUrl(blob) {
    return new Promise((resolve, reject) => {
      try {
        const reader = new FileReader();

        reader.onloadend = () => {
          resolve(String(reader.result || ''));
        };

        reader.onerror = () => {
          reject(new Error('candidate_audio_file_reader_failed'));
        };

        reader.readAsDataURL(blob);
      } catch (e) {
        reject(e);
      }
    });
  }

  async function sendCandidateAudioToParent(blob, meta = {}) {
    try {
      if (!blob || !blob.size) {
        log('[CANDIDATE-AUDIO] skip send - empty blob', {
          size: blob?.size || 0
        });

        postToParent('candidate-audio:error', {
          message: 'candidate_audio_empty',
          uid: UID,
          companyId: COMPANY_ID,
          ts: new Date().toISOString()
        });

        return;
      }

      const dataUrl = await blobToDataUrl(blob);

      const payload = {
        dataUrl,
        durationMs: meta.durationMs || 0,
        size: blob.size,
        mimeType: blob.type || meta.mimeType || 'audio/webm',
        uid: UID,
        companyId: COMPANY_ID,
        ts: new Date().toISOString()
      };

      postToParent('candidate-audio:finished', payload);

      log('[CANDIDATE-AUDIO] event posted to parent', {
        type: 'candidate-audio:finished',
        durationMs: payload.durationMs,
        size: payload.size,
        mimeType: payload.mimeType,
        dataUrlPresent: !!payload.dataUrl,
        dataUrlPrefix: payload.dataUrl ? payload.dataUrl.slice(0, 32) : ''
      });
    } catch (e) {
      const msg = errMsg(e);

      log('[CANDIDATE-AUDIO] send failed', {
        message: msg
      });

      postToParent('candidate-audio:error', {
        message: msg,
        uid: UID,
        companyId: COMPANY_ID,
        ts: new Date().toISOString()
      });
    }
  }

  /* ===== Candidate-only Audio Recorder ===== */
  function prepareCandidateAudioRecording() {
    candidateAudioReady = false;
    candidateChunks = [];

    try {
      const audioTracks = localStream?.getAudioTracks?.() || [];

      if (!audioTracks.length) {
        log('[CANDIDATE-AUDIO] no local audio track available');
        return;
      }

      const candidateStream = new MediaStream();
      audioTracks.forEach(track => candidateStream.addTrack(track));

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : 'audio/webm';

      candidateRecorder = new MediaRecorder(candidateStream, {
        mimeType,
        audioBitsPerSecond: 48_000
      });

      candidateRecorder.onstart = () => {
        candidateRecordingStartedAt = Date.now();
        candidateAudioReady = true;

        log('[CANDIDATE-AUDIO] started', {
          mimeType
        });
      };

      candidateRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) {
          candidateChunks.push(e.data);
        }
      };

      candidateRecorder.onstop = async () => {
        const durationMs = candidateRecordingStartedAt
          ? Date.now() - candidateRecordingStartedAt
          : 0;

        const blob = new Blob(candidateChunks, {
          type: mimeType || 'audio/webm'
        });

        log('[CANDIDATE-AUDIO] stopped', {
          size: blob.size,
          durationMs,
          chunks: candidateChunks.length,
          mimeType: blob.type
        });

        await sendCandidateAudioToParent(blob, {
          durationMs,
          mimeType: blob.type
        });

        candidateChunks.length = 0;
        candidateAudioReady = false;
      };

      log('[CANDIDATE-AUDIO] ready');
    } catch (e) {
      log('[CANDIDATE-AUDIO] prepare failed', {
        message: errMsg(e)
      });

      postToParent('candidate-audio:error', {
        message: errMsg(e),
        uid: UID,
        companyId: COMPANY_ID,
        ts: new Date().toISOString()
      });
    }
  }

  function startCandidateAudioRecording() {
    try {
      if (candidateRecorder && candidateRecorder.state === 'inactive') {
        candidateRecorder.start(1000);
      }
    } catch (e) {
      log('[CANDIDATE-AUDIO] start failed', errMsg(e));
    }
  }

  function stopCandidateAudioRecording() {
    try {
      if (candidateRecorder && candidateRecorder.state !== 'inactive') {
        candidateRecorder.stop();
      }
    } catch (e) {
      log('[CANDIDATE-AUDIO] stop failed', errMsg(e));
    }
  }

  /* ===== Recorder ===== */
  function prepareRecording(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dest = ctx.createMediaStreamDestination();

    if (localStream){
      try {
        ctx.createMediaStreamSource(localStream).connect(dest);
      } catch(e) {
        log('[REC] local mix fail', errMsg(e));
      }
    }

    if (remoteStream){
      try {
        ctx.createMediaStreamSource(remoteStream).connect(dest);
      } catch(e) {
        log('[REC] remote mix fail', errMsg(e));
      }
    }

    mixedStream = new MediaStream();

    dest.stream.getAudioTracks().forEach(track => mixedStream.addTrack(track));

    const cam = AUDIO_ONLY ? null : localStream?.getVideoTracks?.()[0];

    if (cam) mixedStream.addTrack(cam);

    const hasVideo = !!mixedStream.getVideoTracks().length;

    const mimeType = hasVideo
      ? (
          MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
            ? 'video/webm;codecs=vp8,opus'
            : 'video/webm'
        )
      : (
          MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : 'audio/webm'
        );

    mediaRecorder = new MediaRecorder(mixedStream, {
      mimeType,
      videoBitsPerSecond: hasVideo ? 700_000 : undefined,
      audioBitsPerSecond: 96_000
    });

    const chunks = [];

    mediaRecorder.onstart = () => {
      $recState.textContent = 'recording';
      recordingStartedAt = Date.now();
      log('[REC] started', { mimeType });
    };

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      $recState.textContent = 'stopped';

      const hasVid = !!mixedStream.getVideoTracks().length;
      const blob = new Blob(chunks, {
        type: hasVid ? 'video/webm' : 'audio/webm'
      });

      const kind = hasVid ? 'video' : 'audio';

      log('[REC] stop', {
        size: blob.size,
        kind,
        chunks: chunks.length
      });

      try {
        await uploadBlobToMux(blob, kind);
      } catch(e) {
        log('[REC] upload exception', errMsg(e));
      } finally {
        chunks.length = 0;
      }
    };

    $recState.textContent = 'ready';
  }

  function startRecorder(){
    try{
      if (mediaRecorder && mediaRecorder.state === 'inactive') {
        mediaRecorder.start(1000);
      }

      startCandidateAudioRecording();
    } catch(e){
      log('[REC] start error', errMsg(e));
    }
  }

  function stopRecording(){
    try{
      stopCandidateAudioRecording();
    } catch(e){
      log('[CANDIDATE-AUDIO] stop wrapper failed', errMsg(e));
    }

    try{
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
    } catch(e){
      log('[REC] stop error', errMsg(e));
    }

    try{
      mixedStream?.getTracks()?.forEach(track => track.stop());
    } catch(_) {}
  }

  function maybeStartRecorder(){
    if (!WELCOMED) return;
    if (!RECORD_ENABLED) return;

    setTimeout(() => startRecorder(), WELCOME_RECORD_DELAY_MS);
  }

  /* ===== Start / Stop ===== */
  async function startInterview(){
    if (STARTED) return;

    STARTED = true;

    interviewStartedAt = Date.now();
    userUtterances = 0;
    END_CALLED = false;
    END_REQUESTED_BY_MODEL = false;
    FINAL_MESSAGE_SPOKEN = false;
    FINAL_MESSAGE_ITEM_ID = '';
    if (FINAL_HANGUP_TIMER) {
      try { clearTimeout(FINAL_HANGUP_TIMER); } catch(_) {}
    }
    FINAL_HANGUP_TIMER = null;
    uploadStarted = false;
    uploadFinished = false;
    lastPutStatus = null;

    try {
      destroyed = false;
      applyStaticTexts();
      setStatus('info', t('init'));

      await setupLocalMedia();

      const initialInterviewLang = activeInterviewLang(CTX);

      log('[LIVE] startInterview', {
        audioOnly: AUDIO_ONLY,
        mode: AUDIO_ONLY ? 'audio' : 'video',
        uid: UID,
        companyId: COMPANY_ID,
        lang: initialInterviewLang
      });

      const { secret, ctx } = await getRealtimeToken({
        uid: UID,
        companyId: COMPANY_ID,
        lang: initialInterviewLang,
        interviewLang: initialInterviewLang,
        userCommLang: getInterviewLangRaw(CTX),
        mode: AUDIO_ONLY ? 'audio' : 'video',
        audioOnly: AUDIO_ONLY,
        noVideo: AUDIO_ONLY,
        voice: VOICE,
        debug: true,
        allowNoInvite: true
      });

      await connectRealtime(secret);
      prepareRecording();
      prepareCandidateAudioRecording();

      CTX = normalizeIncomingContext(ctx);
      applyStaticTexts();

      await remoteTrackReady;
      await ensureAudioUnlocked();

      postToParent('clarity.live.ready', {});
      setStatus('ok', t('connected'));
    } catch(e) {
      setStatus('err', t('startError'));
      log('[Start error]', errMsg(e));
      postToParent('clarity.live.error', { message: errMsg(e) });
    }
  }

  async function hangup(reason){
    if (FINAL_HANGUP_TIMER) {
      try { clearTimeout(FINAL_HANGUP_TIMER); } catch(_) {}
      FINAL_HANGUP_TIMER = null;
    }

    if (destroyed && reason !== 'user_fallback_end') return;

    destroyed = true;
    setStatus('warn', t('processing'));
    postToParent('clarity.live.processing_started', {
      uid: UID,
      companyId: COMPANY_ID,
      reason: reason || '',
      ts: new Date().toISOString()
    });

    disableMicUplink();

    try {
      if ($remoteA) {
        $remoteA.pause();
        $remoteA.srcObject = null;
      }
    } catch(_) {}

    stopRecording();

    try { DC?.close(); } catch(_) {}

    try {
      pc?.getSenders()?.forEach(sender => sender.track && sender.track.stop());
    } catch(_) {}

    try {
      pc?.getReceivers()?.forEach(receiver => receiver.track && receiver.track.stop());
    } catch(_) {}

    try {
      pc?.close();
    } catch(_) {}

    try {
      localStream?.getTracks()?.forEach(track => track.stop());
    } catch(_) {}

    try {
      remoteStream?.getTracks()?.forEach(track => track.stop());
    } catch(_) {}

    log('[Live] hangup done', reason || '');
  }

  /* ===== Parent Messaging ===== */
  window.addEventListener('message', (ev) => {
    const msg = ev?.data || {};
    const type = msg.type;

    if (type === 'clarity.live.context'){
      CTX = normalizeIncomingContext(msg.data || {});
      applyStaticTexts();
      log('[CTX]', {
        ...CTX,
        normalizedInterviewLang: activeInterviewLang(CTX)
      });
    }

    else if (type === 'clarity.live.record'){
      RECORD_ENABLED = !!(msg.data && msg.data.enabled);
      log('[REC] record flag from parent:', RECORD_ENABLED);
      maybeStartRecorder();
    }

    else if (type === 'clarity.live.prime'){
      CTX = normalizeIncomingContext(msg.data || {});
      applyStaticTexts();

      const rep = CTX.reportLang || LANG;
      log('[PRIME] received from parent', {
        lang: CTX.lang || LANG,
        normalizedInterviewLang: activeInterviewLang(CTX),
        reportLang: rep,
        companyName: CTX.companyName || ''
      });

      primeStrictLanguage(rep);
      speakPrepThenWelcome();
    }

    else if (type === 'clarity.live.start'){
      startInterview();
    }

    else if (type === 'clarity.live.stop' || type === 'clarity.live.hangup'){
      setStatus('warn', t('fallbackEnd'));
      hangup('parent_stop');
    }
  });

  window.addEventListener('load', () => {
    applyStaticTexts();

    postToParent('clarity.live.hello', {
      uid: UID,
      companyId: COMPANY_ID,
      audioOnly: AUDIO_ONLY,
      mode: AUDIO_ONLY ? 'audio' : 'video'
    });

    if (AUTOSTART){
      setTimeout(() => {
        if (!STARTED) {
          log('[AUTO] no parent start → autostart');
          startInterview();
        }
      }, 1500);
    }
  });

  $btnStop.addEventListener('click', () => {
    setStatus('warn', t('fallbackEnd'));
    hangup('user_fallback_end');
  });

  })();
  </script>
</body>
</html>
