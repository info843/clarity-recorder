    assessmentV24MarkQuestionAudioDone(source || 'assistant_question_transcript_done', text);
    assessmentV2Debug('assistant_question_transcript_observed_answer_window_only', { source, textPreview:String(text||'').slice(0,160) });
  }

  function assessmentV2AppendText(existing, incoming){
    const a = String(existing || '').trim();
    const b = String(incoming || '').trim();
    if (!a) return b;
    if (!b) return a;
    const an = normalizeForMatch(a);
    const bn = normalizeForMatch(b);
    if (an && bn) {
      if (an.includes(bn)) return a;
      if (bn.includes(an)) return b;
    }
    return `${a} ${b}`.replace(/\s+/g, ' ').trim();
  }

  function assessmentV2CommitBufferedAnswer(slot, source = 'buffer_commit'){
    if (!assessmentV2IsActive() || ASSESSMENT_V2.finalLock) return false;
    const target = assessmentV2Target();
    const no = Math.max(1, Math.min(target, Math.round(Number(slot || ASSESSMENT_V2.pendingAnswerSlot || ASSESSMENT_V2.lastAskedNo) || 1)));
    const clean = String(ASSESSMENT_V2.pendingAnswerText || '').trim();
    if (!clean || no <= ASSESSMENT_V2.answered || no !== ASSESSMENT_V2.lastAskedNo || !ASSESSMENT_V2.awaitingAnswer) {
      assessmentV2Debug('buffer_commit_ignored', { no, source, cleanPreview:clean.slice(0,160), answered:ASSESSMENT_V2.answered, lastAskedNo:ASSESSMENT_V2.lastAskedNo, awaitingAnswer:ASSESSMENT_V2.awaitingAnswer });
      return false;
    }

    ASSESSMENT_V2.answers[no] = clean;
    ASSESSMENT_V2.answered = Math.max(ASSESSMENT_V2.answered, no);
    ASSESSMENT_V2.awaitingAnswer = false;
    ASSESSMENT_V2.phase = 'answered';
    ASSESSMENT_V2.lastUserAt = Date.now();
    ASSESSMENT_TARGET_ANSWERED = ASSESSMENT_V2.answered >= target;
    assessmentV2ClearTimer('stallTimer');
    assessmentV2ClearTimer('pendingAnswerTimer');
    assessmentV2ClearTimer('controlFallbackTimer');
    assessmentV2ClearTimer('questionDoneFallbackTimer');
    ASSESSMENT_V2.pendingAnswerText = '';
    ASSESSMENT_V2.pendingAnswerSlot = 0;
    ASSESSMENT_V2.pendingAnswerSources = [];
    ASSESSMENT_V2.pendingAnswerFirstAt = 0;
    ASSESSMENT_V2.pendingAnswerLastAt = 0;

    try { postToParent('clarity.assessment.v2.slot_answered', { index:no, target, text:clean.slice(0,240), source, ts:new Date().toISOString() }); } catch(_) {}
    assessmentV2Debug('slot_answered_debounced', { no, target, source, answered: ASSESSMENT_V2.answered, asked: ASSESSMENT_V2.asked, textPreview:clean.slice(0,160) });

    if (no >= target) {
      assessmentV2Finalize('target_answered_debounced');
      return true;
    }

    assessmentV2ClearTimer('nextTimer');
    const nextDelay = Math.max(5200, Math.min(12000, Number(Q.get('assessmentV2NextQuestionDelayMs') || 9500) || 9500));
    ASSESSMENT_V2.nextTimer = setTimeout(() => {
      if (!assessmentV2IsActive() || ASSESSMENT_V2.finalLock) return;
      assessmentV2AskSlot(no + 1, 'after_debounced_answer_next_slot');
    }, nextDelay);
    return true;
  }

  function assessmentV2ArmBufferedAnswerCommit(slot, source = 'buffer'){
    assessmentV2ClearTimer('pendingAnswerTimer');
    const settleMs = Math.max(10000, Math.min(28000, Number(Q.get('assessmentV24AnswerSettleMs') || Q.get('assessmentV2AnswerSettleMs') || 20500) || 20500));
    const minFromQuestionDoneMs = Math.max(9000, Math.min(28000, Number(Q.get('assessmentV24MinAnswerWindowMs') || Q.get('assessmentV2MinTranscriptAnswerMs') || 19500) || 19500));
    const localSilenceMs = Math.max(2500, Math.min(9000, Number(Q.get('assessmentV24MicSilenceMs') || 6500) || 6500));
    const remoteSilenceMs = Math.max(1000, Math.min(5000, Number(Q.get('assessmentV24AiSilenceMs') || 3200) || 3200));
    ASSESSMENT_V2.pendingAnswerTimer = setTimeout(() => {
      if (!assessmentV2IsActive() || ASSESSMENT_V2.finalLock) return;
      const nowTs = Date.now();
      if (!ASSESSMENT_V2.slotQuestionAudioDoneAt) {
        assessmentV2Debug('buffer_commit_waiting_for_question_audio_done', { slot, source });
        assessmentV2ArmBufferedAnswerCommit(slot, 'waiting_for_question_audio_done');
        return;
      }
      const sinceQuestionDone = nowTs - (ASSESSMENT_V2.slotQuestionAudioDoneAt || nowTs);
      const sinceLastTranscript = nowTs - (ASSESSMENT_V2.pendingAnswerLastAt || nowTs);
      const sinceLocalVoice = assessmentV24MsSince(ASSESSMENT_LOCAL_VOICE_LAST_AT);
      const sinceRemoteVoice = assessmentV24MsSince(ASSESSMENT_REMOTE_VOICE_LAST_AT);
      if (
        sinceQuestionDone < minFromQuestionDoneMs ||
        sinceLastTranscript < settleMs - 250 ||
        sinceLocalVoice < localSilenceMs ||
        sinceRemoteVoice < remoteSilenceMs
      ) {
        assessmentV2Debug('buffer_commit_rescheduled_waiting_for_stable_answer_window', {
          slot,
          source,
          sinceQuestionDone,
          minFromQuestionDoneMs,
          sinceLastTranscript,
          settleMs,
          sinceLocalVoice,
          localSilenceMs,
          sinceRemoteVoice,
          remoteSilenceMs
        });
        assessmentV2ArmBufferedAnswerCommit(slot, 'rescheduled_waiting_for_stable_answer_window');
        return;
      }
      assessmentV2CommitBufferedAnswer(slot, source || 'buffer_timer');
    }, settleMs);
    assessmentV2Debug('buffer_commit_armed', { slot, source, settleMs, minFromQuestionDoneMs, localSilenceMs, remoteSilenceMs, textPreview:String(ASSESSMENT_V2.pendingAnswerText||'').slice(0,160) });
  }

  function assessmentV2RegisterUserAnswer(text, source = 'user'){
    if (!assessmentV2IsActive() || ASSESSMENT_V2.finalLock) return;
    const clean = String(text || '').trim();
    if (!clean || clean.length < 2) return;
    const target = assessmentV2Target();
    if (!ASSESSMENT_V2.awaitingAnswer || !ASSESSMENT_V2.lastAskedNo || ASSESSMENT_V2.lastAskedNo <= ASSESSMENT_V2.answered) {
      assessmentV2Debug('user_answer_ignored_no_open_slot', { source, textPreview:clean.slice(0,160) });
      return;
    }

    const no = Math.max(1, Math.min(target, Math.round(ASSESSMENT_V2.lastAskedNo)));
    const nowTs = Date.now();

    if (no === 1 && ASSESSMENT_V2.answered === 0 && assessmentV242LooksLikeReadinessOnlyAnswer(clean)) {
      assessmentV2Debug('v242_readiness_only_answer_ignored_for_q1', { no, source, textPreview: clean.slice(0,160) });
      ASSESSMENT_V2.phase = 'answer_open';
      assessmentV2ArmAnswerStall(no, 'readiness_only_ignored_wait_for_real_q1_answer');
      return;
    }

    if (!ASSESSMENT_V2.slotQuestionAudioDoneAt) {
      assessmentV24MarkQuestionAudioDone('user_transcript_implies_question_done', clean);
    }
    const sinceAsk = nowTs - Math.max(ASSESSMENT_V2.slotListenSince || ASSESSMENT_V2.slotQuestionAudioDoneAt || 0, ASSESSMENT_V2.slotAskedAt || 0);
    const minAcceptMs = Math.max(7000, Math.min(24000, Number(Q.get('assessmentV24MinTranscriptStartMs') || Q.get('assessmentV2MinTranscriptStartMs') || 11500) || 11500));

    // Transcript chunks can arrive while the participant is still speaking. We therefore only buffer here.
    // The slot is counted after a stable silence window, not at the first transcript fragment.
    if (sinceAsk < minAcceptMs) {
      assessmentV2Debug('user_answer_buffered_early_but_not_counted', { no, source, sinceAsk, minAcceptMs, textPreview:clean.slice(0,160) });
    }

    if (ASSESSMENT_V2.pendingAnswerSlot !== no) {
      ASSESSMENT_V2.pendingAnswerText = clean;
      ASSESSMENT_V2.pendingAnswerSlot = no;
      ASSESSMENT_V2.pendingAnswerSources = [String(source || 'user')];
      ASSESSMENT_V2.pendingAnswerFirstAt = nowTs;
    } else {
      ASSESSMENT_V2.pendingAnswerText = assessmentV2AppendText(ASSESSMENT_V2.pendingAnswerText, clean);
      ASSESSMENT_V2.pendingAnswerSources.push(String(source || 'user'));
    }
    ASSESSMENT_V2.pendingAnswerLastAt = nowTs;
    ASSESSMENT_V2.phase = 'answer_buffering';
    assessmentV2Debug('answer_fragment_buffered', { no, source, sinceAsk, pendingChars:ASSESSMENT_V2.pendingAnswerText.length, textPreview:clean.slice(0,160) });
    assessmentV2ArmBufferedAnswerCommit(no, source || 'user_transcript');
  }

  function assessmentV2AskSlot(no, source = 'ask_slot'){
    if (!assessmentV2IsActive() || ASSESSMENT_V2.finalLock) return false;
    const target = assessmentV2Target();
    const idx = Math.max(1, Math.min(target, Number(no || 1) || 1));
    if (idx <= ASSESSMENT_V2.answered) return false;
    if (ASSESSMENT_V2.awaitingAnswer && ASSESSMENT_V2.lastAskedNo > ASSESSMENT_V2.answered && ASSESSMENT_V2.lastAskedNo !== idx) {
      try { log('[ASSESSMENT_V2] ask slot blocked while awaiting previous answer', { requested:idx, awaiting:ASSESSMENT_V2.lastAskedNo, answered:ASSESSMENT_V2.answered, source }); } catch(_) {}
      return false;
    }
    const questionText = assessmentV2QuestionText(idx);
    const marked = assessmentV2MarkSlotAsked(idx, questionText, source || 'ask_slot');
    if (!marked) {
      assessmentV2Debug('ask_slot_not_sent_mark_blocked', { idx, target, source });
      return false;
    }
    try { log('[ASSESSMENT_V2] ask slot', { idx, target, source }); } catch(_) {}
    return createAssistantAudioResponseFromInstruction(assessmentV2QuestionInstruction(idx, source), `assessment_v24_${source}_${idx}`);
  }

  function assessmentV2ClosingText(){
    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);
    if (assessmentV2IsHybrid()) return assessmentHybridClosingText(CTX, lk, profile);
    return assessmentFinalClosingText(CTX);
  }

  function assessmentV2Finalize(source = 'finalize'){
    if (!assessmentV2IsActive() || ASSESSMENT_V2.finalLock) return false;
    const target = assessmentV2Target();
    if (ASSESSMENT_V2.answered < target) {
      try { log('[ASSESSMENT_V2] finalize blocked: target answer missing', { source, answered: ASSESSMENT_V2.answered, target, asked: ASSESSMENT_V2.asked }); } catch(_) {}
      assessmentV2AskSlot(Math.max(1, ASSESSMENT_V2.answered + 1), 'finalize_blocked_missing_slot');
      return false;
    }

    ASSESSMENT_V2.finalLock = true;
    ASSESSMENT_TARGET_ANSWERED = true;
    assessmentV2ClearTimer('nextTimer');
    assessmentV2ClearTimer('stallTimer');
    assessmentV2ClearTimer('pendingAnswerTimer');
    assessmentV2ClearTimer('controlFallbackTimer');
    assessmentV2ClearTimer('questionDoneFallbackTimer');
    try { if (ASSESSMENT_SLOT_DRIVER_TIMER) clearTimeout(ASSESSMENT_SLOT_DRIVER_TIMER); } catch(_) {}
    ASSESSMENT_SLOT_DRIVER_TIMER = null;
    try { if (structuredAutoFinishTimer) clearTimeout(structuredAutoFinishTimer); } catch(_) {}
    structuredAutoFinishTimer = null;
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    targetAutoFinishTimer = null;

    const hybrid = assessmentV2IsHybrid();
    const buffer = hybrid
      ? Math.max(15000, Math.min(22000, Number(Q.get('assessmentV2HybridHangupMs') || 18000) || 18000))
      : Math.max(20000, Math.min(28000, Number(Q.get('assessmentV2FinalHangupMs') || 23000) || 23000));

    try {
      postToParent('clarity.assessment.v2.target_answered', {
        uid: UID,
        companyId: COMPANY_ID,
        source,
        mode: assessmentModeName(CTX),
        hybrid,
        answered: ASSESSMENT_V2.answered,
        asked: ASSESSMENT_V2.asked,
        target,
        bufferMs: buffer,
        ts: new Date().toISOString()
      });
    } catch(_) {}

    assessmentV2Debug('final_lock_target_answered', { source, hybrid, answered: ASSESSMENT_V2.answered, asked: ASSESSMENT_V2.asked, target, buffer });

    setStatus('warn', hybrid ? t('processing') : t('processing'));
    setStopButtonAvailable(false);
    avatarSet('processing', 'assessment_v24_final_lock');
    avatarLevel('user', 0, 'assessment_v24_final_lock');
    avatarLevel('ai', 0.12, 'assessment_v24_final_lock');

    // Stop candidate input and recording immediately after the final answer. This is the key stability rule:
    // from here onward, no further participant audio/video can alter the data that is being exported.
    try { disableMicUplink(); } catch(_) {}
    try {
      localStream?.getAudioTracks?.().forEach(track => { track.enabled = false; });
      // For video-only/mix we can disable the camera track after target completion as well.
      localStream?.getVideoTracks?.().forEach(track => { try { track.enabled = false; } catch(_) {} });
    } catch(_) {}
    try { stopRecording(); ASSESSMENT_V2.mediaStopped = true; } catch(e) { try { log('[ASSESSMENT_V2] stopRecording failed', errMsg(e)); } catch(_) {} }

    const close = assessmentV2ClosingText();
    if (!ASSESSMENT_V2.finalInstructionSent && close) {
      ASSESSMENT_V2.finalInstructionSent = true;
      const lk = activeInterviewLang(CTX);
      const instruction = lk === 'de'
        ? `Das Assessment ist technisch abgeschlossen. Stelle keine weitere Frage. Sage jetzt exakt diesen Satz und nichts danach: „${close}“`
        : `The assessment is technically complete. Do not ask another question. Now say exactly this sentence and nothing after it: “${close}”`;
      try { createAssistantAudioResponseFromInstruction(instruction, hybrid ? 'assessment_v24_handoff_sentence' : 'assessment_v24_final_sentence'); } catch(e) { try { log('[ASSESSMENT_V2] final instruction failed', errMsg(e)); } catch(_) {} }
    }

    assessmentV2ClearTimer('hardTimer');
    ASSESSMENT_V2.hardTimer = setTimeout(() => {
      try { log('[ASSESSMENT_V2] hard hangup after final lock', { source, buffer }); } catch(_) {}
      try { hangup(hybrid ? 'assessment_v24_oral_handoff_complete' : 'assessment_v24_complete'); } catch(e) { try { log('[ASSESSMENT_V2] hard hangup failed', errMsg(e)); } catch(_) {} }
    }, buffer);
    return true;
  }

  function assessmentV2RegisterAudioItemAnswer(itemId = '', source = 'user_audio_item'){
    if (!assessmentV2IsActive() || ASSESSMENT_V2.finalLock) return false;
    // v2.4: raw audio item events still do not count immediately. They arm a conservative
    // control-only fallback so the live flow can progress if OpenAI does not deliver a text
    // transcription event. Text transcripts always win when available.
    const no = Math.max(1, Math.min(assessmentV2Target(), Math.round(Number(ASSESSMENT_V2.lastAskedNo || 1) || 1)));
    ASSESSMENT_V2.lastAudioItemAt = Date.now();
    ASSESSMENT_V2.lastAudioItemId = String(itemId || '');
    assessmentV2Debug('audio_item_observed_control_fallback_armed_v24', { itemId, source, slot:no, answered:ASSESSMENT_V2.answered });
    return assessmentV24ArmControlFallback(no, itemId, source || 'candidate_audio_item');
  }

  function assessmentV2LooksLikeCompletionText(text){
    const n = normalizeForMatch(text);
    if (!n) return false;
    const signals = [
      'assessment ist abgeschlossen', 'analyse ist abgeschlossen', 'daten werden verarbeitet', 'antworten werden verarbeitet', 'bitte bleiben sie', 'fenster nicht schließen', 'fenster nicht schliessen',
      'spoken part is now complete', 'assessment is complete', 'answers will now be processed', 'please stay on this page', 'do not close this window',
      'teil ist abgeschlossen', 'schriftliche teil', 'chat erscheint', 'chat appears', 'written part will now follow'
    ];
    return finalClosingDetected(text) || signals.some(x => n.includes(normalizeForMatch(x)));
  }

  function assessmentV2OnTranscript(payload){
    if (!assessmentV2IsActive()) return;
    const speaker = String(payload?.speaker || payload?.role || '').toLowerCase();
    const text = String(payload?.text || payload?.cleanText || payload?.originalText || '').trim();
    if (!text) return;

    if (speaker === 'assistant') {
      if (assessmentV2LooksLikeCompletionText(text)) {
        // If the assistant somehow speaks the final/handoff sentence before the target answer,
        // do not end. Pull the missing slot instead.
        if (ASSESSMENT_V2.answered >= assessmentV2Target()) assessmentV2Finalize('assistant_completion_text_detected');
        else assessmentV2AskSlot(Math.max(1, ASSESSMENT_V2.answered + 1), 'completion_too_early_missing_slot');
        return;
      }
      if (assessmentV24LooksLikeRoleDrift(text)) {
        assessmentV2Debug('assistant_role_drift_detected_ignored', { textPreview:text.slice(0,220), answered:ASSESSMENT_V2.answered, asked:ASSESSMENT_V2.asked, awaiting:ASSESSMENT_V2.lastAskedNo });
        // Do not let coaching/free-chat text become a report question or a slot transition.
        // If the current slot already has an answer buffered, let the normal debounce commit it.
        // If not, keep waiting for the participant or the stall reminder.
        return;
      }
      assessmentV2RegisterAskedFromAssistant(text, payload?.sourceEvent || 'assistant_transcript');
      return;
    }

    if (speaker === 'user') {
      assessmentV2RegisterUserAnswer(text, payload?.sourceEvent || 'user_transcript');
    }
  }

  applyStaticTexts();
  setStatus('info', t('init'));
  avatarSet('ready', 'live_initialized');

  function transcriptKey(speaker, text, itemId) {
    return [
      String(speaker || '').toLowerCase(),
      String(itemId || ''),
      String(text || '').trim().slice(0, 180)
    ].join('|');
  }

  function looksLikeToolNoise(text){
    const clean = String(text || '').trim();
    if (!clean) return true;
    if (clean === '{}' || clean === '[]') return true;
    if (/^\s*[{[]/.test(clean)) return true;
    if (/^\s*null\s*$/i.test(clean)) return true;
    return false;
  }

  function emitTranscript(speaker, text, extra = {}) {
    const clean = String(text || '').trim();
    if (!clean) return;
    if (speaker === 'assistant' && looksLikeToolNoise(clean)) {
      log('[TRANSCRIPT] skipped assistant tool/noise text', {
        sourceEvent: extra.sourceEvent || '',
        textPreview: clean.slice(0, 120)
      });
      return;
    }

    const key = transcriptKey(
      speaker,
      clean,
      extra.itemId || extra.item_id || extra.responseId || extra.response_id || ''
    );

    if (transcriptSeen.has(key)) return;
    transcriptSeen.add(key);

    transcriptSeq += 1;

    const payload = {
      speaker: speaker || 'unknown',
      text: clean,
      seq: transcriptSeq,
      itemId: extra.itemId || extra.item_id || '',
      responseId: extra.responseId || extra.response_id || '',
      sourceEvent: extra.sourceEvent || '',
      final: extra.final !== false,
      ts: new Date().toISOString()
    };

    log('[TRANSCRIPT]', payload);
    postToParent('rt.transcript.partial', payload);
    emitStructuredTurnFromTranscript(payload);
    try { assessmentV2OnTranscript(payload); } catch(e) { try { log('[ASSESSMENT_V2] transcript hook failed', errMsg(e)); } catch(_) {} }

    if (payload.final !== false) {
      if (String(payload.speaker || '').toLowerCase() === 'user') {
        scheduleInterviewAutoFinishCheck('candidate_transcript_final');
      } else if (String(payload.speaker || '').toLowerCase() === 'assistant') {
        // New assistant activity means the model is still active; defer idle autofinish.
        // If the configured final/handoff sentence is actually spoken, start the technical
        // hangup timer immediately; do not wait for the model to call end_interview.
        if (finalClosingDetected(payload.text)) {
          handleDetectedFinalOrHandoffTranscript('assistant_final_or_handoff_transcript', payload.text);
        } else {
          scheduleInterviewAutoFinishCheck('assistant_transcript_final');
        }
      }
    }
  }

  function isInterviewDe(ctx = {}) {
    return activeInterviewLang(ctx) === 'de';
  }

  function finalClosingText(ctx = {}){
    if (looksAssessmentContext(ctx) || (typeof isAssessmentContext === 'function' && isAssessmentContext(ctx))) {
      return assessmentFinalClosingText(ctx);
    }
    const profile = langProfile(activeInterviewLang(ctx));
    return profile.finalClose || UI_TEXTS.en.finalClose;
  }

  function normalizeForMatch(value){
    return String(value || '')
      .toLowerCase()
      .normalize('NFKD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^\w\u00C0-\u024F\u0370-\u03FF\u0400-\u04FF\u0590-\u05FF\u0600-\u06FF\u0900-\u097F\u0E00-\u0E7F\u1E00-\u1EFF\u3040-\u30FF\u3400-\u9FFF\uAC00-\uD7AF]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function finalClosingDetected(text){
    const given = normalizeForMatch(text);
    if (!given) return false;

    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);

    // Normaler Abschluss und Assessment-Hybrid-Handoff sind beide legitime Endsignale.
    // In Hybrid-Modi lautet der letzte Satz bewusst anders, weil danach der Chat-Teil folgt.
    const expectedCandidates = [
      finalClosingText(CTX),
      assessmentHybridClosingText(CTX, lk, profile),
      interviewHybridClosingText(CTX, lk, profile)
    ]
      .map(normalizeForMatch)
      .filter(Boolean);

    for (const expected of expectedCandidates) {
      const expectedLead = expected.slice(0, Math.min(70, expected.length));
      const expectedMid = expected.slice(0, Math.min(140, expected.length));
      const givenLead = given.slice(0, Math.min(90, given.length));

      if (expectedLead && given.includes(expectedLead)) return true;
      if (expectedMid && expected.includes(givenLead)) return true;
    }

    // Fallback-Marker für den Fall, dass das Realtime-Transkript leicht abweicht.
    const universalMarkers = [
      ['do not close', 'interview is being processed'],
      ['please do not close', 'processed'],
      ['bitte schließen', 'interview wird verarbeitet'],
      ['bitte schliessen', 'interview wird verarbeitet'],
      ['no cierre', 'entrevista se esta procesando'],
      ['no cierre', 'entrevista se está procesando'],
      ['ne pas fermer', 'entretien est en cours'],
      ['non chiuda', 'colloquio e in fase'],
      ['nao feche', 'entrevista esta sendo processada'],
      ['niet sluit', 'interview wordt verwerkt'],

      // Assessment-Hybrid-Handoff: mündlicher Teil ist fertig, Chat folgt.
      ['mündliche teil', 'schriftlicher teil', 'chat'],
      ['muendliche teil', 'schriftlicher teil', 'chat'],
      ['spoken part', 'written part', 'chat'],
      ['oral part', 'written part', 'chat'],
      ['parte orale', 'parte scritta', 'chat'],
      ['parte oral', 'parte escrita', 'chat'],
      ['partie orale', 'partie ecrite', 'chat'],
      ['partie orale', 'partie écrite', 'chat']
    ];

    return universalMarkers.some(pair => pair.every(marker => given.includes(normalizeForMatch(marker))));
  }

  function isReadyText(text){
    const normalized = normalizeForMatch(text);
    if (!normalized) return false;

    const allReadyWords = Object.values(LANG_PROFILES)
      .flatMap(profile => profile.readyWords || [])
      .concat(['ready','yes','ja','oui','si','sí','ok','okay','start']);

    return allReadyWords.some(word => {
      const w = normalizeForMatch(word);
      return w && normalized.includes(w);
    });
  }

  function clearHardEndTimers(){
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    try { if (targetExtraQuestionAutoFinishTimer) clearTimeout(targetExtraQuestionAutoFinishTimer); } catch(_) {}
    try { if (structuredAutoFinishTimer) clearTimeout(structuredAutoFinishTimer); } catch(_) {}
    try { if (SLOT_STALL_TIMER) clearTimeout(SLOT_STALL_TIMER); } catch(_) {}
    targetAutoFinishTimer = null;
    targetExtraQuestionAutoFinishTimer = null;
    structuredAutoFinishTimer = null;
    SLOT_STALL_TIMER = null;
  }

  function lockRealtimeListeningForEnd(source){
    try {
      dcSend({
        type: 'session.update',
        session: { turn_detection: { type: 'none' } }
      });
    } catch(_) {}

    // v3.11.3: Do NOT disable the actual microphone track here.
    // Lock only Realtime turn detection while the final message is requested.
    // Disabling the track before full finalization can leave the UI in a half-ended state:
    // mic appears stopped, but recorder/video continues and the parent processing flow is not triggered.

    log('[HARD-END] listening locked softly', {
      source: source || '',
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      liveTargetQuestions: interviewLiveQuestionTarget(CTX),
      hybrid: isInterviewHybrid(CTX),
      userUtterances,
      userAudioItems
    });
  }

  function scheduleAbsoluteFullFinalize(source, ms = ABSOLUTE_FINALIZE_AFTER_HARD_END_MS){
    try { if (ABSOLUTE_FINALIZE_TIMER) clearTimeout(ABSOLUTE_FINALIZE_TIMER); } catch(_) {}
    const delay = Math.max(12000, Number(ms) || ABSOLUTE_FINALIZE_AFTER_HARD_END_MS);
    ABSOLUTE_FINALIZE_TIMER = setTimeout(() => {
      if (END_CALLED) return;
      if (FINAL_HANGUP_TIMER) return;
      log('[FINALIZER] absolute full finalize fallback -> hangup', {
        source: source || '',
        delayMs: delay,
        mainQuestions: structuredCurrentQuestionIndex,
        targetQuestions: interviewMainQuestionTarget(CTX),
        uploadStarted,
        uploadFinished
      });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup(source || 'absolute_finalize_fallback');
    }, delay);
    log('[FINALIZER] absolute full finalize fallback scheduled', { source: source || '', delayMs: delay });
  }

  function requestHardEnd(source, opts = {}){
    if (END_CALLED || FINAL_HANGUP_TIMER) return;
    if (typeof assessmentV2IsActive === 'function' && assessmentV2IsActive() && !ASSESSMENT_V2.finalLock) {
      assessmentV2Debug('legacy_hard_end_bypassed_by_v24', { source });
      return false;
    }

    if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex < interviewMainQuestionTarget(CTX)) {
      log('[HARD-END] blocked before media target complete', {
        source: source || '',
        current: structuredCurrentQuestionIndex,
        target: interviewMainQuestionTarget(CTX),
        hybrid: isInterviewHybrid(CTX),
        audioOnly: AUDIO_ONLY
      });
      return;
    }

    if (!isInterviewLiveContext(CTX)) {
      sendFinalCloseInstruction(source || 'hard_end_non_interview', true);
      return;
    }

    if (isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX)) {
      sendFinalCloseInstruction(source || 'hard_end_hybrid_handoff', true);
      return;
    }

    const speakFinal = opts.speakFinal !== false;
    const cancelActive = opts.cancelActive !== false;

    HARD_END_LOCK = true;
    TARGET_FINALIZE_REQUESTED = true;
    clearHardEndTimers();
    lockRealtimeListeningForEnd(source || 'hard_end');
    setStatus('warn', t('processing'));

    postToParent('clarity.live.hard_end_lock', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      ts: new Date().toISOString()
    });

    scheduleAbsoluteFullFinalize(source || 'hard_end_absolute_fallback');

    try { if (cancelActive) dcSend({ type: 'response.cancel' }); } catch(_) {}

    if (speakFinal && !FINAL_MESSAGE_SPOKEN) {
      const lk = activeInterviewLang(CTX);
      const profile = langProfile(lk);
      const finalClose = isAssessmentHybridLive(CTX)
        ? (assessmentHybridClosingText(CTX, lk, profile) || finalClosingText({ ...CTX, lang: lk }))
        : finalClosingText({ ...CTX, lang: lk });
      const isAssessmentEnd = isAssessmentVoiceLive(CTX);
      const isHybridEnd = isAssessmentHybridLive(CTX);
      const instruction = lk === 'de'
        ? (isHybridEnd
          ? `Der mündliche Teil ist jetzt abgeschlossen. Stelle keine weitere mündliche Frage. Sage jetzt exakt diesen Übergabesatz ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`
          : `${isAssessmentEnd ? 'Das Assessment' : 'Das Interview'} ist jetzt endgültig abgeschlossen. Stelle keine weitere Frage. Sage jetzt exakt diesen Abschluss ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`)
        : (isHybridEnd
          ? `The spoken part is now complete. Do not ask another spoken question. Now say exactly this handoff message without additional explanation: “${finalClose}” Then call end_interview.`
          : `The ${isAssessmentEnd ? 'assessment' : 'interview'} is now definitively complete. Do not ask another question. Now say exactly this closing message without additional explanation: “${finalClose}” Then call end_interview.`);

      try {
        if (isVideoOnlyInterview(CTX) || isAssessmentVoiceLive(CTX)) {
          dcSend({
            type: 'response.create',
            response: {
              conversation: 'default',
              modalities: ['audio'],
              instructions: instruction
            }
          });
        } else {
          dcSend({
            type: 'conversation.item.create',
            item: { type: 'message', role: 'user', content: [{ type: 'input_text', text: instruction }] }
          });
          dcSend({ type: 'response.create', response: { conversation: 'default', modalities: ['audio'] } });
        }
      } catch (e) {
        log('[HARD-END] final instruction failed', errMsg(e));
      }

      if (isAssessmentVoiceLive(CTX)) {
        scheduleAssessmentDirectHangup(source || 'assessment_hard_end_instruction_sent', effectiveFinalHangupBufferMs());
      }
    } else {
      beginFinalHangup(source || 'hard_end_no_final_needed');
      return;
    }

    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    HARD_END_WATCHDOG_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      log('[HARD-END] watchdog -> force hangup/upload', {
        source: source || '',
        mainQuestions: structuredCurrentQuestionIndex,
        targetQuestions: interviewMainQuestionTarget(CTX)
      });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup(source || 'hard_end_watchdog');
    }, HARD_END_WATCHDOG_MS);
  }

  function scheduleStrictTargetFinalization(source, delayMs){
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return;
    const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
    const isAssessmentTargetReached = isAssessmentVoiceLive(CTX) && structuredCurrentQuestionIndex >= assessmentTarget;
    if (isAssessmentVoiceLive(CTX)) {
      if (!isAssessmentTargetReached) return;
      if (!assessmentTargetAnswerReadyForFinal(source || 'strict_target_finalization')) {
        log('[HARD-END] assessment finalization blocked until target answer', {
          source: source || '',
          current: structuredCurrentQuestionIndex,
          target: assessmentTarget,
          targetAnswered: ASSESSMENT_TARGET_ANSWERED
        });
        return;
      }
    }
    if (!isInterviewLiveContext(CTX) && !isAssessmentTargetReached) return;
    if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex < interviewLiveQuestionTarget(CTX) && !nearCompleteVideoOnlyByRuntime(CTX)) return;

    const delay = Math.max(1000, Number(delayMs) || TARGET_FINALIZE_AFTER_ANSWER_MS);
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    targetAutoFinishTimer = setTimeout(() => {
      requestHardEnd(source || 'strict_target_finalization', { speakFinal: true, cancelActive: true });
    }, delay);

    log('[HARD-END] strict target finalization scheduled', {
      source: source || '',
      delayMs: delay,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      followUpAsked: !!structuredFollowUpAskedForQuestion[structuredCurrentQuestionIndex || 0]
    });
  }

  function effectiveCandidateResponseCount(){
    return Math.max(Number(userUtterances || 0), Number(userAudioItems || 0));
  }

  function shouldAutoFinishInterview({ forceAfterTarget = false } = {}){
    if (!STARTED || END_CALLED || FINAL_HANGUP_TIMER) return false;
    if (!isInterviewLiveContext(CTX)) return false;
    if (!interviewStartedAt) return false;

    const target = interviewLiveQuestionTarget(CTX);
    const elapsedMs = Date.now() - interviewStartedAt;
    const answerCount = effectiveCandidateResponseCount();
    const targetReached = structuredCurrentQuestionIndex >= target || nearCompleteVideoOnlyByRuntime(CTX);
    const hasEnoughResponses = answerCount >= Math.max(3, target - 1);
    const longEnough = elapsedMs >= Math.max(180000, target * 24000);

    if (forceAfterTarget && targetReached) return true;
    return (targetReached && hasEnoughResponses) || (targetReached && longEnough);
  }

  function assessmentTargetAnswerReadyForFinal(source = ''){
    if (!isAssessmentVoiceLive(CTX)) return true;
    const src = String(source || '').toLowerCase();
    // Manual/fallback stop must always be allowed to avoid trapping the user.
    if (/manual|parent_stop|user_abort|emergency|fallback/.test(src)) return true;
    return structuredCurrentQuestionIndex >= assessmentLiveQuestionTarget(CTX) && ASSESSMENT_TARGET_ANSWERED === true;
  }

  function finalMediaTargetReachedForHangup(){
    if (isAssessmentVoiceLive(CTX)) return structuredCurrentQuestionIndex >= assessmentLiveQuestionTarget(CTX) && ASSESSMENT_TARGET_ANSWERED === true;
    if (isInterviewLiveContext(CTX)) return structuredCurrentQuestionIndex >= interviewLiveQuestionTarget(CTX) || nearCompleteVideoOnlyByRuntime(CTX);
    return true;
  }

  function handleDetectedFinalOrHandoffTranscript(source, text){
    if (END_CALLED || FINAL_HANGUP_TIMER) return false;
    if (typeof assessmentV2IsActive === 'function' && assessmentV2IsActive() && !ASSESSMENT_V2.finalLock) {
      assessmentV2Debug('early_final_text_ignored_by_v24_until_target_answer', { source, textPreview:String(text||'').slice(0,160) });
      return false;
    }
    if (!finalClosingDetected(text)) return false;
    if (!finalMediaTargetReachedForHangup()) {
      log('[END] final/handoff text detected before media target; not hanging up yet', {
        source: source || '',
        current: structuredCurrentQuestionIndex,
        assessmentTarget: isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0,
        interviewTarget: isInterviewLiveContext(CTX) ? interviewLiveQuestionTarget(CTX) : 0,
        textPreview: String(text || '').slice(0, 160)
      });
      return false;
    }

    FINAL_MESSAGE_SPOKEN = true;
    HARD_END_LOCK = true;
    TARGET_FINALIZE_REQUESTED = true;
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    try { if (structuredAutoFinishTimer) clearTimeout(structuredAutoFinishTimer); } catch(_) {}
    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    try { if (ASSESSMENT_SLOT_DRIVER_TIMER) clearTimeout(ASSESSMENT_SLOT_DRIVER_TIMER); } catch(_) {}
    targetAutoFinishTimer = null;
    structuredAutoFinishTimer = null;
    HARD_END_WATCHDOG_TIMER = null;
    ASSESSMENT_SLOT_DRIVER_TIMER = null;
    lockRealtimeListeningForEnd(source || 'final_handoff_detected');
    log('[END] final/handoff transcript detected -> final hangup timer', {
      source: source || '',
      current: structuredCurrentQuestionIndex,
      assessmentTarget: isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0,
      bufferMs: effectiveFinalHangupBufferMs(),
      textPreview: String(text || '').slice(0, 160)
    });
    beginFinalHangup(source || 'final_handoff_detected');
    return true;
  }

  function sendFinalCloseInstruction(source, forced = false){
    if (END_CALLED || FINAL_HANGUP_TIMER) return;
    if (typeof assessmentV2IsActive === 'function' && assessmentV2IsActive() && !ASSESSMENT_V2.finalLock) {
      assessmentV2Debug('legacy_final_close_bypassed_by_v24_until_target_answer', { source, forced });
      return;
    }
    if (isAssessmentVoiceLive(CTX) && !assessmentTargetAnswerReadyForFinal(source || 'send_final_close')) {
      log('[END] assessment final close blocked until target answer', {
        source: source || '',
        current: structuredCurrentQuestionIndex,
        target: assessmentLiveQuestionTarget(CTX),
        targetAnswered: ASSESSMENT_TARGET_ANSWERED
      });
      if ((structuredCurrentQuestionIndex || 0) < assessmentLiveQuestionTarget(CTX)) {
        scheduleAssessmentSlotDriver('assessment_final_close_blocked_next_question', structuredCurrentQuestionIndex || 0, 1200);
      }
      return;
    }
    if (!forced && !shouldAutoFinishInterview()) return;

    if (forced && (isInterviewLiveContext(CTX) || isAssessmentVoiceLive(CTX))) {
      HARD_END_LOCK = true;
      TARGET_FINALIZE_REQUESTED = true;
      clearHardEndTimers();
      lockRealtimeListeningForEnd(source || 'forced_final_close');
      try { dcSend({ type: 'response.cancel' }); } catch(_) {}
    }

    if (FINAL_MESSAGE_SPOKEN) {
      beginFinalHangup(source || 'autofinish_final_spoken');
      return;
    }

    if (structuredAutoFinishRequested && !forced) return;
    structuredAutoFinishRequested = true;

    const lk = activeInterviewLang(CTX);
    const profile = langProfile(lk);
    const isAssessmentEnd = isAssessmentVoiceLive(CTX);
    const isHybridEnd = isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX);
    const finalClose = isAssessmentHybridLive(CTX)
      ? (assessmentHybridClosingText(CTX, lk, profile) || finalClosingText({ ...CTX, lang: lk }))
      : (isInterviewHybrid(CTX)
        ? (interviewHybridClosingText(CTX, lk, profile) || finalClosingText({ ...CTX, lang: lk }))
        : finalClosingText({ ...CTX, lang: lk }));
    const instruction = lk === 'de'
      ? (isHybridEnd
        ? `Der mündliche Teil ist jetzt abgeschlossen. Stelle keine weitere mündliche Frage. Sage jetzt exakt diesen Übergabesatz ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`
        : `${isAssessmentEnd ? 'Das Assessment' : 'Das Interview'} ist jetzt abgeschlossen. Stelle keine weitere Frage. Sage jetzt exakt diesen Abschluss ohne zusätzliche Erklärungen: „${finalClose}“ Danach rufe end_interview auf.`)
      : (isHybridEnd
        ? `The spoken part is now complete. Do not ask another spoken question. Now say exactly this handoff message without additional explanation: “${finalClose}” Then call end_interview.`
        : `The ${isAssessmentEnd ? 'assessment' : 'interview'} is now complete. Do not ask another question. Now say exactly this closing message without additional explanation: “${finalClose}” Then call end_interview.`);

    log('[END] autofinish requested', {
      source: source || '',
      forced,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      userUtterances,
      userAudioItems,
      effectiveCandidateResponses: effectiveCandidateResponseCount()
    });

    try {
      if (isVideoOnlyInterview(CTX)) {
        dcSend({
          type: 'response.create',
          response: {
            conversation: 'default',
            modalities: ['audio'],
            instructions: instruction
          }
        });
      } else {
        dcSend({
          type: 'conversation.item.create',
          item: { type: 'message', role: 'user', content: [{ type: 'input_text', text: instruction }] }
        });
        dcSend({ type: 'response.create', response: { conversation: 'default', modalities: ['audio'] } });
      }
    } catch (e) {
      log('[END] autofinish instruction failed', errMsg(e));
    }

    if (isAssessmentVoiceLive(CTX)) {
      scheduleAssessmentDirectHangup(source || 'assessment_autofinish_instruction_sent', effectiveFinalHangupBufferMs());
    }

    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    HARD_END_WATCHDOG_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      log('[END] autofinish force hangup after missing model tool/final audio');
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup('autofinish_force_timeout');
    }, forced ? HARD_END_WATCHDOG_MS : STRUCTURED_AUTOFINISH_FORCE_MS);
  }

  function requestAutoFinishInterview(source){
    sendFinalCloseInstruction(source || 'autofinish', false);
  }

  function slotPlanQuestionAt(no){
    const plan = currentStructuredQuestionPlan(CTX);
    return String(plan[Math.max(0, Number(no || 0) - 1)] || '').trim();
  }

  function clearSlotStallTimer(){
    try { if (SLOT_STALL_TIMER) clearTimeout(SLOT_STALL_TIMER); } catch(_) {}
    SLOT_STALL_TIMER = null;
  }

  function createAssistantAudioResponseFromInstruction(instruction, source){
    if (!instruction || !dcSend || END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return false;
    try {
      // v3.12.0: Video-only control must not be injected as fake user messages.
      // Those messages polluted the conversation and made the assistant drift into normal GPT chat.
      // Audio-only and Mix keep the older path because they were stable in testing.
      if (isVideoOnlyInterview(CTX) || isAssessmentVoiceLive(CTX)) {
        // v2.2: For assessment questions we do NOT cancel any active response.
        // Cancelling caused clipped welcome/questions and premature slot transitions.
        if (isVideoOnlyInterview(CTX) && !isAssessmentVoiceLive(CTX)) { try { dcSend({ type: 'response.cancel' }); } catch(_) {} }
        dcSend({
          type: 'response.create',
          response: {
            conversation: 'default',
            modalities: ['audio'],
            instructions: String(instruction)
          }
        });
        log(isAssessmentVoiceLive(CTX) ? '[ASSESSMENT_V2.4] response.instructions sent' : '[DRIVER:video] response.instructions sent', {
          source: source || '',
          current: structuredCurrentQuestionIndex,
          target: interviewMainQuestionTarget(CTX),
          instructionPreview: String(instruction).slice(0, 180)
        });
        return true;
      }

      dcSend({
        type: 'conversation.item.create',
        item: {
          type: 'message',
          role: 'user',
          content: [{ type: 'input_text', text: instruction }]
        }
      });
      dcSend({ type: 'response.create', response: { conversation: 'default', modalities: ['audio'] } });
      log('[SLOT] recovery instruction sent', { source: source || '', instructionPreview: String(instruction).slice(0, 180) });
      return true;
    } catch(e) {
      log('[SLOT] recovery instruction failed', { source: source || '', message: errMsg(e) });
      return false;
    }
  }

  function clearVideoDriverTimer(){
    try { if (VIDEO_DRIVER_TIMER) clearTimeout(VIDEO_DRIVER_TIMER); } catch(_) {}
    VIDEO_DRIVER_TIMER = null;
  }

  function scheduleAssessmentSlotDriver(source, q, delayMs = 1800){
    if (typeof assessmentV2IsActive === 'function' && assessmentV2IsActive() && !ASSESSMENT_V2.finalLock) {
      assessmentV2Debug('legacy_slot_driver_bypassed_by_v24', { source, q, delayMs });
      return false;
    }
    if (!isAssessmentVoiceLive(CTX)) return false;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return false;
    const target = assessmentLiveQuestionTarget(CTX);
    const current = Math.max(0, Number(q || structuredCurrentQuestionIndex || 0));
    if (current >= target) {
      scheduleStrictTargetFinalization(source || 'assessment_slot_driver_target_complete', TARGET_FINALIZE_AFTER_ANSWER_MS);
      return true;
    }
    try { if (ASSESSMENT_SLOT_DRIVER_TIMER) clearTimeout(ASSESSMENT_SLOT_DRIVER_TIMER); } catch(_) {}
    const delay = Math.max(900, Math.min(6000, Number(delayMs) || 1800));
    ASSESSMENT_SLOT_DRIVER_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return;
      const latest = structuredCurrentQuestionIndex || 0;
      const t = assessmentLiveQuestionTarget(CTX);
      if (latest >= t) {
        scheduleStrictTargetFinalization(source || 'assessment_slot_driver_reached_target', TARGET_FINALIZE_AFTER_ANSWER_MS);
        return;
      }
      log('[DRIVER:assessment] requesting next fixed assessment question', {
        source: source || '',
        current: latest,
        next: Math.min(t, latest + 1),
        target: t,
        mode: assessmentModeName(CTX)
      });
      requestMissingInterviewQuestion(source || 'assessment_slot_driver_next_question');
    }, delay);
    log('[DRIVER:assessment] scheduled', { source: source || '', delayMs: delay, current, target });
    return true;
  }

  function scheduleVideoOnlyDriver(source, delayMs = 1800){
    if (!isVideoOnlyInterview(CTX)) return false;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK || VIDEO_DRIVER_FINAL_LOCK) return false;

    const target = interviewMainQuestionTarget(CTX);
    const current = structuredCurrentQuestionIndex || 0;
    const key = `${source || 'video_driver'}|${current}|${target}|${structuredLastAssistantTurnType}|${structuredLastCandidateTurnType}`;
    const now = Date.now();
    if (VIDEO_DRIVER_LAST_KEY === key && now - VIDEO_DRIVER_LAST_AT < 2500) return false;
    VIDEO_DRIVER_LAST_KEY = key;
    VIDEO_DRIVER_LAST_AT = now;

    clearVideoDriverTimer();
    VIDEO_DRIVER_TIMER = setTimeout(() => {
      if (!isVideoOnlyInterview(CTX)) return;
      if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK || VIDEO_DRIVER_FINAL_LOCK) return;

      const q = structuredCurrentQuestionIndex || 0;
      const t = interviewMainQuestionTarget(CTX);

      if (q >= t) {
        VIDEO_DRIVER_FINAL_LOCK = true;
        log('[DRIVER:video] target complete -> hard finalization', { source: source || '', q, target: t });
        requestHardEnd(source || 'video_driver_target_complete', { speakFinal: true, cancelActive: true });
        return;
      }

      // If a main answer was captured and no follow-up has been accepted, allow exactly one follow-up.
      if (q > 0 && structuredLastAssistantTurnType === 'main_question' && !structuredFollowUpAskedForQuestion[q]) {
        log('[DRIVER:video] requesting one controlled follow-up', { source: source || '', q, target: t });
        requestSlotFollowUp(source || 'video_driver_followup');
        return;
      }

      // Otherwise progress to the next fixed main question from the snapshot/slot plan.
      log('[DRIVER:video] requesting next fixed main question', { source: source || '', current: q, next: Math.min(t, q + 1), target: t });
      requestNextPlannedMainQuestion(source || 'video_driver_next_main');
    }, Math.max(500, Number(delayMs) || 1800));

    log('[DRIVER:video] scheduled', { source: source || '', delayMs: Math.max(500, Number(delayMs) || 1800), current, target });
    return true;
  }

  function requestSlotFollowUp(source){
    if (!isInterviewLiveContext(CTX) || isInterviewHybrid(CTX)) return false;
    const q = structuredCurrentQuestionIndex || 0;
    if (q <= 0 || q >= interviewMainQuestionTarget(CTX)) return false;
    if (structuredFollowUpAskedForQuestion[q]) return false;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return false;

    const lk = activeInterviewLang(CTX);
    const instruction = lk === 'de'
      ? 'Bitte stelle jetzt genau eine kurze, natürliche Nachfrage oder Ergänzungsmöglichkeit zur letzten Antwort. Stelle keine neue Hauptfrage und verwende keine spätere Kundenfrage. Warte danach auf die Ergänzungsantwort.'
      : 'Please now ask exactly one short, natural follow-up or addition opportunity about the last answer. Do not ask a new main question and do not use a later customer question. Then wait for the addition answer.';

    return createAssistantAudioResponseFromInstruction(instruction, source || 'slot_followup_stall');
  }

  function requestNextPlannedMainQuestion(source){
    if (!isInterviewLiveContext(CTX) || isInterviewHybrid(CTX)) return false;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return false;
    const target = interviewMainQuestionTarget(CTX);
    const nextNo = Math.min(target, (structuredCurrentQuestionIndex || 0) + 1);
    if (nextNo <= 0 || nextNo > target) return false;

    const plannedQuestion = slotPlanQuestionAt(nextNo);
    const lk = activeInterviewLang(CTX);
    const instruction = lk === 'de'
      ? (plannedQuestion
        ? `Bitte stelle jetzt exakt diese nächste Hauptfrage aus dem festen Interviewplan. Sage nur die Frage selbst und keine Meta-Erklärung: ${plannedQuestion}`
        : 'Bitte stelle jetzt direkt die nächste rollenbezogene Hauptfrage. Sage nur die Frage selbst und keine Meta-Erklärung.')
      : (plannedQuestion
        ? `Please now ask exactly this next main question from the fixed interview plan. Say only the question itself and no meta explanation: ${plannedQuestion}`
        : 'Please now ask the next role-specific main question directly. Say only the question itself and no meta explanation.');

    return createAssistantAudioResponseFromInstruction(instruction, source || 'slot_next_main_stall');
  }

  function scheduleSlotStallRecovery(kind, q, delayMs, source){
    if (!isInterviewLiveContext(CTX) || isInterviewHybrid(CTX)) return;
    if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return;
    const target = interviewMainQuestionTarget(CTX);
    if (!q || q >= target) return;

    clearSlotStallTimer();
    const delay = Math.max(3000, Number(delayMs) || SLOT_NEXT_MAIN_STALL_MS);
    SLOT_STALL_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER || HARD_END_LOCK) return;
      if ((structuredCurrentQuestionIndex || 0) !== q) return;
      if (kind === 'followup') {
        if (structuredLastAssistantTurnType === 'main_question' && !structuredFollowUpAskedForQuestion[q]) {
          requestSlotFollowUp(source || 'slot_followup_stall');
        }
        return;
      }
      if (kind === 'next_main') {
        if (structuredLastCandidateTurnType === 'answer_addition' || structuredLastAssistantTurnType === 'follow_up_question') {
          requestNextPlannedMainQuestion(source || 'slot_next_main_stall');
        }
      }
    }, delay);

    log('[SLOT] stall recovery scheduled', {
      kind,
      q,
      delayMs: delay,
      source: source || '',
      target
    });
  }

  function scheduleInterviewAutoFinishCheck(source){
    try { if (structuredAutoFinishTimer) clearTimeout(structuredAutoFinishTimer); } catch(_) {}

    const assessmentVoice = isAssessmentVoiceLive(CTX);
    const interviewVoice = isInterviewLiveContext(CTX);
    if (assessmentVoice && typeof assessmentV2IsActive === 'function' && assessmentV2IsActive() && !ASSESSMENT_V2.finalLock) {
      assessmentV2Debug('legacy_auto_finish_check_bypassed_by_v24', { source });
      return;
    }
    if (!interviewVoice && !assessmentVoice) return;

    const target = assessmentVoice ? assessmentLiveQuestionTarget(CTX) : interviewLiveQuestionTarget(CTX);
    const hybrid = (assessmentVoice && isAssessmentHybridLive(CTX)) || (interviewVoice && isInterviewHybrid(CTX));

    if (structuredCurrentQuestionIndex < target) {
      if (assessmentVoice) {
        scheduleAssessmentSlotDriver(source || 'assessment_idle_before_target', structuredCurrentQuestionIndex || 0, Math.max(1500, TARGET_FINALIZE_AFTER_ANSWER_MS));
      }
      return;
    }

    structuredAutoFinishTimer = setTimeout(() => {
      if (assessmentVoice || hybrid) {
        sendFinalCloseInstruction(source || (assessmentVoice ? 'assessment_idle_after_target' : 'hybrid_idle_after_spoken_target'), true);
      } else {
        requestAutoFinishInterview(source || 'idle_after_candidate_answer');
      }
    }, hybrid || assessmentVoice ? Math.max(1200, TARGET_FINALIZE_AFTER_ANSWER_MS) : STRUCTURED_AUTOFINISH_IDLE_MS);
  }

  function scheduleTargetReachedAutoFinish(source, delayMs){
    if (isAssessmentVoiceLive(CTX) && typeof assessmentV2IsActive === 'function' && assessmentV2IsActive() && !ASSESSMENT_V2.finalLock) {
      assessmentV2Debug('legacy_target_autofinish_bypassed_by_v24', { source, delayMs });
      return;
    }

    const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
    const assessmentReached = isAssessmentVoiceLive(CTX) && structuredCurrentQuestionIndex >= assessmentTarget;
    if (!isInterviewLiveContext(CTX) && !assessmentReached) return;
    if (END_CALLED || FINAL_HANGUP_TIMER) return;
    if (isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex < interviewLiveQuestionTarget(CTX) && !nearCompleteVideoOnlyByRuntime(CTX)) return;
    if (isAssessmentVoiceLive(CTX)) {
      if (structuredCurrentQuestionIndex < assessmentTarget) return;
      if (!assessmentTargetAnswerReadyForFinal(source || 'target_reached_autofinish')) {
        log('[END] assessment target reached timer blocked until target answer', {
          source: source || '',
          current: structuredCurrentQuestionIndex,
          target: assessmentTarget,
          targetAnswered: ASSESSMENT_TARGET_ANSWERED
        });
        return;
      }
    }

    const delay = Number.isFinite(Number(delayMs)) ? Number(delayMs) : TARGET_QUESTION_ANSWER_GRACE_MS;
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    targetAutoFinishTimer = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;

      // v3.11.7: For Mix/Video+Chat the spoken target is intentionally lower than the
      // full Q-set. The remaining slots are handled by chat. Assessment hybrid follows
      // the same principle, but remains isolated from the Interview driver.
      const requiredTarget = isAssessmentVoiceLive(CTX)
        ? assessmentTarget
        : (isInterviewHybrid(CTX) ? interviewLiveQuestionTarget(CTX) : interviewMainQuestionTarget(CTX));
      if (structuredCurrentQuestionIndex < requiredTarget && !nearCompleteVideoOnlyByRuntime(CTX)) return;

      requestHardEnd(source || (isAssessmentHybridLive(CTX) || isInterviewHybrid(CTX) ? 'hybrid_spoken_target_reached_timer' : 'target_reached_timer'), { speakFinal: true, cancelActive: true });
    }, Math.max(1500, delay));

    log('[END] target reached autofinish scheduled', {
      source: source || '',
      delayMs: Math.max(1500, delay),
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX),
      liveTargetQuestions: isAssessmentVoiceLive(CTX) ? assessmentTarget : interviewLiveQuestionTarget(CTX),
      hybrid: isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX),
      assessment: isAssessmentVoiceLive(CTX),
      userUtterances,
      userAudioItems
    });
  }

  function markCandidateAudioItem(itemId, source){
    const key = String(itemId || `${source || 'audio'}-${Date.now()}-${Math.random()}`).trim();
    if (seenUserAudioItemIds.has(key)) return;
    seenUserAudioItemIds.add(key);
    userAudioItems += 1;
    log('[USER-AUDIO] counted candidate audio item', {
      source: source || '',
      itemId: key,
      userAudioItems,
      userUtterances,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: interviewMainQuestionTarget(CTX)
    });
    try { assessmentV2RegisterAudioItemAnswer(key, source || 'candidate_audio_item'); } catch(e) { try { log('[ASSESSMENT_V2] audio item answer hook failed', errMsg(e)); } catch(_) {} }

    if (isAssessmentVoiceLive(CTX)) {
      // Assessment v2.4 owns slot progression and finalization. Do not let legacy
      // structuredCurrentQuestionIndex / audio-item heuristics trigger autofinish.
      return;
    }

    const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
    const assessmentReached = isAssessmentVoiceLive(CTX) && structuredCurrentQuestionIndex >= assessmentTarget;
    if (structuredCurrentQuestionIndex >= interviewLiveQuestionTarget(CTX) || nearCompleteVideoOnlyByRuntime(CTX) || assessmentReached) {
      const q = structuredCurrentQuestionIndex || 0;
      const delay = structuredFollowUpAskedForQuestion[q] ? TARGET_FINALIZE_AFTER_ANSWER_MS : TARGET_FOLLOWUP_WAIT_MS;
      if (assessmentReached) scheduleTargetReachedAutoFinish('assessment_candidate_audio_after_target', delay);
      else scheduleStrictTargetFinalization('candidate_audio_after_target', delay);
      if (isVideoOnlyInterview(CTX)) scheduleVideoOnlyDriver('candidate_audio_after_target', delay + 500);
    } else {
      scheduleInterviewAutoFinishCheck('candidate_audio_item');
      if (isVideoOnlyInterview(CTX)) scheduleVideoOnlyDriver('candidate_audio_item', 7000);
    }
  }

  function canEndNow(){
    if (!interviewStartedAt) return false;

    const elapsed = (Date.now() - interviewStartedAt) / 1000;
    const answerCount = effectiveCandidateResponseCount();
    const target = interviewLiveQuestionTarget(CTX);
    const qComplete = !shouldBlockEarlyInterviewClosing() || nearCompleteVideoOnlyByRuntime(CTX);

    // Before the Q-set is complete, keep the old safety floor.
    if (!qComplete) {
      if (elapsed < MIN_SECONDS_BEFORE_END) return false;
      if (answerCount < MIN_USER_UTTERANCES) return false;
      return false;
    }

    // v3.11.5: Video-only and Video+Chat must not finalize on a falsely advanced
    // question index with too little captured candidate material. This keeps the finalizer
    // robust for real completed interviews while blocking short, incomplete video runs.
    const stricterMediaGuard = isInterviewLiveContext(CTX) && (!AUDIO_ONLY || isInterviewHybrid(CTX));
    if (stricterMediaGuard) {
      const minResponses = Math.max(2, Math.min(target, target - 1));
      const elapsedLongEnough = elapsed >= Math.max(90, target * 12);
      if (answerCount < minResponses && !elapsedLongEnough) {
        log('[END] end_interview blocked by video/mix response guard', {
          elapsedSec: elapsed.toFixed(1),
          answerCount,
          minResponses,
          target,
          hybrid: isInterviewHybrid(CTX),
          audioOnly: AUDIO_ONLY
        });
        return false;
      }
    }

    // After the selected Q-set/media target is complete, accept end_interview.
    // The slot plan itself is the stronger completion signal; do not block the finalizer
    // only because Realtime missed one user transcription event.
    return true;
  }


  function clearAssessmentDirectHangupTimer(reason = ''){
    try { if (ASSESSMENT_DIRECT_HANGUP_TIMER) clearTimeout(ASSESSMENT_DIRECT_HANGUP_TIMER); } catch(_) {}
    ASSESSMENT_DIRECT_HANGUP_TIMER = null;
  }

  function scheduleAssessmentDirectHangup(source = 'assessment_direct_hangup', delayMs = 0){
    if (!isAssessmentVoiceLive(CTX)) return false;
    if (END_CALLED || destroyed) return false;
    if (!assessmentTargetAnswerReadyForFinal(source || 'assessment_direct_hangup')) {
      log('[END] assessment direct hangup blocked until target answer', {
        source: source || '',
        current: structuredCurrentQuestionIndex,
        target: assessmentLiveQuestionTarget(CTX),
        targetAnswered: ASSESSMENT_TARGET_ANSWERED
      });
      return false;
    }

    const delay = Math.max(12000, Math.min(26000, Number(delayMs || ASSESSMENT_DIRECT_HANGUP_MS) || 20000));
    clearAssessmentDirectHangupTimer(source || 'reschedule');

    postToParent('clarity.live.final_message_pending', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      bufferMs: delay,
      direct: true,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : interviewMainQuestionTarget(CTX),
      ts: new Date().toISOString()
    });

    if (isAssessmentHybridLive(CTX)) {
      postToParent('clarity.live.handoff_pending', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        bufferMs: delay,
        direct: true,
        mainQuestions: structuredCurrentQuestionIndex,
        targetQuestions: assessmentLiveQuestionTarget(CTX),
        chatQuestionCount: Number(CTX?.chatQuestionCount || 0),
        ts: new Date().toISOString()
      });
    }

    log('[END] assessment direct hangup fail-safe scheduled', {
      source: source || '',
      delayMs: delay,
      mainQuestions: structuredCurrentQuestionIndex,
      targetQuestions: assessmentLiveQuestionTarget(CTX),
      hybrid: isAssessmentHybridLive(CTX)
    });

    ASSESSMENT_DIRECT_HANGUP_TIMER = setTimeout(() => {
      if (END_CALLED || destroyed) return;
      if (FINAL_HANGUP_TIMER) return;

      FINAL_MESSAGE_SPOKEN = true;
      HARD_END_LOCK = true;
      TARGET_FINALIZE_REQUESTED = true;
      END_CALLED = true;

      log('[END] assessment direct hangup fail-safe fired', {
        source: source || '',
        delayMs: delay,
        mainQuestions: structuredCurrentQuestionIndex,
        targetQuestions: assessmentLiveQuestionTarget(CTX),
        hybrid: isAssessmentHybridLive(CTX)
      });

      postToParent('clarity.live.final_message_done', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        bufferMs: delay,
        direct: true,
        ts: new Date().toISOString()
      });

      if (isAssessmentHybridLive(CTX)) {
        postToParent('clarity.live.handoff_ready', {
          uid: UID,
          companyId: COMPANY_ID,
          source: source || '',
          bufferMs: delay,
          direct: true,
          mainQuestions: structuredCurrentQuestionIndex,
          targetQuestions: assessmentLiveQuestionTarget(CTX),
          chatQuestionCount: Number(CTX?.chatQuestionCount || 0),
          ts: new Date().toISOString()
        });
      }

      hangup(source || 'assessment_direct_hangup_timeout');
    }, delay);

    return true;
  }

  function effectiveFinalHangupBufferMs(){
    const base = Math.max(2500, Number(FINAL_HANGUP_BUFFER_MS) || 15000);
    // liveAssessment.html is Assessment-only. The spoken handoff/closing must not be cut,
    // but recorder/mic/camera should stop shortly after target completion.
    if (isAssessmentHybridLive(CTX)) return Math.max(15000, Math.min(20000, base));
    if (isAssessmentVoiceLive(CTX)) return Math.max(15000, Math.min(20000, base));
    return Math.max(2500, Math.min(20000, base));
  }

  function beginFinalHangup(source){
    if (END_CALLED) return;
    if (FINAL_HANGUP_TIMER) return;
    clearAssessmentDirectHangupTimer(source || 'begin_final_hangup');
    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    HARD_END_WATCHDOG_TIMER = null;
    const hangupBufferMs = effectiveFinalHangupBufferMs();

    log('[END] final hangup scheduled', {
      source: source || 'unknown',
      finalMessageSpoken: FINAL_MESSAGE_SPOKEN,
      itemId: FINAL_MESSAGE_ITEM_ID || '',
      bufferMs: hangupBufferMs
    });

    setStatus('warn', t('processing'));

    avatarSet('processing', 'final_hangup_scheduled');
    avatarLevel('ai', 0, 'final_hangup_scheduled');
    avatarLevel('user', 0, 'final_hangup_scheduled');

    postToParent('clarity.live.final_message_pending', {
      uid: UID,
      companyId: COMPANY_ID,
      source: source || '',
      bufferMs: hangupBufferMs,
      ts: new Date().toISOString()
    });

    if (isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX)) {
      postToParent('clarity.live.handoff_pending', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        targetQuestions: interviewMainQuestionTarget(CTX),
        mainQuestions: structuredCurrentQuestionIndex,
        chatQuestionCount: Number(CTX?.chatQuestionCount || 0),
        ts: new Date().toISOString()
      });
    }

    FINAL_HANGUP_TIMER = setTimeout(() => {
      if (END_CALLED) return;

      END_CALLED = true;

      log('[END] final hangup accepted after buffer', {
        source: source || 'unknown',
        bufferMs: hangupBufferMs
      });

      postToParent('clarity.live.final_message_done', {
        uid: UID,
        companyId: COMPANY_ID,
        source: source || '',
        bufferMs: hangupBufferMs,
        ts: new Date().toISOString()
      });

      if (isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX)) {
        postToParent('clarity.live.handoff_ready', {
          uid: UID,
          companyId: COMPANY_ID,
          source: source || '',
          targetQuestions: interviewMainQuestionTarget(CTX),
          mainQuestions: structuredCurrentQuestionIndex,
          chatQuestionCount: Number(CTX?.chatQuestionCount || 0),
          ts: new Date().toISOString()
        });
      }

      hangup(source || 'final_message_done');
    }, hangupBufferMs);
  }

  function requestEndNow(source){
    if (END_CALLED) return;

    if (!canEndNow()){
      log('[END] end_interview IGNORED (too early)', {
        source: source || 'unknown',
        elapsedSec: interviewStartedAt ? ((Date.now() - interviewStartedAt) / 1000).toFixed(1) : '0',
        userUtterances
      });
      return;
    }

    END_REQUESTED_BY_MODEL = true;
    log('[END] end_interview requested by model', source || 'unknown');

    if (FINAL_MESSAGE_SPOKEN) {
      beginFinalHangup(source || 'model_end');
      return;
    }

    // v3.11.3: Some Realtime runs emit the end_interview tool call without a transcript
    // that our finalClosingDetected() can classify as the closing message. Previously that
    // left the interview half-ended: microphone/input stopped or model done, but recorder/video
    // kept running and the parent processing flow never started.
    // Now a valid end_interview request after the slot plan is complete always leads to a full
    // finalizer. We still try to request the spoken closing once; if it is not produced quickly,
    // we finalize rather than hanging indefinitely.
    try { if (MODEL_END_NO_FINAL_TIMER) clearTimeout(MODEL_END_NO_FINAL_TIMER); } catch(_) {}
    sendFinalCloseInstruction(source || 'model_end_without_detected_closing', true);
    MODEL_END_NO_FINAL_TIMER = setTimeout(() => {
      if (END_CALLED || FINAL_HANGUP_TIMER) return;
      log('[FINALIZER] model end without detected closing -> finalize fallback', { source: source || '' });
      FINAL_MESSAGE_SPOKEN = true;
      beginFinalHangup(source || 'model_end_no_final_fallback');
    }, MODEL_END_NO_FINAL_GRACE_MS);
  }

  /* ===== DC Queue ===== */
  function dcSend(obj){
    try {
      if (dcIsOpen && DC?.readyState === 'open'){
        DC.send(JSON.stringify(obj));
      } else {
        dcQueue.push(obj);
        log('[DC] queued', (obj && (obj.type || Object.keys(obj)[0])) || '');
      }
    } catch(e) {
      log('[DC] send fail', errMsg(e));
    }
  }

  function flushDCQueue(){
    if (!dcIsOpen || !DC) return;

    try {
      while (dcQueue.length){
        const m = dcQueue.shift();
        DC.send(JSON.stringify(m));
      }
      log('[DC] queue flushed');
    } catch(e) {
      log('[DC] flush error', errMsg(e));
    }
  }

  /* ===== Token ===== */
  async function getRealtimeToken(payload){
    log('[Live] Fetching token…', TOKEN_URL, JSON.stringify(payload));

    const r = await fetch(TOKEN_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify(payload)
    });

    const txt = await r.text().catch(() => '');
    let data = null;

    try {
      data = txt ? JSON.parse(txt) : null;
    } catch(_) {}

    if (!r.ok) {
      throw new Error('token_http_' + r.status + ': ' + (txt || r.statusText));
    }

    // v3.10.3: GA-token compatibility.
    // Some backends wrap the OpenAI client secret as { ok:true, token/client_secret },
    // while the GA /v1/realtime/client_secrets endpoint can return the raw shape
    // { value, expires_at, ... }. Accept both. Only fail if no usable ephemeral key exists.
    const sec =
      data?.client_secret?.value ||
      data?.client_secret ||
      data?.clientSecret?.value ||
      data?.clientSecret ||
      data?.token?.value ||
      data?.token ||
      data?.value ||
      data?.secret ||
      '';

    if (!sec) {
      const openAiErr = data?.error?.message || data?.error || '';
      const code = data?.error?.code || data?.code || '';
      const msg = data?.message || openAiErr || 'client_secret_missing';
      throw new Error('token_error: ' + [code, msg].filter(Boolean).join(' '));
    }

    if (data?.ok === false) {
      const openAiErr = data?.error?.message || data?.error || '';
      const code = data?.error?.code || data?.code || '';
      const msg = data?.message || openAiErr || 'token_error';
      throw new Error('token_error: ' + [code, msg].filter(Boolean).join(' '));
    }

    log('[Live] effective', {
      lang: data.lang || data.session?.lang || '',
      reportLang: data.reportLang || '',
      voice: data.voice || data.session?.audio?.output?.voice || '',
      model: data.model || data.session?.model || ''
    });

    return { secret: sec, ctx: data?.ok === false ? {} : data };
  }

  /* ===== WebRTC ===== */
  async function connectRealtime(clientSecret){
    if (pc) return;

    pc = new RTCPeerConnection({
      iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
    });

    pc.onconnectionstatechange = () => {
      const state = pc.connectionState || '';
      const ice = pc.iceConnectionState || '';
      log('[RTC]', state, { ice });
      postAudioDiag('rtc_state_change', { state, ice });

      if (state === 'failed' || state === 'disconnected'){
        setStatus('warn', t('disconnected'));
        postAudioDiag('rtc_unstable', { state, ice });
      }
    };

    pc.oniceconnectionstatechange = () => {
      const ice = pc.iceConnectionState || '';
      if (ice === 'failed' || ice === 'disconnected') {
        log('[RTC-DIAG] ice connection state', ice);
        postAudioDiag('ice_unstable', { ice });
      } else if (DEBUG_LOGS) {
        log('[RTC-DIAG] ice connection state', ice);
      }
    };

    pc.ontrack = async (ev) => {
      log('[RTC] ontrack kind=', ev.track.kind);

      if (!remoteStream) remoteStream = new MediaStream();
      remoteStream.addTrack(ev.track);
      $remoteA.srcObject = remoteStream;

      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        remoteSource = audioCtx.createMediaStreamSource(remoteStream);

        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;

        const buf = new Uint8Array(analyser.frequencyBinCount);
        remoteSource.connect(analyser);

        (function tick(){
          if (destroyed) return;

          analyser.getByteTimeDomainData(buf);

          let dev = 0;
          for (let i = 0; i < buf.length; i++) {
            dev = Math.max(dev, Math.abs(buf[i] - 128));
          }

          $sys.style.width = Math.min(100, dev * 2) + '%';
          avatarRemoteAudioDev(dev);

          requestAnimationFrame(tick);
        })();
      } catch(_) {}

      try {
        $remoteA.muted = false;
        $remoteA.volume = 1.0;
        $remoteA.autoplay = true;
        $remoteA.playsInline = true;

        await $remoteA.play();

        audioUnlocked = true;
        $audioBadge.textContent = t('audioReady');
        postToParent('clarity.live.audio_ready', {});
        postAudioDiag('remote_audio_started');
        log('[AUDIO-DIAG] remote audio playing (unlocked).');
      } catch(e) {
        audioUnlocked = false;
        $audioBadge.textContent = t('audioPreparing');
        postToParent('clarity.live.audio_wait', {});
        postAudioDiag('remote_audio_wait', { reason: 'autoplay_blocked' });
        log('[AUDIO-DIAG] autoplay blocked, waiting for user gesture.');
      }

      remoteTrackReadyResolve?.();
    };

    if (localStream){
      localStream.getAudioTracks().forEach(t => {
        t.enabled = false;
        pc.addTrack(t, localStream);
      });

      if (!AUDIO_ONLY) {
        localStream.getVideoTracks().forEach(t => pc.addTrack(t, localStream));
      }

      log('[RTC] local tracks added', {
        audioOnly: AUDIO_ONLY,
        audioTracks: localStream.getAudioTracks().length,
        videoTracks: localStream.getVideoTracks().length
      });
    }

    DC = pc.createDataChannel('oai-events');

    DC.onopen = () => {
      dcIsOpen = true;
      log('[RTC] DC open');
      flushDCQueue();
    };

    DC.onmessage = onRealtimeEvent;

    const offer = await pc.createOffer({
      offerToReceiveAudio: true,
      offerToReceiveVideo: false
    });

    await pc.setLocalDescription(offer);

    // v3.10.3: GA Realtime WebRTC uses /v1/realtime/calls; token parser accepts GA raw client_secret shape.
    // The old SDP exchange endpoint /v1/realtime?model=... now returns beta_api_shape_disabled.
    const r = await fetch('https://api.openai.com/v1/realtime/calls', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${clientSecret}`,
        'Content-Type': 'application/sdp'
      },
      body: offer.sdp
    });

    if (!r.ok){
      const txt = await r.text().catch(() => r.statusText);
      throw new Error('realtime_handshake_failed: ' + txt);
    }

    const answer = {
      type: 'answer',
      sdp: await r.text()
    };

    await pc.setRemoteDescription(answer);
  }

  function onRealtimeEvent(ev){
    let data = ev && ev.data;

    try {
      if (typeof data === 'string') data = JSON.parse(data);
    } catch(_) {}

    if (!data) return;

    const eventType = data.type || '';

    if (
      eventType.includes('transcript') ||
      eventType.includes('transcription') ||
      eventType.includes('input_audio') ||
      eventType === 'conversation.item.created' ||
      eventType === 'conversation.item.done' ||
      eventType === 'response.output_item.done' ||
      eventType === 'response.output_item.added' ||
      eventType === 'response.function_call_arguments.done'
    ) {
      log('[RT-EVENT-TYPE]', eventType);

      log('[RT-EVENT-CHECK]', {
        type: eventType,
        hasTranscript: !!data?.transcript,
        hasText: !!data?.text,
        hasDelta: !!data?.delta,
        hasError: !!data?.error,
        itemId: data?.item_id || data?.itemId || data?.item?.id || '',
        itemRole: data?.item?.role || '',
        itemType: data?.item?.type || '',
        itemStatus: data?.item?.status || '',
        itemContentTypes: Array.isArray(data?.item?.content)
          ? data.item.content.map(p => p?.type || '').join(',')
          : '',
        error: data?.error?.message || data?.error || ''
      });
    }

    if (eventType === 'response.state' && data.state){
      avatarSet(data.state, 'response.state');
    }

    /* USER TRANSCRIPT — completed */
    if (
      eventType === 'conversation.item.input_audio_transcription.completed' ||
      eventType === 'input_audio_transcription.completed'
    ) {
      const txtRaw = String(
        data?.transcript ||
        data?.transcription?.text ||
        data?.text ||
        ''
      ).trim();

      const txt = txtRaw.toLowerCase();

      log('[USER-TRANSCRIPT-COMPLETED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasText: !!txtRaw,
        textPreview: txtRaw.slice(0, 160)
      });

      if (txtRaw) {
        avatarSet('thinking', 'user_transcript_completed');
        avatarLevel('user', 0.12, 'user_transcript_completed');

        userUtterances += 1;
        const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
        if (structuredCurrentQuestionIndex >= interviewMainQuestionTarget(CTX) || (assessmentTarget && structuredCurrentQuestionIndex >= assessmentTarget)) {
          scheduleTargetReachedAutoFinish(isAssessmentVoiceLive(CTX) ? 'assessment_user_transcript_after_target' : 'user_transcript_after_target', STRUCTURED_AUTOFINISH_IDLE_MS);
        } else {
          scheduleInterviewAutoFinishCheck('user_transcript_completed');
        }

        emitTranscript('user', txtRaw, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });
      }

      if (isReadyText(txtRaw)){
        READY_DETECTED = true;
        maybeAskFirstQuestion();
      }

      return;
    }

    /* USER TRANSCRIPT — delta / segment diagnostics */
    if (
      eventType === 'conversation.item.input_audio_transcription.delta' ||
      eventType === 'input_audio_transcription.delta' ||
      eventType === 'conversation.item.input_audio_transcription.segment' ||
      eventType === 'input_audio_transcription.segment'
    ) {
      const piece = String(
        data?.delta ||
        data?.transcript ||
        data?.text ||
        data?.segment?.text ||
        ''
      ).trim();

      log('[USER-TRANSCRIPT-PIECE]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        hasPiece: !!piece,
        piecePreview: piece.slice(0, 160)
      });

      if (piece) {
        avatarSet('user_speaking', 'user_transcript_piece');
        avatarLevel('user', Math.max(0.35, Math.min(0.85, piece.length / 70)), 'user_transcript_piece');
      }

      return;
    }

    /* USER TRANSCRIPT — failed */
    if (
      eventType === 'conversation.item.input_audio_transcription.failed' ||
      eventType === 'input_audio_transcription.failed'
    ) {
      log('[USER-TRANSCRIPT-FAILED]', {
        eventType,
        itemId: data?.item_id || data?.itemId || '',
        error: data?.error?.message || data?.error || 'unknown'
      });

      postToParent('rt.transcript.partial', {
        speaker: 'system',
        text: '[user_transcription_failed]',
        sourceEvent: eventType,
        final: true,
        ts: new Date().toISOString()
      });

      return;
    }

    /* USER AUDIO ITEM / internal user input_text */
    if (
      (eventType === 'conversation.item.created' || eventType === 'conversation.item.done') &&
      data.item &&
      data.item.role === 'user'
    ) {
      const it = data.item;
      const contentTypes = Array.isArray(it.content)
        ? it.content.map(p => p?.type || '').join(',')
        : '';

      const hasInputAudio = contentTypes.includes('input_audio');
      const hasInputText = contentTypes.includes('input_text');

      if (hasInputAudio) {
        const audioItemId = it.id || data.item_id || data.itemId || '';
        log('[TRANSCRIPT] user input_audio item observed, waiting for transcription.completed', {
          itemId: audioItemId,
          contentTypes,
          eventType
        });
        // v2.2: Created events are too early; only a DONE input-audio item can be used
        // as a conservative control fallback if no text transcript arrives.
        if (eventType === 'conversation.item.done') markCandidateAudioItem(audioItemId, eventType);
        return;
      }

      if (hasInputText) {
        log('[TRANSCRIPT] skipped internal user input_text', {
          itemId: it.id || data.item_id || '',
          contentTypes
        });
        return;
      }

      const texts = [];

      if (Array.isArray(it.content)) {
        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.input_text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }
      }

      const userText = texts.join('\n').trim();

      if (userText) {
        userUtterances += 1;

        emitTranscript('user', userText, {
          itemId: it.id || data.item_id || '',
          responseId: data.response_id || '',
          sourceEvent: eventType,
          final: true
        });

        const low = userText.toLowerCase();
        if (isReadyText(userText)) {
          READY_DETECTED = true;
          maybeAskFirstQuestion();
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — spoken final */
    if (eventType === 'response.audio_transcript.done') {
      postAudioDiag('response_audio_done', {
        itemId: data.item_id || data.itemId || '',
        responseId: data.response_id || data.responseId || ''
      });
