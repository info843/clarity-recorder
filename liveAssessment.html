      const txt = String(data?.transcript || '').trim();

      if (txt) {
        emitTranscript('assistant', txt, {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          sourceEvent: eventType,
          final: true
        });

        avatarLevel('ai', 0.18, 'assistant_audio_done');
        if (!FINAL_MESSAGE_SPOKEN && !FINAL_HANGUP_TIMER && !END_CALLED) {
          avatarSet('listening', 'assistant_audio_done');
        }

        if (finalClosingDetected(txt)) {
          if (shouldBlockEarlyInterviewClosing()) {
            requestMissingInterviewQuestion('early_final_audio_transcript_done');
            return;
          }

          FINAL_MESSAGE_SPOKEN = true;
          FINAL_MESSAGE_ITEM_ID = data.item_id || data.itemId || '';
          log('[END] final/handoff message detected', {
            itemId: FINAL_MESSAGE_ITEM_ID,
            responseId: data.response_id || data.responseId || '',
            isHybrid: isAssessmentHybridLive(CTX) || isInterviewHybrid(CTX),
            mainQuestions: structuredCurrentQuestionIndex,
            targetQuestions: interviewMainQuestionTarget(CTX)
          });

          // Robuster Auto-Hangup: Einige Realtime-Läufe sprechen den korrekten
          // Abschluss-/Handoff-Satz, liefern aber den end_interview-Toolcall nicht
          // zuverlässig nach. Nach dem vollständig transkribierten Satz starten wir
          // deshalb den Puffer selbst. Der Button bleibt nur Fallback.
          if (!FINAL_HANGUP_TIMER && !END_CALLED) {
            beginFinalHangup(isAssessmentHybridLive(CTX) ? 'hybrid_handoff_audio_done' : (isInterviewHybrid(CTX) ? 'interview_handoff_audio_done' : 'final_audio_transcript_done'));
          }
        }
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — delta diagnostics only */
    if (eventType === 'response.audio_transcript.delta') {
      const piece = String(data?.delta || '').trim();

      if (piece) {
        avatarSet('ai_speaking', 'assistant_audio_delta');
        avatarLevel('ai', Math.max(0.42, Math.min(0.95, piece.length / 85)), 'assistant_audio_delta');
      }

      if (piece && DEBUG_LOGS) {
        log('[ASSISTANT-TRANSCRIPT-DELTA]', {
          itemId: data.item_id || data.itemId || '',
          responseId: data.response_id || data.responseId || '',
          piecePreview: piece.slice(0, 80)
        });
      }

      return;
    }

    /* ASSISTANT TRANSCRIPT — text fallback, but ignore tool JSON/noise */
    if (eventType === 'response.text.done') {
      const txt = String(data?.text || '').trim();

      if (looksLikeToolNoise(txt)) {
        log('[TRANSCRIPT] skipped empty/json response.text.done', {
          textPreview: txt.slice(0, 120)
        });
        return;
      }

      emitTranscript('assistant', txt, {
        itemId: data.item_id || data.itemId || '',
        responseId: data.response_id || data.responseId || '',
        sourceEvent: eventType,
        final: true
      });

      return;
    }

    /* ASSISTANT output_item.done */
    if (eventType === 'response.output_item.done' && data.item) {
      const it = data.item;

      if (FINAL_MESSAGE_SPOKEN) {
        const itemId = it.id || data.item_id || data.itemId || '';
        const sameItem = !FINAL_MESSAGE_ITEM_ID || itemId === FINAL_MESSAGE_ITEM_ID;

        if (sameItem || END_REQUESTED_BY_MODEL) {
          beginFinalHangup('final_audio_done');
          return;
        }
      }

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }

      if (Array.isArray(it.content)) {
        const texts = [];

        for (const part of it.content) {
          const txt =
            part?.transcript ||
            part?.text ||
            part?.audio?.transcript ||
            '';

          if (String(txt || '').trim()) texts.push(String(txt).trim());
        }

        const finalText = texts.join('\n').trim();

        if (finalText && !looksLikeToolNoise(finalText)) {
          emitTranscript('assistant', finalText, {
            itemId: it.id || data.item_id || '',
            responseId: data.response_id || '',
            sourceEvent: eventType,
            final: true
          });

          // v3.10.5 HOTFIX: In GA Realtime the final spoken text often arrives
          // reliably via response.output_item.done, while response.audio_transcript.done
          // and/or the end_interview tool call may be delayed or absent.
          // Treat the recognized closing/handoff text as a valid processing trigger.
          if (finalClosingDetected(finalText)) {
            if (shouldBlockEarlyInterviewClosing()) {
              requestMissingInterviewQuestion('early_final_output_item_done');
              return;
            }

            FINAL_MESSAGE_SPOKEN = true;
            FINAL_MESSAGE_ITEM_ID = it.id || data.item_id || data.itemId || '';
            log('[END] final/handoff text detected in output_item.done', {
              itemId: FINAL_MESSAGE_ITEM_ID,
              responseId: data.response_id || data.responseId || '',
              mainQuestions: structuredCurrentQuestionIndex,
              targetQuestions: interviewMainQuestionTarget(CTX),
              userUtterances
            });

            if (!FINAL_HANGUP_TIMER && !END_CALLED) {
              beginFinalHangup(isAssessmentHybridLive(CTX)
                ? 'hybrid_handoff_output_item_done'
                : (isInterviewHybrid(CTX) ? 'interview_handoff_output_item_done' : 'final_output_item_done'));
            }
          }
        }
      }

      return;
    }

    /* RESPONSE DONE — GA safety: after the target is reached, do not wait forever for user transcription events. */
    if (eventType === 'response.done' || eventType === 'response.completed') {
      const assessmentTarget = isAssessmentVoiceLive(CTX) ? assessmentLiveQuestionTarget(CTX) : 0;
      if ((isInterviewLiveContext(CTX) && structuredCurrentQuestionIndex >= interviewLiveQuestionTarget(CTX)) || (assessmentTarget && structuredCurrentQuestionIndex >= assessmentTarget)) {
        // For Assessment, response.done after the assistant asked the target question is NOT enough.
        // Wait until the participant answer for that target question has been captured.
        if (isAssessmentVoiceLive(CTX) && !ASSESSMENT_TARGET_ANSWERED) {
          log('[END] assessment response.done after target ignored until candidate answer', {
            current: structuredCurrentQuestionIndex,
            target: assessmentTarget
          });
          return;
        }
        const hybridDone = isInterviewHybrid(CTX) || isAssessmentHybridLive(CTX);
        scheduleTargetReachedAutoFinish(hybridDone ? 'hybrid_response_done_after_spoken_target' : (isAssessmentVoiceLive(CTX) ? 'assessment_response_done_after_target' : 'response_done_after_target'), hybridDone ? TARGET_FINALIZE_AFTER_ANSWER_MS : STRUCTURED_AUTOFINISH_IDLE_MS);
      }
      return;
    }

    /* end_interview tool detection */
    if (eventType === 'conversation.item.created' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow('conversation.item.created');
        return;
      }
    }

    if (eventType === 'response.output_item.added' && data.item){
      const it = data.item;

      if (it.type === 'function_call' && it.name === 'end_interview'){
        requestEndNow(eventType);
        return;
      }
    }

    if (eventType === 'response.function_call_arguments.done'){
      const name =
        data.name ||
        data.tool_name ||
        data.function_name ||
        data?.function_call?.name;

      if (name === 'end_interview'){
        requestEndNow('function_call_arguments.done');
        return;
      }
    }
  }

  /* ===== Audio unlock ===== */
  async function ensureAudioUnlocked(){
    if (audioUnlocked) return true;

    try {
      await $remoteA.play();

      audioUnlocked = true;
      $audioBadge.textContent = t('audioReady');
      postToParent('clarity.live.audio_ready', {});

      return true;
    } catch(_) {}

    postToParent('clarity.live.audio_wait', {});
    setStatus('warn', t('audioClick'));

    return new Promise((resolve) => {
      const unlock = async () => {
        try {
          if (audioCtx && audioCtx.state !== 'running'){
            try {
              await audioCtx.resume();
            } catch(_) {}
          }

          await $remoteA.play();

          audioUnlocked = true;
          $audioBadge.textContent = t('audioReady');
          postToParent('clarity.live.audio_ready', {});

          window.removeEventListener('pointerdown', unlock);
          window.removeEventListener('keydown', unlock);

          resolve(true);
        } catch(_) {}
      };

      window.addEventListener('pointerdown', unlock, { once:true });
      window.addEventListener('keydown', unlock, { once:true });
    });
  }

  /* ===== Instructions / Knowledge ===== */
  function spokenMediaQuestionCap(ctx = CTX){
    const mode = String(ctx?.interviewMode || ctx?.assessmentMode || ctx?.mode || (AUDIO_ONLY ? 'audio' : 'video')).toLowerCase();
    const isChatLike = ['chat','hybrid','mix','mixmode','video_chat','audio_chat'].includes(mode);
    // Launch policy: spoken video/audio sessions are capped at Q30.
    // Q40/Q50 can remain available for chat/hybrid/future products outside this live voice flow.
    return isChatLike ? 50 : 30;
  }

  function interviewMaxQuestions(ctx = CTX){
    const cap = spokenMediaQuestionCap(ctx);
    const direct = Number(ctx?.interviewConfig?.maxQuestions || ctx?.questionCount || ctx?.maxQuestions || 0);
    if (Number.isFinite(direct) && direct > 0) return Math.max(1, Math.min(cap, Math.round(direct)));
    const raw = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || '').toUpperCase();
    const m = raw.match(/(10|20|30|40|50)/);
    return m ? Math.max(1, Math.min(cap, Number(m[1]))) : 10;
  }

  function parseQuestionLines(text){
    const raw = String(text || '').trim();
    if (!raw) return [];

    const out = [];
    const seen = new Set();
    raw
      .split(/\r?\n|(?=\b\d{1,2}[.)]\s+)/g)
      .map(line => line.replace(/^\s*[-•*]+\s*/, '').replace(/^\s*\d{1,2}[.)]\s*/, '').trim())
      .filter(Boolean)
      .forEach(line => {
        const clean = line.replace(/\s+/g, ' ');
        const key = clean.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          out.push(clean);
        }
      });
    return out;
  }

  function questionPolicyText(ctx = CTX){
    const maxQ = interviewMaxQuestions(ctx);
    const qset = String(ctx?.questionSet || ctx?.interviewConfig?.questionSet || `Q${maxQ}`).toUpperCase();
    const customQuestions = selectedCustomerQuestionLines(ctx).slice(0, maxQ);
    const missing = Math.max(0, maxQ - customQuestions.length);
    const capNoteDe = spokenMediaQuestionCap(ctx) === 30 ? ' Für Video- und Audio-Interviews ist Q30 das aktuelle Maximum im Live-Gespräch.' : '';
    const capNoteEn = spokenMediaQuestionCap(ctx) === 30 ? ' For video and audio interviews, Q30 is the current maximum for the live conversation.' : '';
    const spokenQ = isInterviewHybrid(ctx) ? interviewLiveQuestionTarget(ctx) : maxQ;
    const hybridNoteDe = isInterviewHybrid(ctx) ? ` Dies ist nur der mündliche Teil eines hybriden Interviews. Stelle hier genau ${spokenQ} mündliche Hauptfragen; der restliche schriftliche Teil folgt im Chat. Beende den mündlichen Teil mit dem vorgegebenen Übergabesatz.` : '';
    const hybridNoteEn = isInterviewHybrid(ctx) ? ` This is only the spoken part of a hybrid interview. Ask exactly ${spokenQ} spoken main questions here; the remaining written part follows in chat. End the spoken part with the provided handoff message.` : '';
    const hasCustomerPlan = customQuestions.length > 0;
    if (activeInterviewLang(ctx) === 'de') {
      return hasCustomerPlan
        ? `Interner Interviewumfang ${qset}: Es gibt einen festen Slot-Plan mit genau ${maxQ} Hauptfragen. Stelle zuerst die kundeneigenen Fragen exakt in der gespeicherten Reihenfolge. Wenn nur ${customQuestions.length} kundeneigene Fragen vorhanden sind, ergänze danach ${missing} passende rollenbezogene Hauptfragen. Pro Slot gilt strikt: Hauptfrage stellen, vollständige Antwort abwarten, genau eine kurze natürliche Nachfrage oder Ergänzungsmöglichkeit stellen, Ergänzungsantwort abwarten, erst dann nächster Slot. Eine Nachfrage darf NIEMALS eine spätere kundeneigene Hauptfrage enthalten und zählt NIEMALS als Hauptfrage. Sage im Gespräch keine Fragennummern, kein Q10/Q20/Q30 und keine Formulierungen wie „zweite Frage“, „Frage 8“ oder „letzte Frage“. Beende erst nach Slot ${maxQ} und dessen Antwort/Ergänzung.${capNoteDe}${hybridNoteDe}`
        : `Interner Interviewumfang ${qset}: Stelle genau ${maxQ} passende rollenbezogene Hauptfragen in einem festen Slot-Plan. Pro Slot gilt strikt: Hauptfrage stellen, vollständige Antwort abwarten, genau eine kurze natürliche Nachfrage oder Ergänzungsmöglichkeit stellen, Ergänzungsantwort abwarten, erst dann nächster Slot. Eine Nachfrage zählt NIEMALS als Hauptfrage. Sage im Gespräch keine Fragennummern, kein Q10/Q20/Q30 und keine Formulierungen wie „zweite Frage“, „Frage 8“ oder „letzte Frage“. Nutze natürliche professionelle Übergänge. Beende erst nach Slot ${maxQ} und dessen Antwort/Ergänzung.${capNoteDe}${hybridNoteDe}`;
    }
    return hasCustomerPlan
      ? `Internal interview scope ${qset}: There is a fixed slot plan with exactly ${maxQ} main questions. Ask the customer's own questions first, exactly in the stored order. If only ${customQuestions.length} customer questions are available, add ${missing} suitable role-specific main questions afterwards. Per slot, strictly follow: ask the main question, wait for the complete answer, ask exactly one short natural follow-up or addition opportunity, wait for the addition answer, only then move to the next slot. A follow-up must NEVER contain a later customer main question and NEVER counts as a main question. Do not announce question numbers, Q10/Q20/Q30, or phrases like “question 8”, “second question”, or “last question”. End only after slot ${maxQ} and its answer/addition.${capNoteEn}${hybridNoteEn}`

  function chunkText(txt, max = 1800) {
    const out = [];
    let i = 0;

    while (i < txt.length) {
      out.push(txt.slice(i, i + max));
      i += max;
    }

    return out;
  }

  function pushCompanyKnowledge() {
    const kb  = (CTX.kbText || '').trim();
    const job = (CTX.jobAd  || '').trim();

    if (!kb && !job) return;

    const header = '=== KONTEXT / CONTEXT START ===';
    const footer = '=== KONTEXT / CONTEXT ENDE ===';
    const questions = isAssessmentContext(CTX) ? '' : currentStructuredQuestionPlan(CTX)
      .map((q, i) => `${i + 1}. ${q}`)
      .join('\n');

    const policy = isAssessmentContext(CTX) ? assessmentQuestionPolicyText(CTX, activeInterviewLang(CTX)) : questionPolicyText(CTX);
    const questionBlock = [
      policy,
      questions ? `CUSTOMER QUESTIONS / KUNDENEIGENE FRAGEN:\n${questions}` : ''
    ].filter(Boolean).join('\n\n');

    const body = [kb, job, questionBlock].filter(Boolean).join('\n\n');
    const pieces = chunkText(`${header}\n${body}\n${footer}`, 1800);

    for (const p of pieces) {
      dcSend({
        type: 'conversation.item.create',
        item: {
          type: 'message',
          role: 'system',
          content: [{ type: 'input_text', text: p }]
        }
      });
    }
  }

  function primeStrictLanguage(reportLang) {
    const spoken = activeInterviewLang(CTX);
    const sys = buildSystemInstructions({
      ...CTX,
      lang: spoken,
      reportLang: langKey(CTX.reportLang || reportLang || 'de')
    });

    const tools = [{
      type: 'function',
      name: 'end_interview',
      description: 'Ends the interview. Use ONLY when interview is truly finished and you have said the final processing message.',
      parameters: {
        type: 'object',
        properties: {
          reason: { type: 'string' }
        },
        required: []
      }
    }];

    dcSend({
      type: 'session.update',
      session: {
        voice: effectiveRealtimeVoice(CTX),
        instructions: sys,
        spoken_language: spoken,
        input_audio_format: 'pcm16',

  function buildInterviewPlan(ctx){
    const lk = activeInterviewLang(ctx);
    const profile = langProfile(lk);
    const seeds = [];
    const prefix = profile.jobPrefix || LANG_PROFILES.en.jobPrefix;
    const maxQ = interviewMaxQuestions(ctx);

    const customQuestions = selectedCustomerQuestionLines(ctx).slice(0, maxQ);
    customQuestions.forEach(q => seeds.push(q));

    const base = (profile.baseQuestions || LANG_PROFILES.en.baseQuestions).slice();
    base.forEach(q => seeds.push(q));

    const text =
      (ctx.roleProfileText || '').trim() +
      '\n' +
      (ctx.docsText || '').trim();

    const lines = text
      .split(/\r?\n/)
      .map(s => s.trim())
      .filter(Boolean)
      .filter(line => !/^\d{1,2}[.)]\s*/.test(line))
      .slice(0, Math.max(0, maxQ - seeds.length));

    if (lines.length){
      lines.forEach(line => {
        seeds.push(prefix + line);
      });
    }

    const unique = [];
    const seen = new Set();
    for (const q of seeds){
      const clean = String(q || '').replace(/\s+/g, ' ').trim();
      if (!clean) continue;
      const key = clean.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      unique.push(clean);
      if (unique.length >= maxQ) break;
    }

    return unique.slice(0, Math.max(1, maxQ));
  }

  function firstQuestionInstruction(question, lk){
    const profile = langProfile(lk);

  /* ===== Media ===== */
  async function setupLocalMedia(){
    const constraints = {
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: AUDIO_ONLY ? false : true
    };

    try {
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) {
      setStatus('warn', t('mediaBlocked'));
      log('[Media] getUserMedia error', {
        audioOnly: AUDIO_ONLY,
        message: errMsg(e)
      });
      postToParent('clarity.live.permission_error', { message:String(e?.name || e), audioOnly: AUDIO_ONLY });
      localStream = null;
    }

    if (localStream){
      if (!AUDIO_ONLY) {
        $localV.srcObject = localStream;
      } else {
        try { $localV.srcObject = null; } catch(_) {}
      }

      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const src = ctx.createMediaStreamSource(localStream);
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 512;

        const buf = new Uint8Array(analyser.frequencyBinCount);
        src.connect(analyser);

        (function tick(){
          if (destroyed) return;

          analyser.getByteTimeDomainData(buf);

          let dev = 0;
          for (let i = 0; i < buf.length; i++) {
            dev = Math.max(dev, Math.abs(buf[i] - 128));
          }

          $mic.style.width = Math.min(100, dev * 2) + '%';
          avatarLocalAudioDev(dev);

          requestAnimationFrame(tick);
        })();
      } catch(_) {}

      localStream.getAudioTracks().forEach(t => t.enabled = false);
    }
  }

  /* ===== Mux Upload ===== */
  async function readJsonSafe(res){
    const ct = res.headers.get('content-type') || '';

    if (ct.includes('json')) return res.json();

    const text = await res.text().catch(() => '');
    throw new Error(`Non-JSON (${res.status}): ${text.slice(0,300)}`);
  }

  async function createMuxUpload(blob, kind){
    log('[MUX] create upload', {
      endpoint: MUX_UPLOAD_URL,
      uid: UID,
      companyId: COMPANY_ID,
      size: blob.size,
      kind
    });

    const r = await fetch(MUX_UPLOAD_URL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        uid: UID,
        companyId: COMPANY_ID,
        sessionId: UID,
        mode: kind === 'audio' ? 'audio' : 'video'
      })
    });

    const j = await readJsonSafe(r);

    log('[MUX] create response', {
      ok: j?.ok,
      error: j?.error || '',
      message: j?.message || '',
      uploadId: j?.uploadId || '',
      uploadUrlPresent: !!j?.uploadUrl,
      uploadUrlPrefix: j?.uploadUrl ? String(j.uploadUrl).slice(0, 50) : ''
    });

    if (!r.ok || !j?.ok) {
      throw new Error(j?.message || j?.error || `mux_create_failed_${r.status}`);
    }

    if (!j.uploadId) throw new Error('mux_uploadId_missing');
    if (!j.uploadUrl) throw new Error('mux_uploadUrl_missing');

    return j;
  }

  async function putToMux(uploadUrl, blob, kind){
    $muxState.textContent = 'uploading';
    setProg(35);

    log('[MUX] PUT start', {
      size: blob.size,
      type: blob.type,
      kind
    });

    const put = await fetch(uploadUrl, {
      method:'PUT',
      body: blob,
      headers:{
        'Content-Type': blob.type || (kind === 'audio' ? 'audio/webm' : 'video/webm')
      }
    });

    lastPutStatus = put.status;

    log('[MUX] PUT done', {
      status: put.status,
      ok: put.ok
    });

    if (!put.ok) {
      const txt = await put.text().catch(() => '');
      throw new Error(`mux_put_failed_${put.status}: ${txt.slice(0,300)}`);
    }

    setProg(65);

    return put.status;
  }

  async function fetchMuxAsset(uploadId){
    const r = await fetch(`${MUX_ASSET_URL}?uploadId=${encodeURIComponent(uploadId)}`);
    const j = await readJsonSafe(r);

    if (!r.ok || !j?.ok) {
      throw new Error(j?.message || j?.error || `mux_asset_failed_${r.status}`);
    }

    return j;
  }

  async function pollMuxAsset(uploadId, maxMs = 120000){
    const start = Date.now();
    let last = null;

    $muxState.textContent = 'processing';
    setProg(75);

    while (Date.now() - start < maxMs) {
      await new Promise(resolve => setTimeout(resolve, 3000));

      const j = await fetchMuxAsset(uploadId);
      last = j;

      log('[MUX] poll', {
        uploadId,
        assetStatus: j?.assetStatus || '',
        assetId: j?.assetId || '',
        playbackId: j?.playbackId || '',
        playbackUrlPresent: !!j?.playbackUrl,
        downloadUrlPresent: !!j?.downloadUrl,
        audioOnlyUrlPresent: !!j?.audioOnlyUrl,
        staticRenditionsStatus: j?.staticRenditionsStatus || '',
        error: j?.error || ''
      });

      if (j.assetStatus === 'ready' && j.playbackId) {
        setProg(100);
        $muxState.textContent = 'ready';
        return j;
      }

      if (j.assetStatus === 'errored') {
        setProg(0);
        $muxState.textContent = 'errored';
        return j;
      }
    }

    return last;
  }

  async function uploadBlobToMux(blob, kind){
    if (uploadStarted) {
      log('[MUX] duplicate upload ignored');
      return;
    }

    uploadStarted = true;
    uploadFinished = false;

    try {
      setStopButtonAvailable(false);
      $muxState.textContent = 'creating';
      setProg(15);
      setStatus('warn', t('uploadPreparing'));

      const created = await createMuxUpload(blob, kind);

      await putToMux(created.uploadUrl, blob, kind);

      let first = await fetchMuxAsset(created.uploadId);

      log('[MUX] first asset', {
        uploadId: created.uploadId,
        assetStatus: first?.assetStatus || '',
        assetId: first?.assetId || '',
        playbackId: first?.playbackId || '',
        playbackUrlPresent: !!first?.playbackUrl,
        downloadUrlPresent: !!first?.downloadUrl,
        audioOnlyUrlPresent: !!first?.audioOnlyUrl
      });

      let finalAsset = first;

      if (!(first?.assetStatus === 'ready' && first?.playbackId)) {
        finalAsset = await pollMuxAsset(created.uploadId);
      }

      if (!finalAsset) throw new Error('mux_asset_poll_empty');

      const durationMs = recordingStartedAt ? (Date.now() - recordingStartedAt) : 0;

      const payload = {
        durationMs,
        size: blob.size,
        uploadUrl: finalAsset?.downloadUrl || finalAsset?.playbackUrl || '',
        mux: {
          provider: 'mux',
          uploadId: created.uploadId || '',
          putStatus: lastPutStatus,
          assetStatus: finalAsset?.assetStatus || '',
          assetId: finalAsset?.assetId || '',
          playbackId: finalAsset?.playbackId || '',
          playbackUrl: finalAsset?.playbackUrl || '',
          downloadUrl: finalAsset?.downloadUrl || '',
          audioOnlyUrl: finalAsset?.audioOnlyUrl || '',
          staticRenditionsStatus: finalAsset?.staticRenditionsStatus || '',
          error: finalAsset?.error || ''
        }
      };

      log('[MUX] recorder:finished', payload);

      uploadFinished = true;

      if (finalAsset?.assetStatus === 'ready') {
        setStatus('ok', t('recordingSaved') || t('uploadStillProcessing'));
      } else {
        setStatus('warn', t('uploadStillProcessing'));
      }

      postToParent('recorder:finished', payload);

      return payload;
    } catch (e) {
      const msg = errMsg(e);

      $muxState.textContent = 'upload failed';
      setProg(0);
      setStatus('warn', t('uploadStillProcessing'));

      const durationMs = recordingStartedAt ? (Date.now() - recordingStartedAt) : 0;

      const payload = {
        durationMs,
        size: blob?.size || 0,
        uploadUrl: '',
        mux: {
          provider: 'mux',
          uploadId: '',
          putStatus: lastPutStatus,
          assetStatus: '',
          assetId: '',
          playbackId: '',
          playbackUrl: '',
          downloadUrl: '',
          audioOnlyUrl: '',
          staticRenditionsStatus: '',
          error: msg
        }
      };

      log('[MUX] upload failed', payload);

      postToParent('recorder:finished', payload);
      postToParent('recorder:upload_error', { message: msg });

      return payload;
    }
  }

  function blobToDataUrl(blob) {
    return new Promise((resolve, reject) => {
      try {
        const reader = new FileReader();

        reader.onloadend = () => {
          resolve(String(reader.result || ''));
        };

        reader.onerror = () => {
          reject(new Error('candidate_audio_file_reader_failed'));
        };

        reader.readAsDataURL(blob);
      } catch (e) {
        reject(e);
      }
    });
  }

  async function sendCandidateAudioToParent(blob, meta = {}) {
    try {
      if (!blob || !blob.size) {
        log('[CANDIDATE-AUDIO] skip send - empty blob', {
          size: blob?.size || 0
        });

        postToParent('candidate-audio:error', {
          message: 'candidate_audio_empty',
          uid: UID,
          companyId: COMPANY_ID,
          ts: new Date().toISOString()
        });

        return;
      }

      const dataUrl = await blobToDataUrl(blob);

      const payload = {
        dataUrl,
        durationMs: meta.durationMs || 0,
        size: blob.size,
        mimeType: blob.type || meta.mimeType || 'audio/webm',
        uid: UID,
        companyId: COMPANY_ID,
        ts: new Date().toISOString()
      };

      postToParent('candidate-audio:finished', payload);

      log('[CANDIDATE-AUDIO] event posted to parent', {
        type: 'candidate-audio:finished',
        durationMs: payload.durationMs,
        size: payload.size,
        mimeType: payload.mimeType,
        dataUrlPresent: !!payload.dataUrl,
        dataUrlPrefix: payload.dataUrl ? payload.dataUrl.slice(0, 32) : ''
      });
    } catch (e) {
      const msg = errMsg(e);

      log('[CANDIDATE-AUDIO] send failed', {
        message: msg
      });

      postToParent('candidate-audio:error', {
        message: msg,
        uid: UID,
        companyId: COMPANY_ID,
        ts: new Date().toISOString()
      });
    }
  }

  /* ===== Candidate-only Audio Recorder ===== */
  function prepareCandidateAudioRecording() {
    candidateAudioReady = false;
    candidateChunks = [];

    try {
      const audioTracks = localStream?.getAudioTracks?.() || [];

      if (!audioTracks.length) {
        log('[CANDIDATE-AUDIO] no local audio track available');
        return;
      }

      const candidateStream = new MediaStream();
      audioTracks.forEach(track => candidateStream.addTrack(track));

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : 'audio/webm';

      candidateRecorder = new MediaRecorder(candidateStream, {
        mimeType,
        audioBitsPerSecond: 12_000
      });

      candidateRecorder.onstart = () => {
        candidateRecordingStartedAt = Date.now();
        candidateAudioReady = true;

        log('[CANDIDATE-AUDIO] started', {
          mimeType,
          audioBitsPerSecond: 12000
        });
      };

      candidateRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) {
          candidateChunks.push(e.data);
        }
      };

      candidateRecorder.onstop = async () => {
        const durationMs = candidateRecordingStartedAt
          ? Date.now() - candidateRecordingStartedAt
          : 0;

        const blob = new Blob(candidateChunks, {
          type: mimeType || 'audio/webm'
        });

        log('[CANDIDATE-AUDIO] stopped', {
          size: blob.size,
          durationMs,
          chunks: candidateChunks.length,
          mimeType: blob.type
        });

        await sendCandidateAudioToParent(blob, {
          durationMs,
          mimeType: blob.type
        });

        candidateChunks.length = 0;
        candidateAudioReady = false;
      };

      log('[CANDIDATE-AUDIO] ready');
    } catch (e) {
      log('[CANDIDATE-AUDIO] prepare failed', {
        message: errMsg(e)
      });

      postToParent('candidate-audio:error', {
        message: errMsg(e),
        uid: UID,
        companyId: COMPANY_ID,
        ts: new Date().toISOString()
      });
    }
  }

  function startCandidateAudioRecording() {
    try {
      if (candidateRecorder && candidateRecorder.state === 'inactive') {
        candidateRecorder.start(1000);
      }
    } catch (e) {
      log('[CANDIDATE-AUDIO] start failed', errMsg(e));
    }
  }

  function stopCandidateAudioRecording() {
    try {
      if (candidateRecorder && candidateRecorder.state !== 'inactive') {
        candidateRecorder.stop();
      }
    } catch (e) {
      log('[CANDIDATE-AUDIO] stop failed', errMsg(e));
    }
  }

  /* ===== Recorder ===== */
  function prepareRecording(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dest = ctx.createMediaStreamDestination();

    if (localStream){
      try {
        ctx.createMediaStreamSource(localStream).connect(dest);
      } catch(e) {
        log('[REC] local mix fail', errMsg(e));
      }
    }

    if (remoteStream){
      try {
        ctx.createMediaStreamSource(remoteStream).connect(dest);
      } catch(e) {
        log('[REC] remote mix fail', errMsg(e));
      }
    }

    mixedStream = new MediaStream();

    dest.stream.getAudioTracks().forEach(track => mixedStream.addTrack(track));

    const cam = AUDIO_ONLY ? null : localStream?.getVideoTracks?.()[0];

    if (cam) mixedStream.addTrack(cam);

    const hasVideo = !!mixedStream.getVideoTracks().length;

    const mimeType = hasVideo
      ? (
          MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
            ? 'video/webm;codecs=vp8,opus'
            : 'video/webm'
        )
      : (
          MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
            ? 'audio/webm;codecs=opus'
            : 'audio/webm'
        );

    mediaRecorder = new MediaRecorder(mixedStream, {
      mimeType,
      videoBitsPerSecond: hasVideo ? 700_000 : undefined,
      audioBitsPerSecond: 96_000
    });

    const chunks = [];

    mediaRecorder.onstart = () => {
      $recState.textContent = 'recording';
      recordingStartedAt = Date.now();
      log('[REC] started', { mimeType });
    };

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      $recState.textContent = 'stopped';

      const hasVid = !!mixedStream.getVideoTracks().length;
      const blob = new Blob(chunks, {
        type: hasVid ? 'video/webm' : 'audio/webm'
      });

      const kind = hasVid ? 'video' : 'audio';

      log('[REC] stop', {
        size: blob.size,
        kind,
        chunks: chunks.length
      });

      try {
        await uploadBlobToMux(blob, kind);
      } catch(e) {
        log('[REC] upload exception', errMsg(e));
      } finally {
        chunks.length = 0;
      }
    };

    $recState.textContent = 'ready';
  }

  function startRecorder(){
    try{
      if (mediaRecorder && mediaRecorder.state === 'inactive') {
        mediaRecorder.start(1000);
      }

      startCandidateAudioRecording();
    } catch(e){
      log('[REC] start error', errMsg(e));
    }
  }

  function stopRecording(){
    try{
      stopCandidateAudioRecording();
    } catch(e){
      log('[CANDIDATE-AUDIO] stop wrapper failed', errMsg(e));
    }

    try{
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
    } catch(e){
      log('[REC] stop error', errMsg(e));
    }

    try{
      mixedStream?.getTracks()?.forEach(track => track.stop());
    } catch(_) {}
  }

  function maybeStartRecorder(){
    if (!WELCOMED) return;
    if (!RECORD_ENABLED) return;

    setTimeout(() => startRecorder(), WELCOME_RECORD_DELAY_MS);
  }

  /* ===== Start / Stop ===== */
  async function startInterview(){
    if (STARTED) return;

    STARTED = true;

    interviewStartedAt = Date.now();
    userUtterances = 0;
    try { seenUserAudioItemIds.clear(); } catch(_) {}
    userAudioItems = 0;
    targetMainQuestionReachedAt = 0;
    try { if (targetAutoFinishTimer) clearTimeout(targetAutoFinishTimer); } catch(_) {}
    try { if (targetExtraQuestionAutoFinishTimer) clearTimeout(targetExtraQuestionAutoFinishTimer); } catch(_) {}
    targetAutoFinishTimer = null;
    targetExtraQuestionAutoFinishTimer = null;
    structuredAutoFinishRequested = false;
    refreshStructuredQuestionPlan(CTX, 'interview_start_reset');
    try { if (structuredAutoFinishTimer) clearTimeout(structuredAutoFinishTimer); } catch(_) {}
    structuredAutoFinishTimer = null;
    END_CALLED = false;
    END_REQUESTED_BY_MODEL = false;
    FINAL_MESSAGE_SPOKEN = false;
    FINAL_MESSAGE_ITEM_ID = '';
    HARD_END_LOCK = false;
    TARGET_FINALIZE_REQUESTED = false;
    try { if (isAssessmentContext(CTX)) assessmentV2Reset('startInterview'); } catch(_) {}
    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    HARD_END_WATCHDOG_TIMER = null;
    try { if (ABSOLUTE_FINALIZE_TIMER) clearTimeout(ABSOLUTE_FINALIZE_TIMER); } catch(_) {}
    ABSOLUTE_FINALIZE_TIMER = null;
    try { if (MODEL_END_NO_FINAL_TIMER) clearTimeout(MODEL_END_NO_FINAL_TIMER); } catch(_) {}
    MODEL_END_NO_FINAL_TIMER = null;
    try { if (ASSESSMENT_SLOT_DRIVER_TIMER) clearTimeout(ASSESSMENT_SLOT_DRIVER_TIMER); } catch(_) {}
    ASSESSMENT_SLOT_DRIVER_TIMER = null;
    try { if (SLOT_STALL_TIMER) clearTimeout(SLOT_STALL_TIMER); } catch(_) {}
    SLOT_STALL_TIMER = null;
    try { if (structuredEarlyClosingRecoveryTimer) clearTimeout(structuredEarlyClosingRecoveryTimer); } catch(_) {}
    structuredEarlyClosingRecoveryTimer = null;
    if (FINAL_HANGUP_TIMER) {
      try { clearTimeout(FINAL_HANGUP_TIMER); } catch(_) {}
    }
    FINAL_HANGUP_TIMER = null;
    uploadStarted = false;
    uploadFinished = false;
    lastPutStatus = null;

    try {
      destroyed = false;
      applyStaticTexts();
      setStopButtonAvailable(true);
      setStatus('info', t('init'));

      await setupLocalMedia();

      const initialInterviewLang = activeInterviewLang(CTX);

      const tokenMediaMode = canonicalRealtimeMediaMode(CTX);

      log('[LIVE] startInterview', {
        audioOnly: AUDIO_ONLY,
        mode: AUDIO_ONLY ? 'audio' : 'video',
        tokenMediaMode,
        originalMode: CTX?.mode || MODE_RAW || '',
        uid: UID,
        companyId: COMPANY_ID,
        lang: initialInterviewLang
      });

      const { secret, ctx } = await getRealtimeToken({
        ...CTX,
        uid: UID || CTX.uid || CTX.linkId || '',
        linkId: UID || CTX.uid || CTX.linkId || '',
        companyId: COMPANY_ID || CTX.companyId || '',
        lang: initialInterviewLang,
        interviewLang: initialInterviewLang,
        interviewLanguage: initialInterviewLang,
        userCommLang: getInterviewLangRaw(CTX),
        reportLang: getReportLangRaw(CTX),
        reportLanguage: getReportLangRaw(CTX),
        // v3.10.2: Token stabilisieren. Alte Page-Werte wie live-video/video_chat/mixmode
        // dürfen nicht als technischer Token-Modus durchgereicht werden.
        mode: tokenMediaMode,
        mediaMode: tokenMediaMode,
        recordingMode: tokenMediaMode,
        originalMode: CTX.mode || MODE_RAW || '',
        requestedMode: CTX.mode || MODE_RAW || tokenMediaMode,
        audioOnly: tokenMediaMode === 'audio',
        noVideo: tokenMediaMode === 'audio',
        voice: effectiveRealtimeVoice(CTX),
        debug: true,
        allowNoInvite: true
      });

      await connectRealtime(secret);
      prepareRecording();
      prepareCandidateAudioRecording();

      // Merge token response without letting a smaller token context overwrite the parent Access snapshot.
      CTX = normalizeIncomingContext({ ...(ctx || {}), ...CTX });
      refreshStructuredQuestionPlan(CTX, 'token_context_merged');
      applyStaticTexts();

      // If no remote track arrives, do not leave the candidate in an endless "started" state.
      // This becomes a recoverable start error in the parent page before recording/upload begins.
      await withStartTimeout(remoteTrackReady, 26000, 'remote_track_timeout');
      await ensureAudioUnlocked();

      postToParent('clarity.live.ready', {});
      setStatus('ok', t('connected'));
    } catch(e) {
      const message = errMsg(e);
      const code = classifyStartError(message);
      const tokenMediaMode = canonicalRealtimeMediaMode(CTX);
      setStatus('err', t('startError'));
      log('[Start error]', { code, message, mode: tokenMediaMode, originalMode: CTX?.mode || MODE_RAW || '' });
      postToParent('clarity.live.error', {
        code,
        message,
        phase: 'startInterview',
        uid: UID || CTX.uid || CTX.linkId || '',
        companyId: COMPANY_ID || CTX.companyId || '',
        mode: tokenMediaMode,
        originalMode: CTX?.mode || MODE_RAW || '',
        audioOnly: tokenMediaMode === 'audio',
        rtcState: pc?.connectionState || '',
        iceState: pc?.iceConnectionState || '',
        recordingStarted: !!recordingStartedAt,
        uploadStarted: !!uploadStarted,
        uploadFinished: !!uploadFinished
      });
    }
  }

  async function hangup(reason){
    if (FINAL_HANGUP_TIMER) {
      try { clearTimeout(FINAL_HANGUP_TIMER); } catch(_) {}
      FINAL_HANGUP_TIMER = null;
    }
    try { if (structuredEarlyClosingRecoveryTimer) clearTimeout(structuredEarlyClosingRecoveryTimer); } catch(_) {}
    structuredEarlyClosingRecoveryTimer = null;
    try { if (HARD_END_WATCHDOG_TIMER) clearTimeout(HARD_END_WATCHDOG_TIMER); } catch(_) {}
    HARD_END_WATCHDOG_TIMER = null;
    try { if (ABSOLUTE_FINALIZE_TIMER) clearTimeout(ABSOLUTE_FINALIZE_TIMER); } catch(_) {}
    ABSOLUTE_FINALIZE_TIMER = null;
    try { if (MODEL_END_NO_FINAL_TIMER) clearTimeout(MODEL_END_NO_FINAL_TIMER); } catch(_) {}
    MODEL_END_NO_FINAL_TIMER = null;
    try { if (ASSESSMENT_SLOT_DRIVER_TIMER) clearTimeout(ASSESSMENT_SLOT_DRIVER_TIMER); } catch(_) {}
    ASSESSMENT_SLOT_DRIVER_TIMER = null;
    clearAssessmentDirectHangupTimer(reason || 'hangup');
    clearHardEndTimers();

    if (destroyed && reason !== 'user_fallback_end') return;

    destroyed = true;
    setStopButtonAvailable(false);
    setStatus('warn', t('processing'));
    postToParent('clarity.live.processing_started', {
      uid: UID,
      companyId: COMPANY_ID,
      reason: reason || '',
      ts: new Date().toISOString()
    });
    // Compatibility event for older/current Wix page handlers. Duplicate-safe parent code should guard exports.
    postToParent('clarity.live.ended', {
      uid: UID,
      companyId: COMPANY_ID,
      reason: reason || '',
      ts: new Date().toISOString()
    });

    disableMicUplink();

    try {
      if ($remoteA) {
        $remoteA.pause();
        $remoteA.srcObject = null;
      }
    } catch(_) {}

    stopRecording();

    try { DC?.close(); } catch(_) {}

    try {
      pc?.getSenders()?.forEach(sender => sender.track && sender.track.stop());
    } catch(_) {}

    try {
      pc?.getReceivers()?.forEach(receiver => receiver.track && receiver.track.stop());
    } catch(_) {}

    try {
      pc?.close();
    } catch(_) {}

    try {
      localStream?.getTracks()?.forEach(track => track.stop());
    } catch(_) {}

    try {
      remoteStream?.getTracks()?.forEach(track => track.stop());
    } catch(_) {}

    log('[Live] hangup done', reason || '');
  }

  /* ===== Parent Messaging ===== */
  window.addEventListener('message', (ev) => {
    const msg = ev?.data || {};
    const type = msg.type;

    if (type === 'clarity.live.context'){
      CTX = normalizeIncomingContext({ ...CTX, ...(msg.data || {}) });
      refreshStructuredQuestionPlan(CTX, 'parent_context');
      applyStaticTexts();
      log('[CTX]', {
        ...CTX,
        normalizedInterviewLang: activeInterviewLang(CTX)
      });
    }

    else if (type === 'clarity.live.record'){
      RECORD_ENABLED = !!(msg.data && msg.data.enabled);
      log('[REC] record flag from parent:', RECORD_ENABLED);
      maybeStartRecorder();
    }

    else if (type === 'clarity.live.prime'){
      // Prime may contain only language/mode. Merge it without clearing assessment/product snapshot fields.
      CTX = normalizeIncomingContext({ ...CTX, ...(msg.data || {}) });
      refreshStructuredQuestionPlan(CTX, 'parent_prime');
      applyStaticTexts();

      const rep = CTX.reportLang || LANG;
      log('[PRIME] received from parent', {
        lang: CTX.lang || LANG,
        normalizedInterviewLang: activeInterviewLang(CTX),
        reportLang: rep,
        companyName: CTX.companyName || ''
      });

      primeStrictLanguage(rep);
      speakPrepThenWelcome();
    }

    else if (type === 'clarity.live.start'){
      CTX = normalizeIncomingContext({ ...CTX, ...(msg.data || {}) });
      refreshStructuredQuestionPlan(CTX, 'parent_start');
      log('[START] received from parent', {
        productType: CTX.productType || '',
        assessment: CTX.assessment === true,
        interviewMode: CTX.interviewMode || '',
        moduleArea: CTX.moduleArea || '',
        questionCount: CTX.questionCount || CTX.totalQuestionCount || '',
        normalizedInterviewLang: activeInterviewLang(CTX),
        reportLang: activeReportLang(CTX)
      });
      startInterview();
    }

    else if (type === 'clarity.live.processing_complete'){
      setStopButtonAvailable(false);
      setStatus('ok', t('uploadReady'));
    }

    else if (type === 'clarity.live.stop' || type === 'clarity.live.hangup'){
      setStopButtonAvailable(false);
      setStatus('warn', t('fallbackEnd'));
      hangup('parent_stop');
    }
  });

  window.addEventListener('load', () => {
    applyStaticTexts();

    postToParent('clarity.live.hello', {
      uid: UID,
      companyId: COMPANY_ID,
      audioOnly: AUDIO_ONLY,
      mode: AUDIO_ONLY ? 'audio' : 'video'
    });

    if (AUTOSTART){
      setTimeout(() => {
        if (!STARTED) {
          log('[AUTO] no parent start → autostart');
          startInterview();
        }
      }, 1500);
    }
  });

  $btnStop.addEventListener('click', () => {
    if ($btnStop.disabled) return;
    setStopButtonAvailable(false);
    setStatus('warn', t('fallbackEnd'));
    avatarSet('processing', 'user_fallback_end');
    avatarLevel('ai', 0, 'user_fallback_end');
    avatarLevel('user', 0, 'user_fallback_end');
    hangup('user_fallback_end');
  });

  })();
  </script>
</body>
</html>
