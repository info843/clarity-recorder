<!-- liveAssessment.html — v2.6 DETERMINISTIC_ORAL_RECORDER | CLARITY Assessment only. No Realtime question driver. Fixed app-controlled question slots + local media recorder + Mux upload. -->
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>CLARITY Assessment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{--bg:#fff;--fg:#111827;--muted:#6b7280;--line:#e5e7eb;--soft:#f8fafc;--accent:#4f46e5;--ok:#047857;--warn:#92400e;--err:#b91c1c;--shadow:0 16px 40px rgba(15,23,42,.10)}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font:14px/1.45 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .wrap{display:grid;grid-template-columns:1fr 320px;gap:16px;padding:14px;align-items:start;background:#fff}.card{background:#fff;border:1px solid rgba(229,231,235,.75);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
    .row{display:flex;gap:10px;align-items:center}.rowBetween{display:flex;gap:10px;align-items:center;justify-content:space-between}.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#f8fafc;border:1px solid #e2e8f0;color:#334155;font-size:12px}.muted{color:var(--muted)}
    .btn{appearance:none;border:1px solid #cbd5e1;background:#fff;color:#111827;border-radius:10px;padding:8px 12px;cursor:pointer;box-shadow:0 6px 18px rgba(15,23,42,.08)}.btn:hover{background:#f8fafc}.btn:disabled{opacity:.5;cursor:not-allowed}
    video{width:100%;max-height:320px;background:#fff;border-radius:12px;box-shadow:0 10px 28px rgba(15,23,42,.10);border:0}.bar{height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar>i{display:block;height:100%;width:0;background:var(--accent);transition:width 120ms linear}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.question{font-size:20px;line-height:1.35;font-weight:650;margin:12px 0;color:#111827}.hint{font-size:13px;color:#6b7280}.log{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:#6b7280;white-space:pre-wrap;max-height:280px;overflow:auto;background:#f8fafc;border-radius:12px;padding:8px;border:1px solid #e5e7eb}.debugOnly{display:none}body.debug-ui .debugOnly{display:block}body.audio-only #cameraLabel,body.audio-only #localVideo{display:none}body.audio-only .wrap{grid-template-columns:1fr}body.audio-only .grid2{grid-template-columns:1fr}@media(max-width:900px){.wrap{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="rowBetween">
        <div><span id="status" class="badge">Initialisierung…</span><span id="slotBadge" class="badge" style="margin-left:6px">Slot 0/10</span></div>
        <button id="btnStop" class="btn">Assessment beenden</button>
      </div>
      <div id="questionText" class="question">Assessment wird vorbereitet…</div>
      <div id="hintText" class="hint">Bitte bleiben Sie auf dieser Seite.</div>
      <div class="grid2" style="margin-top:12px">
        <div>
          <div id="cameraLabel" class="muted" style="margin-bottom:6px">Kamera-Vorschau</div>
          <video id="localVideo" autoplay playsinline muted></video>
          <div class="muted" style="margin:8px 0 4px">Mikrofon</div>
          <div class="bar"><i id="micLevel"></i></div>
        </div>
        <div>
          <div class="muted" style="margin-bottom:6px">Ablauf</div>
          <div class="bar"><i id="slotProgress"></i></div>
          <div id="phaseText" class="hint" style="margin-top:10px">Warten auf Start…</div>
        </div>
      </div>
    </section>
    <aside class="card debugOnly">
      <div style="font-weight:600;margin-bottom:8px">Deterministic Recorder</div>
      <div class="row"><span class="badge" id="recState">idle</span><span class="badge" id="muxState">no upload</span></div>
      <div class="muted" style="margin:8px 0 4px">Upload</div><div class="bar"><i id="recProgress"></i></div>
      <div class="muted" style="margin:10px 0 4px">Logs</div><div id="log" class="log"></div>
    </aside>
  </div>
<script>
(()=>{ 'use strict';
  if (window.__clarity_assessment_v26_active) return; window.__clarity_assessment_v26_active = true;

  const Q = new URLSearchParams(location.search);
  const UID = (Q.get('uid') || '').trim();
  const COMPANY_ID = (Q.get('companyId') || '').trim();
  const API_BASE = (Q.get('api') || window.location.origin).replace(/\/+$/, '');
  const MODE_RAW = String(Q.get('mode') || '').toLowerCase();
  const AUDIO_ONLY = MODE_RAW === 'audio' || Q.get('audioOnly') === '1' || Q.get('audioonly') === '1' || Q.get('noVideo') === '1' || Q.get('novideo') === '1';
  const DEBUG_UI = Q.get('debugUi') === '1' || Q.get('debugui') === '1' || Q.get('showLogs') === '1';
  const DEBUG_LOGS = Q.get('debug') === '1' || Q.get('debugLive') === '1' || DEBUG_UI;
  if (AUDIO_ONLY) document.body.classList.add('audio-only'); if (DEBUG_UI) document.body.classList.add('debug-ui');

  const TOKENLESS_VERSION = 'v2.6_DETERMINISTIC_ORAL_RECORDER';
  const MUX_UPLOAD_URL = `${API_BASE}/api/mux-upload`;
  const MUX_ASSET_URL = `${API_BASE}/api/mux-asset`;

  const $ = (id) => document.getElementById(id);
  const $status = $('status'), $slotBadge = $('slotBadge'), $question = $('questionText'), $hint = $('hintText'), $phase = $('phaseText'), $mic = $('micLevel'), $slotProgress = $('slotProgress'), $log = $('log'), $localVideo = $('localVideo'), $btnStop = $('btnStop'), $recState = $('recState'), $muxState = $('muxState'), $recProgress = $('recProgress');

  let CTX = { uid: UID, linkId: UID, companyId: COMPANY_ID, lang: Q.get('lang') || 'de', reportLang: Q.get('reportLang') || Q.get('reportlang') || Q.get('lang') || 'de', mode: AUDIO_ONLY ? 'audio' : 'video', productType: 'modul1', assessment: true };
  let localStream = null, mediaRecorder = null, candidateRecorder = null, mixedStream = null;
  let candidateChunks = [], recordChunks = [], recordingStartedAt = 0, candidateRecordingStartedAt = 0;
  let uploadStarted = false, uploadFinished = false, lastPutStatus = null;
  let prepared = false, recordEnabled = false, started = false, destroyed = false, finishing = false, finalSent = false;
  let currentSlot = 0, targetSlots = 10, questions = [];
  let phase = 'IDLE', slotStartedAt = 0, answerWindowOpenedAt = 0, lastVoiceAt = 0, voiceActive = false, slotTimers = [];
  let micAnalyser = null, micBuf = null;

  const LANG_ALIASES = { deutsch:'de', german:'de', englisch:'en', english:'en', spanisch:'es', spanish:'es', español:'es', espanol:'es', french:'fr', französisch:'fr', franzoesisch:'fr', italian:'it', italienisch:'it' };
  function clean(v){ return String(v ?? '').replace(/\s+/g,' ').trim(); }
  function lower(v){ return clean(v).toLowerCase(); }
  function firstNonEmpty(...vals){ for (const v of vals){ const s = clean(v); if (s) return s; } return ''; }
  function langKey(v){ const raw = lower(v || CTX.lang || 'en').replace(/_/g,'-'); const first = raw.slice(0,2); if (['de','en','es','fr','it','pt','nl','pl','tr','ar','ru','zh','ja','ko','cs','sv','no','da','fi','el','ro','hu','uk','he','hi','id','ms','th','vi'].includes(first)) return first; return LANG_ALIASES[raw] || 'en'; }
  function activeLang(){ return langKey(firstNonEmpty(CTX.userCommLang, CTX.interviewLang, CTX.interviewLanguage, CTX.lang, Q.get('lang'), 'en')); }
  function isGerman(){ return activeLang() === 'de'; }

  function postToParent(type, data={}){ try { parent?.postMessage?.({ type, data }, '*'); } catch(_) {} }
  function debug(stage, data={}){ const payload = { version:TOKENLESS_VERSION, stage, slot:currentSlot, target:targetSlots, phase, ts:new Date().toISOString(), ...data }; postToParent('clarity.assessment.v2.debug', payload); if (DEBUG_LOGS) { try { console.log('[ASSESSMENT_V2.6]', payload); } catch(_) {} } if (DEBUG_UI && $log){ $log.textContent += `[${new Date().toLocaleTimeString()}] ${stage} ${JSON.stringify(data)}\n`; $log.scrollTop = $log.scrollHeight; } }
  function log(...args){ if (DEBUG_LOGS) { try { console.log(...args); } catch(_) {} } if (DEBUG_UI && $log){ $log.textContent += args.map(x=>{try{return typeof x==='object'?JSON.stringify(x):String(x)}catch(_){return String(x)}}).join(' ') + '\n'; $log.scrollTop = $log.scrollHeight; } }
  function setStatus(kind, text){ $status.textContent = text || kind; $status.style.background = kind==='err'?'#fef2f2':kind==='warn'?'#fffbeb':kind==='ok'?'#ecfdf5':'#f8fafc'; $status.style.borderColor = kind==='err'?'#fecaca':kind==='warn'?'#fde68a':kind==='ok'?'#bbf7d0':'#e2e8f0'; $status.style.color = kind==='err'?'#991b1b':kind==='warn'?'#92400e':kind==='ok'?'#065f46':'#334155'; }
  function setSlotUi(slot=currentSlot){ $slotBadge.textContent = `Slot ${Math.max(0,slot)}/${targetSlots}`; $slotProgress.style.width = `${Math.max(0, Math.min(100, (slot/Math.max(1,targetSlots))*100))}%`; }
  function setPhase(p, text){ phase = p; if (text) $phase.textContent = text; }
  function setProg(p){ try { $recProgress.style.width = `${Math.max(0, Math.min(100, Number(p)||0))}%`; } catch(_){} }
  function errMsg(e){ return (e && (e.message || e.toString())) || String(e || ''); }
  function clearSlotTimers(){ slotTimers.forEach(t => { try { clearTimeout(t); } catch(_){} }); slotTimers = []; }
  function timer(fn, ms){ const t = setTimeout(fn, ms); slotTimers.push(t); return t; }

  const TEXTS = {
    de: { init:'Initialisierung…', ready:'Bereit.', running:'Assessment läuft.', listen:'Bitte beantworten Sie die Frage in Ruhe.', wait:'Bitte warten Sie kurz auf die nächste Frage.', processing:'Das Assessment wird abgeschlossen. Bitte bleiben Sie auf dieser Seite …', saved:'Die Aufnahme wurde gespeichert. Der Report wird erstellt …', start:'Das Assessment startet jetzt.', endBtn:'Assessment beenden', noSpeech:'Ihr Browser konnte die Frage nicht automatisch vorlesen. Bitte prüfen Sie die Audioausgabe.' },
    en: { init:'Initializing…', ready:'Ready.', running:'Assessment is running.', listen:'Please answer the question calmly.', wait:'Please wait briefly for the next question.', processing:'The assessment is being completed. Please stay on this page …', saved:'The recording has been saved. Building the report …', start:'The assessment starts now.', endBtn:'End assessment', noSpeech:'Your browser could not read the question automatically. Please check audio output.' },
    es: { init:'Inicializando…', ready:'Listo.', running:'El assessment está en curso.', listen:'Responda la pregunta con calma.', wait:'Espere brevemente la siguiente pregunta.', processing:'El assessment está finalizando. Permanezca en esta página …', saved:'La grabación se ha guardado. Se está creando el informe …', start:'El assessment comienza ahora.', endBtn:'Finalizar assessment', noSpeech:'El navegador no pudo leer la pregunta automáticamente. Revise el audio.' }
  };
  function t(k){ const lk = activeLang(); return (TEXTS[lk] || TEXTS.en)[k] || TEXTS.en[k] || k; }

  const DEFAULT_Q = {
    personality: {
      de: ['Bitte beschreiben Sie Ihren typischen Arbeitsstil.','Was motiviert Sie in Ihrer täglichen Arbeit am meisten?','Wie gehen Sie mit kritischem Feedback um?','Wie organisieren Sie Ihre Kommunikation im Team, um Missverständnisse zu vermeiden?','Wie verhalten Sie sich, wenn im Team ein Konflikt entsteht?','Wie reagieren Sie unter hoher Belastung oder Stress?','Welche Rolle übernehmen Sie typischerweise, wenn Sie eng mit anderen zusammenarbeiten?','Wie gehen Sie mit unterschiedlichen Arbeitspräferenzen im Team um?','Wie organisieren Sie Ihre Aufgaben, um produktiv zu bleiben?','Wie gehen Sie mit kurzfristigen Planänderungen um?'],
      en: ['Please describe your typical working style.','What motivates you most in your daily work?','How do you handle critical feedback?','How do you organize communication in a team to avoid misunderstandings?','How do you behave when conflict arises in a team?','How do you react under high pressure or stress?','Which role do you usually take when working closely with others?','How do you handle different work preferences within a team?','How do you organize your tasks to stay productive?','How do you deal with short-notice changes of plan?'],
      es: ['Describa su estilo de trabajo habitual.','¿Qué le motiva más en su trabajo diario?','¿Cómo maneja la retroalimentación crítica?','¿Cómo organiza la comunicación en el equipo para evitar malentendidos?','¿Cómo actúa cuando surge un conflicto en el equipo?','¿Cómo reacciona bajo presión o estrés?','¿Qué rol suele asumir cuando trabaja estrechamente con otros?','¿Cómo maneja diferentes preferencias de trabajo en el equipo?','¿Cómo organiza sus tareas para mantenerse productivo?','¿Cómo maneja cambios de planes a corto plazo?']
    },
    aptitude: {
      de: ['Wie gehen Sie vor, wenn Sie ein komplexes Problem in überschaubare Einzelschritte zerlegen müssen?','Wie entscheiden Sie, welche Informationen für eine Lösung wirklich relevant sind?','Beschreiben Sie eine Situation, in der Sie unter Zeitdruck eine schwierige Entscheidung treffen mussten.','Wie gehen Sie mit widersprüchlichen Informationen aus unterschiedlichen Quellen um?','Wie gehen Sie vor, wenn Sie ein völlig neues Thema schnell erlernen müssen?','Wie entscheiden Sie, welche Teilaspekte eines Problems sofort bearbeitet werden müssen und welche warten können?','Woran erkennen Sie, dass eine gefundene Lösung nachhaltig und tragfähig ist?','Wie reagieren Sie, wenn mitten im Lösungsprozess unerwartete neue Faktoren auftauchen?','Wann verzichten Sie bewusst auf eine schnelle Entscheidung, um mehr Informationen abzuwarten?','Wie übertragen Sie Erkenntnisse aus einer Problemlösung auf zukünftige Situationen?'],
      en: ['How do you break a complex problem into manageable steps?','How do you decide which information is truly relevant for a solution?','Describe a situation where you had to make a difficult decision under time pressure.','How do you handle contradictory information from different sources?','How do you proceed when you need to learn a completely new topic quickly?','How do you decide which parts of a problem must be handled immediately and which can wait?','How do you recognize that a solution is sustainable and reliable?','How do you react when unexpected new factors arise during the solution process?','When would you deliberately delay a quick decision to wait for more information?','How do you transfer insights from one problem-solving process to future situations?'],
      es: ['¿Cómo divide un problema complejo en pasos manejables?','¿Cómo decide qué información es realmente relevante para una solución?','Describa una situación en la que tuvo que tomar una decisión difícil bajo presión de tiempo.','¿Cómo maneja información contradictoria de diferentes fuentes?','¿Cómo procede cuando debe aprender rápidamente un tema completamente nuevo?','¿Cómo decide qué partes de un problema deben abordarse de inmediato y cuáles pueden esperar?','¿Cómo reconoce que una solución es sostenible y fiable?','¿Cómo reacciona cuando surgen factores inesperados durante el proceso de solución?','¿Cuándo pospondría deliberadamente una decisión rápida para esperar más información?','¿Cómo transfiere aprendizajes de una solución de problemas a situaciones futuras?']
    },
    skills: {
      de: ['Welche konkreten Tools setzen Sie aktuell in Ihrer täglichen Arbeit am häufigsten ein?','Welches methodische Vorgehen nutzen Sie typischerweise, um Ihre Projekte zu strukturieren?','Nennen Sie ein konkretes Projektbeispiel, in dem Sie Ihre Methodenkompetenz eingesetzt haben.','Welche praktischen Fähigkeiten haben Sie dabei konkret weiterentwickelt?','Wie stellen Sie sicher, dass Ihre Lösungen auf neue Aufgabenfelder übertragbar sind?','Wie gehen Sie bei der Einarbeitung in ein unbekanntes Tool vor?','Welches Tool haben Sie zuletzt neu erlernt und wofür haben Sie es eingesetzt?','Wie messen Sie den Erfolg Ihrer umgesetzten Lösungen in Projekten?','Wie integrieren Sie Feedback, um Ihre Methodenkompetenz zu verbessern?','Welche Fähigkeit ist für Ihre Zielrolle besonders wichtig und warum?'],
      en: ['Which concrete tools do you currently use most often in your daily work?','Which method do you typically use to structure your projects?','Give a concrete project example where you used your methodological competence.','Which practical skills did you specifically develop in that process?','How do you ensure that your solutions are transferable to new tasks?','How do you approach learning an unfamiliar tool?','Which tool have you learned most recently and what did you use it for?','How do you measure the success of your implemented solutions in projects?','How do you integrate feedback to improve your methodological competence?','Which skill is especially important for your target role and why?'],
      es: ['¿Qué herramientas concretas utiliza con más frecuencia en su trabajo diario?','¿Qué método utiliza normalmente para estructurar sus proyectos?','Dé un ejemplo concreto de un proyecto en el que utilizó su competencia metodológica.','¿Qué habilidades prácticas desarrolló específicamente en ese proceso?','¿Cómo asegura que sus soluciones sean transferibles a nuevas tareas?','¿Cómo aborda el aprendizaje de una herramienta desconocida?','¿Qué herramienta aprendió más recientemente y para qué la utilizó?','¿Cómo mide el éxito de sus soluciones implementadas en proyectos?','¿Cómo integra feedback para mejorar su competencia metodológica?','¿Qué habilidad es especialmente importante para su rol objetivo y por qué?']
    },
    language: {
      de: ['Beschreiben Sie eine berufliche Herausforderung, die Sie sprachlich erfolgreich bewältigt haben.','Wie gehen Sie vor, wenn Sie ein Team für ein neues Projekt sprachlich ausrichten müssen?','Wie erklären Sie komplexe technische Inhalte verständlich für Nicht-Fachleute?','Wie passen Sie Ihre Kommunikation an unterschiedliche Hierarchieebenen an?','Wie erklären Sie einem Kunden mit wenig Fachwissen ein technisches Problem?','Wie unterscheiden Sie Ihre Wortwahl schriftlich und mündlich?','Wie reagieren Sie sprachlich, wenn Missverständnisse entstehen?','Welche Rolle spielt Körpersprache in Ihrer mündlichen Kommunikation?','Wie reagieren Sie auf unerwartete Fragen in einer Präsentation?','Wie stellen Sie am Ende eines Gesprächs sicher, dass Ihre Botschaft verstanden wurde?'],
      en: ['Describe a professional communication challenge you handled successfully.','How do you align a team linguistically for a new project?','How do you explain complex technical content clearly to non-experts?','How do you adapt your communication to different hierarchy levels?','How do you explain a technical problem to a customer with little technical knowledge?','How do you vary your wording in written versus oral communication?','How do you respond linguistically when misunderstandings occur?','What role does body language play in your oral communication?','How do you respond to unexpected questions in a presentation?','How do you ensure at the end of a conversation that your message was understood?'],
      es: ['Describa un desafío de comunicación profesional que haya manejado con éxito.','¿Cómo alinea lingüísticamente a un equipo para un nuevo proyecto?','¿Cómo explica contenido técnico complejo a personas no expertas?','¿Cómo adapta su comunicación a diferentes niveles jerárquicos?','¿Cómo explica un problema técnico a un cliente con poco conocimiento técnico?','¿Cómo varía su lenguaje entre comunicación escrita y oral?','¿Cómo responde lingüísticamente cuando surgen malentendidos?','¿Qué papel juega el lenguaje corporal en su comunicación oral?','¿Cómo responde a preguntas inesperadas en una presentación?','¿Cómo se asegura al final de una conversación de que su mensaje fue entendido?']
    }
  };

  function normalizeArea(v){ const raw = lower(v || 'personality'); if (raw === 'skill') return 'skills'; if (raw === 'lang') return 'language'; if (['aptitude','personality','skills','language'].includes(raw)) return raw; const uid = String(UID).toUpperCase(); if (uid.includes('-APT-')) return 'aptitude'; if (uid.includes('-SKI-')) return 'skills'; if (uid.includes('-LAN-')) return 'language'; return 'personality'; }
  function normalizeTarget(v){ const n = Number(v); if ([10,20,30,40,50].includes(n)) return n; if (n > 0) return Math.max(1, Math.min(50, Math.round(n))); const raw = String(CTX.questionSet || CTX.qLimit || '').match(/(10|20|30|40|50)/); return raw ? Number(raw[1]) : 10; }
  function isBadQuestion(q){ const x = lower(q); return !x || x.includes('bereit') || x.includes('ready') || x.includes('startklar') || x.includes('starten wir') || x.includes('assessment startet') || x.includes('bitte sagen sie kurz') || x.includes('please say') || x.includes('por favor diga') || x.includes('finalizado') || x.includes('processed') || x.includes('verarbeitet') || x.includes('close this window') || x.includes('fenster'); }
  function parseQuestionsText(text){ const raw = String(text || '').trim(); if (!raw) return []; return raw.split(/\r?\n|(?=\b\d{1,2}[.)]\s+)/g).map(line=>line.replace(/^\s*[-•*]+\s*/,'').replace(/^\s*\d{1,2}[.)]\s*/,'').trim()).filter(Boolean); }
  function collectSnapshotQuestions(ctx){ const values = [ctx.assessmentQuestionSnapshot, ctx.questionSnapshot, ctx.questions, ctx.questionPlan, ctx.finalQuestionsSnapshot, ctx.finalQuestionsText, ctx.selectedQuestionsText, ctx.customQuestionsText, ctx.questionsText]; const out=[]; for (const v of values){ if (!v) continue; if (Array.isArray(v)) { v.forEach(x => out.push(typeof x==='string'?x:(x && (x.question||x.text||x.prompt)))); continue; } if (typeof v === 'object') { ['assessmentQuestionSnapshot','questionSnapshot','questions','questionPlan','plannedQuestions','finalQuestions'].forEach(k => { if (Array.isArray(v[k])) v[k].forEach(x=>out.push(typeof x==='string'?x:(x&&(x.question||x.text||x.prompt)))); }); continue; } parseQuestionsText(v).forEach(x=>out.push(x)); } return out; }
  function buildQuestions(){ const area = normalizeArea(CTX.moduleArea || CTX.area); const lk = activeLang(); const baseLang = DEFAULT_Q[area]?.[lk] ? lk : (DEFAULT_Q[area]?.de && lk === 'de' ? 'de' : 'en'); targetSlots = normalizeTarget(CTX.totalQuestionCount || CTX.questionCount || CTX.maxQuestions || 10); const seen = new Set(); const out = []; const add = (q) => { const c = clean(q); if (!c || isBadQuestion(c)) return; const key = c.toLowerCase().replace(/[¿?!.]+$/,''); if (seen.has(key)) return; seen.add(key); out.push(c); };
    collectSnapshotQuestions(CTX).forEach(add); (DEFAULT_Q[area]?.[baseLang] || DEFAULT_Q.personality.en).forEach(add);
    let i = out.length + 1; while(out.length < targetSlots){ add(isGerman() ? `Bitte beantworten Sie Assessment-Frage ${i} mit einem konkreten beruflichen Beispiel.` : `Please answer assessment question ${i} with a concrete professional example.`); i++; }
    return out.slice(0, targetSlots);
  }

  function estimateSpeechMs(text){ const words = clean(text).split(/\s+/).filter(Boolean).length; return Math.max(3500, Math.min(15000, 1000 + words * 430)); }
  function timing(){ const audio = AUDIO_ONLY; const target = targetSlots; return { introMs: 900, afterQuestionBufferMs: audio ? 1200 : 1000, minAnswerMs: audio ? 15500 : 14500, silenceMs: audio ? 7200 : 6500, maxAnswerMs: target > 10 ? (audio ? 32000 : 30000) : (audio ? 35500 : 33500), nextQuestionMs: audio ? 2800 : 2400, finalStopMs: 1200, absoluteMaxSessionMs: Math.max(180000, target * (audio ? 48000 : 45000)) }; }

  function pickVoice(lang){ try { const voices = speechSynthesis.getVoices() || []; const lk = langKey(lang); const pref = voices.find(v => lower(v.lang).startsWith(lk)); return pref || voices.find(v => lower(v.lang).startsWith('en')) || voices[0] || null; } catch(_) { return null; } }
  function speak(text, opts={}){ return new Promise(resolve => { const raw = clean(text); if (!raw || !('speechSynthesis' in window)) { timer(resolve, estimateSpeechMs(raw)); return; }
      let done = false; const finish = (why) => { if (done) return; done = true; debug('v26_tts_done', { why, textPreview: raw.slice(0,80) }); resolve(); };
      try { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(raw); const lk = activeLang(); u.lang = lk === 'de' ? 'de-DE' : lk === 'es' ? 'es-ES' : lk === 'fr' ? 'fr-FR' : lk === 'it' ? 'it-IT' : 'en-US'; const v = pickVoice(u.lang); if (v) u.voice = v; u.rate = opts.rate || 0.94; u.pitch = 1; u.volume = 1; u.onend = () => finish('onend'); u.onerror = (e) => finish(`onerror_${e?.error || 'unknown'}`); speechSynthesis.speak(u); timer(()=>finish('fallback_timer'), Math.max(6000, estimateSpeechMs(raw)+3500)); }
      catch(e){ debug('v26_tts_failed', { message: errMsg(e) }); timer(resolve, estimateSpeechMs(raw)); }
    }); }

  function postTurn(role, text, slot, turnType){ postToParent('clarity.live.turn', { productType:'modul1', role, speaker: role === 'assistant' ? 'assistant' : 'user', turnType, questionIndex: slot, subTurnIndex:0, text: clean(text), cleanText: clean(text), originalText: clean(text), sourceEvent:'v26_deterministic_oral_recorder', ts:new Date().toISOString(), uid: UID || CTX.uid || CTX.linkId || '', linkId: UID || CTX.uid || CTX.linkId || '', companyId: COMPANY_ID || CTX.companyId || '', sessionId: CTX.sessionId || UID || '' }); }

  async function setupLocalMedia(){ const constraints = { audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true }, video: AUDIO_ONLY ? false : { width:{ideal:1280}, height:{ideal:720} } }; try { localStream = await navigator.mediaDevices.getUserMedia(constraints); if (!AUDIO_ONLY && localStream) $localVideo.srcObject = localStream; setupMicAnalyser(); } catch(e){ setStatus('err', isGerman() ? 'Mikrofon oder Kamera konnten nicht gestartet werden.' : 'Microphone or camera could not be started.'); postToParent('clarity.live.error', { code:'media_permission_error', message:errMsg(e) }); throw e; } }
  function setupMicAnalyser(){ try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const src = ctx.createMediaStreamSource(localStream); micAnalyser = ctx.createAnalyser(); micAnalyser.fftSize = 512; micBuf = new Uint8Array(micAnalyser.frequencyBinCount); src.connect(micAnalyser); const tick = () => { if (destroyed || !micAnalyser) return; micAnalyser.getByteTimeDomainData(micBuf); let dev=0; for(let i=0;i<micBuf.length;i++) dev=Math.max(dev, Math.abs(micBuf[i]-128)); const pct = Math.min(100, dev*2.2); $mic.style.width = pct + '%'; const active = dev > 8; voiceActive = active; if (active && phase !== 'SPEAKING_QUESTION') lastVoiceAt = Date.now(); if (active) postToParent('clarity.avatar.level', { source:'user', value:Math.max(0, Math.min(1, (dev-2)/34)), reason:'v26_mic' }); requestAnimationFrame(tick); }; tick(); } catch(e){ debug('v26_mic_analyser_failed', { message:errMsg(e) }); } }

  function prepareCandidateAudioRecording(){ candidateChunks = []; const tracks = localStream?.getAudioTracks?.() || []; if (!tracks.length) return; const s = new MediaStream(); tracks.forEach(t=>s.addTrack(t)); const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'; candidateRecorder = new MediaRecorder(s, { mimeType, audioBitsPerSecond: 12000 }); candidateRecorder.onstart = () => { candidateRecordingStartedAt = Date.now(); debug('v26_candidate_audio_started', { mimeType }); }; candidateRecorder.ondataavailable = e => { if (e.data && e.data.size) candidateChunks.push(e.data); }; candidateRecorder.onstop = async () => { const durationMs = candidateRecordingStartedAt ? Date.now()-candidateRecordingStartedAt : 0; const blob = new Blob(candidateChunks, { type:mimeType }); debug('v26_candidate_audio_stopped', { size:blob.size, durationMs }); await sendCandidateAudioToParent(blob, { durationMs, mimeType }); candidateChunks = []; }; }
  function prepareRecording(){ recordChunks = []; const hasVideo = !AUDIO_ONLY && !!localStream?.getVideoTracks?.().length; mixedStream = new MediaStream(); localStream?.getAudioTracks?.().forEach(t=>mixedStream.addTrack(t)); if (hasVideo) localStream.getVideoTracks().forEach(t=>mixedStream.addTrack(t)); const mimeType = hasVideo ? (MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus') ? 'video/webm;codecs=vp8,opus' : 'video/webm') : (MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'); mediaRecorder = new MediaRecorder(mixedStream, { mimeType, videoBitsPerSecond: hasVideo ? 700000 : undefined, audioBitsPerSecond: 96000 }); mediaRecorder.onstart = () => { recordingStartedAt = Date.now(); $recState.textContent='recording'; debug('v26_recorder_started', { mimeType, hasVideo }); }; mediaRecorder.ondataavailable = e => { if (e.data && e.data.size) recordChunks.push(e.data); }; mediaRecorder.onstop = async () => { $recState.textContent='stopped'; const kind = hasVideo ? 'video' : 'audio'; const blob = new Blob(recordChunks, { type: hasVideo ? 'video/webm' : 'audio/webm' }); debug('v26_recorder_stopped', { size:blob.size, kind, chunks:recordChunks.length }); try { await uploadBlobToMux(blob, kind); } catch(e){ debug('v26_upload_exception', { message:errMsg(e) }); } finally { recordChunks = []; } }; $recState.textContent='ready'; }
  function startRecorders(){ try { if (mediaRecorder && mediaRecorder.state === 'inactive') mediaRecorder.start(1000); } catch(e){ debug('v26_record_start_failed', { message:errMsg(e) }); } try { if (candidateRecorder && candidateRecorder.state === 'inactive') candidateRecorder.start(1000); } catch(e){ debug('v26_candidate_start_failed', { message:errMsg(e) }); } }
  function stopRecorders(){ try { if (candidateRecorder && candidateRecorder.state !== 'inactive') candidateRecorder.stop(); } catch(e){ debug('v26_candidate_stop_failed', { message:errMsg(e) }); } try { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); } catch(e){ debug('v26_record_stop_failed', { message:errMsg(e) }); } try { localStream?.getTracks?.().forEach(t=>t.stop()); } catch(_){} try { mixedStream?.getTracks?.().forEach(t=>t.stop()); } catch(_){} }

  function blobToDataUrl(blob){ return new Promise((resolve,reject)=>{ const r=new FileReader(); r.onloadend=()=>resolve(String(r.result||'')); r.onerror=()=>reject(new Error('file_reader_failed')); r.readAsDataURL(blob); }); }
  async function sendCandidateAudioToParent(blob, meta={}){ try { if (!blob || !blob.size) throw new Error('candidate_audio_empty'); const dataUrl = await blobToDataUrl(blob); postToParent('candidate-audio:finished', { dataUrl, durationMs:meta.durationMs||0, size:blob.size, mimeType:blob.type || meta.mimeType || 'audio/webm', uid:UID, companyId:COMPANY_ID, ts:new Date().toISOString() }); } catch(e){ postToParent('candidate-audio:error', { message:errMsg(e), uid:UID, companyId:COMPANY_ID, ts:new Date().toISOString() }); } }
  async function readJsonSafe(res){ const ct = res.headers.get('content-type') || ''; if (ct.includes('json')) return res.json(); const text = await res.text().catch(()=> ''); throw new Error(`Non-JSON (${res.status}): ${text.slice(0,300)}`); }
  async function createMuxUpload(blob, kind){ const r = await fetch(MUX_UPLOAD_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ uid:UID, companyId:COMPANY_ID, sessionId:UID, mode:kind === 'audio' ? 'audio' : 'video' }) }); const j = await readJsonSafe(r); if (!r.ok || !j?.ok) throw new Error(j?.message || j?.error || `mux_create_failed_${r.status}`); if (!j.uploadId || !j.uploadUrl) throw new Error('mux_create_missing_fields'); return j; }
  async function putToMux(uploadUrl, blob, kind){ $muxState.textContent='uploading'; setProg(35); const put = await fetch(uploadUrl, { method:'PUT', body:blob, headers:{'Content-Type': blob.type || (kind==='audio'?'audio/webm':'video/webm')} }); lastPutStatus = put.status; if (!put.ok){ const txt = await put.text().catch(()=> ''); throw new Error(`mux_put_failed_${put.status}: ${txt.slice(0,200)}`); } setProg(65); }
  async function fetchMuxAsset(uploadId){ const r = await fetch(`${MUX_ASSET_URL}?uploadId=${encodeURIComponent(uploadId)}`); const j = await readJsonSafe(r); if (!r.ok || !j?.ok) throw new Error(j?.message || j?.error || `mux_asset_failed_${r.status}`); return j; }
  async function pollMuxAsset(uploadId, maxMs=120000){ const start=Date.now(); let last=null; $muxState.textContent='processing'; setProg(75); while(Date.now()-start < maxMs){ await new Promise(r=>setTimeout(r,3000)); const j = await fetchMuxAsset(uploadId); last=j; debug('v26_mux_poll', { assetStatus:j?.assetStatus||'', playbackId:j?.playbackId||'', error:j?.error||'' }); if (j.assetStatus === 'ready' && j.playbackId){ setProg(100); $muxState.textContent='ready'; return j; } if (j.assetStatus === 'errored') return j; } return last; }
  async function uploadBlobToMux(blob, kind){ if (uploadStarted) return; uploadStarted = true; uploadFinished = false; try { $muxState.textContent='creating'; setProg(15); setStatus('warn', t('saved')); const created = await createMuxUpload(blob, kind); await putToMux(created.uploadUrl, blob, kind); let asset = await fetchMuxAsset(created.uploadId); if (!(asset?.assetStatus === 'ready' && asset?.playbackId)) asset = await pollMuxAsset(created.uploadId); const durationMs = recordingStartedAt ? Date.now()-recordingStartedAt : 0; const payload = { durationMs, size:blob.size, uploadUrl: asset?.downloadUrl || asset?.playbackUrl || '', mux:{ provider:'mux', uploadId:created.uploadId || '', putStatus:lastPutStatus, assetStatus:asset?.assetStatus || '', assetId:asset?.assetId || '', playbackId:asset?.playbackId || '', playbackUrl:asset?.playbackUrl || '', downloadUrl:asset?.downloadUrl || '', audioOnlyUrl:asset?.audioOnlyUrl || '', staticRenditionsStatus:asset?.staticRenditionsStatus || '', error:asset?.error || '' } }; uploadFinished = true; debug('v26_recorder_finished_posted', { durationMs, size:blob.size, kind, muxReady:asset?.assetStatus === 'ready' }); postToParent('recorder:finished', payload); return payload; } catch(e){ const durationMs = recordingStartedAt ? Date.now()-recordingStartedAt : 0; const payload = { durationMs, size:blob?.size || 0, uploadUrl:'', mux:{ provider:'mux', uploadId:'', putStatus:lastPutStatus, assetStatus:'', assetId:'', playbackId:'', playbackUrl:'', downloadUrl:'', audioOnlyUrl:'', staticRenditionsStatus:'', error:errMsg(e) } }; postToParent('recorder:finished', payload); postToParent('recorder:upload_error', { message:errMsg(e) }); return payload; } }

  async function startAssessment(){ if (started) return; started = true; destroyed = false; finishing = false; finalSent = false; uploadStarted = false; currentSlot = 0; setStatus('info', t('init')); setPhase('STARTING', isGerman()?'Medien werden vorbereitet…':'Preparing media…'); try { questions = buildQuestions(); setSlotUi(0); debug('v26_question_plan_ready', { targetSlots, area:normalizeArea(CTX.moduleArea), lang:activeLang(), questions:questions.slice(0, targetSlots) }); await setupLocalMedia(); prepareRecording(); prepareCandidateAudioRecording(); prepared = true; postToParent('clarity.live.prepared', { version:TOKENLESS_VERSION, targetSlots, mode:AUDIO_ONLY?'audio':'video' }); setStatus('ok', t('ready')); setPhase('READY', t('ready')); if (recordEnabled) beginAssessmentFlow(); }
    catch(e){ postToParent('clarity.live.error', { code:'start_error', message:errMsg(e) }); setStatus('err', errMsg(e)); }
  }
  async function beginAssessmentFlow(){ if (!prepared || finishing) return; if (!recordingStartedAt){ startRecorders(); await new Promise(r=>setTimeout(r,700)); } setStatus('ok', t('running')); postToParent('clarity.avatar', { state:'listening', reason:'v26_begin' }); await speak(t('start'), { rate:0.96 }); timer(()=>askSlot(1), 700); }
  async function askSlot(slot){ if (finishing || destroyed) return; if (slot > targetSlots) { finishAssessment('slot_over_target'); return; } clearSlotTimers(); currentSlot = slot; setSlotUi(slot); slotStartedAt = Date.now(); lastVoiceAt = 0; setPhase('SPEAKING_QUESTION', isGerman() ? `Frage ${slot} wird gestellt…` : `Question ${slot} is being asked…`); const q = questions[slot-1] || (isGerman()?`Bitte beantworten Sie Frage ${slot}.`:`Please answer question ${slot}.`); $question.textContent = q; $hint.textContent = t('wait'); postTurn('assistant', q, slot, 'main_question'); postToParent('clarity.assessment.v2.slot_asked', { slot, questionIndex:slot, target:targetSlots, question:q, version:TOKENLESS_VERSION }); debug('v26_slot_asked', { slot, question:q }); postToParent('clarity.avatar', { state:'ai_speaking', reason:'v26_question' }); await speak(q, { rate:0.93 }); if (finishing || destroyed) return; timer(()=>openAnswerWindow(slot), timing().afterQuestionBufferMs); }
  function openAnswerWindow(slot){ if (finishing || destroyed || slot !== currentSlot) return; answerWindowOpenedAt = Date.now(); lastVoiceAt = Date.now(); setPhase('LISTENING', t('listen')); $hint.textContent = t('listen'); postToParent('clarity.avatar', { state:'listening', reason:'v26_answer_window' }); debug('v26_answer_window_open', { slot }); const tm = timing(); const check = () => { if (finishing || destroyed || slot !== currentSlot) return; const now = Date.now(); const elapsed = now - answerWindowOpenedAt; const quietFor = now - (lastVoiceAt || answerWindowOpenedAt); const bySilence = elapsed >= tm.minAnswerMs && quietFor >= tm.silenceMs; const byMax = elapsed >= tm.maxAnswerMs; if (bySilence || byMax){ commitSlot(slot, bySilence ? 'silence_after_min' : 'max_answer_time'); return; } timer(check, 1000); }; timer(check, 1000); }
  function commitSlot(slot, reason){ if (finishing || destroyed || slot !== currentSlot) return; setPhase('COMMITTING', t('wait')); postToParent('clarity.assessment.v2.slot_answered', { slot, questionIndex:slot, target:targetSlots, reason, version:TOKENLESS_VERSION }); debug('v26_slot_answered_committed', { slot, reason }); if (slot >= targetSlots){ finishAssessment('target_reached'); return; } const tm = timing(); timer(()=>askSlot(slot+1), tm.nextQuestionMs); }
  function finishAssessment(reason='finish'){ if (finishing) return; finishing = true; clearSlotTimers(); setPhase('FINISHING', t('processing')); setStatus('warn', t('processing')); $hint.textContent = t('processing'); postToParent('clarity.assessment.v2.target_answered', { slot:Math.max(currentSlot,targetSlots), target:targetSlots, reason, version:TOKENLESS_VERSION }); postToParent('clarity.live.processing_started', { reason, version:TOKENLESS_VERSION }); debug('v26_finish_assessment', { reason, currentSlot, targetSlots }); try { speechSynthesis?.cancel?.(); } catch(_){} timer(()=>{ stopRecorders(); postToParent('clarity.live.ended', { reason, version:TOKENLESS_VERSION }); }, timing().finalStopMs); }
  function manualStop(reason='manual_stop'){ debug('v26_manual_stop', { reason, currentSlot }); finishAssessment(reason); }

  function handleMessage(ev){ let msg = ev?.data; try { if (typeof msg === 'string') msg = JSON.parse(msg); } catch(_){} if (!msg || typeof msg !== 'object') return; const type = msg.type; const data = msg.data || msg.payload || {}; if (type === 'clarity.live.context' || type === 'clarity.live.prime'){ CTX = { ...CTX, ...(data||{}) }; CTX.lang = firstNonEmpty(CTX.userCommLang, CTX.interviewLang, CTX.interviewLanguage, CTX.lang, Q.get('lang'), 'en'); CTX.reportLang = firstNonEmpty(CTX.reportLang, CTX.reportLanguage, Q.get('reportLang'), CTX.lang); $btnStop.textContent = t('endBtn'); setStatus('info', t('init')); debug('v26_context_received', { mode:CTX.mode, moduleArea:CTX.moduleArea, questionCount:CTX.questionCount, totalQuestionCount:CTX.totalQuestionCount, lang:CTX.lang }); return; } if (type === 'clarity.live.record'){ recordEnabled = data?.enabled !== false; debug('v26_record_enabled', { recordEnabled, prepared }); if (recordEnabled && prepared && !recordingStartedAt) beginAssessmentFlow(); return; } if (type === 'clarity.live.start'){ startAssessment(); return; } if (type === 'clarity.live.hangup' || type === 'clarity.live.stop' || type === 'recorder:stop'){ manualStop(type); return; } }
  window.addEventListener('message', handleMessage);
  $btnStop.addEventListener('click', () => manualStop('local_button'));

  function boot(){ setStatus('info', t('init')); $btnStop.textContent = t('endBtn'); setSlotUi(0); postToParent('clarity.live.ready', { version:TOKENLESS_VERSION, tokenless:true, mode:AUDIO_ONLY?'audio':'video' }); debug('v26_ready_posted', { uid:UID, companyId:COMPANY_ID, audioOnly:AUDIO_ONLY }); if (Q.get('autostart') !== '0') setTimeout(()=>startAssessment(), 500); }
  try { if ('speechSynthesis' in window) { speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = () => { try { speechSynthesis.getVoices(); } catch(_){} }; } } catch(_){}
  boot();
})();
</script>
</body>
