<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clarity Interview Recorder</title>
<style>
  html,body{height:100%}
  body{
    margin:0;
    background:transparent;
    color:#eaf2ff;
    font:15px/1.4 ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial;
    display:grid;
    place-items:center;
  }

  .wrap{display:grid;gap:14px;justify-items:center;width:min(920px,96vw)}
  .controls{display:flex;gap:10px;align-items:center}

  .btn{
    --bg1:#1f9cf0;--bg2:#0ea5e9;
    appearance:none;outline:none;border:0;cursor:pointer;
    color:#fff;font-weight:700;letter-spacing:.2px;
    padding:12px 18px;border-radius:999px;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    box-shadow:0 10px 24px rgba(2,12,24,.35);
    transition:.2s transform ease,.2s filter ease,.2s opacity ease;
  }
  .btn:hover{transform:translateY(-1px);filter:brightness(1.03)}
  .btn:active{transform:translateY(0)}
  .btn[disabled]{opacity:.5;cursor:not-allowed}

  .btn--red{--bg1:#ef4444;--bg2:#dc2626}
  .btn--green{--bg1:#22c55e;--bg2:#16a34a}

  .status{font-size:13px;opacity:.95;text-align:center}
  .ok{color:#22c55e}.warn{color:#f59e0b}.err{color:#ef4444}

  .view{width:min(900px,94vw);display:grid;gap:8px;justify-items:center}
  video{width:100%;height:auto;max-height:420px;background:#000;border-radius:14px}
  audio{width:100%}

  #debug{
    width:min(900px,94vw);
    max-height:260px;
    overflow:auto;
    white-space:pre-wrap;
    font-size:11px;
    opacity:.82;
    color:#94a3b8;
    text-align:left;
    background:rgba(2,6,23,.72);
    border:1px solid rgba(148,163,184,.25);
    border-radius:12px;
    padding:10px;
    box-sizing:border-box;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <button class="btn" id="btnStart">Start</button>
      <button class="btn btn--red" id="btnStop" disabled>Stop</button>
      <button class="btn btn--green" id="btnUpload" disabled>Upload</button>
    </div>

    <div class="status" id="status">Ready.</div>
    <pre id="debug"></pre>

    <div class="view">
      <video id="video" playsinline muted></video>
      <audio id="audio" controls style="display:none"></audio>
    </div>
  </div>

<script>
(function(){
  "use strict";

  const $ = (s) => document.querySelector(s);

  const btnStart = $('#btnStart');
  const btnStop = $('#btnStop');
  const btnUpload = $('#btnUpload');
  const statusEl = $('#status');
  const debugEl = $('#debug');
  const v = $('#video');
  const a = $('#audio');

  const params = new URLSearchParams(location.search);

  const API_BASE = (params.get('api') || window.location.origin).replace(/\/+$/, '');

  let mode = (params.get('mode') || 'video').toLowerCase();
  let uid = (params.get('uid') || params.get('linkId') || '').trim();
  let companyId = (params.get('companyId') || '').trim();
  let lang = (params.get('lang') || 'de').toLowerCase();
  let maxSeconds = Number(params.get('maxSeconds') || 0);

  let stream = null;
  let rec = null;
  let chunks = [];
  let startedAt = 0;
  let lastBlob = null;
  let timer = null;
  let lastUploadId = null;
  let lastPutStatus = null;

  function say(message, cls){
    statusEl.textContent = message;
    statusEl.className = 'status ' + (cls || '');
  }

  function post(type, payload){
    try {
      parent?.postMessage?.(Object.assign({ type }, payload || {}), '*');
    } catch (_) {}
  }

  function dbg(label, data){
    const safe = data || {};
    const line = `[${new Date().toISOString()}] ${label}: ${JSON.stringify(safe, null, 2)}`;
    console.log('[RECORDER]', label, safe);
    if (debugEl) {
      debugEl.textContent = line + "\n\n" + debugEl.textContent;
    }
  }

  function stopTimer(){
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
  }

  const fmt = (ms) => {
    const s = Math.floor(ms / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    return `${mm}:${ss}`;
  };

  function pickMimeType(){
    if (mode === 'audio') {
      if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
      return 'audio/webm';
    }

    if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')) return 'video/webm;codecs=vp9,opus';
    if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')) return 'video/webm;codecs=vp8,opus';
    return 'video/webm';
  }

  async function startRecording(){
    try {
      dbg('init:params', { API_BASE, uid, companyId, mode, lang, maxSeconds });

      if (!uid) throw new Error('UID fehlt. URL braucht ?uid=...');
      if (!companyId) throw new Error('companyId fehlt. URL braucht ?companyId=...');

      say('Zugriff auf Kamera/Mikro …', 'warn');

      const constraints = (mode === 'audio')
        ? { audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true }, video:false }
        : {
            audio:{ echoCancellation:true, noiseSuppression:true, autoGainControl:true },
            video:{ width:{ ideal:1280 }, height:{ ideal:720 } }
          };

      stream = await navigator.mediaDevices.getUserMedia(constraints);

      if (mode === 'video') {
        v.srcObject = stream;
        v.muted = true;
        v.controls = false;
        v.style.display = 'block';
        a.style.display = 'none';
        await v.play().catch(() => {});
      } else {
        v.style.display = 'none';
        a.style.display = 'block';
      }

      chunks = [];
      lastBlob = null;
      lastUploadId = null;
      lastPutStatus = null;

      const mimeType = pickMimeType();
      dbg('recording:mime', { mimeType });

      rec = new MediaRecorder(stream, { mimeType });

      rec.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) {
          chunks.push(event.data);
        }
      };

      rec.onstop = handleStop;

      rec.start(250);
      startedAt = Date.now();

      say('Recording …', 'ok');
      post('recorder:started', { uid, companyId, mode, lang });

      btnStart.disabled = true;
      btnStop.disabled = false;
      btnUpload.disabled = true;

      stopTimer();

      if (maxSeconds > 0) {
        timer = setInterval(() => {
          const elapsedSec = (Date.now() - startedAt) / 1000;
          say(`Recording … ${fmt(Date.now() - startedAt)} / ${maxSeconds}s`, 'ok');
          if (elapsedSec >= maxSeconds) stopRecording();
        }, 250);
      } else {
        timer = setInterval(() => {
          say(`Recording … ${fmt(Date.now() - startedAt)}`, 'ok');
        }, 250);
      }
    } catch (err) {
      const msg = String(err?.message || err);
      say(msg, 'err');
      dbg('recording:error', { error: msg });
      post('recorder:error', { message: msg });
    }
  }

  async function stopRecording(){
    try {
      stopTimer();

      if (rec && rec.state !== 'inactive') {
        rec.stop();
      }

      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }

      btnStop.disabled = true;
      say('Verarbeite …', 'warn');
    } catch (err) {
      const msg = String(err?.message || err);
      say('Stop fehlgeschlagen.', 'err');
      dbg('stop:error', { error: msg });
      post('recorder:error', { message: msg });
    }
  }

  async function handleStop(){
    try {
      lastBlob = new Blob(chunks, {
        type: mode === 'audio' ? 'audio/webm' : 'video/webm'
      });

      dbg('recording:blob', {
        type: lastBlob.type,
        size: lastBlob.size,
        durationMs: Date.now() - startedAt
      });

      const localUrl = URL.createObjectURL(lastBlob);

      if (mode === 'video') {
        v.srcObject = null;
        v.src = localUrl;
        v.muted = false;
        v.controls = true;
        v.play().catch(() => {});
      } else {
        a.src = localUrl;
        a.load();
      }

      say('Bereit zum Upload …', 'ok');
      btnUpload.disabled = false;

      await doMuxUpload();
    } catch (err) {
      const msg = String(err?.message || err);
      say('Verarbeitung fehlgeschlagen.', 'err');
      dbg('handleStop:error', { error: msg });
      post('recorder:error', { message: msg });
    }
  }

  async function readJsonSafe(res){
    const contentType = res.headers.get('content-type') || '';

    if (contentType.includes('json')) {
      return res.json();
    }

    const text = await res.text();
    throw new Error(`Non-JSON (${res.status}): ${text.slice(0, 300)}…`);
  }

  async function pollAsset(uploadId, maxMs = 120000){
    const start = Date.now();
    let last = null;

    while (Date.now() - start < maxMs) {
      await new Promise((resolve) => setTimeout(resolve, 3000));

      const response = await fetch(`${API_BASE}/api/mux-asset?uploadId=${encodeURIComponent(uploadId)}`);
      const json = await readJsonSafe(response);
      last = json;

      dbg('mux-asset:poll', {
        uploadId,
        assetStatus: json?.assetStatus || '',
        assetId: json?.assetId || '',
        playbackId: json?.playbackId || '',
        playbackUrlPresent: !!json?.playbackUrl,
        downloadUrlPresent: !!json?.downloadUrl,
        audioOnlyUrlPresent: !!json?.audioOnlyUrl,
        staticRenditionsStatus: json?.staticRenditionsStatus || '',
        error: json?.error || ''
      });

      if (json?.assetStatus === 'ready' && json?.playbackId) {
        return json;
      }

      if (json?.assetStatus === 'errored') {
        return json;
      }
    }

    return last;
  }

  async function doMuxUpload(){
    if (!lastBlob) {
      say('Nichts zum Hochladen.', 'warn');
      return;
    }

    try {
      say('Upload vorbereiten …', 'warn');
      btnUpload.disabled = true;

      dbg('mux-upload:start', {
        API_BASE,
        uid,
        companyId,
        sessionId: uid,
        mode,
        size: lastBlob.size,
        type: lastBlob.type
      });

      if (!uid) throw new Error('UID fehlt im Recorder. Prüfe URL-Parameter ?uid=...');
      if (!companyId) throw new Error('companyId fehlt im Recorder. Prüfe URL-Parameter ?companyId=...');

      const createResponse = await fetch(`${API_BASE}/api/mux-upload`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          uid,
          companyId,
          sessionId: uid,
          mode
        })
      });

      const createJson = await readJsonSafe(createResponse);

      dbg('mux-upload:response', {
        ok: createJson?.ok,
        error: createJson?.error || '',
        message: createJson?.message || '',
        uploadId: createJson?.uploadId || '',
        uploadUrlPresent: !!createJson?.uploadUrl,
        uploadUrlPrefix: createJson?.uploadUrl ? String(createJson.uploadUrl).slice(0, 48) : ''
      });

      if (!createJson?.ok) {
        throw new Error(createJson?.message || createJson?.error || 'Mux upload create failed');
      }

      if (!createJson?.uploadUrl) {
        throw new Error(createJson?.error || 'No uploadUrl');
      }

      lastUploadId = createJson.uploadId || null;

      say('Lade zu Mux hoch …', 'warn');

      dbg('mux-put:start', {
        uploadId: lastUploadId,
        blobType: lastBlob.type,
        blobSize: lastBlob.size
      });

      const putResponse = await fetch(createJson.uploadUrl, {
        method: 'PUT',
        body: lastBlob,
        headers: {
          'Content-Type': lastBlob.type || (mode === 'audio' ? 'audio/webm' : 'video/webm')
        }
      });

      lastPutStatus = putResponse.status;

      dbg('mux-put:done', {
        putStatus: putResponse.status,
        ok: putResponse.ok
      });

      if (!putResponse.ok) {
        const putText = await putResponse.text().catch(() => '');
        throw new Error(`Upload failed (${putResponse.status}) ${putText.slice(0, 300)}`);
      }

      say('Upload fertig – prüfe Mux Asset …', 'warn');

      const firstStatusResponse = await fetch(`${API_BASE}/api/mux-asset?uploadId=${encodeURIComponent(lastUploadId)}`);
      let assetJson = await readJsonSafe(firstStatusResponse);

      dbg('mux-asset:first', {
        uploadId: lastUploadId,
        assetStatus: assetJson?.assetStatus || '',
        assetId: assetJson?.assetId || '',
        playbackId: assetJson?.playbackId || '',
        playbackUrlPresent: !!assetJson?.playbackUrl,
        downloadUrlPresent: !!assetJson?.downloadUrl,
        audioOnlyUrlPresent: !!assetJson?.audioOnlyUrl,
        staticRenditionsStatus: assetJson?.staticRenditionsStatus || '',
        error: assetJson?.error || ''
      });

      if (!(assetJson?.assetStatus === 'ready' && assetJson?.playbackId)) {
        const polled = await pollAsset(lastUploadId);
        if (polled) assetJson = polled;
      }

      dbg('mux-asset:final', {
        uploadId: lastUploadId,
        assetStatus: assetJson?.assetStatus || '',
        assetId: assetJson?.assetId || '',
        playbackId: assetJson?.playbackId || '',
        playbackUrlPresent: !!assetJson?.playbackUrl,
        downloadUrlPresent: !!assetJson?.downloadUrl,
        audioOnlyUrlPresent: !!assetJson?.audioOnlyUrl,
        staticRenditionsStatus: assetJson?.staticRenditionsStatus || '',
        error: assetJson?.error || ''
      });

      const playableUrl = assetJson?.downloadUrl || assetJson?.playbackUrl || '';

      if (playableUrl) {
        if (mode === 'video') {
          v.src = playableUrl;
          v.controls = true;
        } else {
          a.src = assetJson?.audioOnlyUrl || playableUrl;
          a.load();
        }
      }

      const finalPayload = {
        durationMs: Date.now() - startedAt,
        size: lastBlob.size,
        uploadUrl: assetJson?.downloadUrl || assetJson?.playbackUrl || '',
        mux: {
          provider: 'mux',
          uploadId: lastUploadId || '',
          putStatus: lastPutStatus,
          assetStatus: assetJson?.assetStatus || '',
          assetId: assetJson?.assetId || '',
          playbackId: assetJson?.playbackId || '',
          playbackUrl: assetJson?.playbackUrl || '',
          downloadUrl: assetJson?.downloadUrl || '',
          audioOnlyUrl: assetJson?.audioOnlyUrl || '',
          staticRenditionsStatus: assetJson?.staticRenditionsStatus || '',
          error: assetJson?.error || ''
        }
      };

      dbg('recorder:finished', finalPayload);

      if (assetJson?.assetStatus === 'ready') {
        say('✅ Upload erfolgreich. Mux Asset bereit.', 'ok');
      } else if (assetJson?.assetStatus === 'processing' || assetJson?.assetStatus === 'waiting') {
        say('Upload erfolgreich. Mux verarbeitet noch.', 'warn');
      } else if (assetJson?.assetStatus === 'errored') {
        say('Upload angekommen, aber Mux-Verarbeitung fehlerhaft.', 'err');
      } else {
        say('Upload abgeschlossen. Status unklar.', 'warn');
      }

      post('recorder:finished', finalPayload);
    } catch (err) {
      const msg = String(err?.message || err);

      say('Upload-Fehler – Bericht kann trotzdem gebaut werden.', 'err');

      const errorPayload = {
        durationMs: Date.now() - startedAt,
        size: lastBlob?.size || 0,
        uploadUrl: '',
        mux: {
          provider: 'mux',
          uploadId: lastUploadId || '',
          putStatus: lastPutStatus,
          assetStatus: '',
          assetId: '',
          playbackId: '',
          playbackUrl: '',
          downloadUrl: '',
          audioOnlyUrl: '',
          staticRenditionsStatus: '',
          error: msg
        }
      };

      dbg('mux-upload:error', errorPayload);
      console.error('Mux upload error:', err);

      post('recorder:finished', errorPayload);
    }
  }

  btnStart.addEventListener('click', startRecording);
  btnStop.addEventListener('click', stopRecording);
  btnUpload.addEventListener('click', doMuxUpload);

  // Parent/Wix Steuerung bleibt erhalten.
  window.addEventListener('message', (event) => {
    const data = event?.data || {};
    const type = data.type || '';

    if (type === 'start') {
      mode = (data.mode || mode || 'video').toLowerCase();
      uid = String(data.uid || uid || '').trim();
      companyId = String(data.companyId || companyId || '').trim();
      lang = String(data.lang || lang || 'de').toLowerCase();
      maxSeconds = Number(data.maxSeconds || maxSeconds || 0);

      dbg('parent:start', { uid, companyId, mode, lang, maxSeconds });
      startRecording();
    }

    if (type === 'stop') {
      stopRecording();
    }

    if (type === 'export') {
      doMuxUpload();
    }
  });

  dbg('page:ready', { API_BASE, uid, companyId, mode, lang, maxSeconds });
  post('recorder:ready', { uid, companyId, mode, lang });
})();
</script>
</body>
</html>
