
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CLARITY Video Presentation Live Recorder</title>
  <style>
    :root{--bg:#060914;--card:rgba(255,255,255,.075);--line:rgba(255,255,255,.14);--text:#f5f8ff;--muted:rgba(245,248,255,.7);--brand:#8fc7ff;--brand2:#d9efff;--pink:#d9008d;--cyan:#21d6d9;--danger:#ff6d7a;--ok:#93ffd2;}
    *{box-sizing:border-box} body{margin:0;background:transparent;color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;}
    .stage{display:grid;gap:12px}
    .video-shell{position:relative;width:100%;aspect-ratio:16/10;background:#05070d;border-radius:22px;overflow:hidden;border:1px solid var(--line);display:grid;place-items:center;}
    video{width:100%;height:100%;object-fit:cover;background:#05070d;}
    .empty{position:absolute;inset:0;display:grid;place-items:center;color:rgba(245,248,255,.52);text-align:center;padding:22px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(0,0,0,.18));}
    .ring{position:absolute;inset:16px;border-radius:18px;border:2px solid rgba(255,109,122,.72);box-shadow:0 0 34px rgba(255,109,122,.3),inset 0 0 30px rgba(255,109,122,.12);pointer-events:none;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(.992)}}
    .rec-indicator{position:absolute;top:13px;left:13px;border:1px solid rgba(255,109,122,.45);background:rgba(255,109,122,.18);color:#fff;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;display:flex;gap:7px;align-items:center;}
    .dot{width:8px;height:8px;border-radius:50%;background:#ff5268;box-shadow:0 0 18px rgba(255,82,104,.85);animation:blink 1.1s infinite} @keyframes blink{50%{opacity:.35}}
    .hidden{display:none!important}
    .bars{display:grid;gap:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.055);border-radius:18px;padding:12px;}
    .barrow{display:grid;grid-template-columns:92px 1fr 70px;gap:10px;align-items:center;color:var(--muted);font-size:12px;}
    .track{height:10px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;border:1px solid rgba(255,255,255,.08);}
    .fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),#0b58b8,var(--pink));box-shadow:0 0 22px rgba(33,214,217,.28);transition:width .18s linear;}
    .fill.sound{background:linear-gradient(90deg,#8fc7ff,#21d6d9,#93ffd2);}
    .timer{font-variant-numeric:tabular-nums;color:var(--brand2);text-align:right;}
    .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
    button{position:relative;border:0;border-radius:999px;padding:12px 17px;color:#07101e;background:linear-gradient(135deg,#fff,#96ccff);font-weight:900;cursor:pointer;box-shadow:0 0 28px rgba(143,199,255,.25);overflow:hidden;}
    button.secondary{color:var(--text);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);box-shadow:none;}
    button.danger{color:#fff;background:rgba(255,109,122,.18);border:1px solid rgba(255,109,122,.35);box-shadow:none;}
    button:disabled{opacity:.45;cursor:not-allowed;}
    .status{min-height:22px;color:var(--muted);font-size:13px;line-height:1.4} .status.ok{color:var(--ok)} .status.err{color:var(--danger)}
  </style>
</head>
<body>
  <div class="stage">
    <div class="video-shell">
      <div class="empty" id="empty">Camera preview will appear here.</div>
      <video id="video" playsinline muted></video>
      <div id="ring" class="ring hidden"></div>
      <div id="recBadge" class="rec-indicator hidden"><span class="dot"></span><span id="recordingLabel">Recording</span></div>
    </div>
    <div class="bars">
      <div class="barrow"><span id="lengthLabel">Length</span><div class="track"><div class="fill" id="timeFill"></div></div><span class="timer" id="timer">00:00 / 03:00</span></div>
      <div class="barrow"><span id="soundLabel">Sound</span><div class="track"><div class="fill sound" id="soundFill"></div></div><span class="timer" id="soundText">—</span></div>
    </div>
    <div class="controls">
      <button id="startCamera">Start camera</button>
      <button class="secondary" id="startRecording" disabled>Start recording</button>
      <button class="danger" id="stopRecording" disabled>Stop</button>
      <button class="secondary" id="retake" disabled>Record again</button>
      <button id="submit" disabled>Submit presentation</button>
    </div>
    <div class="status" id="status">Waiting for setup …</div>
  </div>
<script>
const SUPPORTED = ['en','de','es','fr','it','nl','pt','pl','tr','ar'];
const I18N = {
  en: {cameraEmpty:'Camera preview will appear here.',recording:'Recording',length:'Length',sound:'Sound',startCamera:'Start camera',startRecording:'Start recording',stop:'Stop',retake:'Record again',submit:'Submit presentation',waiting:'Waiting for setup …',needDetails:'Please enter your details and consent before submitting.',cameraReady:'Camera ready. Start recording when you are ready.',noAccess:'Camera or microphone access was not granted.',recordingNow:'Recording … You can stop when finished.',preview:'Preview your recording. You can submit it or record again.',newRecording:'Ready for a new recording.',uploading:'Uploading your presentation. Please keep this page open …',uploadFailed:'Upload failed.',unsupported:'This browser does not support video recording.'},
  de: {cameraEmpty:'Die Kameravorschau erscheint hier.',recording:'Aufnahme',length:'Länge',sound:'Ton',startCamera:'Kamera starten',startRecording:'Aufnahme starten',stop:'Stoppen',retake:'Neu aufnehmen',submit:'Vorstellung einreichen',waiting:'Warte auf Einrichtung …',needDetails:'Bitte geben Sie Ihre Daten ein und bestätigen Sie die Einwilligung.',cameraReady:'Kamera bereit. Starten Sie die Aufnahme, wenn Sie bereit sind.',noAccess:'Kamera- oder Mikrofonzugriff wurde nicht freigegeben.',recordingNow:'Aufnahme läuft … Sie können stoppen, wenn Sie fertig sind.',preview:'Prüfen Sie Ihre Aufnahme. Sie können einreichen oder neu aufnehmen.',newRecording:'Bereit für eine neue Aufnahme.',uploading:'Ihre Vorstellung wird hochgeladen. Bitte bleiben Sie auf dieser Seite …',uploadFailed:'Upload fehlgeschlagen.',unsupported:'Dieser Browser unterstützt keine Videoaufnahme.'},
  es: {cameraEmpty:'La vista previa de la cámara aparecerá aquí.',recording:'Grabando',length:'Duración',sound:'Sonido',startCamera:'Iniciar cámara',startRecording:'Iniciar grabación',stop:'Detener',retake:'Grabar de nuevo',submit:'Enviar presentación',waiting:'Esperando configuración …',needDetails:'Introduzca sus datos y confirme el consentimiento.',cameraReady:'Cámara lista. Inicie la grabación cuando quiera.',noAccess:'No se concedió acceso a cámara o micrófono.',recordingNow:'Grabando … Puede detener cuando termine.',preview:'Revise su grabación. Puede enviarla o repetirla.',newRecording:'Listo para una nueva grabación.',uploading:'Subiendo su presentación. Mantenga esta página abierta …',uploadFailed:'Error al subir.',unsupported:'Este navegador no admite grabación de vídeo.'},
  fr: {cameraEmpty:'L’aperçu de la caméra apparaîtra ici.',recording:'Enregistrement',length:'Durée',sound:'Son',startCamera:'Démarrer la caméra',startRecording:'Démarrer l’enregistrement',stop:'Arrêter',retake:'Réenregistrer',submit:'Envoyer la présentation',waiting:'En attente de configuration …',needDetails:'Veuillez saisir vos informations et confirmer le consentement.',cameraReady:'Caméra prête. Lancez l’enregistrement quand vous êtes prêt.',noAccess:'L’accès à la caméra ou au microphone n’a pas été accordé.',recordingNow:'Enregistrement … Vous pouvez arrêter lorsque vous avez terminé.',preview:'Vérifiez votre enregistrement. Vous pouvez l’envoyer ou recommencer.',newRecording:'Prêt pour un nouvel enregistrement.',uploading:'Votre présentation est en cours d’envoi. Veuillez rester sur cette page …',uploadFailed:'Échec de l’envoi.',unsupported:'Ce navigateur ne prend pas en charge l’enregistrement vidéo.'},
  it: {cameraEmpty:'L’anteprima della fotocamera apparirà qui.',recording:'Registrazione',length:'Durata',sound:'Audio',startCamera:'Avvia fotocamera',startRecording:'Avvia registrazione',stop:'Ferma',retake:'Registra di nuovo',submit:'Invia presentazione',waiting:'In attesa della configurazione …',needDetails:'Inserisci i dati e conferma il consenso.',cameraReady:'Fotocamera pronta. Avvia la registrazione quando sei pronto.',noAccess:'Accesso a fotocamera o microfono non concesso.',recordingNow:'Registrazione in corso … Puoi fermarti quando hai finito.',preview:'Controlla la registrazione. Puoi inviarla o rifarla.',newRecording:'Pronto per una nuova registrazione.',uploading:'Caricamento della presentazione. Rimani su questa pagina …',uploadFailed:'Caricamento non riuscito.',unsupported:'Questo browser non supporta la registrazione video.'},
  nl: {cameraEmpty:'Cameravoorbeeld verschijnt hier.',recording:'Opname',length:'Lengte',sound:'Geluid',startCamera:'Camera starten',startRecording:'Opname starten',stop:'Stoppen',retake:'Opnieuw opnemen',submit:'Presentatie indienen',waiting:'Wachten op instellingen …',needDetails:'Vul uw gegevens in en bevestig toestemming.',cameraReady:'Camera klaar. Start de opname wanneer u klaar bent.',noAccess:'Camera- of microfoontoegang is niet toegestaan.',recordingNow:'Opname loopt … Stop wanneer u klaar bent.',preview:'Bekijk uw opname. U kunt indienen of opnieuw opnemen.',newRecording:'Klaar voor een nieuwe opname.',uploading:'Uw presentatie wordt geüpload. Blijf op deze pagina …',uploadFailed:'Upload mislukt.',unsupported:'Deze browser ondersteunt geen video-opname.'},
  pt: {cameraEmpty:'A pré-visualização da câmara aparecerá aqui.',recording:'Gravando',length:'Duração',sound:'Som',startCamera:'Iniciar câmara',startRecording:'Iniciar gravação',stop:'Parar',retake:'Gravar novamente',submit:'Enviar apresentação',waiting:'A aguardar configuração …',needDetails:'Introduza os seus dados e confirme o consentimento.',cameraReady:'Câmara pronta. Inicie a gravação quando estiver pronto.',noAccess:'O acesso à câmara ou ao microfone não foi concedido.',recordingNow:'A gravar … Pode parar quando terminar.',preview:'Reveja a gravação. Pode enviar ou gravar novamente.',newRecording:'Pronto para uma nova gravação.',uploading:'A enviar a apresentação. Mantenha esta página aberta …',uploadFailed:'Falha no envio.',unsupported:'Este navegador não suporta gravação de vídeo.'},
  pl: {cameraEmpty:'Podgląd kamery pojawi się tutaj.',recording:'Nagrywanie',length:'Długość',sound:'Dźwięk',startCamera:'Uruchom kamerę',startRecording:'Rozpocznij nagrywanie',stop:'Stop',retake:'Nagraj ponownie',submit:'Prześlij prezentację',waiting:'Oczekiwanie na konfigurację …',needDetails:'Wpisz dane i potwierdź zgodę.',cameraReady:'Kamera gotowa. Rozpocznij nagrywanie, gdy będziesz gotowy.',noAccess:'Nie przyznano dostępu do kamery lub mikrofonu.',recordingNow:'Nagrywanie … Zatrzymaj, gdy skończysz.',preview:'Sprawdź nagranie. Możesz wysłać lub nagrać ponownie.',newRecording:'Gotowe do nowego nagrania.',uploading:'Przesyłanie prezentacji. Pozostań na tej stronie …',uploadFailed:'Przesyłanie nie powiodło się.',unsupported:'Ta przeglądarka nie obsługuje nagrywania wideo.'},
  tr: {cameraEmpty:'Kamera önizlemesi burada görünecek.',recording:'Kayıt',length:'Süre',sound:'Ses',startCamera:'Kamerayı başlat',startRecording:'Kaydı başlat',stop:'Durdur',retake:'Tekrar kaydet',submit:'Sunumu gönder',waiting:'Kurulum bekleniyor …',needDetails:'Lütfen bilgilerinizi girin ve onayı işaretleyin.',cameraReady:'Kamera hazır. Hazır olduğunuzda kayda başlayın.',noAccess:'Kamera veya mikrofon izni verilmedi.',recordingNow:'Kayıt devam ediyor … Bitirdiğinizde durdurabilirsiniz.',preview:'Kaydınızı kontrol edin. Gönderebilir veya tekrar kaydedebilirsiniz.',newRecording:'Yeni kayıt için hazır.',uploading:'Sunumunuz yükleniyor. Lütfen bu sayfada kalın …',uploadFailed:'Yükleme başarısız.',unsupported:'Bu tarayıcı video kaydını desteklemiyor.'},
  ar: {cameraEmpty:'ستظهر معاينة الكاميرا هنا.',recording:'جارٍ التسجيل',length:'المدة',sound:'الصوت',startCamera:'تشغيل الكاميرا',startRecording:'بدء التسجيل',stop:'إيقاف',retake:'إعادة التسجيل',submit:'إرسال العرض',waiting:'في انتظار الإعداد …',needDetails:'يرجى إدخال بياناتك وتأكيد الموافقة.',cameraReady:'الكاميرا جاهزة. ابدأ التسجيل عندما تكون مستعدًا.',noAccess:'لم يتم منح إذن الكاميرا أو الميكروفون.',recordingNow:'جارٍ التسجيل … يمكنك الإيقاف عند الانتهاء.',preview:'راجع التسجيل. يمكنك إرساله أو إعادة التسجيل.',newRecording:'جاهز لتسجيل جديد.',uploading:'يتم رفع العرض. يرجى البقاء على هذه الصفحة …',uploadFailed:'فشل الرفع.',unsupported:'هذا المتصفح لا يدعم تسجيل الفيديو.'}
};
const state={lang:'en',maxDurationSec:180,stream:null,recorder:null,chunks:[],blob:null,mime:'video/webm',recordStart:0,timer:null,audioCtx:null,analyser:null,soundTimer:null,canSubmit:false,durationSec:0};
const $=id=>document.getElementById(id);
const post=(type,payload={})=>window.parent.postMessage({type,payload},'*');
function t(k){return (I18N[state.lang]||I18N.en)[k]||I18N.en[k]||k;}
function normLang(x){x=String(x||'en').toLowerCase().trim();const a={deutsch:'de',german:'de',englisch:'en',english:'en',spanisch:'es',spanish:'es',español:'es',französisch:'fr',franzoesisch:'fr',french:'fr','français':'fr',italienisch:'it',italian:'it',niederländisch:'nl',niederlaendisch:'nl',dutch:'nl',portugiesisch:'pt',portuguese:'pt',polnisch:'pl',polish:'pl',türkisch:'tr',tuerkisch:'tr',turkish:'tr',arabisch:'ar',arabic:'ar'};x=a[x]||x;return SUPPORTED.includes(x)?x:'en';}
function fmt(sec){sec=Math.max(0,Math.floor(sec||0));const m=String(Math.floor(sec/60)).padStart(2,'0');const s=String(sec%60).padStart(2,'0');return `${m}:${s}`;}
function setStatus(msg,kind=''){$('status').textContent=msg;$('status').className='status '+kind;}
function applyText(){$('empty').textContent=t('cameraEmpty');$('recordingLabel').textContent=t('recording');$('lengthLabel').textContent=t('length');$('soundLabel').textContent=t('sound');$('startCamera').textContent=t('startCamera');$('startRecording').textContent=t('startRecording');$('stopRecording').textContent=t('stop');$('retake').textContent=t('retake');$('submit').textContent=t('submit');setStatus(t('waiting'));updateBars(0,0);}
function updateBars(elapsed, level){const max=Math.max(30,Number(state.maxDurationSec||180));const pct=Math.min(100,(elapsed/max)*100);$('timeFill').style.width=pct+'%';$('timer').textContent=`${fmt(elapsed)} / ${fmt(max)}`;$('soundFill').style.width=Math.min(100,Math.max(0,level||0))+'%';$('soundText').textContent=level?Math.round(level)+'%':'—';}
function updateSubmit(){$('submit').disabled=!(state.blob&&state.canSubmit);}
async function startCamera(){try{if(!navigator.mediaDevices?.getUserMedia) throw new Error(t('unsupported'));state.stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});$('video').srcObject=state.stream;$('video').muted=true;$('video').controls=false;await $('video').play();$('empty').classList.add('hidden');$('startCamera').disabled=true;$('startRecording').disabled=false;setupAudioMeter();setStatus(t('cameraReady'),'ok');post('VP_LIVE_CAMERA_READY',{});}catch(err){setStatus(t('noAccess'),'err');post('VP_LIVE_ERROR',{message:t('noAccess'),raw:String(err?.message||err)});}}
function setupAudioMeter(){try{state.audioCtx=new (window.AudioContext||window.webkitAudioContext)();const src=state.audioCtx.createMediaStreamSource(state.stream);state.analyser=state.audioCtx.createAnalyser();state.analyser.fftSize=256;src.connect(state.analyser);const data=new Uint8Array(state.analyser.frequencyBinCount);clearInterval(state.soundTimer);state.soundTimer=setInterval(()=>{if(!state.analyser)return;state.analyser.getByteFrequencyData(data);const avg=data.reduce((a,b)=>a+b,0)/data.length;updateBars(currentElapsed(),Math.min(100,(avg/128)*100));},160);}catch(_){}}
function currentElapsed(){return state.recordStart?Math.floor((Date.now()-state.recordStart)/1000):state.durationSec||0;}
function pickMime(){const types=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];return types.find(x=>window.MediaRecorder&&MediaRecorder.isTypeSupported(x))||'video/webm';}
function startRecording(){if(!state.stream)return;if(!window.MediaRecorder){setStatus(t('unsupported'),'err');return;}state.chunks=[];state.blob=null;state.durationSec=0;state.mime=pickMime();state.recorder=new MediaRecorder(state.stream,{mimeType:state.mime});state.recorder.ondataavailable=e=>{if(e.data&&e.data.size)state.chunks.push(e.data);};state.recorder.onstop=onRecordingStop;state.recorder.start(1000);state.recordStart=Date.now();$('ring').classList.remove('hidden');$('recBadge').classList.remove('hidden');$('startRecording').disabled=true;$('stopRecording').disabled=false;$('retake').disabled=true;$('submit').disabled=true;setStatus(t('recordingNow'));post('VP_LIVE_RECORDING_STARTED',{});clearInterval(state.timer);state.timer=setInterval(()=>{const elapsed=currentElapsed();updateBars(elapsed,0);post('VP_LIVE_TICK',{elapsedSec:elapsed,maxDurationSec:state.maxDurationSec});if(elapsed>=state.maxDurationSec)stopRecording();},250);}
function stopRecording(){if(state.recorder&&state.recorder.state!=='inactive')state.recorder.stop();}
function onRecordingStop(){clearInterval(state.timer);state.durationSec=currentElapsed();state.recordStart=0;state.blob=new Blob(state.chunks,{type:state.mime});const url=URL.createObjectURL(state.blob);$('video').srcObject=null;$('video').src=url;$('video').muted=false;$('video').controls=true;$('video').play().catch(()=>{});$('ring').classList.add('hidden');$('recBadge').classList.add('hidden');$('startRecording').disabled=true;$('stopRecording').disabled=true;$('retake').disabled=false;updateSubmit();setStatus(t('preview'),'ok');post('VP_LIVE_HAS_RECORDING',{durationSec:state.durationSec,sizeBytes:state.blob.size,mimeType:state.blob.type});}
async function retake(){state.blob=null;state.durationSec=0;$('video').controls=false;$('video').src='';$('video').muted=true;if(!state.stream||!state.stream.active){state.stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});setupAudioMeter();}$('video').srcObject=state.stream;await $('video').play();$('startRecording').disabled=false;$('retake').disabled=true;updateSubmit();setStatus(t('newRecording'));updateBars(0,0);}
function requestSubmit(){if(!state.blob) return; if(!state.canSubmit){setStatus(t('needDetails'),'err');post('VP_LIVE_SUBMIT_BLOCKED',{reason:'details_or_consent_missing'});return;}$('submit').disabled=true;$('retake').disabled=true;post('VP_LIVE_SUBMIT_REQUEST',{durationSec:state.durationSec,sizeBytes:state.blob.size,mimeType:state.blob.type});}
function uploadToMux(payload){if(!state.blob||!payload?.uploadUrl){setStatus(t('uploadFailed'),'err');return;}setStatus(t('uploading'));const xhr=new XMLHttpRequest();xhr.open('PUT',payload.uploadUrl,true);xhr.setRequestHeader('Content-Type',state.blob.type||'video/webm');xhr.upload.onprogress=(e)=>{if(e.lengthComputable)post('VP_LIVE_UPLOAD_PROGRESS',{percent:Math.round((e.loaded/e.total)*100),loaded:e.loaded,total:e.total});};xhr.onload=()=>{if(xhr.status>=200&&xhr.status<300){post('VP_LIVE_UPLOAD_DONE',{sessionId:payload.sessionId,uploadId:payload.uploadId});}else{setStatus(t('uploadFailed'),'err');post('VP_LIVE_ERROR',{message:t('uploadFailed'),status:xhr.status});}};xhr.onerror=()=>{setStatus(t('uploadFailed'),'err');post('VP_LIVE_ERROR',{message:t('uploadFailed')});};xhr.send(state.blob);}
window.addEventListener('message',event=>{const msg=event.data||{};const type=msg.type;const payload=msg.payload||{};if(type==='VP_LIVE_INIT'){state.lang=normLang(payload.flowLang);state.maxDurationSec=Math.max(30,Number(payload.maxDurationSec||180));applyText();post('VP_LIVE_READY',{version:'live_v1_3'});}if(type==='VP_LIVE_CAN_SUBMIT'){state.canSubmit=!!payload.canSubmit;updateSubmit();}if(type==='VP_LIVE_UPLOAD_TO_MUX')uploadToMux(payload);if(type==='VP_LIVE_LOCK'){['startCamera','startRecording','stopRecording','retake','submit'].forEach(id=>$(id).disabled=true);}});
$('startCamera').onclick=startCamera;$('startRecording').onclick=startRecording;$('stopRecording').onclick=stopRecording;$('retake').onclick=retake;$('submit').onclick=requestSubmit;applyText();post('VP_LIVE_READY',{version:'live_v1_3_boot'});
</script>
</body>
</html>
